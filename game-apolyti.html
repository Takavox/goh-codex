  _bindCompEvents(c){
    const ed=Utils.$("#dev-editor"); if(!ed) return;
    ed.querySelectorAll("[data-field]").forEach(inp=>{inp.addEventListener(inp.tagName==="SELECT"||inp.tagName==="TEXTAREA"?"change":"input",(e)=>{e.stopPropagation();c[inp.dataset.field]=inp.value;this._dirty=true;});});
    ed.querySelectorAll("[data-stat]").forEach(inp=>{inp.addEventListener("input",(e)=>{e.stopPropagation();c.base_stats[inp.dataset.stat]=parseFloat(inp.value)||0;this._dirty=true;});});
    ed.querySelectorAll("[data-growth]").forEach(inp=>{inp.addEventListener("input",(e)=>{e.stopPropagation();c.growth_rates[inp.dataset.growth]=parseFloat(inp.value)||0;this._dirty=true;});});

    // Multi-category checkboxes
    ed.querySelectorAll("[data-cat]").forEach(cb=>{cb.addEventListener("change",(e)=>{
      e.stopPropagation();
      const checked=[]; ed.querySelectorAll("[data-cat]:checked").forEach(x=>checked.push(x.dataset.cat));
      c.categories=checked; c.category=checked[0]||"Guerrier"; this._dirty=true;
    });});

    // Image uploads
    const upload=(field)=>{const inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.onchange=(ev)=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=(re)=>{c[field]=re.target.result;this._dirty=true;this._render();};r.readAsDataURL(f);};inp.click();};
    Utils.$("#dev-up-portrait")?.addEventListener("click",(e)=>{e.stopPropagation();upload("portrait_path");});
    Utils.$("#dev-up-sprite")?.addEventListener("click",(e)=>{e.stopPropagation();upload("sprite_path");});

    // Leader skill
    const syncLS=()=>{
      if(!c.leader_skill) c.leader_skill={name:"",condition:{type:"always"},bonuses:[]};
      c.leader_skill.name=Utils.$("#dev-ls-name")?.value||"";
      c.leader_skill.condition={type:Utils.$("#dev-ls-cond-type")?.value||"always",category:Utils.$("#dev-ls-cond-cat")?.value||"",count:parseInt(Utils.$("#dev-ls-cond-val")?.value)||0,rarity:Utils.$("#dev-ls-cond-val")?.value||""};
      this._dirty=true;
    };
    Utils.$("#dev-ls-name")?.addEventListener("input",syncLS);
    Utils.$("#dev-ls-cond-type")?.addEventListener("change",syncLS);
    Utils.$("#dev-ls-cond-cat")?.addEventListener("input",syncLS);
    Utils.$("#dev-ls-cond-val")?.addEventListener("input",syncLS);

    ed.querySelectorAll("[data-lsb-type]").forEach(sel=>{sel.addEventListener("change",(e)=>{e.stopPropagation();const i=parseInt(sel.dataset.lsbType);if(c.leader_skill?.bonuses[i])c.leader_skill.bonuses[i].bonus_type=sel.value;this._dirty=true;});});
    ed.querySelectorAll("[data-lsb-val]").forEach(inp=>{inp.addEventListener("input",(e)=>{e.stopPropagation();const i=parseInt(inp.dataset.lsbVal);if(c.leader_skill?.bonuses[i])c.leader_skill.bonuses[i].value=parseFloat(inp.value)||0;this._dirty=true;});});
    ed.querySelectorAll("[data-lsb-cats]").forEach(inp=>{inp.addEventListener("input",(e)=>{e.stopPropagation();const i=parseInt(inp.dataset.lsbCats);if(c.leader_skill?.bonuses[i])c.leader_skill.bonuses[i].target_categories=inp.value?inp.value.split(",").map(s=>s.trim()):[];this._dirty=true;});});
    ed.querySelectorAll("[data-rm-lsb]").forEach(b=>{b.addEventListener("click",(e)=>{e.stopPropagation();c.leader_skill.bonuses.splice(parseInt(b.dataset.rmLsb),1);this._dirty=true;this._render();});});
    Utils.$("#dev-add-lsb")?.addEventListener("click",(e)=>{e.stopPropagation();if(!c.leader_skill)c.leader_skill={name:"",condition:{type:"always"},bonuses:[]};c.leader_skill.bonuses.push({bonus_type:"atk_percent",value:10,target_categories:[]});this._dirty=true;this._render();});

    this._bindActionBtns(c,"companions");
  },

        <div class="form-group"><label>Biome Secondaire</label><select class="form-select" id="gen-biome2">${BIOME_KEYS.filter(b=>!["wall","door","lava","path"].includes(b)).map(b=>`<option value="${b}" ${b==="forest"?"selected":""}>${BIOMES[b].name}</option>`).join("")}</select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Eau ?</label><select class="form-select" id="gen-water"><option value="">Non</option><option value="river">Rivière</option><option value="lake">Lac</option></select></div>

      Utils.$("#gen-create")?.addEventListener("click",(e)=>{

  // ═══════════════════════════════════════
  // SYNERGY CONFIG EDITOR
  // ═══════════════════════════════════════
  _synergyEditor(){
    const frag=document.createDocumentFragment();
    const config=GameData.db.synergy_config||{};
    const allCats=GameData.db.categories||DEFAULT_CATEGORIES;

    let html='<p style="font-size:12px;color:#9a8e7a;margin-bottom:12px">Configurez les bonus de synergie par catégorie. 2 membres = base, 3 = ×1.5, 4 = ×2.</p>';

    for(const cat of allCats){
      const cfg=config[cat]||null;
      const bonuses=cfg?.bonuses||[];
      html+=`<div style="border:1px solid rgba(201,168,76,0.1);border-radius:6px;padding:12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <strong style="color:var(--color-primary)">${cat}</strong>
          <span style="font-size:11px;color:#5c5347">${bonuses.length} bonus</span>
        </div>
        <div id="syn-bonuses-${cat.replace(/\s/g,'_')}" style="margin-top:8px">
          ${bonuses.map((b,i)=>`<div class="dev-loot-row">
            <select class="form-select" data-syn-cat="${cat}" data-syn-idx="${i}" data-syn-field="bonus_type" style="flex:2">${Object.entries(SYNERGY_BONUS_TYPES).map(([k,v])=>`<option value="${k}" ${b.bonus_type===k?"selected":""}>${v.label}</option>`).join("")}</select>
            <input class="form-input form-input-sm" type="number" value="${b.value}" data-syn-cat="${cat}" data-syn-idx="${i}" data-syn-field="value" placeholder="Valeur (base 2 membres)">
            <button class="btn btn-danger btn-sm" data-syn-rm="${cat}" data-syn-rm-idx="${i}">✕</button>
          </div>`).join("")}
        </div>
        <button class="btn btn-secondary btn-sm" data-syn-add="${cat}" style="margin-top:4px">+ Bonus</button>
      </div>`;
    }

    // Add custom category
    html+=`<div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(201,168,76,0.1)">
      <div class="form-row"><div class="form-group"><label>Nouvelle Catégorie</label><input class="form-input" id="syn-new-cat" placeholder="Nom"></div>
      <button class="btn btn-success btn-sm" id="syn-add-cat" style="align-self:flex-end">+ Catégorie</button></div>
    </div>`;

    frag.appendChild(this._sec("⚡ Configuration Synergies",html));

    setTimeout(()=>{
      // Synergy bonus edits
      Utils.$$("[data-syn-field]").forEach(inp=>{
        inp.addEventListener(inp.tagName==="SELECT"?"change":"input",(e)=>{
          e.stopPropagation();
          const cat=inp.dataset.synCat, idx=parseInt(inp.dataset.synIdx), field=inp.dataset.synField;
          if(!config[cat]) config[cat]={name:`Synergie ${cat}`,icon:"⚡",bonuses:[]};
          if(!config[cat].bonuses[idx]) return;
          config[cat].bonuses[idx][field]=field==="value"?(parseFloat(inp.value)||0):inp.value;
          GameData.db.synergy_config=config; this._dirty=true;
        });
      });
      // Remove bonus
      Utils.$$("[data-syn-rm]").forEach(b=>{b.addEventListener("click",(e)=>{
        e.stopPropagation();const cat=b.dataset.synRm,idx=parseInt(b.dataset.synRmIdx);
        if(config[cat]) config[cat].bonuses.splice(idx,1);
        GameData.db.synergy_config=config;this._dirty=true;this._render();
      });});
      // Add bonus
      Utils.$$("[data-syn-add]").forEach(b=>{b.addEventListener("click",(e)=>{
        e.stopPropagation();const cat=b.dataset.synAdd;
        if(!config[cat]) config[cat]={name:`Synergie ${cat}`,icon:"⚡",bonuses:[]};
        config[cat].bonuses.push({bonus_type:"atk_percent",value:10});
        GameData.db.synergy_config=config;this._dirty=true;this._render();
      });});
      // Add category
      Utils.$("#syn-add-cat")?.addEventListener("click",(e)=>{
        e.stopPropagation();const name=Utils.$("#syn-new-cat")?.value?.trim();
        if(name&&!GameData.db.categories.includes(name)){GameData.db.categories.push(name);this._dirty=true;this._render();EventBus.emit("ui:toast",{message:`Catégorie "${name}" ajoutée`,type:"success"});}
      });
    },0);
    return frag;
  },

    setTimeout(()=>{
      const on=(id,fn)=>{Utils.$("#"+id)?.addEventListener("click",(e)=>{e.stopPropagation();fn();});};
      Utils.$("#dev-vis-comp")?.addEventListener("change",(e)=>{e.stopPropagation();Player.setVisibleCompanion(e.target.value||null);});
      Utils.$("#dev-leader")?.addEventListener("change",(e)=>{e.stopPropagation();CompanionSystem.setLeader(e.target.value||null);});
      on("dev-cheat-gold",()=>{GameData.state.player.gold+=10000;HUD.refresh();EventBus.emit("ui:toast",{message:"+10K Or",type:"success"});});
      on("dev-cheat-xp",()=>{GameData.state.player.xp+=5000;HUD.refresh();});
      on("dev-cheat-heal",()=>{GameData.state.player.stats.hp=GameData.state.player.stats.maxHp;HUD.refresh();});
      on("dev-cheat-reset",()=>{if(confirm("Reset?")){localStorage.clear();location.reload();}});
      on("dev-cheat-stones",()=>{for(const s of["xp_stone_small","xp_stone_medium","xp_stone_large"]){const ex=GameData.state.inventory.find(i=>i.itemId===s);if(ex)ex.quantity+=10;else GameData.state.inventory.push({itemId:s,quantity:10});}EventBus.emit("ui:toast",{message:"+10 pierres",type:"success"});});
      on("dev-cheat-party-xp",()=>{CompanionSystem.grantPartyXP(1000,"cheat");HUD.refresh();});
      on("dev-cheat-unlock",()=>{const all=Object.keys(GameData.db.companions);for(const id of all){if(!GameData.state.unlockedCompanions.includes(id))GameData.state.unlockedCompanions.push(id);if(!GameData.state._companionBench)GameData.state._companionBench={};if(!GameData.state._companionBench[id])GameData.state._companionBench[id]=CompanionSystem.createInstance(id);}EventBus.emit("ui:toast",{message:"Tous débloqués",type:"success"});});
      on("dev-c-easy",()=>{DevMode.close();EventBus.emit("combat:start",{enemies:[{enemyId:"enemy_shade",level:1},{enemyId:"enemy_shade",level:2}]});});
      on("dev-c-hard",()=>{DevMode.close();EventBus.emit("combat:start",{enemies:[{enemyId:"enemy_skeleton",level:10},{enemyId:"enemy_infernal_wolf",level:8}]});});
      on("dev-c-boss",()=>{DevMode.close();EventBus.emit("combat:start",{enemies:[{enemyId:"enemy_skeleton",level:25}],context:{canFlee:false}});});
      on("dev-toggle-coll",()=>{Renderer.toggleCollisionDebug();});
      on("dev-toggle-fps",()=>{GameData.state.settings.showFps=!GameData.state.settings.showFps;});
      on("dev-toggle-grid",()=>{GameData.state.settings.showGrid=!GameData.state.settings.showGrid;});
    },0);
    return frag;
  },

  // Helpers
  _sec(title,html){const s=Utils.createElement("div",{className:"dev-section"});s.innerHTML=`<h3 class="dev-section-title">${title}</h3>${html}`;return s;},
  _actionButtons(){const w=Utils.createElement("div",{className:"btn-row",style:{marginTop:"20px",paddingTop:"12px",borderTop:"1px solid rgba(201,168,76,0.08)"}});w.innerHTML=`<button class="btn btn-success btn-sm" id="dev-action-save">💾 Sauver</button><button class="btn btn-secondary btn-sm" id="dev-action-dup">📋 Dupliquer</button><button class="btn btn-danger btn-sm" id="dev-action-del">🗑️ Supprimer</button>`;return w;},
  _bindActionBtns(data,type){
    Utils.$("#dev-action-save")?.addEventListener("click",(e)=>{e.stopPropagation();SaveManager.saveDevData();this._dirty=false;EventBus.emit("ui:toast",{message:"Sauvé",type:"success"});});
    Utils.$("#dev-action-dup")?.addEventListener("click",(e)=>{e.stopPropagation();const cl=Utils.deepClone(data);cl.id=type.slice(0,-1)+"_"+Utils.uid();cl.name+=" (copie)";switch(type){case"companions":GameData.addCompanion(cl);break;case"enemies":GameData.addEnemy(cl);break;case"items":GameData.addItem(cl);break;}this._selectedId=cl.id;this._dirty=true;this._render();});
    Utils.$("#dev-action-del")?.addEventListener("click",(e)=>{e.stopPropagation();if(!confirm(`Supprimer "${data.name}" ?`))return;switch(type){case"companions":GameData.removeCompanion(data.id);break;case"enemies":GameData.removeEnemy(data.id);break;case"items":GameData.removeItem(data.id);break;}this._selectedId=null;this._dirty=true;this._render();});
  },
  _createNew(){
    let d;
    switch(this._currentTab){
      case"companions":d={id:"companion_"+Utils.uid(),name:"Nouveau",rarity:"N",category:"Guerrier",categories:["Guerrier"],element:"Neutre",portrait_path:null,sprite_path:null,base_stats:{hp:100,atk:10,def:10,mag:10,spd:10},growth_rates:{hp:5,atk:1,def:1,mag:1,spd:1},skills:[],leader_skill:{name:"",condition:{type:"always"},bonuses:[]},equipment_slots:{weapon:null,armor:null,accessory_1:null,accessory_2:null,accessory_3:null},awakening:{current_tier:0,max_tier:3,materials_needed:[]},description:""};GameData.addCompanion(d);break;
      case"enemies":d={id:"enemy_"+Utils.uid(),name:"Nouvel Ennemi",category:"Monstre",element:"Neutre",level:1,level_scaling:true,portrait_path:null,base_stats:{hp:50,atk:8,def:5,mag:3,spd:8},growth_rates:{hp:3,atk:0.5,def:0.3,mag:0.2,spd:0.3},ai_type:"aggressive",ai_patterns:[{condition:"default",action:"attack_lowest_hp"}],skills:[{id:"atk",name:"Attaque",unlock_level:1,damage_multiplier:1.0,mp_cost:0,target_type:"enemy",effects:[]}],rewards:{base_xp:30,xp_per_level:5,base_gold:15,gold_per_level:3,loot_table:[]},visual_variants:[]};GameData.addEnemy(d);break;
      case"items":d={id:"item_"+Utils.uid(),name:"Nouvel Item",category:"CONSUMABLES",rarity:"N",base_value:50,stackable:true,max_stack:99,can_sell:true,can_drop:true,description:""};GameData.addItem(d);break;
    }
    if(d){this._selectedId=d.id;this._dirty=true;this._render();}
  }
};

// === js/core/game.js ===
/* ═══════════════════════════════════════════
   Game Loop — Gates of Hades v0.2
   ═══════════════════════════════════════════ */
"use strict";

const Game = {
  _running:false, _lastTime:0,

  async init() {
    const bar=Utils.$("#loading-bar"), text=Utils.$("#loading-text");
    const p=(pct,msg)=>{bar.style.width=pct+"%";text.textContent=msg;};

    p(10,"Moteur..."); Renderer.init(); Input.init(); Audio.init(); await Utils.wait(80);
    p(30,"Données..."); GameData.init(); await Utils.wait(80);
    p(50,"Sauvegarde..."); SaveManager.init(); await Utils.wait(60);
    p(70,"Systèmes...");
    MapSystem.init(); Player.init(); CompanionSystem.init();
    Combat.init(); Inventory.init(); QuestSystem.init();
    EncounterSystem.init(); HarvestSystem.init();
    await Utils.wait(60);

    p(85,"Interface...");
    HUD.init(); Menus.init(); Toast.init(); PartyPanel.init();
    CombatUI.init(); InventoryPanel.init(); QuestPanel.init();
    DialogueUI.init(); DevMode.init();
    await Utils.wait(60);

    p(95,"Carte...");
    MapSystem.loadMap(GameData.state.player.position.mapId||"apolyti");
    await Utils.wait(80);

    // NPC interaction
    EventBus.on("npc:interact",(npc)=>{
      if(npc.type==="merchant") EventBus.emit("ui:toast",{message:`${npc.name}: "${npc.dialogue}"`,type:"info",duration:2000});
      else EventBus.emit("ui:toast",{message:`${npc.name}: "${npc.dialogue}"`,type:"info",duration:4000});
    });
    EventBus.on("chest:open",(chest)=>{
      const names=(chest.loot||[]).map(l=>{const i=GameData.getItem(l.item_id);return i?`${i.name} x${l.quantity}`:l.item_id;}).join(", ");
      EventBus.emit("ui:toast",{message:`Coffre: ${names}`,type:"success",duration:4000});
      Audio.playSFX("level_up");
    });
    // Confirm key = interact
    document.addEventListener("keydown",(e)=>{
      if((e.code==="Enter"||e.code==="Space")&&!Input.isAnyUIOpen()&&!Combat.active) Player.interact();
      if(e.code==="KeyE"&&!Input.isAnyUIOpen()&&!Combat.active) HarvestSystem.tryHarvest();
    });

    p(100,"Prêt !"); await Utils.wait(300);
    const ls=Utils.$("#loading-screen"); ls.classList.add("fade-out");
    setTimeout(()=>ls.remove(),600);

    this._running=true; this._lastTime=performance.now();
    requestAnimationFrame((t)=>this._loop(t));
    EventBus.emit("game:ready");
  },

  _loop(ts) {
    if(!this._running) return;
    const dt=Math.min((ts-this._lastTime)/1000,0.1); this._lastTime=ts;
    if(!Input.isAnyUIOpen()) GameData.state.playtime=(GameData.state.playtime||0)+dt;
    this._update(dt); this._render(dt); Input.endFrame();
    requestAnimationFrame((t)=>this._loop(t));
  },

  _update(dt) {
    Player.update(dt);
    if(MapSystem.currentMap) {
      Renderer.centerCameraOn(Player.visualX*TILE_SIZE+TILE_SIZE/2,Player.visualY*TILE_SIZE+TILE_SIZE/2);
      Renderer.clampCamera(MapSystem.getMapWidthPx(),MapSystem.getMapHeightPx());
    }
    EventBus.emit("game:tick",dt);
  },

  _render(dt) {
    Renderer.clear();
    if(MapSystem.currentMap) {
      const m=MapSystem.currentMap;
      Renderer.drawTileMap(m);
      if(GameData.state.settings.showGrid) Renderer.drawGrid(m.width,m.height);

      const ent=MapSystem.getRenderEntities();

      // Transitions
      for(const tr of(m.transitions||[])){
        const sp=Renderer.worldToScreen(tr.from.x*TILE_SIZE,tr.from.y*TILE_SIZE);
        const pulse=Math.sin(Date.now()/400)*0.3+0.7;
        Renderer.ctx.globalAlpha=pulse; Renderer.ctx.fillStyle="rgba(201,168,76,0.3)";
        Renderer.ctx.fillRect(sp.x+4,sp.y+4,TILE_SIZE-8,TILE_SIZE-8);
        Renderer.ctx.font="bold 14px 'Cinzel'"; Renderer.ctx.textAlign="center";
        Renderer.ctx.fillStyle="#e4cc7a"; Renderer.ctx.fillText("→",sp.x+TILE_SIZE/2,sp.y+TILE_SIZE/2+5);
        Renderer.ctx.globalAlpha=1;
      }

      // Instances
      for(const inst of ent.instances) Renderer.drawInstance(inst);

      // Harvest nodes
      for(const node of ent.harvestNodes) Renderer.drawHarvestNode(node);

      // Chests
      for(const chest of ent.chests) Renderer.drawChest(chest);

      // NPCs
      for(const npc of ent.npcs) Renderer.drawNPC(npc);

      // Player
      const pe=Player.getEntity();
      pe.isLeader = (CompanionSystem.getLeaderId()===Player.visibleCompanionId);
      Renderer.drawEntity(pe);

      // Party followers
      const party=CompanionSystem.getParty();
      for(let i=0;i<party.length;i++){
        const c=party[i]; const t=GameData.getCompanion(c.templateId); if(!t) continue;
        if(Player.visibleCompanionId===c.templateId) continue; // Don't draw if they ARE the visible character
        const offsets=[{x:-1,y:1},{x:1,y:1},{x:0,y:2}]; const off=offsets[i]||offsets[0];
        Renderer.drawEntity({
          x:Player.visualX+off.x, y:Player.visualY+off.y,
          color:RARITY_DATA[c.effectiveRarity]?.color||"#7a7570",
          name:t.name.split(" ")[0], direction:Player.direction,
          sprite:t.sprite_path||null,
          isLeader: CompanionSystem.getLeaderId()===c.templateId
        });
      }
    }

    if(GameData.state.settings.showFps) Renderer.drawFPS(dt);
    if(MapSystem.currentMap) {
      Renderer.drawText(MapSystem.currentMap.name,10,Renderer.height-10,{size:11,color:"rgba(228,204,122,0.3)",bold:true});
      // Harvest hint
      Renderer.drawText("E: Récolter",10,Renderer.height-24,{size:9,color:"rgba(228,204,122,0.2)"});
    }
  },

  stop(){this._running=false;SaveManager.destroy();}
};

window.addEventListener("DOMContentLoaded",()=>{
  Game.init().catch(err=>{console.error("[Game] Fatal:",err);const t=Utils.$("#loading-text");if(t)t.textContent="Erreur: "+err.message;});
});
