<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Gates of Hades</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   Gates of Hades — CSS Variables
   Theme: Dark Mythological Underworld
   ═══════════════════════════════════════════ */

:root {
  /* ── Core Palette — Underworld ── */
  --color-primary: #c9a84c;
  --color-primary-light: #e4cc7a;
  --color-primary-dark: #8b6f2a;
  --color-secondary: #d44b2f;
  --color-secondary-light: #e8765e;
  --color-accent: #7b4bb3;
  --color-accent-light: #a77cd4;

  --color-bg-deep: #08070c;
  --color-bg-mid: #0f0d16;
  --color-bg-surface: #16131f;
  --color-bg-elevated: #1e1a2a;

  --color-text: #e8e0d0;
  --color-text-dim: #9a8e7a;
  --color-text-muted: #5c5347;

  --color-success: #5fa35e;
  --color-warning: #d4942a;
  --color-danger: #c93636;
  --color-info: #4a8ec4;

  /* ── Rarity ── */
  --rarity-N: #7a7570;
  --rarity-R: #4a9e4d;
  --rarity-SR: #3a7ec4;
  --rarity-SSR: #8b3eb5;
  --rarity-UR: #d48a2a;
  --rarity-LR: #c93636;
  --rarity-TR: #e4cc7a;

  /* ── Typography ── */
  --font-display: 'Cinzel', 'Cinzel Decorative', serif;
  --font-body: 'Crimson Pro', 'Georgia', serif;

  --text-xs: 0.7rem;
  --text-sm: 0.82rem;
  --text-base: 0.95rem;
  --text-lg: 1.15rem;
  --text-xl: 1.4rem;
  --text-2xl: 1.85rem;
  --text-3xl: 2.8rem;

  /* ── Spacing ── */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;

  /* ── Borders ── */
  --radius-sm: 3px;
  --radius-md: 6px;
  --radius-lg: 10px;
  --radius-xl: 14px;
  --radius-full: 9999px;

  --border-subtle: 1px solid rgba(201, 168, 76, 0.1);
  --border-accent: 1px solid var(--color-primary);
  --border-ember: 1px solid rgba(212, 75, 47, 0.2);

  /* ── Shadows ── */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.5);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.6);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.7);
  --shadow-glow-gold: 0 0 20px rgba(201, 168, 76, 0.25);
  --shadow-glow-ember: 0 0 20px rgba(212, 75, 47, 0.3);

  /* ── Panels ── */
  --panel-bg: rgba(14, 12, 20, 0.94);
  --panel-border: rgba(201, 168, 76, 0.12);
  --panel-blur: 16px;

  /* ── Transitions ── */
  --transition-fast: 150ms ease-out;
  --transition-base: 300ms ease-out;
  --transition-slow: 500ms ease-out;

  /* ── Z-Index ── */
  --z-canvas: 1;
  --z-sprites: 10;
  --z-hud: 100;
  --z-menu: 500;
  --z-modal: 1000;
  --z-toast: 2000;
  --z-devmode: 9999;
}

/* ═══════════════════════════════════════════
   Reset — Gates of Hades
   ═══════════════════════════════════════════ */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--color-text);
  background: var(--color-bg-deep);
  -webkit-font-smoothing: antialiased;
  user-select: none;
  cursor: default;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }
input, select, textarea { font-family: var(--font-body); font-size: inherit; }
a { color: inherit; text-decoration: none; }
ul, ol { list-style: none; }
img { display: block; max-width: 100%; }

.hidden { display: none !important; }
.hidden-input { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: var(--color-primary-dark); border-radius: var(--radius-full); }
::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }

/* ═══════════════════════════════════════════
   Layout — Gates of Hades
   ═══════════════════════════════════════════ */

/* ── Loading Screen ── */
#loading-screen {
  position: fixed; inset: 0; z-index: 99999;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse 80% 60% at 50% 100%, rgba(212, 75, 47, 0.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(123, 75, 179, 0.08) 0%, transparent 60%),
    linear-gradient(180deg, #05040a 0%, #0c0a14 40%, #140e1c 100%);
  transition: opacity 0.8s ease-out;
}

#loading-screen.fade-out { opacity: 0; pointer-events: none; }

.loading-content { text-align: center; width: 360px; }

.loading-title {
  font-family: var(--font-display);
  font-size: var(--text-3xl);
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--color-primary);
  text-shadow: 0 0 40px rgba(201, 168, 76, 0.4), 0 0 80px rgba(201, 168, 76, 0.15), 0 4px 12px rgba(0,0,0,0.8);
  margin-bottom: var(--space-sm);
}

.loading-title sup {
  display: none; /* No sup needed for Gates of Hades */
}

.loading-subtitle {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--color-secondary);
  opacity: 0.7;
  margin-bottom: var(--space-xl);
}

.loading-bar-track {
  width: 100%; height: 3px;
  background: rgba(201, 168, 76, 0.1);
  border-radius: var(--radius-full);
  overflow: hidden;
  margin-bottom: var(--space-md);
  position: relative;
}

.loading-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--color-secondary), var(--color-primary));
  border-radius: var(--radius-full);
  transition: width 0.3s ease-out;
  box-shadow: 0 0 12px rgba(212, 75, 47, 0.5);
}

.loading-text {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── Game Container ── */
#game-container {
  position: relative; width: 100vw; height: 100vh; overflow: hidden;
  background: var(--color-bg-deep);
}

/* ── Canvas ── */
#game-canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: var(--z-canvas);
  image-rendering: pixelated;
}

/* ── UI Layer ── */
.ui-layer {
  position: absolute; inset: 0;
  z-index: var(--z-menu);
  pointer-events: none;
}
.ui-layer > * { pointer-events: auto; }

/* ── Panel (generic modal) ── */
.panel {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(90vw, 480px);
  max-height: 85vh;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(var(--panel-blur));
  box-shadow: var(--shadow-lg), 0 0 60px rgba(0,0,0,0.5);
  overflow: hidden;
  display: flex; flex-direction: column;
  animation: panel-in 0.35s ease-out;
}

/* Gold corner accents on panels */
.panel::before, .panel::after {
  content: '';
  position: absolute;
  width: 24px; height: 24px;
  border-color: var(--color-primary-dark);
  border-style: solid;
  opacity: 0.4;
  pointer-events: none;
}
.panel::before { top: 6px; left: 6px; border-width: 2px 0 0 2px; }
.panel::after  { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

@keyframes panel-in {
  from { opacity: 0; transform: translate(-50%, -48%) scale(0.96); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid rgba(201, 168, 76, 0.08);
  background: linear-gradient(180deg, rgba(201, 168, 76, 0.04) 0%, transparent 100%);
}

.panel-title {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 1px;
}

.panel-close {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-lg); color: var(--color-text-muted);
  transition: all var(--transition-fast);
}
.panel-close:hover { background: rgba(201, 75, 47, 0.15); color: var(--color-danger); }

.panel-body {
  padding: var(--space-md) var(--space-lg);
  overflow-y: auto; flex: 1;
}

/* ── Menu items ── */
.menu-item {
  display: block; width: 100%;
  padding: var(--space-md);
  text-align: left;
  font-family: var(--font-display);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text-dim);
  letter-spacing: 0.5px;
  border-radius: var(--radius-md);
  transition: all var(--transition-fast);
  margin-bottom: var(--space-xs);
}
.menu-item:hover {
  background: rgba(201, 168, 76, 0.08);
  color: var(--color-primary-light);
  padding-left: var(--space-lg);
}
.menu-item--dev {
  color: var(--color-secondary);
  border-top: 1px solid rgba(212, 75, 47, 0.15);
  margin-top: var(--space-md);
  padding-top: var(--space-lg);
}

/* ── Settings ── */
.setting-row {
  display: flex; align-items: center; gap: var(--space-md);
  padding: var(--space-md) 0;
  border-bottom: var(--border-subtle);
}
.setting-row label { min-width: 140px; font-weight: 500; color: var(--color-text-dim); }
.setting-row input[type="range"] { flex: 1; accent-color: var(--color-primary); }
.setting-row select {
  padding: var(--space-xs) var(--space-sm);
  background: var(--color-bg-elevated); color: var(--color-text);
  border: var(--border-subtle); border-radius: var(--radius-sm);
}

/* ── Save Slots ── */
.save-slot {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-md); margin-bottom: var(--space-sm);
  background: rgba(201, 168, 76, 0.02);
  border: 1px solid rgba(201, 168, 76, 0.08);
  border-radius: var(--radius-md);
  cursor: pointer; transition: all var(--transition-fast);
}
.save-slot:hover {
  background: rgba(201, 168, 76, 0.06);
  border-color: var(--color-primary-dark);
  box-shadow: var(--shadow-glow-gold);
}
.save-slot-info h3 { font-family: var(--font-display); font-size: var(--text-base); font-weight: 600; color: var(--color-primary-light); }
.save-slot-info p { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 2px; }
.save-slot-empty { color: var(--color-text-muted); font-style: italic; }

/* ── Overlay Backdrops ── */
#menu-overlay, #save-overlay, #settings-overlay {
  background: rgba(5, 4, 10, 0.75);
  backdrop-filter: blur(6px);
  pointer-events: auto;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .panel { width: 95vw; max-height: 90vh; }
  #hud-bottom { flex-direction: column; gap: var(--space-xs); }
}

/* ═══════════════════════════════════════════
   HUD — Gates of Hades
   ═══════════════════════════════════════════ */

#hud {
  z-index: var(--z-hud);
  display: flex; flex-direction: column; justify-content: space-between;
  padding: var(--space-md);
  pointer-events: none;
}
#hud > * { pointer-events: auto; }

/* ── Top Bar ── */
#hud-top { display: flex; align-items: flex-start; gap: var(--space-md); }

.hud-party-info {
  background: linear-gradient(135deg, rgba(14, 12, 20, 0.92), rgba(22, 19, 31, 0.88));
  border: 1px solid rgba(201, 168, 76, 0.15);
  border-radius: var(--radius-md);
  padding: var(--space-sm) var(--space-md);
  backdrop-filter: blur(12px);
  min-width: 280px;
  box-shadow: var(--shadow-md), inset 0 1px 0 rgba(201, 168, 76, 0.05);
}

.hud-hero-bar { display: flex; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-xs); }

.hud-label {
  font-family: var(--font-display);
  font-weight: 700; font-size: var(--text-sm);
  color: var(--color-primary);
  min-width: 50px; letter-spacing: 0.5px;
}

.hp-bar-container {
  flex: 1; height: 10px;
  background: rgba(0,0,0,0.4);
  border-radius: var(--radius-full);
  overflow: hidden;
  border: 1px solid rgba(201, 168, 76, 0.1);
}

.hp-bar-fill {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #5fa35e, #8bc98a);
  border-radius: var(--radius-full);
  transition: width 0.4s ease-out;
  box-shadow: 0 0 6px rgba(95, 163, 94, 0.3);
}
.hp-bar-fill.hp-low { background: linear-gradient(90deg, #c93636, #e85555); box-shadow: 0 0 8px rgba(201, 54, 54, 0.4); }
.hp-bar-fill.hp-mid { background: linear-gradient(90deg, #d4942a, #e8b44a); }

.hp-text { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-dim); min-width: 55px; text-align: right; }

.hud-meta { display: flex; justify-content: space-between; font-size: var(--text-xs); color: var(--color-text-muted); }
.hud-gold { color: var(--color-primary); font-weight: 700; font-family: var(--font-display); letter-spacing: 0.5px; }

/* ── Bottom Bar ── */
#hud-bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: var(--space-md); }

#hud-quest-tracker {
  background: linear-gradient(135deg, rgba(14, 12, 20, 0.9), rgba(22, 19, 31, 0.85));
  border: 1px solid rgba(201, 168, 76, 0.1);
  border-radius: var(--radius-md);
  padding: var(--space-xs) var(--space-md);
  backdrop-filter: blur(10px);
  font-size: var(--text-sm); color: var(--color-text-dim);
  max-width: 420px;
}
.quest-label { font-style: italic; }

#hud-actions { display: flex; gap: var(--space-xs); }

.hud-btn {
  padding: var(--space-sm) var(--space-md);
  background: linear-gradient(180deg, rgba(14, 12, 20, 0.9), rgba(8, 7, 12, 0.95));
  border: 1px solid rgba(201, 168, 76, 0.15);
  border-radius: var(--radius-md);
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  backdrop-filter: blur(10px);
  transition: all var(--transition-fast);
}
.hud-btn:hover {
  background: rgba(201, 168, 76, 0.1);
  border-color: var(--color-primary-dark);
  color: var(--color-primary-light);
  box-shadow: var(--shadow-glow-gold);
  transform: translateY(-1px);
}
.hud-btn:active { transform: translateY(0); }

/* ═══════════════════════════════════════════
   Menus & Panels
   ═══════════════════════════════════════════ */

/* Generic button styles */
.btn {
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-md);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--text-sm);
  transition: all var(--transition-fast);
  cursor: pointer;
}

.btn-primary {
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  color: white;
  border: 1px solid var(--color-primary);
}

.btn-primary:hover {
  box-shadow: 0 0 16px rgba(33, 150, 243, 0.4);
  transform: translateY(-1px);
}

.btn-secondary {
  background: rgba(255,255,255,0.05);
  color: var(--color-text-dim);
  border: 1px solid rgba(255,255,255,0.1);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
  color: var(--color-text);
}

.btn-danger {
  background: rgba(244, 67, 54, 0.15);
  color: var(--color-danger);
  border: 1px solid rgba(244, 67, 54, 0.3);
}

.btn-danger:hover {
  background: rgba(244, 67, 54, 0.25);
}

.btn-success {
  background: linear-gradient(135deg, var(--color-success), #388E3C);
  color: white;
  border: 1px solid var(--color-success);
}

.btn-success:hover {
  box-shadow: 0 0 16px rgba(76, 175, 80, 0.4);
}

.btn-sm {
  padding: var(--space-xs) var(--space-sm);
  font-size: var(--text-xs);
}

.btn-block {
  display: block;
  width: 100%;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--panel-border);
  margin-bottom: var(--space-md);
}

.tab {
  padding: var(--space-sm) var(--space-md);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  border-bottom: 2px solid transparent;
  transition: all var(--transition-fast);
}

.tab:hover {
  color: var(--color-text-dim);
}

.tab.active {
  color: var(--color-primary-light);
  border-bottom-color: var(--color-primary);
}

/* Form Controls */
.form-group {
  margin-bottom: var(--space-md);
}

.form-group label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text-dim);
  margin-bottom: var(--space-xs);
}

.form-input,
.form-select {
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: var(--color-bg-deep);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  color: var(--color-text);
  font-size: var(--text-sm);
  transition: border-color var(--transition-fast);
}

.form-input:focus,
.form-select:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.2);
}

.form-input-sm {
  width: 80px;
  padding: var(--space-xs) var(--space-sm);
}

.form-row {
  display: flex;
  gap: var(--space-md);
  align-items: flex-end;
}

.form-row > * {
  flex: 1;
}

/* Inline stat row */
.stat-row {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-xs) 0;
  font-size: var(--text-sm);
}

.stat-label {
  min-width: 50px;
  font-weight: 600;
  color: var(--color-text-dim);
}

.stat-value {
  font-weight: 700;
  color: var(--color-text);
}

/* Card / List Item */
.list-card {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  background: rgba(255,255,255,0.02);
  border: var(--border-subtle);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-xs);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.list-card:hover {
  background: rgba(33, 150, 243, 0.08);
  border-color: rgba(33, 150, 243, 0.3);
}

.list-card.selected {
  background: rgba(33, 150, 243, 0.15);
  border-color: var(--color-primary);
}

.list-card-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-xl);
  flex-shrink: 0;
}

.list-card-info {
  flex: 1;
  min-width: 0;
}

.list-card-info h4 {
  font-size: var(--text-sm);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.list-card-info p {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}

/* Button row */
.btn-row {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

.btn-row--end {
  justify-content: flex-end;
}

/* ═══════════════════════════════════════════
   Rarity System Styles
   ═══════════════════════════════════════════ */

/* ── Rarity Borders ── */
.rarity-border-N   { border: 2px solid var(--rarity-N); }
.rarity-border-R   { border: 2px solid var(--rarity-R); box-shadow: 0 0 10px rgba(76, 175, 80, 0.5); }
.rarity-border-SR  { border: 2px solid var(--rarity-SR); box-shadow: 0 0 15px rgba(33, 150, 243, 0.6); }
.rarity-border-SSR { border: 2px solid var(--rarity-SSR); box-shadow: 0 0 20px rgba(156, 39, 176, 0.7); }
.rarity-border-UR  { border: 2px solid var(--rarity-UR); box-shadow: 0 0 25px rgba(255, 152, 0, 0.8); }
.rarity-border-LR  { border: 2px solid var(--rarity-LR); box-shadow: 0 0 30px rgba(244, 67, 54, 0.9); }
.rarity-border-TR  {
  border: 3px solid transparent;
  background: linear-gradient(var(--color-bg-surface), var(--color-bg-surface)) padding-box,
              linear-gradient(135deg, #FFD700, #FF6B6B, #4ECDC4, #C792EA, #FFD700) border-box;
  animation: rainbow-rotate 3s linear infinite;
  box-shadow: 0 0 40px rgba(255, 215, 0, 1.0);
}

/* ── Rarity Text Colors ── */
.rarity-text-N   { color: var(--rarity-N); }
.rarity-text-R   { color: var(--rarity-R); font-weight: 600; }
.rarity-text-SR  { color: var(--rarity-SR); font-weight: 700; }
.rarity-text-SSR { color: var(--rarity-SSR); font-weight: 700; text-shadow: 0 0 5px rgba(156, 39, 176, 0.7); }
.rarity-text-UR  { color: var(--rarity-UR); font-weight: 800; text-shadow: 0 0 8px rgba(255, 152, 0, 0.8); }
.rarity-text-LR  { color: var(--rarity-LR); font-weight: 900; text-shadow: 0 0 10px rgba(244, 67, 54, 0.9); }
.rarity-text-TR  {
  background: linear-gradient(135deg, #FFD700, #FF6B6B, #4ECDC4, #C792EA);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 900;
}

/* ── Rarity Badge ── */
.rarity-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.rarity-badge-N   { background: rgba(158,158,158,0.2); color: var(--rarity-N); }
.rarity-badge-R   { background: rgba(76,175,80,0.2); color: var(--rarity-R); }
.rarity-badge-SR  { background: rgba(33,150,243,0.2); color: var(--rarity-SR); }
.rarity-badge-SSR { background: rgba(156,39,176,0.2); color: var(--rarity-SSR); }
.rarity-badge-UR  { background: rgba(255,152,0,0.2); color: var(--rarity-UR); }
.rarity-badge-LR  { background: rgba(244,67,54,0.2); color: var(--rarity-LR); }
.rarity-badge-TR  { 
  background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,107,107,0.2), rgba(78,205,196,0.2));
  color: var(--rarity-TR);
}

/* ── Animations ── */
@keyframes rainbow-rotate {
  0%   { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

/* ═══════════════════════════════════════════
   Dev Mode Styles
   ═══════════════════════════════════════════ */

#devmode-overlay {
  z-index: var(--z-devmode);
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(8px);
  pointer-events: auto;
}

.dev-container {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
}

/* ── Dev Header ── */
.dev-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-sm) var(--space-lg);
  background: rgba(255, 152, 0, 0.08);
  border-bottom: 1px solid rgba(255, 152, 0, 0.2);
}

.dev-title {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 800;
  color: var(--color-secondary);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.dev-title::before {
  content: "⚙️";
}

.dev-actions {
  display: flex;
  gap: var(--space-sm);
}

/* ── Dev Tabs ── */
.dev-tabs {
  display: flex;
  gap: 0;
  background: var(--color-bg-deep);
  border-bottom: 1px solid var(--panel-border);
}

.dev-tab {
  padding: var(--space-sm) var(--space-lg);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  border-bottom: 2px solid transparent;
  transition: all var(--transition-fast);
}

.dev-tab:hover {
  color: var(--color-text-dim);
  background: rgba(255,255,255,0.03);
}

.dev-tab.active {
  color: var(--color-secondary);
  border-bottom-color: var(--color-secondary);
  background: rgba(255, 152, 0, 0.05);
}

/* ── Dev Body ── */
.dev-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.dev-sidebar {
  width: 280px;
  border-right: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  background: var(--color-bg-mid);
}

.dev-sidebar-header {
  padding: var(--space-sm) var(--space-md);
  border-bottom: var(--border-subtle);
  display: flex;
  gap: var(--space-sm);
}

.dev-sidebar-header .form-input {
  flex: 1;
  font-size: var(--text-xs);
}

.dev-list {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-xs);
}

.dev-list-item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition-fast);
  font-size: var(--text-sm);
}

.dev-list-item:hover {
  background: rgba(255,255,255,0.05);
}

.dev-list-item.selected {
  background: rgba(255, 152, 0, 0.12);
  border-left: 2px solid var(--color-secondary);
}

.dev-list-item-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.dev-list-item-info {
  flex: 1;
  min-width: 0;
}

.dev-list-item-info .name {
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dev-list-item-info .meta {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}

/* ── Dev Editor Panel ── */
.dev-editor {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-lg);
}

.dev-editor-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--color-text-muted);
  font-style: italic;
}

.dev-section {
  margin-bottom: var(--space-xl);
}

.dev-section-title {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-secondary-light);
  margin-bottom: var(--space-md);
  padding-bottom: var(--space-xs);
  border-bottom: 1px solid rgba(255, 152, 0, 0.2);
}

/* Stats grid in dev editor */
.dev-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: var(--space-sm);
}

.dev-stat-input {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.dev-stat-input label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.dev-stat-input input {
  padding: var(--space-xs) var(--space-sm);
  background: var(--color-bg-deep);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  color: var(--color-text);
  font-size: var(--text-sm);
  font-weight: 600;
  width: 100%;
}

.dev-stat-input input:focus {
  outline: none;
  border-color: var(--color-secondary);
}

/* Loot table row */
.dev-loot-row {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-xs) 0;
  font-size: var(--text-sm);
}

.dev-loot-row .form-input {
  font-size: var(--text-xs);
}

/* Footer */
.dev-footer {
  padding: var(--space-sm) var(--space-lg);
  border-top: 1px solid var(--panel-border);
  background: var(--color-bg-mid);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dev-footer-info {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}

@media (max-width: 768px) {
  .dev-sidebar {
    width: 200px;
  }

  .dev-tabs {
    overflow-x: auto;
  }
}

/* ═══════════════════════════════════════════
   Inventory Panel Styles
   ═══════════════════════════════════════════ */

/* ── Layout ── */
.inv-body {
  display: flex;
  min-height: 350px;
}

.inv-list-pane {
  width: 280px;
  border-right: 1px solid var(--panel-border);
  overflow-y: auto;
  flex-shrink: 0;
}

.inv-detail-pane {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-md);
}

.inv-detail-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--color-text-muted);
  font-style: italic;
}

/* ── Item Row ── */
.inv-item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  cursor: pointer;
  transition: background var(--transition-fast);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.inv-item:hover {
  background: rgba(33,150,243,0.06);
}

.inv-item--selected {
  background: rgba(33,150,243,0.12);
  border-left: 3px solid var(--color-primary);
}

.inv-item-icon {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.inv-item-info {
  flex: 1;
  min-width: 0;
}

.inv-item-name {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
}

.inv-item-name span:first-child {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.inv-item-qty {
  font-size: 11px;
  color: var(--color-text-muted);
  flex-shrink: 0;
}

.inv-item-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 1px;
}

.inv-item-price {
  font-size: 10px;
  color: var(--color-secondary);
  font-weight: 600;
}

/* ── Detail Sections ── */
.inv-detail-section {
  margin-bottom: var(--space-md);
}

.inv-detail-section-title {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  color: var(--color-primary-light);
  margin-bottom: var(--space-xs);
  padding-bottom: var(--space-xs);
  border-bottom: 1px solid rgba(33,150,243,0.12);
}

.inv-detail-stats {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.inv-detail-stat {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 2px 0;
}

.inv-detail-stat span {
  color: var(--color-text-dim);
}

.inv-detail-stat strong {
  color: var(--color-text);
}

/* Enhancement bar */
.inv-detail-enhance-bar {
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: var(--radius-full);
  overflow: hidden;
  margin-top: 6px;
}

.inv-detail-enhance-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
  border-radius: var(--radius-full);
  transition: width 0.3s;
}

/* ── Equip Target ── */
.inv-equip-target {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--color-text);
  cursor: pointer;
  transition: all var(--transition-fast);
  margin-bottom: var(--space-xs);
  font-size: var(--text-sm);
  text-align: left;
}

.inv-equip-target:hover {
  background: rgba(33,150,243,0.1);
  border-color: var(--color-primary);
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .inv-body {
    flex-direction: column;
  }

  .inv-list-pane {
    width: 100%;
    max-height: 200px;
    border-right: none;
    border-bottom: 1px solid var(--panel-border);
  }
}

/* ═══════════════════════════════════════════
   Combat UI Styles
   ═══════════════════════════════════════════ */

/* ── Container ── */
.combat-container {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: var(--space-md);
  gap: var(--space-sm);
}

/* ── Turn Bar ── */
.combat-turn-bar {
  text-align: center;
  padding: var(--space-sm);
  background: rgba(255,255,255,0.04);
  border-radius: var(--radius-md);
  border: 1px solid rgba(255,255,255,0.08);
}

.combat-turn-text {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-primary-light);
}

/* ── Battlefield ── */
.combat-battlefield {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: var(--space-sm);
  min-height: 0;
  overflow: hidden;
}

.combat-side {
  display: flex;
  gap: var(--space-sm);
  flex-wrap: wrap;
  justify-content: center;
}

.combat-vs {
  text-align: center;
  font-size: 24px;
  padding: var(--space-xs);
  opacity: 0.5;
}

/* ── Combatant Card ── */
.combatant {
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-md);
  min-width: 180px;
  max-width: 240px;
  flex: 1;
  position: relative;
  transition: all 0.2s ease;
}

.combatant--active {
  border-color: var(--color-primary);
  box-shadow: 0 0 12px rgba(33,150,243,0.3);
  background: rgba(33,150,243,0.06);
}

.combatant--dead {
  opacity: 0.4;
  filter: grayscale(0.6);
}

.combatant--targetable {
  cursor: pointer;
  border-color: var(--color-secondary);
  animation: targetPulse 1s ease-in-out infinite;
}

@keyframes targetPulse {
  0%, 100% { box-shadow: 0 0 8px rgba(255,152,0,0.3); }
  50%      { box-shadow: 0 0 18px rgba(255,152,0,0.6); }
}

.combatant--hit {
  animation: hitFlash 0.4s ease;
}

@keyframes hitFlash {
  0%   { background: rgba(244,67,54,0.3); transform: translateX(0); }
  25%  { transform: translateX(-4px); }
  50%  { background: rgba(244,67,54,0.1); transform: translateX(4px); }
  75%  { transform: translateX(-2px); }
  100% { background: rgba(255,255,255,0.03); transform: translateX(0); }
}

.combatant--healed {
  animation: healFlash 0.4s ease;
}

@keyframes healFlash {
  0%   { background: rgba(76,175,80,0); }
  50%  { background: rgba(76,175,80,0.2); }
  100% { background: rgba(255,255,255,0.03); }
}

/* Sprite */
.combatant-sprite {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: 2px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
}

.combatant-dead-x {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: var(--color-danger);
  font-weight: 900;
  text-shadow: 0 0 8px rgba(244,67,54,0.8);
}

/* Info */
.combatant-info {
  flex: 1;
  min-width: 0;
}

.combatant-name-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 2px;
}

.combatant-name {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.combatant-element {
  font-size: 11px;
}

.combatant-level {
  font-size: 10px;
  color: var(--color-text-muted);
  font-weight: 600;
}

/* HP Bar */
.combatant-bars {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 2px;
}

.combatant-hp-bar {
  flex: 1;
  height: 7px;
  background: rgba(255,255,255,0.08);
  border-radius: var(--radius-full);
  overflow: hidden;
}

.combatant-hp-fill {
  height: 100%;
  background: linear-gradient(90deg, #4CAF50, #81C784);
  border-radius: var(--radius-full);
  transition: width 0.4s ease-out;
}

.combatant-hp-fill.hp-warn {
  background: linear-gradient(90deg, #FF9800, #FFB74D);
}

.combatant-hp-fill.hp-crit {
  background: linear-gradient(90deg, #F44336, #FF5252);
}

.combatant-hp-text {
  font-size: 9px;
  color: var(--color-text-muted);
  white-space: nowrap;
  min-width: 50px;
  text-align: right;
}

/* MP Bar */
.combatant-mp-row {
  display: flex;
  align-items: center;
  gap: 4px;
}

.combatant-mp-bar {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: var(--radius-full);
  overflow: hidden;
}

.combatant-mp-fill {
  height: 100%;
  background: linear-gradient(90deg, #2196F3, #64B5F6);
  border-radius: var(--radius-full);
  transition: width 0.3s;
}

.combatant-mp-text {
  font-size: 9px;
  color: var(--color-text-muted);
  white-space: nowrap;
}

.combatant-status {
  font-size: 10px;
  color: var(--color-info);
  font-weight: 600;
  margin-top: 2px;
  display: block;
}

.combatant-statuses {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  margin-top: 3px;
}

.combatant-status-icon {
  font-size: 11px;
  padding: 1px 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 3px;
  cursor: help;
}

/* ── Floating Damage ── */
.combat-dmg-float {
  position: absolute;
  top: -5px;
  right: 8px;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 18px;
  color: var(--color-danger);
  text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  pointer-events: none;
  animation: combatDmgFloat 1.2s ease-out forwards;
  z-index: 10;
}

.combat-dmg-float--crit {
  font-size: 24px;
  color: #FFD700;
  text-shadow: 0 0 12px rgba(255,215,0,0.8);
}

.combat-dmg-float--heal {
  color: var(--color-success);
}

@keyframes combatDmgFloat {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-35px); }
}

/* ── Log ── */
.combat-log {
  max-height: 80px;
  overflow-y: auto;
  padding: var(--space-sm);
  background: rgba(0,0,0,0.3);
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.05);
}

.combat-log-line {
  font-size: 11px;
  color: var(--color-text-dim);
  padding: 2px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.combat-log-line--new {
  color: var(--color-text);
  animation: fade-in 0.3s ease;
}

/* ── Action Panel ── */
.combat-action-panel {
  padding: var(--space-md);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-md);
  min-height: 100px;
}

.combat-action-header {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-primary-light);
  margin-bottom: var(--space-sm);
}

.combat-action-wait {
  text-align: center;
  color: var(--color-text-muted);
  font-style: italic;
  padding: var(--space-md);
}

.combat-action-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

/* ── Combat Buttons ── */
.combat-btn {
  padding: var(--space-sm) var(--space-lg);
  border-radius: var(--radius-md);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: var(--text-sm);
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: var(--color-text);
  transition: all var(--transition-fast);
  flex: 1;
  min-width: 100px;
  text-align: center;
}

.combat-btn:hover:not(:disabled) {
  background: rgba(33,150,243,0.15);
  border-color: var(--color-primary);
  transform: translateY(-1px);
}

.combat-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.combat-btn--attack { border-color: rgba(244,67,54,0.3); }
.combat-btn--attack:hover:not(:disabled) { background: rgba(244,67,54,0.15); border-color: var(--color-danger); }
.combat-btn--skill { border-color: rgba(156,39,176,0.3); }
.combat-btn--skill:hover:not(:disabled) { background: rgba(156,39,176,0.15); border-color: var(--rarity-SSR); }

@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

/* ═══════════════════════════════════════════
   Utility Functions
   ═══════════════════════════════════════════ */

"use strict";

const Utils = {
  // ── ID Generation ──
  uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  },

  // ── Clamping ──
  clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  },

  // ── Random ──
  randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  },

  randFloat(min, max) {
    return Math.random() * (max - min) + min;
  },

  randChoice(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  },

  // ── Object Helpers ──
  deepClone(obj) {
    return JSON.parse(JSON.stringify(obj));
  },

  merge(target, source) {
    for (const key of Object.keys(source)) {
      if (source[key] && typeof source[key] === "object" && !Array.isArray(source[key])) {
        target[key] = target[key] || {};
        Utils.merge(target[key], source[key]);
      } else {
        target[key] = source[key];
      }
    }
    return target;
  },

  // ── Formatting ──
  formatNumber(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
    if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
    return n.toString();
  },

  formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    if (h > 0) return `${h}h ${m % 60}m`;
    if (m > 0) return `${m}m ${s % 60}s`;
    return `${s}s`;
  },

  // ── DOM Helpers ──
  $(selector) {
    return document.querySelector(selector);
  },

  $$(selector) {
    return document.querySelectorAll(selector);
  },

  createElement(tag, attrs = {}, children = []) {
    const el = document.createElement(tag);
    for (const [key, val] of Object.entries(attrs)) {
      if (key === "className") el.className = val;
      else if (key === "textContent") el.textContent = val;
      else if (key === "innerHTML") el.innerHTML = val;
      else if (key.startsWith("on")) el.addEventListener(key.slice(2).toLowerCase(), val);
      else if (key === "style" && typeof val === "object") Object.assign(el.style, val);
      else if (key === "dataset") Object.assign(el.dataset, val);
      else el.setAttribute(key, val);
    }
    for (const child of children) {
      if (typeof child === "string") el.appendChild(document.createTextNode(child));
      else if (child) el.appendChild(child);
    }
    return el;
  },

  clearElement(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  },

  // ── Async ──
  wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  },

  // ── Storage Size Check ──
  getLocalStorageUsedMB() {
    let total = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      total += (localStorage.getItem(key) || "").length;
    }
    return (total * 2 / 1024 / 1024).toFixed(2); // UTF-16 = 2 bytes per char
  }
};

// === js/core/eventbus.js ===
/* ═══════════════════════════════════════════
   Event Bus — Pub/Sub for Module Communication
   ═══════════════════════════════════════════ */

"use strict";

const EventBus = {
  _listeners: {},

  on(event, callback) {
    if (!this._listeners[event]) this._listeners[event] = [];
    this._listeners[event].push(callback);
    return () => this.off(event, callback); // Return unsubscribe function
  },

  off(event, callback) {
    if (!this._listeners[event]) return;
    this._listeners[event] = this._listeners[event].filter(cb => cb !== callback);
  },

  emit(event, data) {
    if (!this._listeners[event]) return;
    for (const cb of this._listeners[event]) {
      try {
        cb(data);
      } catch (err) {
        console.error(`[EventBus] Error in listener for "${event}":`, err);
      }
    }
  },

  once(event, callback) {
    const wrapper = (data) => {
      this.off(event, wrapper);
      callback(data);
    };
    this.on(event, wrapper);
  },

  clear(event) {
    if (event) {
      delete this._listeners[event];
    } else {
      this._listeners = {};
    }
  }
};

// === js/core/input.js ===
/* ═══════════════════════════════════════════
   Input Handler
   ═══════════════════════════════════════════ */

"use strict";

const Input = {
  _keys: {},
  _keysJustPressed: {},
  _mousePos: { x: 0, y: 0 },
  _mouseDown: false,
  _mouseClicked: false,
  _uiBlocking: false,

  init() {
    document.addEventListener("keydown", (e) => this._onKeyDown(e));
    document.addEventListener("keyup", (e) => this._onKeyUp(e));

    const canvas = Utils.$("#game-canvas");
    canvas.addEventListener("mousemove", (e) => this._onMouseMove(e));
    canvas.addEventListener("mousedown", (e) => this._onMouseDown(e));
    canvas.addEventListener("mouseup", (e) => this._onMouseUp(e));
    canvas.addEventListener("click", (e) => this._onCanvasClick(e));

    // Prevent context menu on canvas
    canvas.addEventListener("contextmenu", (e) => e.preventDefault());

    // Block clicks through UI
    document.querySelectorAll(".ui-layer").forEach(layer => {
      layer.addEventListener("click", (e) => e.stopPropagation());
      layer.addEventListener("mousedown", (e) => e.stopPropagation());
    });
  },

  // ── Keyboard ──
  _onKeyDown(e) {
    // Don't capture input when typing in form fields
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") {
      return;
    }

    this._keys[e.code] = true;
    this._keysJustPressed[e.code] = true;

    // Special keys
    if (this._isAction("DEVMODE", e.code)) {
      e.preventDefault();
      EventBus.emit("input:devmode");
    }
    if (this._isAction("CANCEL", e.code)) {
      EventBus.emit("input:cancel");
    }
    if (this._isAction("INVENTORY", e.code)) {
      EventBus.emit("input:inventory");
    }
    if (this._isAction("PARTY", e.code)) {
      EventBus.emit("input:party");
    }
    if (this._isAction("QUESTS", e.code)) {
      EventBus.emit("input:quests");
    }
    if (this._isAction("MENU", e.code)) {
      EventBus.emit("input:menu");
    }
  },

  _onKeyUp(e) {
    this._keys[e.code] = false;
  },

  _isAction(action, code) {
    return KEY_BINDINGS[action] && KEY_BINDINGS[action].includes(code);
  },

  isDown(action) {
    if (!KEY_BINDINGS[action]) return false;
    return KEY_BINDINGS[action].some(code => this._keys[code]);
  },

  justPressed(action) {
    if (!KEY_BINDINGS[action]) return false;
    return KEY_BINDINGS[action].some(code => this._keysJustPressed[code]);
  },

  // ── Mouse ──
  _onMouseMove(e) {
    const rect = e.target.getBoundingClientRect();
    this._mousePos.x = e.clientX - rect.left;
    this._mousePos.y = e.clientY - rect.top;
  },

  _onMouseDown(e) {
    this._mouseDown = true;
  },

  _onMouseUp(e) {
    this._mouseDown = false;
  },

  _onCanvasClick(e) {
    if (this.isAnyUIOpen()) return;
    this._mouseClicked = true;
    EventBus.emit("input:canvas_click", {
      x: this._mousePos.x,
      y: this._mousePos.y,
      raw: e
    });
  },

  getMousePos() {
    return { ...this._mousePos };
  },

  isMouseDown() {
    return this._mouseDown;
  },

  wasMouseClicked() {
    return this._mouseClicked;
  },

  // ── UI State ──
  isAnyUIOpen() {
    const overlays = ["menu-overlay", "save-overlay", "settings-overlay", "devmode-overlay", "party-overlay", "combat-overlay", "inventory-overlay", "quest-overlay", "dialogue-overlay"];
    return overlays.some(id => {
      const el = document.getElementById(id);
      return el && !el.classList.contains("hidden");
    });
  },

  // ── Per-Frame Reset ──
  endFrame() {
    this._keysJustPressed = {};
    this._mouseClicked = false;
  }
};

/* ═══════════════════════════════════════════
   Renderer — Biome-aware tiles, harvest nodes, sprites
   ═══════════════════════════════════════════ */
"use strict";

const Renderer = {
  canvas:null, ctx:null, width:0, height:0,
  camera:{x:0,y:0}, _imageCache:{}, _showCollision:false,

  init() {
    this.canvas=Utils.$("#game-canvas"); this.ctx=this.canvas.getContext("2d");
    this.resize(); window.addEventListener("resize",()=>this.resize());
  },

  resize() {
    const dpr=window.devicePixelRatio||1;
    this.width=window.innerWidth; this.height=window.innerHeight;
    this.canvas.width=this.width*dpr; this.canvas.height=this.height*dpr;
    this.canvas.style.width=this.width+"px"; this.canvas.style.height=this.height+"px";
    this.ctx.setTransform(dpr,0,0,dpr,0,0); this.ctx.imageSmoothingEnabled=false;
  },

  loadImage(src) {
    if(!src) return null;
    if(this._imageCache[src]) return this._imageCache[src];
    const img=new Image(); img.src=src; img._loaded=false;
    img.onload=()=>{img._loaded=true;}; img.onerror=()=>{img._failed=true;};
    this._imageCache[src]=img; return img;
  },

  drawImage(src,x,y,w,h) {
    const img=this.loadImage(src);
    if(img&&img._loaded){this.ctx.drawImage(img,x,y,w,h);return true;} return false;
  },

  centerCameraOn(wx,wy){this.camera.x=wx-this.width/2;this.camera.y=wy-this.height/2;},
  clampCamera(mw,mh){this.camera.x=Utils.clamp(this.camera.x,0,Math.max(0,mw-this.width));this.camera.y=Utils.clamp(this.camera.y,0,Math.max(0,mh-this.height));},
  worldToScreen(wx,wy){return{x:wx-this.camera.x,y:wy-this.camera.y};},

  clear(){this.ctx.fillStyle="#08070c";this.ctx.fillRect(0,0,this.width,this.height);},

  // ── Tile Map with biome colors ──
  drawTileMap(mapData) {
    if(!mapData?.layers) return;
    const sc=Math.floor(this.camera.x/TILE_SIZE), sr=Math.floor(this.camera.y/TILE_SIZE);
    const ec=Math.min(mapData.width,sc+Math.ceil(this.width/TILE_SIZE)+2);
    const er=Math.min(mapData.height,sr+Math.ceil(this.height/TILE_SIZE)+2);

    // Seeded noise for consistent tile variations
    const _tHash=(c,r)=>((c*374761393+r*668265263)^(c*1274126177))>>>0;
    
    for(let r=Math.max(0,sr);r<er;r++) {
      for(let c=Math.max(0,sc);c<ec;c++) {
        const sp=this.worldToScreen(c*TILE_SIZE,r*TILE_SIZE);
        const biome = mapData.biomesLayer?.[r]?.[c];
        let baseColor;
        if (biome && BIOMES[biome]) {
          baseColor = BIOMES[biome].color;
        } else {
          const tileId = mapData.layers.background[r]?.[c] || 0;
          const bKey = BIOME_KEYS[tileId];
          baseColor = bKey && BIOMES[bKey] ? BIOMES[bKey].color : "#2a3328";
        }
        
        // Parse color and add seeded variation
        const hash = _tHash(c,r);
        const variation = ((hash % 20) - 10) / 255;
        this.ctx.fillStyle = baseColor;
        this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE);
        
        // Subtle brightness variation (seeded, not random)
        const bv = ((hash >> 8) % 15) / 255;
        this.ctx.fillStyle = `rgba(${bv>0.03?255:0},${bv>0.03?255:0},${bv>0.03?255:0},${Math.abs(bv)})`;
        this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE);
        
        // Biome-specific decorations
        if(biome==="road"||biome==="path"){
          // Cobblestone pattern
          if((hash%3)===0){
            this.ctx.strokeStyle="rgba(60,55,48,0.25)"; this.ctx.lineWidth=0.5;
            const ox=(hash%8)-4, oy=((hash>>4)%8)-4;
            this.ctx.strokeRect(sp.x+4+ox,sp.y+4+oy,TILE_SIZE/2-2,TILE_SIZE/2-2);
          }
        } else if(biome==="plaza"||biome==="market"){
          // Stone tile pattern
          if((c+r)%2===0){ this.ctx.fillStyle="rgba(255,255,255,0.02)"; this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE); }
        } else if(biome==="wall"||biome==="tower"){
          // Brick lines
          this.ctx.strokeStyle="rgba(0,0,0,0.2)"; this.ctx.lineWidth=0.5;
          this.ctx.beginPath();
          this.ctx.moveTo(sp.x,sp.y+TILE_SIZE/2); this.ctx.lineTo(sp.x+TILE_SIZE,sp.y+TILE_SIZE/2);
          if((r+c)%2===0){ this.ctx.moveTo(sp.x+TILE_SIZE/2,sp.y); this.ctx.lineTo(sp.x+TILE_SIZE/2,sp.y+TILE_SIZE); }
          this.ctx.stroke();
        } else if(biome==="garden"||biome==="plains"||biome==="forest"){
          // Grass tufts
          if((hash%5)===0){
            this.ctx.fillStyle=biome==="forest"?"rgba(30,60,20,0.4)":"rgba(50,80,30,0.3)";
            const gx=sp.x+(hash%20)+4, gy=sp.y+((hash>>5)%20)+4;
            this.ctx.beginPath(); this.ctx.arc(gx,gy,2,0,Math.PI*2); this.ctx.fill();
          }
        } else if(biome==="fountain"||biome==="river"||biome==="lake"){
          // Water shimmer
          const shimmer = Math.sin(Date.now()*0.002+c*0.5+r*0.7)*0.05+0.05;
          this.ctx.fillStyle=`rgba(100,160,220,${shimmer})`;
          this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE);
        } else if(biome==="palace"){
          // Royal purple tint
          this.ctx.fillStyle="rgba(80,40,100,0.08)";
          this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE);
          // Gold trim
          if(r===40||r===56||c===50||c===70){
            this.ctx.fillStyle="rgba(200,170,60,0.15)";
            this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE);
          }
        } else if(biome==="barracks"){
          // Military pattern
          if((c+r)%3===0){ this.ctx.fillStyle="rgba(100,90,130,0.06)"; this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE); }
        } else if(biome==="gate"){
          // Gate glow
          this.ctx.fillStyle="rgba(200,160,60,0.12)";
          this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE);
        } else if(biome==="arena"){
          // Arena sand
          this.ctx.fillStyle="rgba(180,150,100,0.06)";
          this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE);
        } else if(biome==="house"||biome==="shop"){
          // Roof shadow
          this.ctx.fillStyle="rgba(0,0,0,0.08)";
          this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE/3);
        }
        
        // Subtle grid (lighter than before)
        this.ctx.strokeStyle="rgba(0,0,0,0.06)"; this.ctx.lineWidth=0.3;
        this.ctx.strokeRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE);
      }
    }

    if(this._showCollision) {
      for(let r=Math.max(0,sr);r<er;r++)for(let c=Math.max(0,sc);c<ec;c++){
        if(mapData.layers.collision[r]?.[c]===1){const sp=this.worldToScreen(c*TILE_SIZE,r*TILE_SIZE);this.ctx.fillStyle="rgba(255,0,0,0.15)";this.ctx.fillRect(sp.x,sp.y,TILE_SIZE,TILE_SIZE);}
      }
    }
  },

  // ── Harvest Nodes ──
  drawHarvestNode(node) {
    if(node.depleted) return;
    const sp=this.worldToScreen(node.x*TILE_SIZE,node.y*TILE_SIZE);
    if(sp.x+TILE_SIZE<0||sp.x>this.width||sp.y+TILE_SIZE<0||sp.y>this.height) return;

    const def = HARVEST_TYPES[node.type];
    if(!def) return;

    // Background
    this.ctx.fillStyle = node.type==="tree"?"#1a3a1a":node.type==="rock"?"#3a3535":"rgba(26,42,64,0.5)";
    this.ctx.fillRect(sp.x+2,sp.y+2,TILE_SIZE-4,TILE_SIZE-4);
    this.ctx.strokeStyle="rgba(201,168,76,0.15)"; this.ctx.lineWidth=1;
    this.ctx.strokeRect(sp.x+2,sp.y+2,TILE_SIZE-4,TILE_SIZE-4);

    // Icon
    this.ctx.font="16px serif"; this.ctx.textAlign="center";
    this.ctx.fillText(def.icon,sp.x+TILE_SIZE/2,sp.y+TILE_SIZE/2+5);
  },

  // ── Entity with sprite ──
  drawEntity(entity) {
    const sp=this.worldToScreen(entity.x*TILE_SIZE,entity.y*TILE_SIZE);
    if(sp.x+TILE_SIZE<0||sp.x>this.width||sp.y+TILE_SIZE<0||sp.y>this.height) return;
    const size=TILE_SIZE-4,offset=2;
    // Shadow
    this.ctx.fillStyle="rgba(0,0,0,0.4)"; this.ctx.beginPath();
    this.ctx.ellipse(sp.x+TILE_SIZE/2,sp.y+TILE_SIZE-1,size/2.5,3,0,0,Math.PI*2); this.ctx.fill();
    // Sprite or color
    if(entity.sprite&&this.drawImage(entity.sprite,sp.x+offset,sp.y+offset,size,size)){}
    else {
      this.ctx.fillStyle=entity.color||PLACEHOLDER_COLORS.player;
      this.ctx.fillRect(sp.x+offset,sp.y+offset,size,size);
      this.ctx.strokeStyle="rgba(255,255,255,0.2)";this.ctx.lineWidth=1;
      this.ctx.strokeRect(sp.x+offset,sp.y+offset,size,size);
    }
    if(entity.isLeader){this.ctx.fillStyle="#e4cc7a";this.ctx.font="8px serif";this.ctx.textAlign="center";this.ctx.fillText("👑",sp.x+TILE_SIZE/2,sp.y-1);}
    if(entity.name){this.ctx.font="bold 9px 'Cinzel',serif";this.ctx.textAlign="center";this.ctx.fillStyle="rgba(0,0,0,0.7)";this.ctx.fillText(entity.name,sp.x+TILE_SIZE/2+1,sp.y-3);this.ctx.fillStyle="#e8e0d0";this.ctx.fillText(entity.name,sp.x+TILE_SIZE/2,sp.y-4);}
  },

  drawNPC(npc) {
    this.drawEntity({x:npc.position.x,y:npc.position.y,color:PLACEHOLDER_COLORS.npc,name:npc.name,direction:npc.direction,sprite:npc.sprite});
    const sp=this.worldToScreen(npc.position.x*TILE_SIZE,npc.position.y*TILE_SIZE);
    const bob=Math.sin(Date.now()/500)*3;
    this.ctx.fillStyle=npc.type==="merchant"?"#c9a84c":"#e8e0d0";
    this.ctx.font="bold 12px 'Cinzel'"; this.ctx.textAlign="center";
    this.ctx.fillText(npc.type==="merchant"?"💰":"!",sp.x+TILE_SIZE/2,sp.y-10+bob);
  },

  drawInstance(inst) {
    const sp=this.worldToScreen(inst.position.x*TILE_SIZE,inst.position.y*TILE_SIZE);
    const pulse=Math.sin(Date.now()/600)*0.3+0.7;
    this.ctx.globalAlpha=pulse;
    const g=this.ctx.createRadialGradient(sp.x+TILE_SIZE/2,sp.y+TILE_SIZE/2,2,sp.x+TILE_SIZE/2,sp.y+TILE_SIZE/2,TILE_SIZE*0.7);
    g.addColorStop(0,inst.color||"rgba(123,75,179,0.6)"); g.addColorStop(1,"rgba(0,0,0,0)");
    this.ctx.fillStyle=g; this.ctx.fillRect(sp.x-4,sp.y-4,TILE_SIZE+8,TILE_SIZE+8);
    this.ctx.globalAlpha=1;
    this.ctx.font="16px serif"; this.ctx.textAlign="center";
    this.ctx.fillText(inst.icon||"🚪",sp.x+TILE_SIZE/2,sp.y+TILE_SIZE/2+5);
    if(inst.name){this.ctx.font="bold 9px 'Cinzel',serif";this.ctx.fillStyle="#e8e0d0";this.ctx.fillText(inst.name,sp.x+TILE_SIZE/2,sp.y-4);}
  },

  drawChest(chest) {
    const sp=this.worldToScreen(chest.x*TILE_SIZE,chest.y*TILE_SIZE);
    const size=TILE_SIZE-6;
    this.ctx.fillStyle=chest.opened?"#3a3028":PLACEHOLDER_COLORS.chest;
    this.ctx.fillRect(sp.x+3,sp.y+6,size,size-4);
    if(!chest.opened){const s=Math.sin(Date.now()/300)*0.3+0.7;this.ctx.globalAlpha=s;this.ctx.fillStyle="#e4cc7a";this.ctx.fillRect(sp.x+TILE_SIZE/2-2,sp.y+TILE_SIZE/2,4,4);this.ctx.globalAlpha=1;}
  },

  drawGrid(w,h){this.ctx.strokeStyle="rgba(201,168,76,0.06)";this.ctx.lineWidth=0.5;const sc=Math.floor(this.camera.x/TILE_SIZE),sr=Math.floor(this.camera.y/TILE_SIZE);for(let c=sc;c<=Math.min(w,sc+Math.ceil(this.width/TILE_SIZE)+2);c++){const x=c*TILE_SIZE-this.camera.x;this.ctx.beginPath();this.ctx.moveTo(x,0);this.ctx.lineTo(x,this.height);this.ctx.stroke();}for(let r=sr;r<=Math.min(h,sr+Math.ceil(this.height/TILE_SIZE)+2);r++){const y=r*TILE_SIZE-this.camera.y;this.ctx.beginPath();this.ctx.moveTo(0,y);this.ctx.lineTo(this.width,y);this.ctx.stroke();}},

  drawText(text,x,y,opts={}){const{size=14,color="#e8e0d0",align="left",font="Cinzel",bold=false,shadow=false}=opts;this.ctx.font=`${bold?"bold ":""}${size}px '${font}',serif`;this.ctx.textAlign=align;if(shadow){this.ctx.fillStyle="rgba(0,0,0,0.6)";this.ctx.fillText(text,x+1,y+1);}this.ctx.fillStyle=color;this.ctx.fillText(text,x,y);},

  _fpsFrames:0,_fpsTime:0,_fpsDisplay:0,
  drawFPS(dt){this._fpsFrames++;this._fpsTime+=dt;if(this._fpsTime>=1){this._fpsDisplay=this._fpsFrames;this._fpsFrames=0;this._fpsTime=0;}this.ctx.font="bold 11px monospace";this.ctx.textAlign="right";this.ctx.fillStyle=this._fpsDisplay>=55?"#5fa35e":this._fpsDisplay>=30?"#d4942a":"#c93636";this.ctx.fillText(`${this._fpsDisplay} FPS`,this.width-10,18);},

  toggleCollisionDebug(){this._showCollision=!this._showCollision;}
};

   Audio Manager (Stub — full impl in Module 6)

"use strict";

const Audio = {
  _musicVolume: 0.7,
  _sfxVolume: 0.8,
  _muted: false,
  _currentTrack: null,

  init() {
    // Web Audio API context will be created on first user interaction
    this._ready = false;
  },

  _ensureContext() {
    if (this._ready) return;
    try {
      this._ctx = new (window.AudioContext || window.webkitAudioContext)();
      this._ready = true;
    } catch (e) {
      console.warn("[Audio] Web Audio not available");
    }
  },

  playMusic(trackId, fade = true) {
    this._currentTrack = trackId;
    // Stub: will load and play audio files in Module 6
    console.log(`[Audio] Play music: ${trackId}`);
  },

  stopMusic(fade = true) {
    this._currentTrack = null;
    console.log("[Audio] Stop music");
  },

  playSFX(sfxId) {
    this._ensureContext();
    // Stub: generate a quick beep for feedback
    if (!this._ready || this._muted) return;

    try {
      const osc = this._ctx.createOscillator();
      const gain = this._ctx.createGain();
      osc.connect(gain);
      gain.connect(this._ctx.destination);

      // Different tones for different SFX
      const tones = {
        ui_click: { freq: 800, dur: 0.05 },
        ui_open: { freq: 600, dur: 0.08 },
        ui_close: { freq: 400, dur: 0.06 },
        save: { freq: 1000, dur: 0.15 },
        level_up: { freq: 1200, dur: 0.2 },
        error: { freq: 200, dur: 0.15 },
        default: { freq: 660, dur: 0.06 }
      };

      const tone = tones[sfxId] || tones.default;
      osc.frequency.value = tone.freq;
      osc.type = "sine";
      gain.gain.value = this._sfxVolume * 0.15;
      gain.gain.exponentialRampToValueAtTime(0.001, this._ctx.currentTime + tone.dur);
      osc.start(this._ctx.currentTime);
      osc.stop(this._ctx.currentTime + tone.dur);
    } catch (e) { /* Ignore audio errors */ }
  },

  setMusicVolume(v) { this._musicVolume = Utils.clamp(v, 0, 1); },
  setSFXVolume(v)   { this._sfxVolume = Utils.clamp(v, 0, 1); },
  getMusicVolume()  { return this._musicVolume; },
  getSFXVolume()    { return this._sfxVolume; },

  mute()   { this._muted = true; },
  unmute() { this._muted = false; },
  toggleMute() { this._muted = !this._muted; }
};

// === js/core/save.js ===
/* ═══════════════════════════════════════════
   Save / Load System
   ═══════════════════════════════════════════ */

"use strict";

const SaveManager = {
  _autoSaveTimer: null,
  _currentSlot: 0,

  init() {
    // Start autosave
    this._autoSaveTimer = setInterval(() => {
      this.autoSave();
    }, AUTO_SAVE_INTERVAL);
  },

  // ── Build Save Data ──
  _buildSaveData() {
    return {
      version: GAME_VERSION,
      timestamp: Date.now(),
      playtime: GameData.state.playtime || 0,

      player: {
        name: GameData.state.player.name,
        level: GameData.state.player.level,
        xp: GameData.state.player.xp,
        gold: GameData.state.player.gold,
        position: { ...GameData.state.player.position },
        stats: { ...GameData.state.player.stats }
      },

      party: Utils.deepClone(GameData.state.party),
      _companionBench: Utils.deepClone(GameData.state._companionBench || {}),
      inventory: Utils.deepClone(GameData.state.inventory),
      unlockedCompanions: [...GameData.state.unlockedCompanions],
      completedQuests: [...GameData.state.completedQuests],
      activeQuests: Utils.deepClone(GameData.state.activeQuests),
      worldState: Utils.deepClone(GameData.state.worldState),

      settings: { ...GameData.state.settings }
    };
  },

  // ── Save to Slot ──
  saveToSlot(slot) {
    try {
      const data = this._buildSaveData();
      const key = SAVE_KEY_PREFIX + slot;
      const json = JSON.stringify(data);

      localStorage.setItem(key, json);
      this._currentSlot = slot;

      EventBus.emit("save:complete", { slot });
      EventBus.emit("ui:toast", { message: `Sauvegarde Slot ${slot + 1} réussie`, type: "success" });

      return true;
    } catch (err) {
      console.error("[Save] Error:", err);
      EventBus.emit("ui:toast", { message: "Erreur de sauvegarde!", type: "error" });
      return false;
    }
  },

  // ── Load from Slot ──
  loadFromSlot(slot) {
    try {
      const key = SAVE_KEY_PREFIX + slot;
      const json = localStorage.getItem(key);

      if (!json) {
        EventBus.emit("ui:toast", { message: "Slot vide", type: "warning" });
        return false;
      }

      const data = JSON.parse(json);

      // Version check
      if (data.version !== GAME_VERSION) {
        console.warn(`[Save] Version mismatch: save=${data.version}, game=${GAME_VERSION}`);
        // Could add migration logic here
      }

      // Apply to game state
      GameData.state.player = data.player;
      GameData.state.party = data.party || [];
      GameData.state._companionBench = data._companionBench || {};
      GameData.state.inventory = data.inventory || [];
      GameData.state.unlockedCompanions = data.unlockedCompanions || [];
      GameData.state.completedQuests = data.completedQuests || [];
      GameData.state.activeQuests = data.activeQuests || [];
      GameData.state.worldState = data.worldState || {};
      GameData.state.playtime = data.playtime || 0;

      if (data.settings) {
        Object.assign(GameData.state.settings, data.settings);
      }

      this._currentSlot = slot;

      EventBus.emit("save:loaded", { slot });
      EventBus.emit("ui:toast", { message: `Slot ${slot + 1} chargé`, type: "success" });

      return true;
    } catch (err) {
      console.error("[Save] Load error:", err);
      EventBus.emit("ui:toast", { message: "Erreur de chargement!", type: "error" });
      return false;
    }
  },

  // ── Auto Save ──
  autoSave() {
    try {
      const data = this._buildSaveData();
      localStorage.setItem(SAVE_KEY_PREFIX + "auto", JSON.stringify(data));
    } catch (err) {
      console.warn("[Save] Autosave failed:", err);
    }
  },

  // ── Get Slot Info (for UI) ──
  getSlotInfo(slot) {
    try {
      const key = SAVE_KEY_PREFIX + slot;
      const json = localStorage.getItem(key);
      if (!json) return null;

      const data = JSON.parse(json);
      return {
        slot,
        playerName: data.player?.name || "???",
        level: data.player?.level || 1,
        gold: data.player?.gold || 0,
        playtime: data.playtime || 0,
        timestamp: data.timestamp,
        version: data.version,
        mapId: data.player?.position?.mapId || "???"
      };
    } catch {
      return null;
    }
  },

  getAllSlotInfo() {
    const slots = [];
    for (let i = 0; i < MAX_SAVE_SLOTS; i++) {
      slots.push(this.getSlotInfo(i));
    }
    // Add auto slot
    const autoKey = SAVE_KEY_PREFIX + "auto";
    try {
      const json = localStorage.getItem(autoKey);
      if (json) {
        const data = JSON.parse(json);
        slots.push({
          slot: "auto",
          playerName: data.player?.name || "???",
          level: data.player?.level || 1,
          timestamp: data.timestamp,
          version: data.version,
          isAuto: true
        });
      }
    } catch { /* ignore */ }
    return slots;
  },

  // ── Delete Slot ──
  deleteSlot(slot) {
    localStorage.removeItem(SAVE_KEY_PREFIX + slot);
    EventBus.emit("ui:toast", { message: `Slot ${slot + 1} supprimé`, type: "info" });
  },

  // ── Export to File ──
  exportSave(slot) {
    const key = SAVE_KEY_PREFIX + (slot !== undefined ? slot : this._currentSlot);
    const json = localStorage.getItem(key);
    if (!json) {
      EventBus.emit("ui:toast", { message: "Rien à exporter", type: "warning" });
      return;
    }

    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `13th_division_save_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);

    EventBus.emit("ui:toast", { message: "Sauvegarde exportée", type: "success" });
  },

  // ── Import from File ──
  importSave(file, slot) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);

          // Validate basic structure
          if (!data.version || !data.player) {
            EventBus.emit("ui:toast", { message: "Fichier invalide", type: "error" });
            resolve(false);
            return;
          }

          const targetSlot = slot !== undefined ? slot : this._currentSlot;
          localStorage.setItem(SAVE_KEY_PREFIX + targetSlot, JSON.stringify(data));
          EventBus.emit("ui:toast", { message: `Importé dans Slot ${targetSlot + 1}`, type: "success" });
          resolve(true);
        } catch (err) {
          EventBus.emit("ui:toast", { message: "Erreur: fichier corrompu", type: "error" });
          resolve(false);
        }
      };
      reader.readAsText(file);
    });
  },

  // ── Dev Data Save/Load (separate from game saves) ──
  saveDevData() {
    try {
      const devData = {
        companions: GameData.db.companions,
        enemies: GameData.db.enemies,
        items: GameData.db.items,
        maps: GameData.db.maps,
        quests: GameData.db.quests
      };
      localStorage.setItem("goh_devdata", JSON.stringify(devData));
      EventBus.emit("ui:toast", { message: "Données DEV sauvegardées", type: "success" });
    } catch (err) {
      console.error("[Save] Dev data save error:", err);
    }
  },

  loadDevData() {
    try {
      const json = localStorage.getItem("goh_devdata");
      if (!json) return false;

      const devData = JSON.parse(json);
      if (devData.companions) GameData.db.companions = devData.companions;
      if (devData.enemies) GameData.db.enemies = devData.enemies;
      if (devData.items) GameData.db.items = devData.items;
      if (devData.maps) GameData.db.maps = devData.maps;
      if (devData.quests) GameData.db.quests = devData.quests;

      return true;
    } catch {
      return false;
    }
  },

  exportDevData() {
    const devData = {
      companions: GameData.db.companions,
      enemies: GameData.db.enemies,
      items: GameData.db.items,
      maps: GameData.db.maps,
      quests: GameData.db.quests
    };

    const blob = new Blob([JSON.stringify(devData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `13th_division_devdata_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  },

  importDevData(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const devData = JSON.parse(e.target.result);
          if (devData.companions) GameData.db.companions = devData.companions;
          if (devData.enemies) GameData.db.enemies = devData.enemies;
          if (devData.items) GameData.db.items = devData.items;
          if (devData.maps) GameData.db.maps = devData.maps;
          if (devData.quests) GameData.db.quests = devData.quests;

          SaveManager.saveDevData();
          EventBus.emit("dev:data_change", { type: "all" });
          EventBus.emit("ui:toast", { message: "Données DEV importées", type: "success" });
          resolve(true);
        } catch {
          EventBus.emit("ui:toast", { message: "Import DEV échoué", type: "error" });
          resolve(false);
        }
      };
      reader.readAsText(file);
    });
  },

  // Cleanup
  destroy() {
    if (this._autoSaveTimer) clearInterval(this._autoSaveTimer);
  }
};

   Game Data — Gates of Hades v0.2
   Multi-category companions, leader skills, synergy config, harvest, biomes

"use strict";

const GameData = {
