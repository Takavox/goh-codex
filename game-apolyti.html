    return { templateId:tid, level:1, xp:0, currentHp:calculateStat(t.base_stats.hp,t.growth_rates.hp,1),
      mp:30, maxMp:30, awakenTier:0, effectiveRarity:t.rarity,
      equipment:{weapon:null,armor:null,accessory_1:null,accessory_2:null,accessory_3:null} };
  },

  // ═══════════════════════════════════════
  // STATS — includes synergy + leader bonuses
  // ═══════════════════════════════════════
  getComputedStats(instance, includeSynergies=false) {
    const t=GameData.getCompanion(instance.templateId); if(!t) return null;
    const stats={};
    for (const k of STAT_KEYS) stats[k]=calculateStat(t.base_stats[k],t.growth_rates[k],instance.level);
    // Awakening
    if (instance.awakenTier>0) { const m=1+(instance.awakenTier*0.05); for(const k of STAT_KEYS) stats[k]=Math.floor(stats[k]*m); }
    // Equipment
    for (const slot of Object.keys(instance.equipment)) {
      const iid=instance.equipment[slot]; if(!iid) continue;
      const item=GameData.getItem(iid); if(!item?.stats) continue;
      for (const s of Object.keys(item.stats)) { if(stats[s]!==undefined) stats[s]+=item.stats[s]; }
    }
    stats.maxHp=stats.hp;
    stats.maxMp=30+Math.floor(instance.level*1.5)+(instance.awakenTier*10);
    // Extended stats (for synergy bonuses)
    stats.crit_chance=stats.crit_chance||0; stats.crit_damage=stats.crit_damage||0;
    stats.xp_bonus=0; stats.gold_bonus=0; stats.heal_bonus=0;
    stats.dmg_reduce=0; stats.elem_dmg=0; stats.mp_regen=0;
    stats.lifesteal=0; stats.counter_chance=0; stats.double_hit=0; stats.evasion_bonus=0;

    if (includeSynergies) {
      this._applySynergyBonuses(stats, instance);
      this._applyLeaderBonuses(stats, instance);
    }
    return stats;
  },

  getLevelCap(inst) { return RARITY_DATA[inst.effectiveRarity]?.levelCap||20; },
  getUnlockedSkills(inst) { const t=GameData.getCompanion(inst.templateId); return t?(t.skills||[]).filter(sk=>inst.level>=sk.unlock_level):[]; },
  getAllSkills(inst) { const t=GameData.getCompanion(inst.templateId); return t?(t.skills||[]).map(sk=>({...sk,unlocked:inst.level>=sk.unlock_level})):[]; },

  // ═══════════════════════════════════════
  // PARTY
  // ═══════════════════════════════════════
  getParty() { return GameData.state.party; },
  getPartySize() { return GameData.state.party.length+1; },

  addToParty(tid) {
    if(GameData.state.party.length>=3){EventBus.emit("ui:toast",{message:"Équipe complète",type:"warning"});return false;}
    if(GameData.state.party.some(c=>c.templateId===tid)){EventBus.emit("ui:toast",{message:"Déjà dans l'équipe",type:"warning"});return false;}
    if(!GameData.state.unlockedCompanions.includes(tid)) return false;
    let inst=this._findStored(tid); if(!inst) inst=this.createInstance(tid);
    GameData.state.party.push(inst);
    Audio.playSFX("ui_open"); EventBus.emit("party:changed"); HUD.refresh();
    const t=GameData.getCompanion(tid);
    EventBus.emit("ui:toast",{message:`${t?.name} rejoint l'équipe !`,type:"success"});
    return true;
  },

  removeFromParty(tid) {
    const idx=GameData.state.party.findIndex(c=>c.templateId===tid); if(idx===-1) return false;
    this._store(GameData.state.party[idx]);
    GameData.state.party.splice(idx,1);
    if(Player.visibleCompanionId===tid) Player.setVisibleCompanion(null);
    if(GameData.state.leaderId===tid) GameData.state.leaderId=null;
    EventBus.emit("party:changed"); HUD.refresh();
    return true;
  },

  isInParty(id) { return GameData.state.party.some(c=>c.templateId===id); },

  getAllUnlockedCompanions() {
    return GameData.state.unlockedCompanions.map(id=>{
      const template=GameData.getCompanion(id);
      const instance=this.getInstanceForTemplate(id);
      return {template,instance,inParty:this.isInParty(id)};
    }).filter(c=>c.template);
  },

  getInstanceForTemplate(id) {
    const a=GameData.state.party.find(c=>c.templateId===id);
    return a||this._findStored(id);
  },

  // ═══════════════════════════════════════
  // LEADER SYSTEM
  // ═══════════════════════════════════════
  setLeader(companionId) {
    GameData.state.leaderId = companionId;
    EventBus.emit("party:changed");
    const t=GameData.getCompanion(companionId);
    EventBus.emit("ui:toast",{message:`👑 ${t?.name||"Héros"} est maintenant leader`,type:"success"});
  },

  getLeaderId() { return GameData.state.leaderId || null; },

  getLeaderTemplate() {
    const lid = this.getLeaderId();
    if (!lid) return null;
    return GameData.getCompanion(lid);
  },

  /**
   * Check if leader skill condition is met
   * Condition: { type, category?, element?, count?, rarity? }
   */
  isLeaderConditionMet(condition) {
    if (!condition || condition.type === "always") return true;
    const party = GameData.state.party;
    const templates = party.map(c=>GameData.getCompanion(c.templateId)).filter(Boolean);

    switch (condition.type) {
      case "min_category_count": {
        const cat = condition.category;
        const count = templates.filter(t=>(t.categories||[t.category]).includes(cat)).length;
        return count >= (condition.count || 2);
      }
      case "all_same_element": {
        const elems = new Set(templates.map(t=>t.element));
        return elems.size <= 1;
      }
      case "all_different_elements": {
        const elems = templates.map(t=>t.element);
        return new Set(elems).size === elems.length;
      }
      case "min_rarity": {
        const minTier = RARITY_TIERS[condition.rarity] || 1;
        return party.every(c => RARITY_TIERS[c.effectiveRarity] >= minTier);
      }
      default: return true;
    }
  },

  /**
   * Get active leader bonuses (if any)
   * Returns array of { bonus_type, value, target_categories?, description }
   */
  getActiveLeaderBonuses() {
    const lid = this.getLeaderId();
    if (!lid) return [];
    const t = GameData.getCompanion(lid);
    if (!t || !t.leader_skill) return [];

    const ls = t.leader_skill;
    if (!this.isLeaderConditionMet(ls.condition)) return [];

    return ls.bonuses || [];
  },

  _applyLeaderBonuses(stats, instance) {
    const bonuses = this.getActiveLeaderBonuses();
    const t = GameData.getCompanion(instance.templateId);
    if (!t) return;

    for (const bonus of bonuses) {
      // Check if this bonus applies to this companion's categories
      if (bonus.target_categories && bonus.target_categories.length > 0) {
        const companionCats = t.categories || [t.category];
        const applies = bonus.target_categories.some(bc => companionCats.includes(bc));
        if (!applies) continue;
      }

      const bType = SYNERGY_BONUS_TYPES[bonus.bonus_type];
      if (!bType) continue;

      if (bType.mode === "percent" && bType.stat in stats) {
        stats[bType.stat] = Math.floor(stats[bType.stat] * (1 + bonus.value / 100));
      } else if (bType.mode === "flat" && bType.stat in stats) {
        stats[bType.stat] += bonus.value;
      }
    }
  },

  // ═══════════════════════════════════════
  // SYNERGIES — Multi-category, dev-configurable bonuses
  // ═══════════════════════════════════════

  /**
   * Get all active synergies
   * Uses GameData.db.synergy_config for per-category bonus configuration
   */
  getActiveSynergies() {
    const party = GameData.state.party;
    if (party.length===0) return [];
    const synergies = [];

    // Count members per category (companions can belong to multiple)
    const catCounts = {};
    for (const c of party) {
      const t = GameData.getCompanion(c.templateId); if (!t) continue;
      const cats = t.categories || [t.category];
      for (const cat of cats) {
        catCounts[cat] = (catCounts[cat]||0) + 1;
      }
    }

    // Check each category with 2+ members
    const synergyConfig = GameData.db.synergy_config || {};

    for (const [cat, count] of Object.entries(catCounts)) {
      if (count < 2) continue;

      const config = synergyConfig[cat];
      if (config) {
        // Dev-configured synergy
        const bonuses = [];
        for (const b of (config.bonuses || [])) {
          // Scale by count: value_per_member * count
          // Thresholds: 2=base, 3=1.5x, 4=2x
          const scale = count === 2 ? 1.0 : count === 3 ? 1.5 : 2.0;
          const scaledValue = Math.floor(b.value * scale);
          bonuses.push({ ...b, value: scaledValue, original_value: b.value });
        }
        synergies.push({
          type:"category", category: cat, name: config.name || `Synergie ${cat}`,
          description: config.description || `${count} ${cat}`,
          bonuses, count, icon: config.icon || "⚡"
        });
      } else {
        // Default fallback: +10% ATK per 2 members, scaling
        const baseBonus = 10;
        const scale = count === 2 ? 1.0 : count === 3 ? 1.5 : 2.0;
        synergies.push({
          type:"category", category: cat,
          name: `Alliance ${cat}`,
          description: `+${Math.floor(baseBonus * scale)}% ATK (${count} membres)`,
          bonuses: [{ bonus_type:"atk_percent", value: Math.floor(baseBonus * scale) }],
          count, icon: "⚡"
        });
      }
    }

    return synergies;
  },

  _applySynergyBonuses(stats, instance) {
    const synergies = this.getActiveSynergies();
    const t = GameData.getCompanion(instance.templateId);
    if (!t) return;
    const companionCats = t.categories || [t.category];

    for (const syn of synergies) {
      // Only apply if this companion belongs to the synergy's category
      if (!companionCats.includes(syn.category)) continue;

      for (const bonus of syn.bonuses) {
        const bType = SYNERGY_BONUS_TYPES[bonus.bonus_type];
        if (!bType) continue;
        if (bType.mode === "percent" && bType.stat in stats) {
          stats[bType.stat] = Math.floor(stats[bType.stat] * (1 + bonus.value / 100));
        } else if (bType.mode === "flat" && bType.stat in stats) {
          stats[bType.stat] += bonus.value;
        }
      }
    }
  },

  // ═══════════════════════════════════════
  // XP
  // ═══════════════════════════════════════
  grantXP(inst, amount) {
    if(!inst) return {levelsGained:0,xpGained:0,newLevel:0};
    const cap=this.getLevelCap(inst); if(inst.level>=cap) return {levelsGained:0,xpGained:0,newLevel:inst.level};
    inst.xp+=amount; let gained=0;
    while(inst.level<cap) { const n=getXPForNextLevel(inst.level); if(inst.xp<n) break; inst.xp-=n; inst.level++; gained++;
      const s=this.getComputedStats(inst); inst.currentHp=Math.min(s.maxHp,inst.currentHp+Math.floor(s.maxHp*0.2));
    }
    if(inst.level>=cap) inst.xp=0;
    if(gained>0) {
      const t=GameData.getCompanion(inst.templateId);
      Audio.playSFX("level_up");
      EventBus.emit("companion:level_up",{templateId:inst.templateId,name:t?.name,newLevel:inst.level,levelsGained:gained});
      for(const sk of this.getAllSkills(inst)) { if(sk.unlocked&&inst.level-gained<sk.unlock_level) EventBus.emit("ui:toast",{message:`💫 ${t?.name}: "${sk.name}" !`,type:"success",duration:4000}); }
    }
    return {levelsGained:gained,xpGained:amount,newLevel:inst.level};
  },

  grantPartyXP(base,source="combat") {
    const party=GameData.state.party; if(!party.length) return;
    const pen={1:1.0,2:0.6,3:0.45}; const xp=Math.floor(base*(pen[party.length]||0.35));
    for(const c of party) this.grantXP(c,xp);
    GameData.state.player.xp+=Math.floor(base*(pen[party.length]||0.35));
    this._checkHeroLevelUp();
  },

  useXPStone(cid,stoneId) {
    const inst=this.getInstanceForTemplate(cid); const stone=GameData.getItem(stoneId);
    if(!inst||!stone) return null;
    const eff=(stone.effects||[]).find(e=>e.type==="grant_xp"); if(!eff) return null;
    const inv=GameData.state.inventory.find(i=>i.itemId===stoneId&&i.quantity>0);
    if(!inv) return null;
    let xp=eff.value; if(RARITY_TIERS[stone.rarity]>=RARITY_TIERS[inst.effectiveRarity]) xp=Math.floor(xp*1.2);
    inv.quantity--; GameData.state.inventory=GameData.state.inventory.filter(i=>i.quantity>0);
    const r=this.grantXP(inst,xp); const t=GameData.getCompanion(cid);
    EventBus.emit("ui:toast",{message:`+${Utils.formatNumber(xp)} XP → ${t?.name}`,type:"success"});
    return r;
  },

  canAwaken(inst) {
    const t=GameData.getCompanion(inst.templateId); if(!t?.awakening) return {can:false,reason:"Pas d'éveil"};
    if(inst.awakenTier>=t.awakening.max_tier) return {can:false,reason:"Max tier"};
    const cap=this.getLevelCap(inst); if(inst.level<cap) return {can:false,reason:`Nv.${cap} requis`};
    return {can:true,reason:"Prêt"};
  },

  awakenCompanion(cid) {
    const inst=this.getInstanceForTemplate(cid); if(!inst) return false;
    const check=this.canAwaken(inst); if(!check.can){EventBus.emit("ui:toast",{message:check.reason,type:"warning"});return false;}
    inst.awakenTier++; const rIdx=RARITY_KEYS.indexOf(inst.effectiveRarity);
    if(rIdx<RARITY_KEYS.length-1) inst.effectiveRarity=RARITY_KEYS[rIdx+1];
    inst.level=1; inst.xp=0; const s=this.getComputedStats(inst); inst.currentHp=s.maxHp;
    Audio.playSFX("level_up"); const t=GameData.getCompanion(cid);
    EventBus.emit("ui:toast",{message:`⭐ ${t.name} éveillé → ${inst.effectiveRarity}`,type:"success",duration:5000});
    return true;
  },

  _getElementIcon(e) { return {Feu:"🔥",Eau:"💧",Terre:"🪨",Vent:"🌪️",Lumière:"☀️",Ténèbres:"🌑",Neutre:"⚪"}[e]||"⚪"; },
  _catIcon(c) { return {Guerrier:"⚔️",Mage:"🔮",Archer:"🏹",Tank:"🛡️",Soigneur:"💚",Assassin:"🗡️",Invocateur:"👁️",Berserk:"🔥",Paladin:"✨",Druide:"🌿","13e Division":"🏴"}[c]||"⚡"; },

  _unlockStarters() {
    const ids=Object.keys(GameData.db.companions);
    for(const id of ids){if(!GameData.state.unlockedCompanions.includes(id))GameData.state.unlockedCompanions.push(id);}
    if(!GameData.state._companionBench)GameData.state._companionBench={};
    for(const id of ids){if(!GameData.state._companionBench[id])GameData.state._companionBench[id]=this.createInstance(id);}
  },
  _validateParty() {
    if(!GameData.state._companionBench)GameData.state._companionBench={};
    if(!GameData.state.leaderId) GameData.state.leaderId=null;
    GameData.state.party=GameData.state.party.filter(c=>{
      if(!c.templateId||!GameData.getCompanion(c.templateId))return false;
      if(!c.effectiveRarity)c.effectiveRarity=GameData.getCompanion(c.templateId).rarity;
      if(c.awakenTier===undefined)c.awakenTier=0;
      if(c.currentHp===undefined){const s=this.getComputedStats(c);c.currentHp=s?.maxHp||100;}
      return true;
    });
  },
  _findStored(id){return GameData.state._companionBench?.[id]||null;},
  _store(inst){if(!GameData.state._companionBench)GameData.state._companionBench={};GameData.state._companionBench[inst.templateId]=Utils.deepClone(inst);},
  _checkHeroLevelUp() {
    const p=GameData.state.player; let g=0;
    while(true){const n=getXPForNextLevel(p.level);if(p.xp<n)break;p.xp-=n;p.level++;g++;p.stats.maxHp+=8;p.stats.hp=p.stats.maxHp;p.stats.atk+=2;p.stats.def+=1;p.stats.mag+=1;p.stats.spd+=1;}
    if(g>0){Audio.playSFX("level_up");EventBus.emit("ui:toast",{message:`🎉 Héros Nv.${p.level} !`,type:"success",duration:4000});HUD.refresh();}
  }
};

// === js/systems/combat.js ===
/* ═══════════════════════════════════════════
   Combat Engine — Full Status Effects System
   Buffs/Debuffs: atk_up, def_up, mag_up, spd_up, atk_down, def_down,
   stun, evasion, regen, poison, shield, taunt
   Skills can have multiple effects with configurable duration
   ═══════════════════════════════════════════ */
"use strict";

// ── Status Effect Definitions ──
const STATUS_EFFECTS = {
  atk_up:   { name: "ATK+",   icon: "⚔️↑", stat: "atk", mult: 1,   type: "buff" },
  def_up:   { name: "DEF+",   icon: "🛡️↑", stat: "def", mult: 1,   type: "buff" },
  mag_up:   { name: "MAG+",   icon: "✨↑",  stat: "mag", mult: 1,   type: "buff" },
  spd_up:   { name: "VIT+",   icon: "💨↑",  stat: "spd", mult: 1,   type: "buff" },
  atk_down: { name: "ATK-",   icon: "⚔️↓", stat: "atk", mult: -1,  type: "debuff" },
  def_down: { name: "DEF-",   icon: "🛡️↓", stat: "def", mult: -1,  type: "debuff" },
  mag_down: { name: "MAG-",   icon: "✨↓",  stat: "mag", mult: -1,  type: "debuff" },
  spd_down: { name: "VIT-",   icon: "💨↓",  stat: "spd", mult: -1,  type: "debuff" },
  stun:     { name: "Étourdi", icon: "💫",   stat: null,  mult: 0,   type: "debuff" },
  evasion:  { name: "Esquive", icon: "🌀",   stat: null,  mult: 0,   type: "buff" },
  regen:    { name: "Regen",   icon: "💚",   stat: null,  mult: 0,   type: "buff" },
  poison:   { name: "Poison",  icon: "☠️",   stat: null,  mult: 0,   type: "debuff" },
  shield:   { name: "Bouclier",icon: "🔰",   stat: null,  mult: 0,   type: "buff" },
  taunt:    { name: "Provoc",  icon: "😤",   stat: null,  mult: 0,   type: "buff" },
};

const Combat = {
  active: false,
  state: "IDLE",
  turnOrder: [], currentTurnIndex: 0, turnNumber: 0,
  allies: [], enemies: [],
  selectedAction: null, selectedSkill: null, selectedItem: null, selectedTarget: null,
  log: [],
  rewards: { xp: 0, gold: 0, loot: [] },

  ELEMENT_TABLE: {
    Feu:{strong:"Terre",weak:"Eau"}, Eau:{strong:"Feu",weak:"Vent"},
    Terre:{strong:"Vent",weak:"Feu"}, Vent:{strong:"Eau",weak:"Terre"},
    Lumière:{strong:"Ténèbres",weak:"Ténèbres"}, Ténèbres:{strong:"Lumière",weak:"Lumière"},
    Neutre:{strong:null,weak:null}
  },

  init() { EventBus.on("combat:start", (d) => this.startCombat(d.enemies, d.context)); },

  startCombat(enemyDefs, context = {}) {
    if (this.active) return;
    this.active = true; this.state = "INIT"; this.turnNumber = 0;
    this.log = []; this.rewards = { xp:0, gold:0, loot:[] };
    this.selectedAction = null; this.selectedSkill = null;
    this.selectedItem = null; this.selectedTarget = null;
    this._context = context;
    this._buildAllies(); this._buildEnemies(enemyDefs);
    this._calculateTurnOrder();
    this._log("⚔️ Combat engagé !");
    EventBus.emit("combat:ui_open");
    this.state = "CHECK"; this._nextTurn();
  },

  // ── Build combatants ──
  _buildAllies() {
    this.allies = [];
    const p = GameData.state.player;
    this.allies.push({
      id: "hero", name: p.name, isHero: true,
      baseStats: { ...p.stats }, stats: { ...p.stats },
      currentHp: p.stats.hp, maxHp: p.stats.maxHp,
      mp: 30, maxMp: 30,
      skills: [{ id:"power_slash", name:"Frappe Puissante", damage_multiplier:1.5, mp_cost:8, element:"Neutre", target_type:"enemy", effects:[] }],
      element: "Neutre", buffs: [], defending: false,
      portrait: p.portrait_path || null
    });

    for (const c of GameData.state.party) {
      const t = GameData.getCompanion(c.templateId);
      if (!t) continue;
      const stats = CompanionSystem.getComputedStats(c);
      if (!stats) continue;
      this.allies.push({
        id: c.templateId, name: t.name, templateId: c.templateId, isHero: false,
        baseStats: { ...stats }, stats: { ...stats },
        currentHp: Math.min(c.currentHp, stats.maxHp), maxHp: stats.maxHp,
        mp: c.mp || 30, maxMp: stats.maxMp || 30,
        skills: CompanionSystem.getUnlockedSkills(c),
        element: t.element || "Neutre", buffs: [], defending: false,
        portrait: t.portrait_path || null
      });
    }
  },

  _buildEnemies(enemyDefs) {
    this.enemies = [];
    for (let i = 0; i < enemyDefs.length; i++) {
      const def = enemyDefs[i];
      const t = GameData.getEnemy(def.enemyId);
      if (!t) continue;
      const level = def.level || t.level || 1;
      const stats = {};
      for (const s of STAT_KEYS) stats[s] = calculateStat(t.base_stats[s], t.growth_rates[s], level);

      let displayName = t.name;
      for (const v of (t.visual_variants || [])) {
        if (level >= v.min_level && level <= v.max_level && v.name_prefix) { displayName = v.name_prefix + t.name; break; }
      }

      this.enemies.push({
        id: `enemy_${i}_${t.id}`, name: displayName, enemyId: t.id, level,
        baseStats: { ...stats }, stats: { ...stats },
        currentHp: stats.hp, maxHp: stats.hp, mp: 30, maxMp: 30,
        skills: (t.skills || []).filter(sk => level >= sk.unlock_level),
        element: t.element || "Neutre",
        ai_type: t.ai_type || "aggressive", ai_patterns: t.ai_patterns || [],
        buffs: [], defending: false,
        rewards: t.rewards || {}, portrait: t.portrait_path || null
      });
    }
  },

  // ── Status Effects ──
  applyStatusEffect(target, effectId, value, duration, source) {
    const def = STATUS_EFFECTS[effectId];
    if (!def) return;

    // Remove existing same effect (refresh)
    target.buffs = target.buffs.filter(b => b.id !== effectId);

    target.buffs.push({ id: effectId, value: value || 0, turnsLeft: duration || 3, source: source || "?" });

    // Apply immediate stat change for stat-based effects
    this._recalcStats(target);

    const icon = def.icon;
    const typeLabel = def.type === "buff" ? "+" : "-";
    this._log(`${icon} ${target.name}: ${def.name} (${duration} tours)`);
    EventBus.emit("combat:status_applied", { target, effectId, duration });
  },

  removeStatusEffect(target, effectId) {
    target.buffs = target.buffs.filter(b => b.id !== effectId);
    this._recalcStats(target);
  },

  hasStatus(unit, effectId) {
    return unit.buffs.some(b => b.id === effectId);
  },

  _recalcStats(unit) {
    // Reset to base stats
    for (const key of STAT_KEYS) {
      unit.stats[key] = unit.baseStats[key];
    }
    // Apply all active stat-based buffs/debuffs
    for (const buff of unit.buffs) {
      const def = STATUS_EFFECTS[buff.id];
      if (def && def.stat && def.stat in unit.stats) {
        const change = Math.floor(unit.baseStats[def.stat] * (buff.value / 100) * def.mult);
        unit.stats[def.stat] = Math.max(1, unit.stats[def.stat] + change);
      }
    }
  },

  _tickStatusEffects() {
    const all = [...this.allies, ...this.enemies];
    for (const unit of all) {
      if (unit.currentHp <= 0) continue;
      const expired = [];

      for (const buff of unit.buffs) {
        // Per-turn effects
        if (buff.id === "regen") {
          const heal = Math.floor(unit.maxHp * (buff.value / 100));
          unit.currentHp = Math.min(unit.maxHp, unit.currentHp + heal);
          this._log(`💚 ${unit.name} régénère ${heal} PV`);
        }
        if (buff.id === "poison") {
          const dmg = Math.floor(unit.maxHp * (buff.value / 100));
          unit.currentHp = Math.max(1, unit.currentHp - dmg);
          this._log(`☠️ ${unit.name} perd ${dmg} PV (poison)`);
        }

        buff.turnsLeft--;
        if (buff.turnsLeft <= 0) expired.push(buff.id);
      }

      for (const id of expired) {
        this.removeStatusEffect(unit, id);
        this._log(`${STATUS_EFFECTS[id]?.icon || ""} ${unit.name}: ${STATUS_EFFECTS[id]?.name} expiré`);
      }

      unit.defending = false;
    }
  },

  // ── Turn order ──
  _calculateTurnOrder() {
    const all = [];
    for (const a of this.allies) { if (a.currentHp > 0) all.push({ id:a.id, type:"ally", speed:a.stats.spd, ref:a }); }
    for (const e of this.enemies) { if (e.currentHp > 0) all.push({ id:e.id, type:"enemy", speed:e.stats.spd, ref:e }); }
    all.sort((a,b) => (b.speed + Math.random()*0.5) - (a.speed + Math.random()*0.5));
    this.turnOrder = all; this.currentTurnIndex = 0;
  },

  _nextTurn() {
    const aliveAllies = this.allies.filter(a => a.currentHp > 0);
    const aliveEnemies = this.enemies.filter(e => e.currentHp > 0);
    if (aliveEnemies.length === 0) { this._victory(); return; }
    if (aliveAllies.length === 0) { this._defeat(); return; }

    if (this.currentTurnIndex >= this.turnOrder.length) {
      this.turnNumber++; this._tickStatusEffects(); this._calculateTurnOrder();
      this._checkDeaths();
      // Re-check after status damage
      if (this.allies.filter(a=>a.currentHp>0).length===0) { this._defeat(); return; }
      if (this.enemies.filter(e=>e.currentHp>0).length===0) { this._victory(); return; }
    }

    const current = this.turnOrder[this.currentTurnIndex];
    if (!current || current.ref.currentHp <= 0) { this.currentTurnIndex++; this._nextTurn(); return; }

    // STUN check
    if (this.hasStatus(current.ref, "stun")) {
      this._log(`💫 ${current.ref.name} est étourdi et ne peut pas agir !`);
      this.currentTurnIndex++;
      EventBus.emit("combat:log", { message: `💫 ${current.ref.name} est étourdi !` });
      setTimeout(() => this._nextTurn(), 800);
      return;
    }

    if (current.type === "ally") {
      this.state = "PLAYER_TURN";
      this.selectedAction = null; this.selectedSkill = null;
      this.selectedItem = null; this.selectedTarget = null;
      EventBus.emit("combat:player_turn", { unit: current.ref });
    } else {
      this.state = "ENEMY_TURN";
      EventBus.emit("combat:enemy_turn", { unit: current.ref });
      setTimeout(() => this._executeEnemyTurn(current.ref), 600);
    }
  },

  // ── Player actions ──
  playerAction(action, params = {}) {
    if (!["PLAYER_TURN","SELECTING_TARGET","SELECTING_SKILL","SELECTING_ITEM"].includes(this.state)) return;
    const unit = this.turnOrder[this.currentTurnIndex]?.ref;
    if (!unit) return;

    switch (action) {
      case "attack":
        this.state = "SELECTING_TARGET"; this.selectedAction = "attack";
        EventBus.emit("combat:select_target", { targets: this._getAliveEnemies(), type:"enemy" }); break;
      case "skill":
        this.state = "SELECTING_SKILL"; this.selectedAction = "skill";
        EventBus.emit("combat:select_skill", { skills: unit.skills, mp: unit.mp }); break;
      case "item":
        this.state = "SELECTING_ITEM"; this.selectedAction = "item";
        EventBus.emit("combat:select_item", { inventory: this._getCombatItems() }); break;
      case "defend":
        unit.defending = true;
        unit.mp = Math.min(unit.maxMp, unit.mp + Math.floor(unit.maxMp * 0.1));
        this._log(`${unit.name} se défend ! (+PM)`);
        this._endPlayerTurn(); break;
      case "flee": this._attemptFlee(unit); break;
      case "select_target":
        this.selectedTarget = params.target;
        this._executePlayerAction(unit); break;
      case "select_skill":
        this.selectedSkill = params.skill;
        // Determine target type
        const targetType = params.skill.target_type || "enemy";
        if (targetType === "self") {
          this.selectedTarget = unit;
          this._executePlayerAction(unit);
        } else if (targetType === "ally" || targetType === "ally_all") {
          this.state = "SELECTING_TARGET";
          EventBus.emit("combat:select_target", { targets: this._getAliveAllies(), type:"ally" });
        } else {
          this.state = "SELECTING_TARGET";
          EventBus.emit("combat:select_target", { targets: this._getAliveEnemies(), type:"enemy" });
        }
        break;
      case "select_item":
        this.selectedItem = params.item;
        this.state = "SELECTING_TARGET";
        EventBus.emit("combat:select_target", { targets: this._getAliveAllies(), type:"ally" }); break;
      case "cancel":
        this.state = "PLAYER_TURN"; this.selectedAction = null;
        this.selectedSkill = null; this.selectedItem = null;
        EventBus.emit("combat:player_turn", { unit }); break;
    }
  },

  _executePlayerAction(unit) {
    this.state = "ANIMATING";

    if (this.selectedAction === "attack") {
      const target = this.selectedTarget;
      if (this._checkEvasion(target)) { this._log(`🌀 ${target.name} esquive l'attaque !`); }
      else {
        const result = this._calculateDamage(unit, target, null);
        this._applyDamage(target, result);
        this._log(`${unit.name} → ${target.name}: ${result.finalDamage} dégâts${result.isCritical?" CRIT":""}${result.elementText}`);
      }
      EventBus.emit("combat:attack_anim", { attacker:unit, target:this.selectedTarget, result:{finalDamage:0} });

    } else if (this.selectedAction === "skill" && this.selectedSkill) {
      const target = this.selectedTarget;
      const skill = this.selectedSkill;
      if (unit.mp < (skill.mp_cost||0)) {
        this._log(`PM insuffisants !`);
        this.state = "PLAYER_TURN"; EventBus.emit("combat:player_turn", { unit }); return;
      }
      unit.mp -= skill.mp_cost || 0;
      this._executeSkill(unit, target, skill);

    } else if (this.selectedAction === "item" && this.selectedItem) {
      const target = this.selectedTarget;
      const item = this.selectedItem;
      const invSlot = GameData.state.inventory.find(i => i.itemId === item.id);
      if (invSlot) { invSlot.quantity--; GameData.state.inventory = GameData.state.inventory.filter(i => i.quantity > 0); }
      for (const eff of (item.effects || [])) {
        if (eff.type === "heal_hp") { target.currentHp = Math.min(target.maxHp, target.currentHp + eff.value); this._log(`${item.name} → ${target.name} +${eff.value} PV`); }
        if (eff.type === "heal_mp") { target.mp = Math.min(target.maxMp, target.mp + eff.value); this._log(`${item.name} → ${target.name} +${eff.value} PM`); }
        if (eff.type === "status") { this.applyStatusEffect(target, eff.status_id, eff.value, eff.duration, item.name); }
      }
      EventBus.emit("combat:item_anim", { user:unit, target, item });
    }

    setTimeout(() => this._endPlayerTurn(), 800);
  },

  // ── Execute Skill (multi-effect) ──
  _executeSkill(caster, target, skill) {
    // Damage component
    if (skill.damage_multiplier && skill.damage_multiplier > 0) {
      if (this._checkEvasion(target)) {
        this._log(`🌀 ${target.name} esquive ${skill.name} !`);
      } else {
        const result = this._calculateDamage(caster, target, skill);
        this._applyDamage(target, result);
        this._log(`${caster.name} [${skill.name}] → ${target.name}: ${result.finalDamage}${result.isCritical?" CRIT":""}${result.elementText}`);
      }
    }

    // Heal component
    if (skill.heal_value || (skill.heal_percent)) {
      const healTarget = skill.target_type === "self" ? caster : target;
      const amount = skill.heal_value || Math.floor(healTarget.maxHp * (skill.heal_percent / 100));
      healTarget.currentHp = Math.min(healTarget.maxHp, healTarget.currentHp + amount);
      this._log(`${caster.name} [${skill.name}] soigne ${healTarget.name} +${amount} PV`);
    }

    // Status effects
    for (const eff of (skill.effects || [])) {
      const effTarget = eff.target === "self" ? caster : eff.target === "caster" ? caster : target;
      this.applyStatusEffect(effTarget, eff.status_id, eff.value || 30, eff.duration || 3, skill.name);
    }

    EventBus.emit("combat:skill_anim", { attacker:caster, target, skill, result:{ finalDamage:0 } });
  },

  _checkEvasion(target) {
    if (this.hasStatus(target, "evasion")) {
      // 60% chance to dodge
      if (Math.random() < 0.6) return true;
    }
    return false;
  },

  _endPlayerTurn() {
    this.currentTurnIndex++;
    this.selectedAction = null; this.selectedSkill = null;
    this.selectedItem = null; this.selectedTarget = null;
    this._checkDeaths();
    setTimeout(() => this._nextTurn(), 300);
  },

  // ── Enemy AI ──
  _executeEnemyTurn(enemy) {
    this.state = "ANIMATING";
    const decision = CombatAI.decide(enemy, this);

    switch (decision.action) {
      case "attack": {
        const target = decision.target;
        if (this._checkEvasion(target)) { this._log(`🌀 ${target.name} esquive !`); }
        else {
          const result = this._calculateDamage(enemy, target, null);
          this._applyDamage(target, result);
          this._log(`${enemy.name} → ${target.name}: ${result.finalDamage}${result.isCritical?" CRIT":""}`);
        }
        EventBus.emit("combat:attack_anim", { attacker:enemy, target, result:{finalDamage:0} });
        break;
      }
      case "skill": {
        const skill = decision.skill;
        enemy.mp -= skill.mp_cost || 0;
        this._executeSkill(enemy, decision.target, skill);
        break;
      }
      case "defend":
        enemy.defending = true;
        enemy.mp = Math.min(enemy.maxMp, enemy.mp + Math.floor(enemy.maxMp*0.1));
        this._log(`${enemy.name} se défend.`); break;
      case "flee":
        this._log(`${enemy.name} fuit !`); enemy.currentHp = 0; break;
    }

    this.currentTurnIndex++; this._checkDeaths();
    setTimeout(() => this._nextTurn(), 800);
  },

  // ── Damage ──
  _calculateDamage(attacker, defender, skill) {
    const isPhysical = !skill || !skill.element || skill.element === "Neutre";
    const atkStat = isPhysical ? attacker.stats.atk : attacker.stats.mag;
    const multiplier = skill ? (skill.damage_multiplier || 1.0) : 1.0;
    let damage = Math.max(1, (atkStat * multiplier) - (defender.stats.def * 0.5));
    damage *= 0.9 + Math.random() * 0.2;

    const critChance = 5 + (attacker.stats.crit_chance || 0);
    const isCritical = Math.random() * 100 < critChance;
    if (isCritical) damage *= 2;

    let elementMod = 1.0, elementText = "";
    const atkElem = skill?.element || attacker.element || "Neutre";
    const defElem = defender.element || "Neutre";
    if (atkElem !== "Neutre" && defElem !== "Neutre") {
      const table = this.ELEMENT_TABLE[atkElem];
      if (table?.strong === defElem) { elementMod = 1.5; elementText = " (Efficace!)"; }
      else if (table?.weak === defElem) { elementMod = 0.5; elementText = " (Résiste)"; }
    }
    damage *= elementMod;

    if (defender.defending) damage *= 0.5;

    // Shield absorb
    if (this.hasStatus(defender, "shield")) {
      const shieldBuff = defender.buffs.find(b => b.id === "shield");
      if (shieldBuff) { damage *= 0.6; } // -40% damage
    }

    return { finalDamage: Math.max(1, Math.floor(damage)), isCritical, elementText };
  },

  _applyDamage(target, result) {
    target.currentHp = Math.max(0, target.currentHp - result.finalDamage);
    target.defending = false;
  },

  _attemptFlee(unit) {
    if (this._context?.canFlee === false) { this._log("Impossible de fuir !"); return; }
    const avgAS = this.allies.reduce((s,a)=>s+a.stats.spd,0)/this.allies.length;
    const avgES = this.enemies.reduce((s,e)=>s+e.stats.spd,0)/this.enemies.length;
    if (Math.random()*100 < 40 + (avgAS-avgES)*2) { this._log("Fuite réussie !"); this._endCombat("flee"); }
    else { this._log("Fuite échouée..."); this._endPlayerTurn(); }
  },

  _checkDeaths() {
    for (const e of this.enemies) { if (e.currentHp<=0 && !e._dead) { e._dead=true; this._log(`${e.name} vaincu !`); EventBus.emit("combat:enemy_defeated",{enemy:e}); }}
    for (const a of this.allies) { if (a.currentHp<=0 && !a._dead) { a._dead=true; this._log(`${a.name} K.O. !`); EventBus.emit("combat:ally_ko",{ally:a}); }}
  },

  _victory() {
    this.state = "VICTORY"; this._log("🎉 Victoire !");
    this._calculateRewards();
    GameData.state.player.gold += this.rewards.gold;
    if (this.rewards.xp > 0) CompanionSystem.grantPartyXP(this.rewards.xp, "combat");
    for (const loot of this.rewards.loot) {
      const existing = GameData.state.inventory.find(i=>i.itemId===loot.item_id);
      if (existing) existing.quantity += loot.quantity;
      else GameData.state.inventory.push({ itemId:loot.item_id, quantity:loot.quantity });
    }
    this._syncAllyState(); Audio.playSFX("level_up"); HUD.refresh();
    EventBus.emit("combat:victory", { rewards:this.rewards, log:this.log });
  },

  _defeat() {
    this.state = "DEFEAT"; this._log("💀 Défaite...");
    GameData.state.player.stats.hp = 1; this._syncAllyState(); HUD.refresh();
    EventBus.emit("combat:defeat", { log:this.log });
  },

  _calculateRewards() {
    let totalXp=0, totalGold=0; const allLoot=[];
    for (const e of this.enemies) {
      const r = e.rewards; if (!r) continue;
      totalXp += (r.base_xp||0) + (r.xp_per_level||0)*(e.level-1);
      totalGold += (r.base_gold||0) + (r.gold_per_level||0)*(e.level-1);
      for (const entry of (r.loot_table||[])) {
        if (entry.min_level && e.level < entry.min_level) continue;
        if (Math.random()*100 < entry.chance) {
          const qty = Array.isArray(entry.quantity) ? Utils.randInt(entry.quantity[0],entry.quantity[1]) : (entry.quantity||1);
          allLoot.push({ item_id:entry.item_id, quantity:qty });
        }
      }
    }
    const avgEL = this.enemies.reduce((s,e)=>s+e.level,0)/this.enemies.length;
    const ld = avgEL - GameData.state.player.level;
    const xpMod = ld>=5?1.5 : ld<=-10?0.1 : ld<=-5?0.5 : 1.0;
    this.rewards = { xp:Math.floor(totalXp*xpMod), gold:totalGold, loot:allLoot };
  },

  _syncAllyState() {
    const hero = this.allies.find(a=>a.isHero);
    if (hero) GameData.state.player.stats.hp = Math.max(1, hero.currentHp);
    for (const a of this.allies) {
      if (a.isHero||!a.templateId) continue;
      const pm = GameData.state.party.find(c=>c.templateId===a.templateId);
      if (pm) { pm.currentHp=a.currentHp; pm.mp=a.mp; }
    }
  },

  endCombat() { this._endCombat(this.state==="VICTORY"?"victory":this.state==="DEFEAT"?"defeat":"other"); },
  _endCombat(reason) { this.active=false; this.state="IDLE"; EventBus.emit("combat:end",{reason}); },

  _getAliveEnemies() { return this.enemies.filter(e=>e.currentHp>0); },
  _getAliveAllies() { return this.allies.filter(a=>a.currentHp>0); },
  _getCombatItems() {
    return GameData.state.inventory.filter(inv=>{ const i=GameData.getItem(inv.itemId); return i&&i.category==="CONSUMABLES"&&inv.quantity>0; })
      .map(inv=>({ ...GameData.getItem(inv.itemId), currentQty:inv.quantity }));
  },
  _log(msg) { this.log.push({turn:this.turnNumber,text:msg,time:Date.now()}); EventBus.emit("combat:log",{message:msg}); },
  getCurrentUnit() { return this.turnOrder[this.currentTurnIndex]?.ref||null; }
};

// === js/systems/combat-ai.js ===
/* ═══════════════════════════════════════════
   Combat AI — Status-Effect Aware
   ═══════════════════════════════════════════ */
"use strict";

const CombatAI = {
  decide(enemy, cs) {
    const allies = cs._getAliveAllies();
    const enemies = cs._getAliveEnemies();
    if (allies.length === 0) return { action:"defend" };

    // Check taunt — must attack taunting unit
    const taunter = allies.find(a => cs.hasStatus(a, "taunt"));
    if (taunter) {
      const skill = this._pickSkill(enemy, "enemy");
      if (skill && Math.random() > 0.4) return { action:"skill", skill, target:taunter };
      return { action:"attack", target:taunter };
    }

    // Check patterns
    for (const p of (enemy.ai_patterns||[])) {
      if (p.condition === "default") continue;
      if (this._evalCond(p.condition, enemy, cs)) {
        const r = this._execAction(p.action, enemy, allies, enemies, cs);
        if (r) return r;
      }
    }

    const def = (enemy.ai_patterns||[]).find(p=>p.condition==="default");
    if (def) { const r = this._execAction(def.action, enemy, allies, enemies, cs); if (r) return r; }

    return this._fallback(enemy, allies, cs);
  },

  _evalCond(cond, enemy, cs) {
    const hpM = cond.match(/^hp_below_(\d+)%$/);
    if (hpM) return (enemy.currentHp/enemy.maxHp) < parseInt(hpM[1])/100;
    if (cond === "ally_low_hp") return cs._getAliveEnemies().some(e=>e.id!==enemy.id&&(e.currentHp/e.maxHp)<0.3);
    if (cond === "player_low_hp") return cs._getAliveAllies().some(a=>(a.currentHp/a.maxHp)<0.3);
    if (cond === "has_mp") return enemy.skills.some(sk=>enemy.mp>=(sk.mp_cost||0));
    return false;
  },

  _execAction(action, enemy, allies, enemies, cs) {
    switch(action) {
      case "attack_lowest_hp": return { action:"attack", target:this._lowestHP(allies) };
      case "attack_highest_threat": return { action:"attack", target:this._highThreat(allies) };
      case "attack_random": return { action:"attack", target:Utils.randChoice(allies) };
      case "use_skill": { const sk=this._pickSkill(enemy,"enemy"); return sk?{ action:"skill",skill:sk,target:this._lowestHP(allies) }:null; }
      case "use_healing_potion":
        if (enemy.currentHp<enemy.maxHp*0.5) { const h=Math.floor(enemy.maxHp*0.3); enemy.currentHp=Math.min(enemy.maxHp,enemy.currentHp+h); cs._log(`${enemy.name} potion +${h} PV`); return {action:"defend"}; }
        return null;
      case "defend": return { action:"defend" };
      case "flee": return { action:"flee" };
      default: return null;
    }
  },

  _fallback(enemy, allies, cs) {
    const sk = this._pickSkill(enemy, "enemy");
    switch (enemy.ai_type) {
      case "aggressive":
        if (sk && Math.random()>0.4) return { action:"skill",skill:sk,target:this._lowestHP(allies) };
        return { action:"attack",target:this._lowestHP(allies) };
      case "defensive":
        if ((enemy.currentHp/enemy.maxHp)<0.5) return { action:"defend" };
        return { action:"attack",target:Utils.randChoice(allies) };
      case "tactical":
        if (sk && Math.random()>0.3) return { action:"skill",skill:sk,target:this._highThreat(allies) };
        return { action:"attack",target:this._highThreat(allies) };
      case "coward":
        if ((enemy.currentHp/enemy.maxHp)<0.3) return { action:"flee" };
        return { action:"attack",target:Utils.randChoice(allies) };
      default: return { action:"attack",target:Utils.randChoice(allies) };
    }
  },

  _lowestHP(units) { return units.reduce((m,u)=>u.currentHp<m.currentHp?u:m,units[0]); },
  _highThreat(units) { return units.reduce((m,u)=>(u.stats.atk+u.stats.mag)>(m.stats.atk+m.stats.mag)?u:m,units[0]); },
  _pickSkill(enemy, targetType) {
    const avail = enemy.skills.filter(sk=>enemy.mp>=(sk.mp_cost||0));
    if (avail.length===0) return null;
    return avail.reduce((best,sk)=>(sk.damage_multiplier||0)>(best.damage_multiplier||0)?sk:best,avail[0]);
  }
};

// === js/systems/inventory.js ===
/* ═══════════════════════════════════════════
   Inventory & Equipment System
   ═══════════════════════════════════════════ */

"use strict";

const Inventory = {
  init() {
    EventBus.on("chest:open", (chest) => this._handleChestLoot(chest));
  },

  // ══════════════════════════════════════
  // INVENTORY OPERATIONS
  // ══════════════════════════════════════

  /**
   * Add item(s) to inventory
   */
  addItem(itemId, quantity = 1) {
    const template = GameData.getItem(itemId);
    if (!template) {
      console.warn(`[Inventory] Unknown item: ${itemId}`);
      return false;
    }

    const inv = GameData.state.inventory;

    if (template.stackable) {
      const existing = inv.find(i => i.itemId === itemId);
      if (existing) {
        existing.quantity = Math.min((template.max_stack || 99), existing.quantity + quantity);
      } else {
        inv.push({ itemId, quantity: Math.min((template.max_stack || 99), quantity) });
      }
    } else {
      // Non-stackable: add individual entries
      for (let i = 0; i < quantity; i++) {
        inv.push({
          itemId,
          quantity: 1,
          uid: Utils.uid(), // Unique instance ID for non-stackable
          enhancement_level: 0,
          enhancement_xp: 0,
          equipped_by: null
        });
      }
    }

    EventBus.emit("inventory:changed", { itemId, added: quantity });
    return true;
  },

  /**
   * Remove item(s) from inventory
   */
  removeItem(itemId, quantity = 1, uid = null) {
    const inv = GameData.state.inventory;

    if (uid) {
      // Remove specific instance (non-stackable)
      const idx = inv.findIndex(i => i.uid === uid);
      if (idx === -1) return false;
      inv.splice(idx, 1);
    } else {
      const slot = inv.find(i => i.itemId === itemId && !i.equipped_by);
      if (!slot || slot.quantity < quantity) return false;
      slot.quantity -= quantity;
      if (slot.quantity <= 0) {
        const idx = inv.indexOf(slot);
        inv.splice(idx, 1);
      }
    }

    EventBus.emit("inventory:changed", { itemId, removed: quantity });
    return true;
  },

  /**
   * Get quantity of an item
   */
  getCount(itemId) {
    return GameData.state.inventory
      .filter(i => i.itemId === itemId)
      .reduce((sum, i) => sum + i.quantity, 0);
  },

  /**
   * Get all inventory grouped by category
   */
  getByCategory(category) {
    return GameData.state.inventory.filter(i => {
      const template = GameData.getItem(i.itemId);
      return template && template.category === category;
    });
  },

  /**
   * Get full inventory with template data attached
   */
  getFullInventory() {
    return GameData.state.inventory
      .filter(i => i.quantity > 0)
      .map(i => ({
        ...i,
        template: GameData.getItem(i.itemId)
      }))
      .filter(i => i.template);
  },

  // ══════════════════════════════════════
  // EQUIPMENT
  // ══════════════════════════════════════

  /**
   * Equip an item to a companion
   */
  equipItem(invEntry, companionId, slot) {
    const template = GameData.getItem(invEntry.itemId);
    if (!template) return false;

    // Validate slot vs category
    const validSlots = {
      WEAPONS: "weapon",
      ARMOR: "armor",
      ACCESSORIES: ["accessory_1", "accessory_2", "accessory_3"]
    };

    const allowedSlot = validSlots[template.category];
    if (!allowedSlot) {
      EventBus.emit("ui:toast", { message: "Cet objet ne peut pas être équipé", type: "warning" });
      return false;
    }

    if (Array.isArray(allowedSlot)) {
      if (!allowedSlot.includes(slot)) {
        EventBus.emit("ui:toast", { message: "Slot invalide pour cet objet", type: "warning" });
        return false;
      }
    } else if (allowedSlot !== slot) {
      EventBus.emit("ui:toast", { message: "Slot invalide pour cet objet", type: "warning" });
      return false;
    }

    // Get companion instance
    const instance = CompanionSystem.getInstanceForTemplate(companionId);
    if (!instance) return false;

    // Unequip current item in that slot
    const currentItemId = instance.equipment[slot];
    if (currentItemId) {
      this.unequipItem(companionId, slot);
    }

    // Equip new item
    instance.equipment[slot] = invEntry.itemId;
    invEntry.equipped_by = companionId;
    invEntry.equipped_slot = slot;

    Audio.playSFX("ui_click");
    EventBus.emit("equipment:changed", { companionId, slot, itemId: invEntry.itemId });
    EventBus.emit("ui:toast", { message: `${template.name} équipé !`, type: "success" });
    return true;
  },

  /**
   * Unequip item from a companion's slot
   */
  unequipItem(companionId, slot) {
    const instance = CompanionSystem.getInstanceForTemplate(companionId);
    if (!instance) return false;

    const itemId = instance.equipment[slot];
    if (!itemId) return false;

    // Find the inventory entry marked as equipped
    const invEntry = GameData.state.inventory.find(
      i => i.itemId === itemId && i.equipped_by === companionId && i.equipped_slot === slot
    );

    if (invEntry) {
      invEntry.equipped_by = null;
      invEntry.equipped_slot = null;
    }

    instance.equipment[slot] = null;

    EventBus.emit("equipment:changed", { companionId, slot, itemId: null });
    return true;
  },

  /**
   * Get equipped items for a companion
   */
  getEquippedItems(companionId) {
    const instance = CompanionSystem.getInstanceForTemplate(companionId);
    if (!instance) return {};

    const result = {};
    for (const [slot, itemId] of Object.entries(instance.equipment)) {
      if (itemId) {
        result[slot] = GameData.getItem(itemId);
      } else {
        result[slot] = null;
      }
    }
    return result;
  },

  // ══════════════════════════════════════
  // ENHANCEMENT (Level up equipment)
  // ══════════════════════════════════════

  /**
   * Enhance an equipment item
   */
  enhanceItem(invEntry) {
    const template = GameData.getItem(invEntry.itemId);
    if (!template) return false;

    const maxLevel = this._getEnhanceMax(template);
    const currentLevel = invEntry.enhancement_level || 0;

    if (currentLevel >= maxLevel) {
      EventBus.emit("ui:toast", { message: "Niveau d'amélioration maximum", type: "warning" });
      return false;
    }

    // Calculate cost
    const goldCost = this._getEnhanceGoldCost(currentLevel);
    if (GameData.state.player.gold < goldCost) {
      EventBus.emit("ui:toast", { message: `Or insuffisant (${Utils.formatNumber(goldCost)} requis)`, type: "warning" });
      return false;
    }

    // Calculate success rate
    const successRate = Math.max(30, 100 - (currentLevel * 2));
    const success = Math.random() * 100 < successRate;

    // Pay gold
    GameData.state.player.gold -= goldCost;

    if (success) {
      invEntry.enhancement_level = currentLevel + 1;
      Audio.playSFX("level_up");
      EventBus.emit("ui:toast", {
        message: `✨ ${template.name} +${invEntry.enhancement_level} ! (${successRate}%)`,
        type: "success"
      });

      // Check milestones
      this._checkEnhanceMilestone(invEntry, template);
    } else {
      // Failure: 50% chance to downgrade
      const destroyChance = Math.max(0, (currentLevel - 15) * 2);
      if (Math.random() * 100 < destroyChance) {
        // Item destroyed
        const idx = GameData.state.inventory.indexOf(invEntry);
        if (idx !== -1) GameData.state.inventory.splice(idx, 1);
        Audio.playSFX("error");
        EventBus.emit("ui:toast", { message: `💥 ${template.name} détruit !`, type: "error", duration: 5000 });
      } else if (Math.random() < 0.5 && currentLevel > 0) {
        invEntry.enhancement_level = currentLevel - 1;
        Audio.playSFX("error");
        EventBus.emit("ui:toast", { message: `Échec... ${template.name} rétrogradé à +${invEntry.enhancement_level}`, type: "warning" });
      } else {
        Audio.playSFX("error");
        EventBus.emit("ui:toast", { message: `Échec... (${successRate}%)`, type: "warning" });
      }
    }

    HUD.refresh();
    EventBus.emit("inventory:changed", {});
    return success;
  },

  /**
   * Get computed stats for an enhanced item
   */
  getEnhancedStats(invEntry) {
    const template = GameData.getItem(invEntry.itemId);
    if (!template || !template.stats) return {};

    const level = invEntry.enhancement_level || 0;
    const stats = { ...template.stats };

    // +10% per enhancement level for each stat
    for (const key of Object.keys(stats)) {
      stats[key] = Math.floor(stats[key] * (1 + level * 0.1));
    }

    return stats;
  },

  _getEnhanceMax(template) {
    const caps = { N: 5, R: 10, SR: 15, SSR: 20, UR: 25, LR: 30, TR: 40 };
    return template.enhancement?.max_level || caps[template.rarity] || 5;
  },

  _getEnhanceGoldCost(currentLevel) {
    return Math.floor(500 * Math.pow(currentLevel + 1, 2));
  },

  _checkEnhanceMilestone(invEntry, template) {
    const milestones = template.milestone_bonuses || [];
    for (const m of milestones) {
      if (invEntry.enhancement_level === m.at_level) {
        EventBus.emit("ui:toast", {
          message: `🏆 Palier +${m.at_level} atteint ! Bonus débloqué !`,
          type: "success",
          duration: 5000
        });
      }
    }
  },

  // ══════════════════════════════════════
  // MERCHANT
  // ══════════════════════════════════════

  /**
   * Calculate buy price
   */
  getBuyPrice(itemId, merchant = null) {
    const template = GameData.getItem(itemId);
    if (!template) return 0;

    let price = template.base_value;
    price *= 1.5; // Markup

    // Rarity multiplier
    const rarityMult = { N: 1, R: 2, SR: 5, SSR: 10, UR: 25, LR: 50, TR: 100 };
    price *= rarityMult[template.rarity] || 1;

    return Math.floor(price);
  },

  /**
   * Calculate sell price
   */
  getSellPrice(invEntry) {
    const template = GameData.getItem(invEntry.itemId);
    if (!template || !template.can_sell) return 0;

    let price = template.base_value;
    price *= 0.5; // Sell penalty

    // Enhancement bonus
    const enhLevel = invEntry.enhancement_level || 0;
    if (enhLevel > 0) {
      price *= (1 + enhLevel * 0.15);
    }

    // Rarity multiplier (less than buy)
    const rarityMult = { N: 1, R: 1.5, SR: 3, SSR: 6, UR: 15, LR: 30, TR: 60 };
    price *= rarityMult[template.rarity] || 1;

    return Math.floor(price);
  },

  /**
   * Buy item from merchant
   */
  buyItem(itemId, quantity = 1) {
    const price = this.getBuyPrice(itemId) * quantity;
    if (GameData.state.player.gold < price) {
      EventBus.emit("ui:toast", { message: "Or insuffisant !", type: "warning" });
      return false;
    }

    GameData.state.player.gold -= price;
    this.addItem(itemId, quantity);

    const template = GameData.getItem(itemId);
    Audio.playSFX("ui_click");
    EventBus.emit("ui:toast", { message: `Acheté: ${template?.name} ×${quantity} (-${Utils.formatNumber(price)} or)`, type: "success" });
    HUD.refresh();
    return true;
  },

  /**
   * Sell item
   */
  sellItem(invEntry, quantity = 1) {
    const template = GameData.getItem(invEntry.itemId);
    if (!template || !template.can_sell) {
      EventBus.emit("ui:toast", { message: "Objet non vendable", type: "warning" });
      return false;
    }

    if (invEntry.equipped_by) {
      EventBus.emit("ui:toast", { message: "Déséquipez d'abord cet objet", type: "warning" });
      return false;
    }

    const sellQty = Math.min(quantity, invEntry.quantity);
    const priceEach = this.getSellPrice(invEntry);
    const totalPrice = priceEach * sellQty;

    this.removeItem(invEntry.itemId, sellQty, invEntry.uid);
    GameData.state.player.gold += totalPrice;

    Audio.playSFX("ui_click");
    EventBus.emit("ui:toast", { message: `Vendu: ${template.name} ×${sellQty} (+${Utils.formatNumber(totalPrice)} or)`, type: "success" });
    HUD.refresh();
    return true;
  },

  /**
   * Drop/discard item
   */
  dropItem(invEntry, quantity = 1) {
    const template = GameData.getItem(invEntry.itemId);
    if (!template) return false;

    if (template.can_drop === false) {
      EventBus.emit("ui:toast", { message: "Objet non jetable", type: "warning" });
      return false;
    }

    if (invEntry.equipped_by) {
      EventBus.emit("ui:toast", { message: "Déséquipez d'abord", type: "warning" });
      return false;
    }

    const dropQty = Math.min(quantity, invEntry.quantity);
    this.removeItem(invEntry.itemId, dropQty, invEntry.uid);
    EventBus.emit("ui:toast", { message: `${template.name} ×${dropQty} jeté`, type: "info" });
    return true;
  },

  // ══════════════════════════════════════
  // PRIVATE HELPERS
  // ══════════════════════════════════════
  _handleChestLoot(chest) {
    for (const loot of (chest.loot || [])) {
      this.addItem(loot.item_id, loot.quantity);
    }
  }
};

// === js/systems/quest.js ===
/* ═══════════════════════════════════════════
   Quest System
   Tracking, objective progress, completion, rewards
   ═══════════════════════════════════════════ */

"use strict";

const QuestSystem = {
  init() {
    // Listen for game events that can progress quests
    EventBus.on("npc:interact", (npc) => this.checkObjective("talk", { npc_id: npc.id }));
    EventBus.on("combat:victory", (data) => {
      // Count enemy kills
      for (const enemy of (Combat.enemies || [])) {
        this.checkObjective("kill", { enemy_id: enemy.enemyId, enemy_category: GameData.getEnemy(enemy.enemyId)?.category });
      }
    });
    EventBus.on("inventory:changed", (data) => {
      if (data.itemId) this.checkObjective("collect", { item_id: data.itemId });
    });
    EventBus.on("map:change", (data) => this.checkObjective("visit", { map_id: data.mapId }));

    // Auto-start available quests on load
    this._checkAutoStart();
  },

  // ══════════════════════════════════════
  // QUEST MANAGEMENT
  // ══════════════════════════════════════

  /**
   * Start a quest by ID
   */
  startQuest(questId) {
    const template = GameData.getQuest(questId);
    if (!template) return false;

    // Already active?
    if (this.isActive(questId)) {
      EventBus.emit("ui:toast", { message: "Quête déjà en cours", type: "warning" });
      return false;
    }

    // Already completed?
    if (this.isCompleted(questId)) {
      if (template.type !== "REPEATABLE") {
        EventBus.emit("ui:toast", { message: "Quête déjà terminée", type: "warning" });
        return false;
      }
    }

    // Check prerequisites
    for (const preReq of (template.prerequisites || [])) {
      if (!this.isCompleted(preReq)) {
        const preTemplate = GameData.getQuest(preReq);
        EventBus.emit("ui:toast", { message: `Prérequis: ${preTemplate?.title || preReq}`, type: "warning" });
        return false;
      }
    }

    // Create active quest entry
    const activeQuest = {
      quest_id: questId,
      started_at: Date.now(),
      progress: {
        objectives: template.objectives.map(() => 0)
      }
    };

    GameData.state.activeQuests.push(activeQuest);

    Audio.playSFX("ui_open");
    EventBus.emit("quest:started", { questId, title: template.title });
    EventBus.emit("ui:toast", { message: `📜 Nouvelle quête: ${template.title}`, type: "success", duration: 4000 });
    HUD.refreshQuestTracker();

    return true;
  },

  /**
   * Abandon a quest
   */
  abandonQuest(questId) {
    const idx = GameData.state.activeQuests.findIndex(q => q.quest_id === questId);
    if (idx === -1) return false;

    GameData.state.activeQuests.splice(idx, 1);
    EventBus.emit("quest:abandoned", { questId });
    EventBus.emit("ui:toast", { message: "Quête abandonnée", type: "info" });
    HUD.refreshQuestTracker();
    return true;
  },

  /**
   * Check and progress objective
   */
  checkObjective(type, data) {
    for (const activeQuest of GameData.state.activeQuests) {
      const template = GameData.getQuest(activeQuest.quest_id);
      if (!template) continue;

      let changed = false;

      for (let i = 0; i < template.objectives.length; i++) {
        const obj = template.objectives[i];
        if (this._isObjectiveComplete(obj, activeQuest.progress.objectives[i])) continue;

        if (this._matchesObjective(obj, type, data)) {
          activeQuest.progress.objectives[i]++;
          changed = true;

          // Notification
          if (obj.count) {
            const current = activeQuest.progress.objectives[i];
            EventBus.emit("ui:toast", {
              message: `📜 ${obj.label || obj.type}: ${current}/${obj.count}`,
              type: "info",
              duration: 2000
            });
          }
        }
      }

      if (changed) {
        // Check if quest is complete
        if (this._isQuestComplete(template, activeQuest)) {
          this._completeQuest(activeQuest, template);
        }
        HUD.refreshQuestTracker();
      }
    }
  },

  _matchesObjective(obj, type, data) {
    if (obj.type !== type) return false;

    switch (type) {
      case "talk":
        return obj.npc_id === data.npc_id;
      case "kill":
        return obj.target === data.enemy_id || obj.target === data.enemy_category;
      case "collect":
        return obj.item_id === data.item_id && Inventory.getCount(obj.item_id) >= (obj.count || 1);
      case "visit":
        return obj.map_id === data.map_id;
      default:
        return false;
    }
  },

  _isObjectiveComplete(obj, progress) {
    const target = obj.count || 1;
    return progress >= target;
  },

  _isQuestComplete(template, activeQuest) {
    for (let i = 0; i < template.objectives.length; i++) {
      if (!this._isObjectiveComplete(template.objectives[i], activeQuest.progress.objectives[i])) {
        return false;
      }
    }
    return true;
  },

  /**
   * Complete quest and grant rewards
   */
  _completeQuest(activeQuest, template) {
    // Remove from active
    const idx = GameData.state.activeQuests.indexOf(activeQuest);
    if (idx !== -1) GameData.state.activeQuests.splice(idx, 1);

    // Add to completed
    if (!GameData.state.completedQuests.includes(activeQuest.quest_id)) {
      GameData.state.completedQuests.push(activeQuest.quest_id);
    }

    // Grant rewards
    const rewards = template.rewards || {};

    if (rewards.xp) {
      CompanionSystem.grantPartyXP(rewards.xp, "quest");
    }
    if (rewards.gold) {
      GameData.state.player.gold += rewards.gold;
    }
    if (rewards.items) {
      for (const item of rewards.items) {
        Inventory.addItem(item.item_id || item.itemId, item.quantity || 1);
      }
    }
    if (rewards.unlocks) {
      for (const unlock of rewards.unlocks) {
        if (unlock.startsWith("companion_")) {
          if (!GameData.state.unlockedCompanions.includes(unlock)) {
            GameData.state.unlockedCompanions.push(unlock);
            if (!GameData.state._companionBench) GameData.state._companionBench = {};
            GameData.state._companionBench[unlock] = CompanionSystem.createInstance(unlock);
            const ct = GameData.getCompanion(unlock);
            EventBus.emit("ui:toast", { message: `🛡️ ${ct?.name || unlock} débloqué !`, type: "success", duration: 5000 });
          }
        } else if (unlock.startsWith("zone_")) {
          const zoneId = unlock.replace("zone_", "");
          if (!GameData.state.worldState.unlockedZones.includes(zoneId)) {
            GameData.state.worldState.unlockedZones.push(zoneId);
            EventBus.emit("ui:toast", { message: `🗺️ Zone débloquée: ${zoneId}`, type: "success", duration: 4000 });
          }
        }
      }
    }

    Audio.playSFX("level_up");
    EventBus.emit("quest:completed", { questId: activeQuest.quest_id, title: template.title, rewards });
    EventBus.emit("ui:toast", {
      message: `✅ Quête terminée: ${template.title} ! +${rewards.xp || 0} XP, +${rewards.gold || 0} or`,
      type: "success",
      duration: 5000
    });
    HUD.refresh();
  },

  // ══════════════════════════════════════
  // QUERIES
  // ══════════════════════════════════════

  isActive(questId) {
    return GameData.state.activeQuests.some(q => q.quest_id === questId);
  },

  isCompleted(questId) {
    return GameData.state.completedQuests.includes(questId);
  },

  getActiveQuest(questId) {
    return GameData.state.activeQuests.find(q => q.quest_id === questId);
  },

  /**
   * Get all quests grouped by status
   */
  getAllQuests() {
    const allIds = Object.keys(GameData.db.quests);
    const result = { available: [], active: [], completed: [] };

    for (const id of allIds) {
      const template = GameData.getQuest(id);
      if (!template) continue;

      if (this.isCompleted(id)) {
        result.completed.push({ template, status: "completed" });
      } else if (this.isActive(id)) {
        const active = this.getActiveQuest(id);
        result.active.push({ template, activeData: active, status: "active" });
      } else {
        // Check if available (prerequisites met)
        const available = (template.prerequisites || []).every(p => this.isCompleted(p));
        if (available) {
          result.available.push({ template, status: "available" });
        }
      }
    }

    return result;
  },

  /**
   * Get objective progress text
   */
  getObjectiveText(template, activeData, objIndex) {
    const obj = template.objectives[objIndex];
    const progress = activeData?.progress?.objectives?.[objIndex] || 0;
    const target = obj.count || 1;
    const label = obj.label || `${obj.type}: ${obj.target || obj.npc_id || obj.item_id || obj.map_id}`;
    const done = progress >= target;

    return { label, progress, target, done };
  },

  _checkAutoStart() {
    // Auto-start main quest if no active quests
    if (GameData.state.activeQuests.length === 0 && !this.isCompleted("quest_demo_001")) {
      this.startQuest("quest_demo_001");
    }
  }
};

// === js/systems/encounter.js ===
/* ═══════════════════════════════════════════
   Encounter System
   Random battles triggered by player movement in enemy zones
   ═══════════════════════════════════════════ */

"use strict";

const EncounterSystem = {
  _stepCount: 0,
  _encounterCooldown: 0, // Steps before next encounter can happen

  init() {
    EventBus.on("player:move", (pos) => this._onPlayerMove(pos));
    EventBus.on("combat:end", () => { this._encounterCooldown = 5; }); // 5-step grace period after combat
  },

  _onPlayerMove(pos) {
    if (Combat.active) return;
    if (Input.isAnyUIOpen()) return;

    this._stepCount++;

    if (this._encounterCooldown > 0) {
      this._encounterCooldown--;
      return;
    }

    const map = MapSystem.currentMap;
    if (!map || !map.enemies) return;

    // Check if player is in any enemy spawn zone
    for (const zone of map.enemies) {
      if (!this._isInZone(pos.x, pos.y, zone.spawn_zone)) continue;

      // Roll for encounter
      const rate = zone.spawn_rate || 0.02;
      if (Math.random() > rate) continue;

      // Build enemy list
      const enemies = this._buildEncounterGroup(zone, map);
      if (enemies.length === 0) continue;

      // Start combat
      this._encounterCooldown = 3;
      EventBus.emit("ui:toast", { message: "⚔️ Embuscade !", type: "warning", duration: 1500 });

      setTimeout(() => {
        EventBus.emit("combat:start", { enemies, context: { canFlee: true } });
      }, 500);

      break; // Only one encounter per step
    }
  },

  _isInZone(x, y, zone) {
    return x >= zone.x && x < zone.x + zone.width &&
           y >= zone.y && y < zone.y + zone.height;
  },

  _buildEncounterGroup(zone, map) {
    const enemies = [];
    const levelRange = map.enemy_level_range || { min: 1, max: 5, scaling_mode: "random" };

    // 1-3 enemies
    const count = Utils.randInt(1, 3);

    for (let i = 0; i < count; i++) {
      let level;
      switch (levelRange.scaling_mode) {
        case "fixed":
          level = levelRange.min;
          break;
        case "progressive":
          // Higher level the further from map center
          const dist = Math.abs(Player.x - (map.width / 2)) + Math.abs(Player.y - (map.height / 2));
          const maxDist = map.width / 2 + map.height / 2;
          level = Math.floor(levelRange.min + (levelRange.max - levelRange.min) * (dist / maxDist));
          break;
        default: // "random"
          level = Utils.randInt(levelRange.min, levelRange.max);
      }

      // Level override from zone definition
      if (zone.level_override) {
        level = zone.level_override;
      }

      enemies.push({
        enemyId: zone.enemy_id,
        level: level
      });
    }

    return enemies;
  }
};

// === js/systems/harvest.js ===
/* ═══════════════════════════════════════════
   Harvest System — Trees, Rocks, Fish
   ═══════════════════════════════════════════ */
"use strict";

const HarvestSystem = {
  init() {
    EventBus.on("input:harvest", () => this.tryHarvest());
  },

  tryHarvest() {
    if (Combat.active || Input.isAnyUIOpen()) return;

    const map = MapSystem.currentMap;
    if (!map || !map.harvestNodes) return;

    // Check facing tile and current tile
    const offsets = {up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
    const off = offsets[Player.direction];
    const tx = Player.x + off.x, ty = Player.y + off.y;

    for (const node of map.harvestNodes) {
      if (node.depleted) continue;
      if ((node.x === tx && node.y === ty) || (node.x === Player.x && node.y === Player.y)) {
        this._harvestNode(node, map);
        return;
      }
    }

    EventBus.emit("ui:toast", { message: "Rien à récolter ici", type: "info", duration: 1500 });
  },

  _harvestNode(node, map) {
    const harvestDef = HARVEST_TYPES[node.type];
    if (!harvestDef) return;

    // Check tool
    const toolRequired = harvestDef.tool_required;
    if (toolRequired) {
      const toolDef = TOOLS[toolRequired];
      if (!toolDef) return;
      const hasTool = GameData.state.inventory.some(i => i.itemId === toolDef.item_id && i.quantity > 0);
      if (!hasTool) {
        EventBus.emit("ui:toast", { message: `${toolDef.icon} ${toolDef.name} requise !`, type: "warning" });
        return;
      }
    }

    // Check biome compatibility
    const tileBiome = node.biome || this._getTileBiome(node.x, node.y, map);
    if (harvestDef.biomes && !harvestDef.biomes.includes(tileBiome)) {
      EventBus.emit("ui:toast", { message: "Biome inadapté", type: "warning" });
      return;
    }

    // Roll for resources
    const loot = [];
    let resources;

    if (node.type === "fish_spot") {
      // Fish depends on water type
      const waterType = node.water_type || this._getWaterType(tileBiome);
      resources = harvestDef.fish_by_water[waterType] || harvestDef.fish_by_water.river;
    } else {
      resources = harvestDef.resources;
    }

    for (const res of resources) {
      if (Math.random() * 100 < res.chance) {
        const qty = Array.isArray(res.quantity) ? Utils.randInt(res.quantity[0], res.quantity[1]) : (res.quantity || 1);
        loot.push({ id: res.id, name: res.name, quantity: qty, rarity: res.rarity });

        // Add to inventory
        const existing = GameData.state.inventory.find(i => i.itemId === res.id);
        if (existing) existing.quantity += qty;
        else GameData.state.inventory.push({ itemId: res.id, quantity: qty });
      }
    }

    // Deplete node (respawns after X steps)
    node.depleted = true;
    node.respawn_steps = node.respawn_steps_max || 20;

    // Animation / feedback
    Audio.playSFX("ui_click");
    if (loot.length > 0) {
      const lootText = loot.map(l => {
        const rarityColor = RARITY_DATA[l.rarity]?.color || "#7a7570";
        return `${l.name} x${l.quantity}`;
      }).join(", ");
      EventBus.emit("ui:toast", { message: `${harvestDef.icon} ${lootText}`, type: "success", duration: 3000 });
    } else {
      EventBus.emit("ui:toast", { message: `${harvestDef.icon} Rien trouvé...`, type: "info", duration: 1500 });
    }

    EventBus.emit("inventory:changed", {});
  },

  // Called every player step to respawn nodes
  tickRespawns() {
    const map = MapSystem.currentMap;
    if (!map || !map.harvestNodes) return;

    for (const node of map.harvestNodes) {
      if (node.depleted && node.respawn_steps > 0) {
        node.respawn_steps--;
        if (node.respawn_steps <= 0) {
          node.depleted = false;
        }
      }
    }
  },

  _getTileBiome(x, y, map) {
    if (!map.biomesLayer || !map.biomesLayer[y]) return "plains";
    return map.biomesLayer[y][x] || "plains";
  },

  _getWaterType(biome) {
    if (biome === "river") return "river";
    if (biome === "lake") return "lake";
    if (biome === "swamp") return "swamp";
    return "river";
  },

  // Generate harvest nodes for a map based on biome layer
  generateNodes(map) {
    if (!map.biomesLayer) return [];
    const nodes = [];
    const w = map.width, h = map.height;

    for (let y = 1; y < h - 1; y++) {
      for (let x = 1; x < w - 1; x++) {
        if (map.layers.collision[y]?.[x] === 1) continue;
        const biome = map.biomesLayer[y]?.[x] || "plains";
        const biomeDef = BIOMES[biome];
        if (!biomeDef) continue;

        // Trees
        if (biomeDef.trees && Math.random() < 0.06) {
          nodes.push({ x, y, type: "tree", biome, depleted: false, respawn_steps: 0, respawn_steps_max: 15 });
          map.layers.collision[y][x] = 1; // Trees block movement
        }
        // Rocks
        else if (biomeDef.rocks && Math.random() < 0.04) {
          nodes.push({ x, y, type: "rock", biome, depleted: false, respawn_steps: 0, respawn_steps_max: 25 });
          map.layers.collision[y][x] = 1;
        }
        // Fish spots (on water tiles)
        else if (biomeDef.fish && biomeDef.water && Math.random() < 0.03) {
          nodes.push({ x, y, type: "fish_spot", biome, water_type: biome, depleted: false, respawn_steps: 0, respawn_steps_max: 10 });
        }
      }
    }

    return nodes;
  }
};

"use strict";

const HUD = {
  init() {
    EventBus.on("player:stats_change", () => this.refresh());
    EventBus.on("save:loaded", () => this.refresh());
    this.refresh();
  },

  refresh() {
    const p = GameData.state.player;

    // Hero name
    const nameEl = Utils.$("#hud-hero-name");
    if (nameEl) nameEl.textContent = `${p.name} Nv.${p.level}`;

    // HP bar
    const hpFill = Utils.$("#hud-hero-hp");
    const hpText = Utils.$("#hud-hero-hp-text");
    if (hpFill && p.stats) {
      const pct = Math.max(0, (p.stats.hp / p.stats.maxHp) * 100);
      hpFill.style.width = pct + "%";
      hpFill.classList.toggle("hp-low", pct <= 25);
      hpFill.classList.toggle("hp-mid", pct > 25 && pct <= 50);
    }
    if (hpText && p.stats) {
      hpText.textContent = `${p.stats.hp}/${p.stats.maxHp}`;
    }

    // Party count
    const partyEl = Utils.$("#hud-party-count");
    if (partyEl) {
      const count = (GameData.state.party || []).length + 1; // +1 for hero
      partyEl.textContent = `Équipe: ${count}/4`;
    }

    // Gold
    const goldEl = Utils.$("#hud-gold");
    if (goldEl) goldEl.textContent = `💰 ${Utils.formatNumber(p.gold)}`;

    // Quest tracker
    this.refreshQuestTracker();
  },

  refreshQuestTracker() {
    const tracker = Utils.$("#hud-quest-tracker");
    if (!tracker) return;

    const active = GameData.state.activeQuests;
    if (!active || active.length === 0) {
      tracker.innerHTML = '<span class="quest-label">Aucune quête active</span>';
      return;
    }

    const q = active[0]; // Show first active quest
    const questData = GameData.getQuest(q.quest_id);
    if (!questData) return;

    // Build progress string
    let progressText = questData.title;
    if (questData.objectives && questData.objectives.length > 0) {
      const obj = questData.objectives[0];
      if (obj.count) {
        const current = q.progress?.objectives?.[0] || 0;
        progressText += ` (${current}/${obj.count})`;
      }
    }

    tracker.innerHTML = `<span class="quest-label">📜 ${progressText}</span>`;
  }
};

"use strict";

const Menus = {
  _openMenu: null,

  init() {
    // HUD buttons
    Utils.$("#btn-menu").addEventListener("click", (e) => { e.stopPropagation(); this.toggleMenu("menu"); });
    Utils.$("#btn-inventory").addEventListener("click", (e) => { e.stopPropagation(); InventoryPanel.toggle(); });
    Utils.$("#btn-party").addEventListener("click", (e) => { e.stopPropagation(); PartyPanel.toggle(); });
    Utils.$("#btn-quests").addEventListener("click", (e) => { e.stopPropagation(); QuestPanel.toggle(); });

    // Menu panel actions
    Utils.$$("#menu-panel .menu-item").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        this._handleMenuAction(btn.dataset.action);
      });
    });

    // Close buttons
    Utils.$("#menu-close").addEventListener("click", (e) => { e.stopPropagation(); this.closeAll(); });
    Utils.$("#save-close").addEventListener("click", (e) => { e.stopPropagation(); this.closeAll(); });
    Utils.$("#settings-close").addEventListener("click", (e) => { e.stopPropagation(); this.closeAll(); });

    // Overlay click-to-close
    ["menu-overlay", "save-overlay", "settings-overlay"].forEach(id => {
      Utils.$("#" + id).addEventListener("click", (e) => {
        if (e.target.id === id) { this.closeAll(); }
      });
    });

    // Settings sliders
    Utils.$("#setting-music").addEventListener("input", (e) => {
      const v = parseInt(e.target.value);
      Utils.$("#setting-music-val").textContent = v + "%";
      Audio.setMusicVolume(v / 100);
      GameData.state.settings.musicVolume = v / 100;
    });

    Utils.$("#setting-sfx").addEventListener("input", (e) => {
      const v = parseInt(e.target.value);
      Utils.$("#setting-sfx-val").textContent = v + "%";
      Audio.setSFXVolume(v / 100);
      GameData.state.settings.sfxVolume = v / 100;
    });

    Utils.$("#setting-lang").addEventListener("change", (e) => {
      GameData.state.settings.language = e.target.value;
    });

    // File import
    Utils.$("#import-save-input").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        SaveManager.importSave(file, 0).then(() => {
          e.target.value = "";
        });
      }
    });

    // Keyboard shortcuts
    EventBus.on("input:menu", () => this.toggleMenu("menu"));
    EventBus.on("input:cancel", () => this.closeAll());
    EventBus.on("input:inventory", () => EventBus.emit("ui:toast", { message: "Inventaire — Module 4", type: "info" }));

    // Confirm key → interact
    document.addEventListener("keydown", (e) => {
      if ((e.code === "Enter" || e.code === "Space") && !Input.isAnyUIOpen()) {
        Player.interact();
      }
    });
  },

  _handleMenuAction(action) {
    Audio.playSFX("ui_click");

    switch (action) {
      case "save":
        this._showSavePanel("save");
        break;
      case "load":
        this._showSavePanel("load");
        break;
      case "export-save":
        SaveManager.exportSave(SaveManager._currentSlot);
        break;
      case "import-save":
        Utils.$("#import-save-input").click();
        break;
      case "settings":
        this._showSettings();
        break;
      case "devmode":
        this.closeAll();
        DevMode.toggle();
        break;
    }
  },

  // ── Menu Toggle ──
  toggleMenu(menuId) {
    if (this._openMenu === menuId) {
      this.closeAll();
    } else {
      this.closeAll();
      this.openMenu(menuId);
    }
  },

  openMenu(menuId) {
    Audio.playSFX("ui_open");
    const overlay = Utils.$(`#${menuId}-overlay`);
    if (overlay) {
      overlay.classList.remove("hidden");
      this._openMenu = menuId;
      EventBus.emit("ui:menu_open", { menuId });
    }
  },

  closeAll() {
    ["menu-overlay", "save-overlay", "settings-overlay"].forEach(id => {
      Utils.$("#" + id).classList.add("hidden");
    });

    if (this._openMenu) {
      Audio.playSFX("ui_close");
      EventBus.emit("ui:menu_close", { menuId: this._openMenu });
      this._openMenu = null;
    }
  },

  // ── Save Panel ──
  _saveMode: "save",

  _showSavePanel(mode) {
    this._saveMode = mode;
    Utils.$("#menu-overlay").classList.add("hidden");

    const title = Utils.$("#save-panel-title");
    title.textContent = mode === "save" ? "Sauvegarder" : "Charger";

    this._renderSaveSlots();

    Utils.$("#save-overlay").classList.remove("hidden");
    this._openMenu = "save";
  },

  _renderSaveSlots() {
    const container = Utils.$("#save-slots-container");
    Utils.clearElement(container);

    for (let i = 0; i < MAX_SAVE_SLOTS; i++) {
      const info = SaveManager.getSlotInfo(i);
      const slot = this._createSlotElement(i, info);
      container.appendChild(slot);
    }
  },

  _createSlotElement(slotIndex, info) {
    const el = Utils.createElement("div", { className: "save-slot" });

    if (info) {
      const date = new Date(info.timestamp);
      const dateStr = date.toLocaleDateString("fr-FR") + " " + date.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });

      el.innerHTML = `
        <div class="save-slot-info">
          <h3>Slot ${slotIndex + 1} — ${info.playerName} Nv.${info.level}</h3>
          <p>${dateStr} • Or: ${Utils.formatNumber(info.gold || 0)} • ${info.mapId}</p>
        </div>
      `;
    } else {
      el.innerHTML = `
        <div class="save-slot-info">
          <h3>Slot ${slotIndex + 1}</h3>
          <p class="save-slot-empty">— Vide —</p>
        </div>
      `;
    }

    el.addEventListener("click", (e) => {
      e.stopPropagation();
      if (this._saveMode === "save") {
        SaveManager.saveToSlot(slotIndex);
        this._renderSaveSlots();
      } else {
        if (info) {
          SaveManager.loadFromSlot(slotIndex);
          this.closeAll();
          Player.init();
          MapSystem.loadMap(GameData.state.player.position.mapId);
          HUD.refresh();
        } else {
          EventBus.emit("ui:toast", { message: "Slot vide", type: "warning" });
        }
      }
    });

    return el;
  },

  // ── Settings ──
  _showSettings() {
    Utils.$("#menu-overlay").classList.add("hidden");

    // Sync values
    const s = GameData.state.settings;
    Utils.$("#setting-music").value = Math.round(s.musicVolume * 100);
