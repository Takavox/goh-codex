  _genQGExterior() {
    // ═══════════════════════════════════════════════════════
    // QG DES 13 DIVISIONS — Extérieur
    // 150x120 tiles — une mini-ville militaire d'élite
    //
    // LAYOUT:
    //   Muraille tout autour
    //   Centre: Cour d'honneur + statue du 1er Gardien + fontaines
    //   Nord: Mausolée des 8 Gardiens
    //   Nord-Ouest: Jardins symétriques (style Versailles)
    //   Est: Les 13 barraques (2 colonnes de 6 + 13e au sud)
    //   Ouest: Zone commerçants
    //   Sud: Entrée principale, corps de garde
    //   Spawn: devant la 13e Division (sud-est)
    // ═══════════════════════════════════════════════════════
    const w=150, h=120, bg=[], coll=[], biomes=[];
    for(let r=0;r<h;r++){bg[r]=[];coll[r]=[];biomes[r]=[];for(let c=0;c<w;c++){bg[r][c]=0;coll[r][c]=0;biomes[r][c]="road";}}

    function fill(x1,y1,x2,y2,b,col){for(let r=y1;r<=Math.min(y2,h-1);r++)for(let c=x1;c<=Math.min(x2,w-1);c++){if(r>=0&&c>=0){biomes[r][c]=b;coll[r][c]=col?1:0;}}}
    function bldg(x,y,bw,bh,b,dSide,dOff){
      fill(x,y,x+bw-1,y+bh-1,b,true);
      if(dSide==="s"&&y+bh-1<h){coll[y+bh-1][x+dOff]=0;biomes[y+bh-1][x+dOff]="door";}
      if(dSide==="n"&&y>=0){coll[y][x+dOff]=0;biomes[y][x+dOff]="door";}
      if(dSide==="e"){coll[y+dOff][x+bw-1]=0;biomes[y+dOff][x+bw-1]="door";}
      if(dSide==="w"){coll[y+dOff][x]=0;biomes[y+dOff][x]="door";}
    }

    // ── MURAILLES ──
    fill(0,0,w-1,2,"wall",true);     // Nord
    fill(0,h-3,w-1,h-1,"wall",true); // Sud
    fill(0,0,2,h-1,"wall",true);     // Ouest
    fill(w-3,0,w-1,h-1,"wall",true); // Est

    // ── PORTE SUD (entrée principale) ──
    fill(72,h-3,77,h-1,"gate",false);
    // ── PORTE NORD (vers l'extérieur) ──
    fill(72,0,77,2,"gate",false);

    // ── GRANDE AVENUE CENTRALE (nord-sud) ──
    fill(72,3,77,h-4,"road",false);

    // ── AVENUE EST-OUEST ──
    fill(3,55,w-4,58,"road",false);

    // ═══════════════════════════════════
    // CENTRE: COUR D'HONNEUR (x:55-95, y:45-70)
    // ═══════════════════════════════════
    fill(55,45,95,70,"plaza",false);

    // Statue du 1er Gardien (centre exact)
    fill(73,55,76,58,"palace",true); // socle

    // 4 Fontaines symétriques
    fill(62,50,64,52,"fountain",false);
    fill(86,50,88,52,"fountain",false);
    fill(62,63,64,65,"fountain",false);
    fill(86,63,88,65,"fountain",false);

    // Parterres de fleurs dans la cour
    fill(58,47,61,49,"garden",false);
    fill(89,47,92,49,"garden",false);
    fill(58,66,61,68,"garden",false);
    fill(89,66,92,68,"garden",false);

    // Bancs / espaces verts entre fontaines
    fill(66,53,70,54,"garden",false);
    fill(80,53,84,54,"garden",false);
    fill(66,61,70,62,"garden",false);
    fill(80,61,84,62,"garden",false);

    // ═══════════════════════════════════
    // NORD: MAUSOLÉE DES 8 GARDIENS (x:55-95, y:8-35)
    // ═══════════════════════════════════
    // Allée menant au mausolée
    fill(72,35,77,44,"road",false);

    // Bâtiment du mausolée
    fill(58,10,92,32,"ruins",true);
    // Entrée sud du mausolée
    fill(73,32,76,32,"door",false);
    // Intérieur (espace ouvert symbolique)
    fill(60,12,90,30,"plaza",false);

    // 8 emplacements de statues (4 de chaque côté d'une allée)
    // Allée centrale du mausolée
    fill(73,12,76,30,"road",false);
    // Statues à gauche
    fill(63,14,65,16,"palace",true); // Gardien I
    fill(63,19,65,21,"palace",true); // Gardien II
    fill(63,24,65,26,"palace",true); // Gardien III
    fill(68,14,70,16,"palace",true); // Gardien IV
    // Statues à droite
    fill(79,14,81,16,"palace",true); // Gardien V
    fill(79,19,81,21,"palace",true); // Gardien VI
    fill(84,14,86,16,"palace",true); // Gardien VII
    fill(84,19,86,21,"palace",true); // Gardien VIII

    // Flammes éternelles devant le mausolée
    fill(70,33,71,34,"lava",false);
    fill(78,33,79,34,"lava",false);

    // ═══════════════════════════════════
    // NORD-OUEST: JARDINS SYMÉTRIQUES (x:5-50, y:5-50)
    // ═══════════════════════════════════
    fill(5,5,50,50,"garden",false);
    // Allées en croix
    fill(26,5,28,50,"road",false);
    fill(5,26,50,28,"road",false);
    // Allées diagonales (approximation en marches)
    for(let i=0;i<20;i++){
      fill(7+i,7+i,8+i,8+i,"road",false);
      fill(47-i,7+i,48-i,8+i,"road",false);
    }
    // 4 parterres
    fill(8,8,24,24,"garden",false);
    fill(30,8,48,24,"garden",false);
    fill(8,30,24,48,"garden",false);
    fill(30,30,48,48,"garden",false);
    // Fontaines centrales des parterres
    fill(15,15,17,17,"fountain",false);
    fill(38,15,40,17,"fountain",false);
    fill(15,38,17,40,"fountain",false);
    fill(38,38,40,40,"fountain",false);
    // Haies (collisions décoratives)
    for(let i=8;i<=48;i+=2){
      if(i<26||i>28){coll[7][i]=1;coll[49][i]=1;}
    }
    for(let i=8;i<=48;i+=2){
      if(i<26||i>28){coll[i][6]=1;coll[i][49]=1;}
    }
    // Grand bassin central
    fill(24,24,30,28,"fountain",false);

    // Kiosque / pavillon
    bldg(22,20,5,4,"palace",false,0);
    fill(24,23,24,23,"door",false);

    // ═══════════════════════════════════
    // EST: LES 13 BARRAQUES (x:100-145, y:5-115)
    // ═══════════════════════════════════
    // Mur séparant la zone casernes
    fill(98,3,99,h-4,"wall",true);
    fill(98,55,99,58,"gate",false); // passage

    // Avenue des casernes
    fill(100,3,101,h-4,"road",false);
    fill(118,3,119,h-4,"road",false);

    // Divisions 1-6 (colonne gauche, x:103)
    const divNames=["1ère","2ème","3ème","4ème","5ème","6ème","7ème","8ème","9ème","10ème","11ème","12ème","13ème"];
    const divIcons=["⚔","🛡","🔥","💀","⚡","🌙","🌊","🌿","🔮","🏹","🗡","📜","👁"];

    // 6 barraques colonne gauche
    for(let i=0;i<6;i++){
      bldg(103,6+i*15,12,10,"barracks","s",5);
      fill(103,16+i*15,114,18+i*15,"plaza",false);
    }
    // 6 barraques colonne droite
    for(let i=0;i<6;i++){
      bldg(122,6+i*15,12,10,"barracks","s",5);
      fill(122,16+i*15,133,18+i*15,"plaza",false);
    }

    // 13e Division — plus grande, position spéciale au sud
    bldg(106,96,14,12,"barracks","n",6);
    fill(104,93,121,95,"plaza",false); // cour de la 13e
    fill(112,92,112,92,"fountain",false);

    // Terrain d'entraînement commun
    fill(103,80,133,90,"arena",false);
    fill(110,83,126,87,"arena",true); // zone obstacles

    // ═══════════════════════════════════
    // OUEST: ZONE COMMERÇANTS (x:5-50, y:55-95)
    // ═══════════════════════════════════
    fill(5,55,50,95,"market",false);
    // Avenue commerçante
    fill(26,55,28,95,"road",false);
    // Boutiques
    bldg(7,58,8,6,"shop","e",2);   // Forgeron
    bldg(7,68,8,6,"shop","e",2);   // Apothicaire
    bldg(7,78,8,6,"shop","e",2);   // Tailleur
    bldg(17,58,8,6,"shop","e",2);  // Armurier
    bldg(17,68,8,6,"shop","e",2);  // Bijoutier
    bldg(17,78,8,6,"shop","e",2);  // Epicerie
    // Taverne (plus grande)
    bldg(32,60,12,8,"shop","s",5);
    // Quartier général / Administration
    bldg(32,75,12,10,"house","n",5);

    // ═══════════════════════════════════
    // SUD: CORPS DE GARDE + Entrée
    // ═══════════════════════════════════
    bldg(62,h-12,8,6,"tower","n",3);
    bldg(80,h-12,8,6,"tower","n",3);
    // Place d'armes
    fill(55,h-20,95,h-12,"plaza",false);
    fill(73,h-18,76,h-15,"fountain",false);

    // ═══════════════════════════════════
    // DÉTAILS DE VIE
    // ═══════════════════════════════════
    // Arbres le long des avenues
    for(let r=5;r<h-5;r+=4){
      if(biomes[r]?.[70]==="road"||biomes[r]?.[70]==="plaza") continue;
      if(r>45&&r<70) continue;
      coll[r][70]=1; biomes[r][70]="forest";
      coll[r][79]=1; biomes[r][79]="forest";
    }
    // Lampadaires (arbustes décoratifs le long des allées principales)
    for(let r=5;r<h-5;r+=8){
      if(biomes[r]?.[71]==="road") continue;
      coll[r][71]=1; biomes[r][71]="garden";
    }
    // Puits dans la zone commerçante
    fill(26,72,28,74,"fountain",false);

    // Écuries
    bldg(50,100,8,8,"stable",true);
    fill(54,107,54,107,"door",false);

    const map={
      id:"qg_exterior", name:"QG des 13 Divisions", width:w, height:h,
      layers:{background:bg,collision:coll,foreground:[]}, biomesLayer:biomes,
      enemy_level_range:{min:1,max:3,scaling_mode:"random"},
      npcs:[
        {id:"npc_captain",name:"Capitaine Daryn",type:"npc",position:{x:113,y:94},direction:"down",dialogue:"Je suis Daryn, Capitaine de la 13e Division. Bienvenue, recrue. Le QG est ton nouveau foyer."},
        {id:"npc_merchant_forge",name:"Maître-Forgeron Kael",type:"merchant",position:{x:14,y:63},direction:"right",dialogue:"Armes et armures forgées pour les Divisions.",shop_inventory:["sword_iron","sword_steel","fists_metal","bow_hunter","shield_iron","staff_apprentice"]},
        {id:"npc_merchant_potions",name:"Apothicaire Mira",type:"merchant",position:{x:14,y:73},direction:"right",dialogue:"Potions et remèdes pour les missions.",shop_inventory:["potion_hp_small","potion_hp_medium","potion_mp","elixir_atk","elixir_def","antidote"]},
        {id:"npc_merchant_tools",name:"Marchande d'Outils",type:"merchant",position:{x:14,y:83},direction:"right",dialogue:"Haches, pioches, cannes — tout pour récolter.",shop_inventory:["tool_axe","tool_pickaxe","tool_fishing_rod"]},
        {id:"npc_tavern",name:"Aubergiste Yorik",type:"npc",position:{x:37,y:68},direction:"down",dialogue:"Bienvenue à la Taverne de l'Épée Brisée ! Un verre pour nos héros ?"},
        {id:"npc_guard_south",name:"Garde de l'Entrée",type:"npc",position:{x:75,y:h-5},direction:"up",dialogue:"Vous quittez le QG ? Les Plaines d'Aurore sont au-delà."},
        {id:"npc_archivist",name:"Archiviste Lena",type:"npc",position:{x:37,y:80},direction:"down",dialogue:"Les archives contiennent l'histoire de chaque Division depuis la fondation."}
      ],
      instances:[
        {id:"inst_statue",name:"Statue du 1er Gardien",type:"dialogue",position:{x:75,y:54},icon:"👑",
          dialogue:"Une imposante statue du 1er Gardien, le Roi Fondateur d'Iluminia, trône au centre de la cour.",
          options:[
            {label:"Lire l'inscription",action:"toast",message:"« Que la force des Gardiens protège Iluminia pour l'éternité. »"},
            {label:"Se recueillir (+50 PV)",action:"toast",message:"Une chaleur apaisante vous envahit.",effect:{type:"heal",value:50}},
            {label:"Partir",action:"close"}
          ]},
        {id:"inst_mausolee",name:"Mausolée des Gardiens",type:"dialogue",position:{x:75,y:31},icon:"🏛️",
          dialogue:"Le Mausolée des 8 Gardiens. Huit statues majestueuses veillent dans le silence.",
          options:[
            {label:"Gardien I — Le Fondateur",action:"toast",message:"La première statue. Celui qui forgea Iluminia."},
            {label:"Gardien II — Le Stratège",action:"toast",message:"Le stratège militaire qui créa les 13 Divisions."},
            {label:"Gardien III — Le Guérisseur",action:"toast",message:"Celui qui sauva le royaume de la Grande Peste."},
            {label:"Gardien IV — La Sentinelle",action:"toast",message:"Le gardien éternel des Portes."},
            {label:"Gardien V — Le Loup",action:"toast",message:"Le guerrier sauvage, protecteur des frontières."},
            {label:"Gardien VI — L'Oracle",action:"toast",message:"Celui qui pouvait lire le destin dans les étoiles."},
            {label:"Gardien VII — Le Forgeron",action:"toast",message:"Le créateur des armes légendaires."},
            {label:"Gardien VIII — Le Dernier",action:"toast",message:"Le dernier Gardien à avoir sacrifié sa vie pour Iluminia."},
            {label:"Partir",action:"close"}
          ]},
        {id:"inst_taverne",name:"Taverne de l'Épée Brisée",type:"dialogue",position:{x:37,y:67},icon:"🍺",
          dialogue:"La taverne des Divisions. L'odeur de ragoût et de bière emplit l'air.",
          options:[
            {label:"Manger (PV max)",action:"toast",message:"Vous mangez un copieux repas. PV restaurés !",effect:{type:"heal",value:9999}},
            {label:"Écouter les rumeurs",action:"toast",message:"On parle de créatures étranges aperçues près des Portes..."},
            {label:"Partir",action:"close"}
          ]}
      ],
      enemies:[],
      chests:[
        {x:40,y:40,id:"chest_garden",loot:[{item_id:"potion_hp_small",quantity:5}],opened:false},
        {x:115,y:85,id:"chest_arena",loot:[{item_id:"xp_stone_small",quantity:3}],opened:false}
      ],
      transitions:[
        {from:{x:75,y:0},to_map:"aurora_plains",to_position:{x:30,y:43}},
        {from:{x:74,y:0},to_map:"aurora_plains",to_position:{x:30,y:43}}
      ],
      harvestNodes:[], music:null
    };

    // ── Ajouter les portails vers les intérieurs des barraques ──
    // Divisions 1-6 (colonne gauche)
    for(let i=0;i<6;i++){
      map.instances.push({
        id:"inst_div"+(i+1),name:divNames[i]+" Division",type:"map_portal",
        position:{x:108,y:16+i*15},icon:divIcons[i],
        color:"rgba(160,120,255,0.4)",
        target_map:"div"+(i+1)+"_floor1",target_position:{x:15,y:28}
      });
    }
    // Divisions 7-12 (colonne droite)
    for(let i=0;i<6;i++){
      map.instances.push({
        id:"inst_div"+(i+7),name:divNames[i+6]+" Division",type:"map_portal",
        position:{x:127,y:16+i*15},icon:divIcons[i+6],
        color:"rgba(160,120,255,0.4)",
        target_map:"div"+(i+7)+"_floor1",target_position:{x:15,y:28}
      });
    }
    // 13e Division
    map.instances.push({
      id:"inst_div13",name:"13ème Division — Les Indomptables",type:"map_portal",
      position:{x:112,y:96},icon:"👁",
      color:"rgba(200,160,60,0.5)",
      target_map:"div13_floor1",target_position:{x:15,y:28}
    });

    map.harvestNodes=HarvestSystem.generateNodes(map);
    return map;
  },

  // ═══════════════════════════════════════════════════════
  // INTÉRIEURS DES BARRAQUES — Générateur paramétrique
  // divNum: 1-13, floor: 0=sous-sol, 1=RDC, 2=étage2, 3=étage3
  // ═══════════════════════════════════════════════════════
  _genDivInterior(divNum, floor) {
    const w=30, h=30, bg=[], coll=[], biomes=[];
    const divNames=["","1ère","2ème","3ème","4ème","5ème","6ème","7ème","8ème","9ème","10ème","11ème","12ème","13ème"];
    const floorNames=["Sous-sol","Rez-de-chaussée","2e Étage","3e Étage"];
    const is13=divNum===13;

    for(let r=0;r<h;r++){bg[r]=[];coll[r]=[];biomes[r]=[];
      for(let c=0;c<w;c++){bg[r][c]=0;coll[r][c]=0;biomes[r][c]="house";}
    }

    function fill(x1,y1,x2,y2,b,col){for(let r=y1;r<=Math.min(y2,h-1);r++)for(let c=x1;c<=Math.min(x2,w-1);c++){if(r>=0&&c>=0){biomes[r][c]=b;coll[r][c]=col?1:0;}}}

    // Murs extérieurs
    fill(0,0,w-1,0,"wall",true);
    fill(0,h-1,w-1,h-1,"wall",true);
    fill(0,0,0,h-1,"wall",true);
    fill(w-1,0,w-1,h-1,"wall",true);

    // Couloir central
    fill(14,1,16,h-2,"road",false);

    const npcs=[], instances=[], chests=[];
    const mapId = "div"+divNum+(floor===0?"_basement":"_floor"+floor);
    const mapName = divNames[divNum]+" Division — "+floorNames[floor];

    if(floor===0){
      // ── SOUS-SOL: Terrains d'entraînement ──
      fill(1,1,12,14,"arena",false);   // Salle d'armes
      fill(17,1,28,14,"arena",false);  // Ring de combat
      fill(1,16,12,28,"arena",false);  // Parcours obstacles
      fill(17,16,28,28,"arena",false); // Terrain de tir

      // Obstacles dans parcours
      fill(3,18,4,19,"wall",true);
      fill(7,22,8,23,"wall",true);
      fill(10,19,11,20,"wall",true);

      // Mannequins d'entraînement (collisions)
      fill(19,4,19,4,"wall",true);
      fill(22,4,22,4,"wall",true);
      fill(25,4,25,4,"wall",true);
      fill(19,8,19,8,"wall",true);
      fill(22,8,22,8,"wall",true);
      fill(25,8,25,8,"wall",true);

      // Cibles de tir
      fill(28,18,28,18,"wall",true);
      fill(28,21,28,21,"wall",true);
      fill(28,24,28,24,"wall",true);

      instances.push({id:"inst_train",name:"Mannequin d'entraînement",type:"dialogue",position:{x:22,y:6},icon:"🎯",
        dialogue:"Un mannequin de bois usé par les coups.",
        options:[{label:"S'entraîner",action:"toast",message:"Vous vous entraînez pendant un moment. (+20 XP)",effect:{type:"xp",value:20}},{label:"Partir",action:"close"}]
      });

    } else if(floor===1){
      // ── ÉTAGE 1: Accueil, détente, cafétéria ──
      // Hall d'accueil (centre-bas)
      fill(5,20,25,28,"plaza",false);

      // Espace détente (gauche)
      fill(1,1,12,18,"house",false);
      fill(1,1,12,1,"wall",true);
      fill(1,1,1,18,"wall",true);
      fill(12,1,12,18,"wall",true);
      fill(5,18,5,18,"door",false);
      // Mobilier détente (tables, chaises = collision)
      fill(3,4,5,5,"wall",true);
      fill(8,4,10,5,"wall",true);
      fill(3,10,5,11,"wall",true);
      fill(8,10,10,11,"wall",true);

      // Cafétéria (droite)
      fill(17,1,28,18,"shop",false);
      fill(17,1,28,1,"wall",true);
      fill(17,1,17,18,"wall",true);
      fill(28,1,28,18,"wall",true);
      fill(17,12,17,12,"door",false);
      // Comptoir
      fill(19,3,26,4,"wall",true);
      // Tables
      fill(19,8,21,9,"wall",true);
      fill(24,8,26,9,"wall",true);
      fill(19,14,21,15,"wall",true);

      // Comptoir d'accueil (centre)
      fill(13,22,17,23,"wall",true);

      npcs.push({id:"npc_receptionist_"+divNum,name:"Réceptionniste",type:"npc",position:{x:15,y:24},direction:"up",dialogue:"Bienvenue à la "+divNames[divNum]+" Division. Comment puis-je vous aider ?"});

      if(is13){
        npcs.push({id:"npc_cook_13",name:"Cuisinier Bram",type:"npc",position:{x:22,y:5},direction:"down",dialogue:"Le ragoût du jour est prêt ! Servez-vous."});
        instances.push({id:"inst_meal_13",name:"Ragoût du jour",type:"dialogue",position:{x:22,y:7},icon:"🍲",
          dialogue:"Un copieux ragoût mijote dans la marmite.",
          options:[{label:"Manger (PV max)",action:"toast",message:"Délicieux ! PV et PM restaurés.",effect:{type:"heal",value:9999}},{label:"Partir",action:"close"}]
        });
      }

    } else if(floor===2){
      // ── ÉTAGE 2: Chambres des 12 membres ──
      // 6 chambres à gauche, 6 à droite
      for(let i=0;i<6;i++){
        // Gauche
        fill(1,1+i*4,12,3+i*4,"house",false);
        fill(1,1+i*4,12,1+i*4,"wall",true);
        fill(1,1+i*4,1,3+i*4,"wall",true);
        fill(12,1+i*4,12,3+i*4,"wall",true);
        fill(12,2+i*4,12,2+i*4,"door",false);
        // Lit
        fill(3,2+i*4,4,2+i*4,"wall",true);

        // Droite
        fill(17,1+i*4,28,3+i*4,"house",false);
        fill(17,1+i*4,28,1+i*4,"wall",true);
        fill(17,1+i*4,17,3+i*4,"wall",true);
        fill(28,1+i*4,28,3+i*4,"wall",true);
        fill(17,2+i*4,17,2+i*4,"door",false);
        fill(25,2+i*4,26,2+i*4,"wall",true);

// === js/systems/player.js ===
/* ═══════════════════════════════════════════
   Player System — with visible party member selection
   ═══════════════════════════════════════════ */
"use strict";

const Player = {
  x: 25, y: 25, visualX: 25, visualY: 25,
  speed: 4, direction: "down", moving: false,
  _targetX: 25, _targetY: 25, _moveTimer: 0, _moveDuration: 0,
  visibleCompanionId: null, // Which companion sprite is shown on map (null = hero)

  init() {
    const pos = GameData.state.player.position;
    this.x = pos.x || 25; this.y = pos.y || 25;
    this.visualX = this.x; this.visualY = this.y;
    this._targetX = this.x; this._targetY = this.y;
    this.visibleCompanionId = GameData.state.player.visibleCompanionId || null;
  },

  update(dt) {
    if (Input.isAnyUIOpen()) return;

    if (this._moveTimer > 0) {
      this._moveTimer -= dt;
      if (this._moveTimer <= 0) {
        this._moveTimer = 0;
        this.x = this._targetX; this.y = this._targetY;
        this.visualX = this.x; this.visualY = this.y;
        this.moving = false;
      } else {
        const t = 1 - (this._moveTimer / this._moveDuration);
        const ease = t * (2 - t);
        this.visualX = this.x + (this._targetX - this.x) * ease;
        this.visualY = this.y + (this._targetY - this.y) * ease;
      }
      return;
    }

    let dx = 0, dy = 0;
    if (Input.isDown("UP"))    { dy = -1; this.direction = "up"; }
    if (Input.isDown("DOWN"))  { dy =  1; this.direction = "down"; }
    if (Input.isDown("LEFT"))  { dx = -1; this.direction = "left"; }
    if (Input.isDown("RIGHT")) { dx =  1; this.direction = "right"; }
    if (dx !== 0 && dy !== 0) dx = 0;

    if (dx !== 0 || dy !== 0) {
      const newX = this.x + dx, newY = this.y + dy;
      if (!MapSystem.isBlocked(newX, newY)) {
        this._targetX = newX; this._targetY = newY;
        this._moveDuration = 1 / this.speed;
        this._moveTimer = this._moveDuration;
        this.moving = true;
        GameData.state.player.position.x = newX;
        GameData.state.player.position.y = newY;
        EventBus.emit("player:move", { x: newX, y: newY });
        this._checkTileEvents(newX, newY);
      }
    }
  },

  _checkTileEvents(x, y) {
    const map = MapSystem.currentMap;
    if (!map) return;

    // Transitions
    for (const trans of (map.transitions || [])) {
      if (trans.from.x === x && trans.from.y === y) {
        EventBus.emit("map:transition", { to_map: trans.to_map, to_position: trans.to_position });
      }
    }
  },

  interact() {
    const map = MapSystem.currentMap;
    if (!map) return;

    const offsets = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };
    const off = offsets[this.direction];
    const tx = this.x + off.x, ty = this.y + off.y;

    // NPCs
    for (const npc of (map.npcs || [])) {
      if (npc.position.x === tx && npc.position.y === ty) {
        EventBus.emit("npc:interact", npc);
        return;
      }
    }

    // Instances (on player tile or facing)
    for (const inst of (map.instances || [])) {
      if ((inst.position.x === this.x && inst.position.y === this.y) ||
          (inst.position.x === tx && inst.position.y === ty)) {
        EventBus.emit("instance:interact", inst);
        return;
      }
    }

    // Chests
    for (const chest of (map.chests || [])) {
      if ((chest.x === this.x && chest.y === this.y) || (chest.x === tx && chest.y === ty)) {
        if (!chest.opened) { chest.opened = true; EventBus.emit("chest:open", chest); return; }
      }
    }
  },

  setVisibleCompanion(companionId) {
    this.visibleCompanionId = companionId;
    GameData.state.player.visibleCompanionId = companionId;
  },

  getEntity() {
    // If a visible companion is set, use their sprite/color
    if (this.visibleCompanionId) {
      const template = GameData.getCompanion(this.visibleCompanionId);
      const instance = CompanionSystem.getInstanceForTemplate(this.visibleCompanionId);
      if (template) {
        return {
          x: this.visualX, y: this.visualY,
          color: RARITY_DATA[instance?.effectiveRarity || template.rarity]?.color || PLACEHOLDER_COLORS.player,
          name: template.name.split(" ")[0],
          direction: this.direction,
          sprite: template.sprite_path || null
        };
      }
    }

    return {
      x: this.visualX, y: this.visualY,
      color: PLACEHOLDER_COLORS.player,
      name: GameData.state.player.name,
      direction: this.direction,
      sprite: GameData.state.player.sprite_path || null
    };
  }
};

/* ═══════════════════════════════════════════
   Map System — Biomes, Procedural Gen, Harvest Nodes
   ═══════════════════════════════════════════ */
"use strict";

const MapSystem = {
  currentMap: null, currentMapId: null,

  init() {
    EventBus.on("map:transition",(d)=>this.loadMap(d.to_map,d.to_position));
    EventBus.on("instance:interact",(inst)=>this._handleInstance(inst));
    EventBus.on("player:move",()=>HarvestSystem.tickRespawns());
  },

  loadMap(mapId, spawnPos) {
    const mapData = GameData.getMap(mapId);
    if (!mapData) { console.error(`[Map] Not found: ${mapId}`); return false; }
    this.currentMap = mapData; this.currentMapId = mapId;
    if (spawnPos) {
      Player.x=spawnPos.x; Player.y=spawnPos.y;
      Player.visualX=spawnPos.x; Player.visualY=spawnPos.y;
      Player._targetX=spawnPos.x; Player._targetY=spawnPos.y;
      GameData.state.player.position={mapId,x:spawnPos.x,y:spawnPos.y};
    }
    EventBus.emit("map:change",{mapId});
    return true;
  },

  isBlocked(x,y) {
    if(!this.currentMap) return true;
    const m=this.currentMap;
    if(x<0||y<0||x>=m.width||y>=m.height) return true;
    if(m.layers.collision[y]?.[x]===1) return true;
    for(const npc of(m.npcs||[])){if(npc.position.x===x&&npc.position.y===y)return true;}
    return false;
  },

  getMapWidthPx(){return this.currentMap?this.currentMap.width*TILE_SIZE:0;},
  getMapHeightPx(){return this.currentMap?this.currentMap.height*TILE_SIZE:0;},

  getBiomeAt(x,y) {
    if(!this.currentMap?.biomesLayer) return "plains";
    return this.currentMap.biomesLayer[y]?.[x]||"plains";
  },

  getRenderEntities() {
    if(!this.currentMap) return {npcs:[],chests:[],instances:[],harvestNodes:[]};
    return {
      npcs:this.currentMap.npcs||[],
      chests:this.currentMap.chests||[],
      instances:this.currentMap.instances||[],
      harvestNodes:this.currentMap.harvestNodes||[]
    };
  },

  _handleInstance(inst) {
    if(inst.type==="map_portal") this.loadMap(inst.target_map,inst.target_position);
    else if(inst.type==="merchant_dialogue") EventBus.emit("dialogue:open",{npc_name:inst.name,dialogue:inst.dialogue,background:inst.background_image,options:inst.options||[],shop_inventory:inst.shop_inventory});
    else if(inst.type==="dialogue") EventBus.emit("dialogue:open",{npc_name:inst.name,dialogue:inst.dialogue,background:inst.background_image,options:inst.options||[]});
  },

  // ═══════════════════════════════════════
  // PROCEDURAL MAP GENERATOR
  // ═══════════════════════════════════════
  generateMap(params) {
    const {
      id = "gen_" + Utils.uid(),
      name = "Carte Générée",
      width = 60,
      height = 45,
      primaryBiome = "plains",
      secondaryBiome = "forest",
      hasWater = false,
      waterType = "river", // river, lake
      enemyIds = [],
      enemyLevelMin = 1,
      enemyLevelMax = 10,
      enemySpawnRate = 0.025,
      enemyMaxCount = 4,
      lootTable = [],
      treesDensity = 0.05,   // 0 to 0.15
      rocksDensity = 0.03,
      fishDensity = 0.02
    } = params;

    const bg = [], coll = [], biomes = [];

    for (let y = 0; y < height; y++) {
      bg[y] = []; coll[y] = []; biomes[y] = [];
      for (let x = 0; x < width; x++) {
        // Border walls
        if (y === 0 || y === height-1 || x === 0 || x === width-1) {
          // Leave openings for transitions
          if ((x === 0 && y === Math.floor(height/2)) || (x === width-1 && y === Math.floor(height/2))) {
            bg[y][x] = BIOME_KEYS.indexOf("path"); coll[y][x] = 0; biomes[y][x] = "path";
          } else {
            bg[y][x] = BIOME_KEYS.indexOf("wall"); coll[y][x] = 1; biomes[y][x] = "wall";
          }
        }
        // Water feature
        else if (hasWater && waterType === "river" && x >= Math.floor(width/2)-1 && x <= Math.floor(width/2)+1 && y > 2 && y < height-3) {
          // Bridge in middle
          if (y >= Math.floor(height/2)-1 && y <= Math.floor(height/2)+1) {
            bg[y][x] = BIOME_KEYS.indexOf("path"); coll[y][x] = 0; biomes[y][x] = "river";
          } else {
            bg[y][x] = BIOME_KEYS.indexOf("river"); coll[y][x] = 1; biomes[y][x] = "river";
          }
        }
        else if (hasWater && waterType === "lake" && this._distTo(x, y, Math.floor(width*0.7), Math.floor(height*0.3)) < 8) {
          bg[y][x] = BIOME_KEYS.indexOf("lake"); coll[y][x] = 1; biomes[y][x] = "lake";
        }
        // Secondary biome zones
        else if (this._noise(x, y) > 0.6) {
          bg[y][x] = BIOME_KEYS.indexOf(secondaryBiome); coll[y][x] = 0; biomes[y][x] = secondaryBiome;
        }
        // Primary biome
        else {
          bg[y][x] = BIOME_KEYS.indexOf(primaryBiome); coll[y][x] = 0; biomes[y][x] = primaryBiome;
        }
      }
    }

    // Stone paths
    const midY = Math.floor(height / 2);
    for (let x = 1; x < width - 1; x++) {
      if (coll[midY][x] !== 1 || biomes[midY][x] === "river") {
        bg[midY][x] = BIOME_KEYS.indexOf("path"); coll[midY][x] = 0;
      }
    }

    const mapData = {
      id, name, width, height,
      layers: { background: bg, collision: coll, foreground: [] },
      biomesLayer: biomes,
      enemy_level_range: { min: enemyLevelMin, max: enemyLevelMax, scaling_mode: "random" },
      npcs: [],
      instances: [],
      enemies: enemyIds.map(eid => ({
        spawn_zone: { x: 5, y: 5, width: width - 10, height: height - 10 },
        enemy_id: eid,
        spawn_rate: enemySpawnRate,
        max_count: enemyMaxCount
      })),
      chests: [],
      harvestNodes: [],
      transitions: [
        { from: { x: 0, y: midY }, to_map: "apolyti", to_position: { x: 58, y: 25 } }
      ],
      music: null,
      _generated: true,
      _params: params
    };

    // Generate harvest nodes
    mapData.harvestNodes = HarvestSystem.generateNodes(mapData);

    return mapData;
  },

  _noise(x, y) {
    // Simple pseudo-random noise
    const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
    return n - Math.floor(n);
  },

  _distTo(x, y, cx, cy) {
    return Math.sqrt((x-cx)*(x-cx) + (y-cy)*(y-cy));
  }
};

/* ═══════════════════════════════════════════
   Companion System — Multi-Category Synergies + Leader System
