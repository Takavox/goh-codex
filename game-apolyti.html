    Utils.$("#setting-music-val").textContent = Math.round(s.musicVolume * 100) + "%";
    Utils.$("#setting-sfx").value = Math.round(s.sfxVolume * 100);
    Utils.$("#setting-sfx-val").textContent = Math.round(s.sfxVolume * 100) + "%";
    Utils.$("#setting-lang").value = s.language;

    Utils.$("#settings-overlay").classList.remove("hidden");
    this._openMenu = "settings";
  }
};

// === js/ui/toast.js ===
/* ═══════════════════════════════════════════
   Toast Notification System
   ═══════════════════════════════════════════ */

"use strict";

const Toast = {
  _container: null,

  init() {
    this._container = Utils.$("#toast-container");

    // Style the container
    Object.assign(this._container.style, {
      position: "fixed",
      top: "80px",
      right: "16px",
      zIndex: "2000",
      display: "flex",
      flexDirection: "column",
      gap: "8px",
      pointerEvents: "none",
      maxWidth: "360px"
    });

    EventBus.on("ui:toast", (data) => this.show(data.message, data.type, data.duration));
  },

  show(message, type = "info", duration = 3000) {
    const colors = {
      success: { bg: "rgba(76,175,80,0.9)", border: "#4CAF50", icon: "✓" },
      error:   { bg: "rgba(244,67,54,0.9)", border: "#F44336", icon: "✕" },
      warning: { bg: "rgba(255,152,0,0.9)", border: "#FF9800", icon: "⚠" },
      info:    { bg: "rgba(33,150,243,0.9)", border: "#2196F3", icon: "ℹ" }
    };
    const c = colors[type] || colors.info;

    const toast = Utils.createElement("div", {
      style: {
        background: c.bg,
        border: `1px solid ${c.border}`,
        borderRadius: "8px",
        padding: "10px 16px",
        color: "#fff",
        fontFamily: "'Exo 2', sans-serif",
        fontSize: "13px",
        fontWeight: "600",
        display: "flex",
        alignItems: "center",
        gap: "8px",
        backdropFilter: "blur(8px)",
        boxShadow: "0 4px 16px rgba(0,0,0,0.4)",
        opacity: "0",
        transform: "translateX(30px)",
        transition: "all 0.3s ease-out",
        pointerEvents: "auto"
      }
    });

    toast.innerHTML = `<span style="font-size:16px">${c.icon}</span><span>${message}</span>`;

    this._container.appendChild(toast);

    // Animate in
    requestAnimationFrame(() => {
      toast.style.opacity = "1";
      toast.style.transform = "translateX(0)";
    });

    // Auto remove
    setTimeout(() => {
      toast.style.opacity = "0";
      toast.style.transform = "translateX(30px)";
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }
};

// === js/ui/party-panel.js ===
/* ═══════════════════════════════════════════
   Party Panel UI
   Companion management, details, XP, awakening
   ═══════════════════════════════════════════ */

"use strict";

const PartyPanel = {
  _visible: false,
  _selectedCompanionId: null,
  _subView: "roster", // "roster" | "detail" | "xp_stones"

  init() {
    // Create panel overlay in DOM
    this._createOverlay();

    // Listen for open events
    EventBus.on("input:party", () => this.toggle());
    EventBus.on("party:changed", () => { if (this._visible) this._renderContent(); });
    EventBus.on("companion:level_up", () => { if (this._visible) this._renderContent(); });
    EventBus.on("companion:awakened", () => { if (this._visible) this._renderContent(); });
  },

  _createOverlay() {
    const overlay = Utils.createElement("div", {
      id: "party-overlay",
      className: "ui-layer hidden"
    });

    Object.assign(overlay.style, {
      background: "rgba(0,0,0,0.6)",
      backdropFilter: "blur(4px)",
      zIndex: "500",
      pointerEvents: "auto"
    });

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) this.close();
    });

    const panel = Utils.createElement("div", {
      id: "party-panel",
      className: "panel"
    });
    panel.style.width = "min(95vw, 800px)";
    panel.style.maxHeight = "90vh";

    overlay.appendChild(panel);
    Utils.$("#game-container").appendChild(overlay);
  },

  toggle() {
    if (this._visible) {
      this.close();
    } else {
      this.open();
    }
  },

  open() {
    this._visible = true;
    this._subView = "roster";
    this._selectedCompanionId = null;
    this._renderContent();
    Utils.$("#party-overlay").classList.remove("hidden");
    Audio.playSFX("ui_open");
  },

  close() {
    this._visible = false;
    Utils.$("#party-overlay").classList.add("hidden");
    Audio.playSFX("ui_close");
  },

  // ══════════════════════════════════════
  // RENDER
  // ══════════════════════════════════════
  _renderContent() {
    const panel = Utils.$("#party-panel");
    if (!panel) return;

    Utils.clearElement(panel);

    // Header
    const header = Utils.createElement("div", { className: "panel-header" });
    header.innerHTML = `
      <h2 class="panel-title">
        ${this._subView === "roster" ? "🛡️ Équipe & Compagnons" :
          this._subView === "xp_stones" ? "💎 Pierres d\'XP" : "📋 Détails"}
      </h2>
      <div style="display:flex;gap:8px;align-items:center">
        ${this._subView !== "roster" ? '<button class="btn btn-secondary btn-sm" id="party-back">← Retour</button>' : ""}
        <button class="panel-close" id="party-close">✕</button>
      </div>
    `;
    panel.appendChild(header);

    // Body
    const body = Utils.createElement("div", { className: "panel-body", id: "party-body" });
    body.style.padding = "0";
    panel.appendChild(body);

    switch (this._subView) {
      case "roster":   this._renderRoster(body); break;
      case "detail":   this._renderDetail(body); break;
      case "xp_stones": this._renderXPStones(body); break;
    }

    // Bind events
    setTimeout(() => {
      const closeBtn = Utils.$("#party-close");
      if (closeBtn) closeBtn.addEventListener("click", (e) => { e.stopPropagation(); this.close(); });

      const backBtn = Utils.$("#party-back");
      if (backBtn) backBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        this._subView = "roster";
        this._renderContent();
      });
    }, 0);
  },

  // ── Roster View ──
  _renderRoster(body) {
    // Active Party Section
    const activeSection = Utils.createElement("div", { className: "party-section" });
    activeSection.innerHTML = `<div class="party-section-header">
      <h3>Équipe Active (${CompanionSystem.getPartySize()}/4)</h3>
    </div>`;

    const activeGrid = Utils.createElement("div", { className: "party-grid" });

    // Hero card (always first)
    activeGrid.appendChild(this._createHeroCard());

    // Party companions
    for (let i = 0; i < 3; i++) {
      const companion = GameData.state.party[i];
      if (companion) {
        activeGrid.appendChild(this._createCompanionCard(companion, true, i));
      } else {
        activeGrid.appendChild(this._createEmptySlot(i));
      }
    }

    activeSection.appendChild(activeGrid);
    body.appendChild(activeSection);

    // Synergies
    const synergies = CompanionSystem.getActiveSynergies();
    if (synergies.length > 0) {
      const synSection = Utils.createElement("div", { className: "party-section" });
      synSection.innerHTML = `<div class="party-section-header"><h3>✨ Synergies Actives</h3></div>`;
      const synGrid = Utils.createElement("div", { className: "synergy-list" });

      for (const syn of synergies) {
        const el = Utils.createElement("div", { className: "synergy-item" });
        el.innerHTML = `
          <span class="synergy-icon">${syn.icon}</span>
          <div class="synergy-info">
            <div class="synergy-name">${syn.name} (x${syn.count})</div>
            <div class="synergy-desc">${syn.description}</div>
          </div>
        `;
        synGrid.appendChild(el);
      }

      synSection.appendChild(synGrid);
      body.appendChild(synSection);
    }

    // All Unlocked Companions
    const rosterSection = Utils.createElement("div", { className: "party-section" });
    rosterSection.innerHTML = `<div class="party-section-header"><h3>Tous les Compagnons</h3></div>`;
    const rosterGrid = Utils.createElement("div", { className: "party-grid" });

    const allCompanions = CompanionSystem.getAllUnlockedCompanions();
    if (allCompanions.length === 0) {
      rosterGrid.innerHTML = '<p style="padding:16px;color:#5a6a8a;font-style:italic">Aucun compagnon débloqué</p>';
    }

    for (const { template, instance, inParty } of allCompanions) {
      rosterGrid.appendChild(this._createCompanionCard(
        instance || CompanionSystem.createInstance(template.id),
        false,
        null,
        inParty
      ));
    }

    rosterSection.appendChild(rosterGrid);
    body.appendChild(rosterSection);
  },

  _createHeroCard() {
    const p = GameData.state.player;
    const card = Utils.createElement("div", { className: "companion-card companion-card--hero" });

    const hpPct = Math.round((p.stats.hp / p.stats.maxHp) * 100);

    card.innerHTML = `
      <div class="cc-portrait" style="background:${PLACEHOLDER_COLORS.player}30; border-color:${PLACEHOLDER_COLORS.player}">
        <span class="cc-portrait-icon" style="color:${PLACEHOLDER_COLORS.player}">★</span>
      </div>
      <div class="cc-info">
        <div class="cc-name">${p.name}</div>
        <div class="cc-meta">Nv.${p.level} • Héros</div>
        <div class="cc-hp-bar"><div class="cc-hp-fill" style="width:${hpPct}%"></div></div>
        <div class="cc-stats-mini">
          ATK ${p.stats.atk} • DEF ${p.stats.def} • VIT ${p.stats.spd}
        </div>
      </div>
    `;

    return card;
  },

  _createCompanionCard(instance, isActive, partyIndex, showJoinBtn) {
    const template = GameData.getCompanion(instance.templateId);
    if (!template) return Utils.createElement("div");

    const stats = CompanionSystem.getComputedStats(instance);
    const rarity = instance.effectiveRarity;
    const rarityData = RARITY_DATA[rarity];
    const cap = CompanionSystem.getLevelCap(instance);
    const hpPct = stats ? Math.round((instance.currentHp / stats.maxHp) * 100) : 100;
    const xpPct = instance.level >= cap ? 100 : Math.round((instance.xp / getXPForNextLevel(instance.level)) * 100);
    const inParty = CompanionSystem.isInParty(instance.templateId);

    const card = Utils.createElement("div", {
      className: `companion-card rarity-border-${rarity}`,
      dataset: { templateId: instance.templateId }
    });

    card.innerHTML = `
      <div class="cc-portrait" style="background:${rarityData.color}20; border-color:${rarityData.color}">
        <span class="cc-portrait-icon" style="color:${rarityData.color}">${CompanionSystem._getElementIcon ? CompanionSystem._getElementIcon(template.element) : "🛡️"}</span>
        ${instance.awakenTier > 0 ? `<span class="cc-awaken-badge">⭐${instance.awakenTier}</span>` : ""}
      </div>
      <div class="cc-info">
        <div class="cc-name-row">
          <span class="cc-name">${template.name}</span>
          <span class="rarity-badge rarity-badge-${rarity}">${rarity}</span>
        </div>
        <div class="cc-meta">Nv.${instance.level}/${cap} • ${template.category} • ${template.element}</div>
        <div class="cc-bars">
          <div class="cc-hp-bar"><div class="cc-hp-fill" style="width:${hpPct}%"></div></div>
          <div class="cc-xp-bar"><div class="cc-xp-fill" style="width:${xpPct}%"></div></div>
        </div>
        <div class="cc-stats-mini">
          ${stats ? `PV ${stats.maxHp} • ATK ${stats.atk} • DEF ${stats.def} • MAG ${stats.mag} • VIT ${stats.spd}` : ""}
        </div>
        <div class="cc-actions">
          <button class="btn btn-primary btn-sm cc-btn-detail" data-action="detail" data-id="${instance.templateId}">Détails</button>
          ${isActive ?
            `<button class="btn btn-danger btn-sm" data-action="remove" data-id="${instance.templateId}">Retirer</button>` :
            (inParty ? '<span style="font-size:11px;color:#4CAF50;font-weight:600">✓ En équipe</span>' :
              `<button class="btn btn-success btn-sm" data-action="add" data-id="${instance.templateId}">Ajouter</button>`)
          }
        </div>
      </div>
    `;

    // Bind card events
    setTimeout(() => {
      card.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const action = btn.dataset.action;
          const id = btn.dataset.id;

          switch (action) {
            case "detail":
              this._selectedCompanionId = id;
              this._subView = "detail";
              this._renderContent();
              break;
            case "add":
              CompanionSystem.addToParty(id);
              this._renderContent();
              break;
            case "remove":
              CompanionSystem.removeFromParty(id);
              this._renderContent();
              break;
          }
        });
      });
    }, 0);

    return card;
  },

  _createEmptySlot(index) {
    const slot = Utils.createElement("div", { className: "companion-card companion-card--empty" });
    slot.innerHTML = `
      <div class="cc-empty-content">
        <span style="font-size:24px;opacity:0.3">+</span>
        <span style="font-size:11px;color:#5a6a8a">Slot ${index + 1} vide</span>
      </div>
    `;
    return slot;
  },

  // ── Detail View ──
  _renderDetail(body) {
    const instance = CompanionSystem.getInstanceForTemplate(this._selectedCompanionId);
    const template = GameData.getCompanion(this._selectedCompanionId);
    if (!instance || !template) {
      body.innerHTML = '<p style="padding:20px;color:#5a6a8a">Compagnon introuvable</p>';
      return;
    }

    const stats = CompanionSystem.getComputedStats(instance);
    const rarity = instance.effectiveRarity;
    const rarityData = RARITY_DATA[rarity];
    const cap = CompanionSystem.getLevelCap(instance);
    const xpNeeded = instance.level >= cap ? 0 : getXPForNextLevel(instance.level);
    const xpPct = xpNeeded > 0 ? Math.round((instance.xp / xpNeeded) * 100) : 100;
    const skills = CompanionSystem.getAllSkills(instance);
    const awaken = CompanionSystem.canAwaken(instance);
    const synergies = CompanionSystem.getActiveSynergies();

    const wrap = Utils.createElement("div", { style: { padding: "16px" } });

    wrap.innerHTML = `
      <!-- Header -->
      <div class="detail-header rarity-border-${rarity}" style="padding:16px;border-radius:8px;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:16px">
          <div class="cc-portrait-lg" style="background:${rarityData.color}20;border:2px solid ${rarityData.color};width:64px;height:64px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px">
            ${CompanionSystem._getElementIcon(template.element)}
          </div>
          <div>
            <h2 style="font-family:var(--font-display);font-size:var(--text-xl);font-weight:800" class="rarity-text-${rarity}">${template.name}</h2>
            <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
              <span class="rarity-badge rarity-badge-${rarity}">${rarity} — ${rarityData.name}</span>
              <span style="font-size:12px;color:var(--color-text-dim)">${template.category} • ${template.element}</span>
              ${instance.awakenTier > 0 ? `<span style="color:#FFD700;font-weight:700">⭐ Éveil ${instance.awakenTier}</span>` : ""}
            </div>
            <p style="font-size:12px;color:var(--color-text-muted);margin-top:8px">${template.description || ""}</p>
          </div>
        </div>
      </div>

      <!-- Level & XP -->
      <div class="detail-section">
        <h3 class="detail-section-title">Niveau & Expérience</h3>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <span style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:900;color:var(--color-secondary)">Nv. ${instance.level}</span>
          <span style="font-size:12px;color:var(--color-text-muted)">/ ${cap}</span>
        </div>
        <div class="detail-xp-bar">
          <div class="detail-xp-fill" style="width:${xpPct}%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-muted);margin-top:4px">
          <span>${Utils.formatNumber(instance.xp)} XP</span>
          <span>${xpNeeded > 0 ? Utils.formatNumber(xpNeeded) + " requis" : "MAX"}</span>
        </div>
        <button class="btn btn-primary btn-sm" id="detail-btn-xp" style="margin-top:8px">💎 Utiliser Pierres d'XP</button>
      </div>

      <!-- Stats -->
      <div class="detail-section">
        <h3 class="detail-section-title">Statistiques</h3>
        <div class="detail-stats-grid">
          ${STAT_KEYS.map(s => {
            const base = calculateStat(template.base_stats[s], template.growth_rates[s], instance.level);
            const bonus = stats[s] - base;
            return `
              <div class="detail-stat-row">
                <span class="detail-stat-label">${STAT_LABELS[s]}</span>
                <div class="detail-stat-bar-track">
                  <div class="detail-stat-bar-fill" style="width:${Math.min(100, (stats[s] / (cap * 2)) * 100)}%;background:${s === 'hp' ? '#4CAF50' : s === 'atk' ? '#F44336' : s === 'def' ? '#2196F3' : s === 'mag' ? '#9C27B0' : '#FF9800'}"></div>
                </div>
                <span class="detail-stat-value">${stats[s]}${bonus > 0 ? ` <span style="color:#4CAF50;font-size:10px">(+${bonus})</span>` : ""}</span>
              </div>
            `;
          }).join("")}
        </div>
        <div style="font-size:11px;color:var(--color-text-muted);margin-top:8px">
          PV: ${instance.currentHp}/${stats.maxHp} • PM: ${instance.mp || 0}/${stats.maxMp || 30}
        </div>
      </div>

      <!-- Skills -->
      <div class="detail-section">
        <h3 class="detail-section-title">Compétences (${skills.filter(s => s.unlocked).length}/${skills.length})</h3>
        <div class="detail-skills-list">
          ${skills.map(sk => `
            <div class="detail-skill ${sk.unlocked ? "" : "detail-skill--locked"}">
              <div class="detail-skill-name">${sk.unlocked ? "" : "🔒 "}${sk.name}</div>
              <div class="detail-skill-meta">
                ${sk.damage_multiplier > 0 ? `×${sk.damage_multiplier} dégâts` : "Soutien"}
                ${sk.mp_cost ? ` • ${sk.mp_cost} PM` : ""}
                ${sk.element ? ` • ${sk.element}` : ""}
                ${!sk.unlocked ? ` • Nv.${sk.unlock_level}` : ""}
              </div>
            </div>
          `).join("")}
          ${skills.length === 0 ? '<p style="color:var(--color-text-muted);font-size:12px">Aucune compétence</p>' : ""}
        </div>
      </div>

      <!-- Awakening -->
      <div class="detail-section">
        <h3 class="detail-section-title">⭐ Éveil (Tier ${instance.awakenTier}/${template.awakening?.max_tier || 0})</h3>
        <p style="font-size:12px;color:var(--color-text-dim);margin-bottom:8px">
          L'éveil monte la rareté du compagnon, augmente le cap de niveau et booste toutes les stats de +5% par tier.
          Le niveau est réinitialisé à 1.
        </p>
        ${template.awakening?.max_tier > 0 ? `
          <div style="display:flex;gap:4px;margin-bottom:12px">
            ${Array.from({ length: template.awakening.max_tier }, (_, i) => `
              <div style="width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;
                ${i < instance.awakenTier ?
                  "background:rgba(255,215,0,0.2);border:1px solid #FFD700;color:#FFD700" :
                  "background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);color:#5a6a8a"
                }">⭐</div>
            `).join("")}
          </div>
          <p style="font-size:12px;${awaken.can ? "color:#4CAF50" : "color:#FF9800"}">${awaken.reason}</p>
          <button class="btn ${awaken.can ? "btn-success" : "btn-secondary"} btn-sm" id="detail-btn-awaken" ${awaken.can ? "" : "disabled"} style="margin-top:8px">
            ⭐ Éveiller → ${RARITY_KEYS[RARITY_KEYS.indexOf(rarity) + 1] || "MAX"}
          </button>
        ` : '<p style="font-size:12px;color:var(--color-text-muted)">Ce compagnon ne peut pas être éveillé.</p>'}
      </div>

      <!-- Party Actions -->
      <div class="detail-section" style="border-top:1px solid rgba(255,255,255,0.08);padding-top:16px">
        ${CompanionSystem.isInParty(instance.templateId) ?
          `<button class="btn btn-danger" id="detail-btn-party">Retirer de l'équipe</button>` :
          `<button class="btn btn-success" id="detail-btn-party">Ajouter à l'équipe</button>`
        }
      </div>
    `;

    body.appendChild(wrap);

    // Bind events
    setTimeout(() => {
      const xpBtn = Utils.$("#detail-btn-xp");
      if (xpBtn) xpBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        this._subView = "xp_stones";
        this._renderContent();
      });

      const awakenBtn = Utils.$("#detail-btn-awaken");
      if (awakenBtn) awakenBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        CompanionSystem.awakenCompanion(this._selectedCompanionId);
        this._renderContent();
      });

      const partyBtn = Utils.$("#detail-btn-party");
      if (partyBtn) partyBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (CompanionSystem.isInParty(this._selectedCompanionId)) {
          CompanionSystem.removeFromParty(this._selectedCompanionId);
        } else {
          CompanionSystem.addToParty(this._selectedCompanionId);
        }
        this._renderContent();
      });
    }, 0);
  },

  // ── XP Stones View ──
  _renderXPStones(body) {
    const instance = CompanionSystem.getInstanceForTemplate(this._selectedCompanionId);
    const template = GameData.getCompanion(this._selectedCompanionId);
    if (!instance || !template) {
      body.innerHTML = '<p style="padding:20px;color:#5a6a8a">Compagnon introuvable</p>';
      return;
    }

    const cap = CompanionSystem.getLevelCap(instance);
    const xpNeeded = instance.level >= cap ? 0 : getXPForNextLevel(instance.level);

    const wrap = Utils.createElement("div", { style: { padding: "16px" } });

    // Target companion info
    wrap.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px">
        <div style="font-size:24px">${CompanionSystem._getElementIcon(template.element)}</div>
        <div>
          <div style="font-weight:700" class="rarity-text-${instance.effectiveRarity}">${template.name}</div>
          <div style="font-size:12px;color:var(--color-text-dim)">Nv.${instance.level}/${cap} • XP: ${Utils.formatNumber(instance.xp)}/${xpNeeded > 0 ? Utils.formatNumber(xpNeeded) : "MAX"}</div>
        </div>
      </div>
      <h3 class="detail-section-title">💎 Pierres d'XP en Inventaire</h3>
      <div id="xp-stones-list"></div>
    `;

    body.appendChild(wrap);

    // Find XP stones in inventory
    const stonesList = Utils.$("#xp-stones-list");
    const xpItems = GameData.state.inventory.filter(inv => {
      const item = GameData.getItem(inv.itemId);
      return item && item.category === "EXP_ITEMS" && inv.quantity > 0;
    });

    if (xpItems.length === 0) {
      stonesList.innerHTML = '<p style="color:var(--color-text-muted);font-size:12px;padding:12px">Aucune pierre d\'XP en inventaire.</p>';
      return;
    }

    for (const inv of xpItems) {
      const item = GameData.getItem(inv.itemId);
      if (!item) continue;

      const xpEffect = (item.effects || []).find(e => e.type === "grant_xp");
      if (!xpEffect) continue;

      let xpValue = xpEffect.value;
      const hasBonus = RARITY_TIERS[item.rarity] >= RARITY_TIERS[instance.effectiveRarity];
      if (hasBonus) xpValue = Math.floor(xpValue * 1.2);

      const rarityData = RARITY_DATA[item.rarity];
      const row = Utils.createElement("div", { className: "xp-stone-row" });
      row.innerHTML = `
        <div class="xp-stone-icon rarity-border-${item.rarity}" style="background:${rarityData.color}15">${"💎"}</div>
        <div class="xp-stone-info">
          <div class="rarity-text-${item.rarity}" style="font-weight:600;font-size:13px">${item.name}</div>
          <div style="font-size:11px;color:var(--color-text-dim)">
            +${Utils.formatNumber(xpValue)} XP ${hasBonus ? '<span style="color:#4CAF50">(+20% bonus)</span>' : ""} • ×${inv.quantity}
          </div>
        </div>
        <div class="xp-stone-actions">
          <button class="btn btn-primary btn-sm" data-use-stone="${inv.itemId}" data-use-count="1">×1</button>
          ${inv.quantity >= 5 ? `<button class="btn btn-primary btn-sm" data-use-stone="${inv.itemId}" data-use-count="5">×5</button>` : ""}
          ${inv.quantity >= 10 ? `<button class="btn btn-secondary btn-sm" data-use-stone="${inv.itemId}" data-use-count="${inv.quantity}">Tout</button>` : ""}
        </div>
      `;

      stonesList.appendChild(row);
    }

    // Bind stone usage buttons
    setTimeout(() => {
      stonesList.querySelectorAll("[data-use-stone]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const stoneId = btn.dataset.useStone;
          const count = parseInt(btn.dataset.useCount) || 1;

          for (let i = 0; i < count; i++) {
            const result = CompanionSystem.useXPStone(this._selectedCompanionId, stoneId);
            if (!result) break;
          }

          this._renderContent();
        });
      });
    }, 0);
  }
};

// === js/ui/combat-ui.js ===
/* ═══════════════════════════════════════════
   Combat UI — with status effect display
   ═══════════════════════════════════════════ */
"use strict";

const CombatUI = {
  _overlay: null,

  init() {
    this._overlay = Utils.createElement("div",{id:"combat-overlay",className:"ui-layer hidden"});
    Object.assign(this._overlay.style,{zIndex:"600",pointerEvents:"auto",background:"rgba(5,4,10,0.9)",backdropFilter:"blur(6px)"});
    Utils.$("#game-container").appendChild(this._overlay);

    EventBus.on("combat:ui_open",()=>this._open());
    EventBus.on("combat:player_turn",(d)=>this._showActions(d.unit));
    EventBus.on("combat:enemy_turn",(d)=>this._highlight(d.unit));
    EventBus.on("combat:select_target",(d)=>this._showTargets(d.targets,d.type));
    EventBus.on("combat:select_skill",(d)=>this._showSkills(d.skills,d.mp));
    EventBus.on("combat:select_item",(d)=>this._showItems(d.inventory));
    EventBus.on("combat:log",(d)=>this._appendLog(d.message));
    EventBus.on("combat:attack_anim",()=>this._refresh());
    EventBus.on("combat:skill_anim",()=>this._refresh());
    EventBus.on("combat:heal_anim",()=>this._refresh());
    EventBus.on("combat:item_anim",()=>this._refresh());
    EventBus.on("combat:enemy_defeated",()=>this._refresh());
    EventBus.on("combat:ally_ko",()=>this._refresh());
    EventBus.on("combat:status_applied",()=>this._refresh());
    EventBus.on("combat:victory",(d)=>this._showResult("victory",d));
    EventBus.on("combat:defeat",(d)=>this._showResult("defeat",d));
    EventBus.on("combat:end",()=>this._close());
  },

  _open() { this._overlay.classList.remove("hidden"); this._render(); },
  _close() { this._overlay.classList.add("hidden"); Utils.clearElement(this._overlay); },

  _render() {
    Utils.clearElement(this._overlay);
    const c = Utils.createElement("div",{className:"combat-container"});
    c.appendChild(this._turnBar());
    c.appendChild(this._battlefield());
    c.appendChild(this._logPanel());
    c.appendChild(this._actionPanel());
    this._overlay.appendChild(c);
  },

  _refresh() {
    const bf = this._overlay.querySelector(".combat-battlefield");
    if (bf) { const nb = this._battlefield(); bf.parentNode.replaceChild(nb, bf); }
  },

  _turnBar() {
    const bar = Utils.createElement("div",{className:"combat-turn-bar"});
    const u = Combat.getCurrentUnit();
    bar.innerHTML = `<span class="combat-turn-text">Tour ${Combat.turnNumber+1} — ${u?u.name:"..."}</span>`;
    return bar;
  },

  _battlefield() {
    const f = Utils.createElement("div",{className:"combat-battlefield"});
    const es = Utils.createElement("div",{className:"combat-side combat-side--enemies"});
    for (const e of Combat.enemies) es.appendChild(this._unitCard(e,"enemy"));
    f.appendChild(es);
    f.appendChild(Utils.createElement("div",{className:"combat-vs",textContent:"⚔️"}));
    const as = Utils.createElement("div",{className:"combat-side combat-side--allies"});
    for (const a of Combat.allies) as.appendChild(this._unitCard(a,"ally"));
    f.appendChild(as);
    return f;
  },

  _unitCard(unit, type) {
    const dead = unit.currentHp<=0;
    const active = Combat.getCurrentUnit()?.id===unit.id;
    const hpP = Math.max(0,(unit.currentHp/unit.maxHp)*100);
    const mpP = Math.max(0,(unit.mp/unit.maxMp)*100);

    const el = Utils.createElement("div",{
      className:`combatant combatant--${type} ${dead?"combatant--dead":""} ${active?"combatant--active":""}`,
      dataset:{unitId:unit.id,unitType:type}
    });

    const color = type==="enemy"?PLACEHOLDER_COLORS.enemy:
      (unit.isHero?PLACEHOLDER_COLORS.player:(RARITY_DATA[GameData.state.party.find(c=>c.templateId===unit.templateId)?.effectiveRarity]?.color||"#7baed4"));
    const elemIcons = {Feu:"🔥",Eau:"💧",Terre:"🪨",Vent:"🌪️",Lumière:"☀️",Ténèbres:"🌑",Neutre:"⚪"};

    // Status effect icons
    const statusHtml = (unit.buffs||[]).map(b => {
      const def = STATUS_EFFECTS[b.id];
      return def ? `<span class="combatant-status-icon" title="${def.name} (${b.turnsLeft}t)">${def.icon}</span>` : "";
    }).join("");

    el.innerHTML = `
      <div class="combatant-sprite" style="background:${color}25;border-color:${color}">
        <span style="font-size:18px">${type==="enemy"?"💀":(unit.isHero?"⭐":"🛡️")}</span>
        ${dead?'<span class="combatant-dead-x">✕</span>':""}
      </div>
      <div class="combatant-info">
        <div class="combatant-name-row">
          <span class="combatant-name">${unit.name}</span>
          <span class="combatant-element">${elemIcons[unit.element]||""}</span>
          ${type==="enemy"?`<span class="combatant-level">Nv.${unit.level}</span>`:""}
        </div>
        <div class="combatant-bars">
          <div class="combatant-hp-bar"><div class="combatant-hp-fill ${hpP<=25?"hp-crit":hpP<=50?"hp-warn":""}" style="width:${hpP}%"></div></div>
          <div class="combatant-hp-text">${unit.currentHp}/${unit.maxHp}</div>
        </div>
        <div class="combatant-mp-row">
          <div class="combatant-mp-bar"><div class="combatant-mp-fill" style="width:${mpP}%"></div></div>
          <span class="combatant-mp-text">${unit.mp}PM</span>
        </div>
        ${statusHtml?`<div class="combatant-statuses">${statusHtml}</div>`:""}
        ${unit.defending?'<span class="combatant-status">🛡️</span>':""}
      </div>`;
    return el;
  },

  _logPanel() {
    const log = Utils.createElement("div",{className:"combat-log",id:"combat-log"});
    for (const e of Combat.log.slice(-5)) log.appendChild(Utils.createElement("div",{className:"combat-log-line",textContent:e.text}));
    return log;
  },
  _appendLog(msg) {
    const log = Utils.$("#combat-log"); if (!log) return;
    log.appendChild(Utils.createElement("div",{className:"combat-log-line combat-log-line--new",textContent:msg}));
    while (log.children.length>6) log.removeChild(log.firstChild);
    log.scrollTop = log.scrollHeight;
  },

  _actionPanel() {
    const p = Utils.createElement("div",{className:"combat-action-panel",id:"combat-actions"});
    p.innerHTML = '<div class="combat-action-wait">En attente...</div>';
    return p;
  },

  _showActions(unit) {
    this._refresh();
    const p = Utils.$("#combat-actions"); if (!p) return;
    p.innerHTML = `
      <div class="combat-action-header">${unit.name}</div>
      <div class="combat-action-buttons">
        <button class="combat-btn combat-btn--attack" data-a="attack">⚔️ Attaque</button>
        <button class="combat-btn combat-btn--skill" data-a="skill" ${unit.skills.length===0?"disabled":""}>✨ Compétences</button>
        <button class="combat-btn combat-btn--item" data-a="item">🧪 Objets</button>
        <button class="combat-btn combat-btn--defend" data-a="defend">🛡️ Défense</button>
        <button class="combat-btn combat-btn--flee" data-a="flee">🏃 Fuir</button>
      </div>`;
    p.querySelectorAll("[data-a]").forEach(b=>b.addEventListener("click",(e)=>{e.stopPropagation();Audio.playSFX("ui_click");Combat.playerAction(b.dataset.a);}));
  },

  _showTargets(targets, type) {
    this._refresh();
    const p = Utils.$("#combat-actions"); if (!p) return;
    let h = `<div class="combat-action-header">${type==="enemy"?"Cible ennemie":"Cible alliée"}</div><div class="combat-target-list">`;
    for (const t of targets) {
      const hp = Math.round((t.currentHp/t.maxHp)*100);
      h += `<button class="combat-target-btn" data-tid="${t.id}"><span class="combat-target-name">${t.name}</span><span class="combat-target-hp">${t.currentHp}/${t.maxHp} (${hp}%)</span></button>`;
    }
    h += `</div><button class="combat-btn combat-btn--cancel" data-a="cancel">← Retour</button>`;
    p.innerHTML = h;
    p.querySelectorAll("[data-tid]").forEach(b=>b.addEventListener("click",(e)=>{e.stopPropagation();Audio.playSFX("ui_click");const tgt=[...Combat.allies,...Combat.enemies].find(u=>u.id===b.dataset.tid);if(tgt)Combat.playerAction("select_target",{target:tgt});}));
    p.querySelector("[data-a='cancel']")?.addEventListener("click",(e)=>{e.stopPropagation();Combat.playerAction("cancel");});
    // Click on battlefield units
    this._overlay.querySelectorAll(".combatant").forEach(el=>{const id=el.dataset.unitId;if(targets.some(t=>t.id===id)){el.classList.add("combatant--targetable");el.addEventListener("click",()=>{const tgt=targets.find(t=>t.id===id);if(tgt){Audio.playSFX("ui_click");Combat.playerAction("select_target",{target:tgt});}});}});
  },

  _showSkills(skills, mp) {
    const p = Utils.$("#combat-actions"); if (!p) return;
    let h = `<div class="combat-action-header">Compétences (PM: ${mp})</div><div class="combat-skill-list">`;
    for (let i=0;i<skills.length;i++) {
      const sk=skills[i]; const ok=mp>=(sk.mp_cost||0);
      const elemI={Feu:"🔥",Eau:"💧",Terre:"🪨",Vent:"🌪️",Lumière:"☀️",Ténèbres:"🌑"}[sk.element]||"";
      const effectsDesc = (sk.effects||[]).map(e=>STATUS_EFFECTS[e.status_id]?.icon||"").join(" ");
      const healDesc = sk.heal_percent ? `+${sk.heal_percent}%PV ` : (sk.heal_value ? `+${sk.heal_value}PV ` : "");
      h += `<button class="combat-skill-btn ${ok?"":"combat-skill-btn--disabled"}" data-si="${i}" ${ok?"":"disabled"}>
        <span class="combat-skill-name">${elemI} ${sk.name}</span>
        <span class="combat-skill-meta">${sk.damage_multiplier?`×${sk.damage_multiplier}`:""} ${healDesc}${effectsDesc} ${sk.mp_cost||0}PM</span>
      </button>`;
    }
    if (!skills.length) h += '<div style="padding:12px;color:#5c5347;font-style:italic">Aucune compétence</div>';
    h += `</div><button class="combat-btn combat-btn--cancel" data-a="cancel">← Retour</button>`;
    p.innerHTML = h;
    p.querySelectorAll("[data-si]").forEach(b=>b.addEventListener("click",(e)=>{e.stopPropagation();Audio.playSFX("ui_click");Combat.playerAction("select_skill",{skill:skills[parseInt(b.dataset.si)]});}));
    p.querySelector("[data-a='cancel']")?.addEventListener("click",(e)=>{e.stopPropagation();Combat.playerAction("cancel");});
  },

  _showItems(items) {
    const p = Utils.$("#combat-actions"); if (!p) return;
    let h = `<div class="combat-action-header">Objets</div><div class="combat-item-list">`;
    for (const item of items) {
      const desc = (item.effects||[]).map(e=>e.type==="heal_hp"?`+${e.value}PV`:e.type==="heal_mp"?`+${e.value}PM`:e.type==="status"?`${STATUS_EFFECTS[e.status_id]?.icon||""}`:"").join(" ");
      h += `<button class="combat-item-btn" data-iid="${item.id}"><span class="combat-item-name">${item.name}</span><span class="combat-item-meta">×${item.currentQty} ${desc}</span></button>`;
    }
    if (!items.length) h += '<div style="padding:12px;color:#5c5347;font-style:italic">Aucun objet</div>';
    h += `</div><button class="combat-btn combat-btn--cancel" data-a="cancel">← Retour</button>`;
    p.innerHTML = h;
    p.querySelectorAll("[data-iid]").forEach(b=>b.addEventListener("click",(e)=>{e.stopPropagation();Audio.playSFX("ui_click");const item=items.find(i=>i.id===b.dataset.iid);if(item)Combat.playerAction("select_item",{item});}));
    p.querySelector("[data-a='cancel']")?.addEventListener("click",(e)=>{e.stopPropagation();Combat.playerAction("cancel");});
  },

  _highlight(unit) { this._refresh(); const p=Utils.$("#combat-actions"); if(p)p.innerHTML=`<div class="combat-action-wait">⏳ ${unit.name}...</div>`; },

  _showResult(type, data) {
    const p = Utils.$("#combat-actions"); if (!p) return; this._refresh();
    if (type==="victory") {
      const r = data.rewards;
      const loot = r.loot.map(l=>{const i=GameData.getItem(l.item_id);return `${i?.name||l.item_id} ×${l.quantity}`;}).join(", ")||"Rien";
      p.innerHTML = `<div class="combat-result combat-result--victory">
        <h2 class="combat-result-title">🎉 Victoire !</h2>
        <div class="combat-result-rewards">
          <div class="combat-reward-row"><span>XP:</span><strong style="color:var(--color-primary)">+${Utils.formatNumber(r.xp)}</strong></div>
          <div class="combat-reward-row"><span>Or:</span><strong style="color:#e4cc7a">+${Utils.formatNumber(r.gold)}</strong></div>
          <div class="combat-reward-row"><span>Butin:</span><span style="color:#5fa35e">${loot}</span></div>
        </div>
        <button class="combat-btn combat-btn--confirm" id="combat-end-btn">Continuer</button></div>`;
    } else {
      p.innerHTML = `<div class="combat-result combat-result--defeat">
        <h2 class="combat-result-title">💀 Défaite...</h2>
        <p style="color:var(--color-text-dim);margin:12px 0">Héros revient avec 1 PV.</p>
        <button class="combat-btn combat-btn--confirm" id="combat-end-btn">Continuer</button></div>`;
    }
    setTimeout(()=>{Utils.$("#combat-end-btn")?.addEventListener("click",(e)=>{e.stopPropagation();Audio.playSFX("ui_click");Combat.endCombat();});},0);
  }
};

// === js/ui/inventory-panel.js ===
/* ═══════════════════════════════════════════
   Inventory Panel UI
   Tabs, item detail, equip, enhance, merchant shop
   ═══════════════════════════════════════════ */

"use strict";

const InventoryPanel = {
  _visible: false,
  _activeTab: "ALL",
  _selectedEntry: null,
  _merchantMode: false,
  _merchantNpc: null,

  init() {
    this._createOverlay();
    EventBus.on("input:inventory", () => this.toggle());
    EventBus.on("npc:interact", (npc) => {
      if (npc.type === "merchant") this.openMerchant(npc);
    });
    EventBus.on("inventory:changed", () => { if (this._visible) this._renderContent(); });
    EventBus.on("equipment:changed", () => { if (this._visible) this._renderContent(); });
  },

  _createOverlay() {
    const overlay = Utils.createElement("div", { id: "inventory-overlay", className: "ui-layer hidden" });
    Object.assign(overlay.style, {
      background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)",
      zIndex: "500", pointerEvents: "auto"
    });
    overlay.addEventListener("click", (e) => { if (e.target === overlay) this.close(); });

    const panel = Utils.createElement("div", { id: "inventory-panel", className: "panel" });
    panel.style.width = "min(95vw, 750px)";
    panel.style.maxHeight = "90vh";
    overlay.appendChild(panel);
    Utils.$("#game-container").appendChild(overlay);
  },

  toggle() {
    this._visible ? this.close() : this.open();
  },

  open() {
    this._visible = true;
    this._merchantMode = false;
    this._merchantNpc = null;
    this._selectedEntry = null;
    this._activeTab = "ALL";
    this._renderContent();
    Utils.$("#inventory-overlay").classList.remove("hidden");
    Audio.playSFX("ui_open");
  },

  openMerchant(npc) {
    this._visible = true;
    this._merchantMode = true;
    this._merchantNpc = npc;
    this._selectedEntry = null;
    this._activeTab = "SHOP";
    this._renderContent();
    Utils.$("#inventory-overlay").classList.remove("hidden");
    Audio.playSFX("ui_open");
  },

  close() {
    this._visible = false;
    this._merchantMode = false;
    Utils.$("#inventory-overlay").classList.add("hidden");
    Audio.playSFX("ui_close");
  },

  // ══════════════════════════════════════
  // RENDER
  // ══════════════════════════════════════
  _renderContent() {
    const panel = Utils.$("#inventory-panel");
    if (!panel) return;
    Utils.clearElement(panel);

    // Header
    const header = Utils.createElement("div", { className: "panel-header" });
    const title = this._merchantMode ? `🏪 ${this._merchantNpc?.name || "Marchand"}` : "🎒 Inventaire";
    header.innerHTML = `
      <h2 class="panel-title">${title}</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:12px;color:var(--color-secondary);font-weight:700">💰 ${Utils.formatNumber(GameData.state.player.gold)}</span>
        <button class="panel-close" id="inv-close">✕</button>
      </div>
    `;
    panel.appendChild(header);

    // Tabs
    panel.appendChild(this._renderTabs());

    // Body
    const body = Utils.createElement("div", { className: "panel-body inv-body" });
    body.style.padding = "0";
    body.style.display = "flex";
    body.style.minHeight = "350px";

    // Left: item list
    const listPane = Utils.createElement("div", { className: "inv-list-pane" });
    this._renderItemList(listPane);
    body.appendChild(listPane);

    // Right: detail pane
    const detailPane = Utils.createElement("div", { className: "inv-detail-pane", id: "inv-detail" });
    if (this._selectedEntry) {
      this._renderItemDetail(detailPane);
    } else {
      detailPane.innerHTML = '<div class="inv-detail-empty">Sélectionnez un objet</div>';
    }
    body.appendChild(detailPane);

    panel.appendChild(body);

    // Bind close
    setTimeout(() => {
      Utils.$("#inv-close")?.addEventListener("click", (e) => { e.stopPropagation(); this.close(); });
    }, 0);
  },

  _renderTabs() {
    const tabsWrap = Utils.createElement("div", { className: "tabs", style: { padding: "0 16px" } });
    let tabDefs;

    if (this._merchantMode) {
      tabDefs = [
        { id: "SHOP", label: "Acheter" },
        { id: "ALL", label: "Mon Inventaire" }
      ];
    } else {
      tabDefs = [
        { id: "ALL", label: "Tout" },
        { id: "WEAPONS", label: "Armes" },
        { id: "ARMOR", label: "Armures" },
        { id: "ACCESSORIES", label: "Access." },
        { id: "CONSUMABLES", label: "Conso." },
        { id: "MATERIALS", label: "Matériaux" },
        { id: "EXP_ITEMS", label: "XP" }
      ];
    }

    for (const t of tabDefs) {
      const btn = Utils.createElement("button", {
        className: `tab ${t.id === this._activeTab ? "active" : ""}`,
        textContent: t.label
      });
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        this._activeTab = t.id;
        this._selectedEntry = null;
        this._renderContent();
      });
      tabsWrap.appendChild(btn);
    }

    return tabsWrap;
  },

  // ── Item List ──
  _renderItemList(container) {
    let items;

    if (this._activeTab === "SHOP") {
      items = this._getShopItems();
    } else {
      items = Inventory.getFullInventory();
      if (this._activeTab !== "ALL") {
        items = items.filter(i => i.template.category === this._activeTab);
      }
    }

    if (items.length === 0) {
      container.innerHTML = '<div style="padding:20px;color:#5a6a8a;font-style:italic;text-align:center">Vide</div>';
      return;
    }

    for (const entry of items) {
      const t = entry.template || entry;
      const rarity = t.rarity || "N";
      const rarityData = RARITY_DATA[rarity];
      const isSelected = this._selectedEntry &&
        ((entry.uid && entry.uid === this._selectedEntry.uid) ||
         (!entry.uid && entry.itemId === this._selectedEntry.itemId));

      const el = Utils.createElement("div", {
        className: `inv-item ${isSelected ? "inv-item--selected" : ""}`
      });

      const catIcons = {
        WEAPONS: "⚔️", ARMOR: "🛡️", ACCESSORIES: "💍", CONSUMABLES: "🧪",
        MATERIALS: "🪨", EXP_ITEMS: "💎", AWAKENING: "⭐", QUEST_ITEMS: "📜",
        KEY_ITEMS: "🔑", TREASURES: "💰", CRAFTING: "📋"
      };

      const enhStr = (entry.enhancement_level > 0) ? ` +${entry.enhancement_level}` : "";
      const equippedStr = entry.equipped_by ? " [E]" : "";
      const qtyStr = entry.quantity > 1 ? ` ×${entry.quantity}` : "";
      const priceStr = this._activeTab === "SHOP" ? `💰 ${Utils.formatNumber(Inventory.getBuyPrice(t.id))}` : "";

      el.innerHTML = `
        <div class="inv-item-icon" style="background:${rarityData.color}15;border-color:${rarityData.color}">
          ${catIcons[t.category] || "📦"}
        </div>
        <div class="inv-item-info">
          <div class="inv-item-name">
            <span class="rarity-text-${rarity}">${t.name}${enhStr}</span>
            <span class="inv-item-qty">${qtyStr}${equippedStr}</span>
          </div>
          <div class="inv-item-meta">
            <span class="rarity-badge rarity-badge-${rarity}" style="font-size:9px">${rarity}</span>
            ${priceStr ? `<span class="inv-item-price">${priceStr}</span>` : ""}
          </div>
        </div>
      `;

      el.addEventListener("click", (e) => {
        e.stopPropagation();
        this._selectedEntry = entry;
        this._renderContent();
      });

      container.appendChild(el);
    }
  },

  _getShopItems() {
    if (!this._merchantNpc?.shop_inventory) return [];
    return this._merchantNpc.shop_inventory
      .map(id => GameData.getItem(id))
      .filter(Boolean)
      .map(t => ({ itemId: t.id, quantity: 99, template: t, _isShop: true }));
  },

  // ── Item Detail ──
  _renderItemDetail(container) {
    const entry = this._selectedEntry;
    if (!entry) return;

    const t = entry.template || GameData.getItem(entry.itemId);
    if (!t) { container.innerHTML = "Objet inconnu"; return; }

    const rarity = t.rarity || "N";
    const rarityData = RARITY_DATA[rarity];
    const isEquipment = ["WEAPONS", "ARMOR", "ACCESSORIES"].includes(t.category);
    const enhLevel = entry.enhancement_level || 0;
    const enhMax = isEquipment ? Inventory._getEnhanceMax(t) : 0;
    const stats = isEquipment ? Inventory.getEnhancedStats(entry) : (t.stats || {});

    let html = `
      <div class="inv-detail-header rarity-border-${rarity}" style="padding:12px;border-radius:8px;margin-bottom:12px">
        <h3 class="rarity-text-${rarity}" style="font-size:16px;font-family:var(--font-display);font-weight:800">
          ${t.name}${enhLevel > 0 ? ` +${enhLevel}` : ""}
        </h3>
        <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
          <span class="rarity-badge rarity-badge-${rarity}">${rarity} — ${rarityData.name}</span>
          <span style="font-size:11px;color:var(--color-text-dim)">${ITEM_CATEGORIES[t.category] || t.category}</span>
        </div>
        <p style="font-size:12px;color:var(--color-text-muted);margin-top:8px">${t.description || ""}</p>
      </div>
    `;

    // Stats
    if (Object.keys(stats).length > 0) {
      html += `<div class="inv-detail-section"><h4 class="inv-detail-section-title">Statistiques</h4><div class="inv-detail-stats">`;
      for (const [key, val] of Object.entries(stats)) {
        if (val === 0) continue;
        const label = STAT_LABELS[key] || key;
        const baseVal = t.stats?.[key] || 0;
        const bonus = val - baseVal;
        html += `<div class="inv-detail-stat"><span>${label}</span><strong>${val}${bonus > 0 ? ` <span style="color:#4CAF50">(+${bonus})</span>` : ""}</strong></div>`;
      }
      html += `</div></div>`;
    }

    // Effects
    if (t.effects && t.effects.length > 0) {
      html += `<div class="inv-detail-section"><h4 class="inv-detail-section-title">Effets</h4>`;
      for (const eff of t.effects) {
        const desc = eff.type === "heal_hp" ? `Restaure ${eff.value} PV` :
                     eff.type === "grant_xp" ? `Octroie ${Utils.formatNumber(eff.value)} XP` :
                     eff.type;
        html += `<div style="font-size:12px;color:var(--color-text-dim);padding:2px 0">• ${desc}</div>`;
      }
      html += `</div>`;
    }

    // Enhancement info
    if (isEquipment && !entry._isShop) {
      const goldCost = Inventory._getEnhanceGoldCost(enhLevel);
      const successRate = Math.max(30, 100 - (enhLevel * 2));
      html += `
        <div class="inv-detail-section">
          <h4 class="inv-detail-section-title">Amélioration +${enhLevel}/${enhMax}</h4>
          <div class="inv-detail-enhance-bar"><div class="inv-detail-enhance-fill" style="width:${(enhLevel / enhMax) * 100}%"></div></div>
          <div style="font-size:11px;color:var(--color-text-muted);margin-top:4px">
            Coût: ${Utils.formatNumber(goldCost)} or • Taux: ${successRate}%
            ${enhLevel > 15 ? ` • Destruction: ${Math.max(0, (enhLevel - 15) * 2)}%` : ""}
          </div>
          ${enhLevel < enhMax ? `<button class="btn btn-primary btn-sm" id="inv-btn-enhance" style="margin-top:8px">⬆️ Améliorer (${Utils.formatNumber(goldCost)} or)</button>` : '<span style="font-size:11px;color:#FFD700;font-weight:600">MAX</span>'}
        </div>
      `;
    }

    // Price info
    if (!entry._isShop) {
      const sellPrice = Inventory.getSellPrice(entry);
      html += `<div style="font-size:11px;color:var(--color-text-muted);margin-top:12px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)">
        Valeur de vente: ${Utils.formatNumber(sellPrice)} or ${entry.equipped_by ? "(équipé)" : ""}
      </div>`;
    }

    // Action buttons
    html += `<div class="btn-row" style="margin-top:12px">`;

    if (entry._isShop) {
      // Shop mode: buy
      const buyPrice = Inventory.getBuyPrice(t.id);
      html += `<button class="btn btn-success btn-sm" id="inv-btn-buy">Acheter (${Utils.formatNumber(buyPrice)} or)</button>`;
      if (t.stackable) html += `<button class="btn btn-success btn-sm" id="inv-btn-buy5">×5</button>`;
    } else {
      // Inventory mode
      if (isEquipment && !entry.equipped_by) {
        html += `<button class="btn btn-primary btn-sm" id="inv-btn-equip">Équiper</button>`;
      }
      if (entry.equipped_by) {
        html += `<button class="btn btn-secondary btn-sm" id="inv-btn-unequip">Déséquiper</button>`;
      }
      if (t.can_sell && !entry.equipped_by) {
        html += `<button class="btn btn-secondary btn-sm" id="inv-btn-sell">Vendre</button>`;
        if (entry.quantity > 1) html += `<button class="btn btn-secondary btn-sm" id="inv-btn-sell-all">Tout Vendre</button>`;
      }
      if (t.can_drop && !entry.equipped_by) {
        html += `<button class="btn btn-danger btn-sm" id="inv-btn-drop">Jeter</button>`;
      }
    }

    html += `</div>`;
    container.innerHTML = html;

    // Bind actions
    setTimeout(() => this._bindDetailActions(entry, t), 0);
  },

  _bindDetailActions(entry, template) {
    const on = (id, fn) => {
      const el = Utils.$("#" + id);
      if (el) el.addEventListener("click", (e) => { e.stopPropagation(); fn(); });
    };

    on("inv-btn-buy", () => {
      Inventory.buyItem(template.id, 1);
      this._renderContent();
    });

    on("inv-btn-buy5", () => {
      Inventory.buyItem(template.id, 5);
      this._renderContent();
    });

    on("inv-btn-sell", () => {
      Inventory.sellItem(entry, 1);
      this._selectedEntry = null;
      this._renderContent();
    });

    on("inv-btn-sell-all", () => {
      Inventory.sellItem(entry, entry.quantity);
      this._selectedEntry = null;
      this._renderContent();
    });

    on("inv-btn-drop", () => {
      if (confirm(`Jeter ${template.name} ?`)) {
        Inventory.dropItem(entry, 1);
        this._selectedEntry = null;
        this._renderContent();
      }
    });

    on("inv-btn-enhance", () => {
      Inventory.enhanceItem(entry);
      this._renderContent();
    });

    on("inv-btn-equip", () => {
      this._showEquipSelect(entry);
    });

    on("inv-btn-unequip", () => {
      if (entry.equipped_by && entry.equipped_slot) {
        Inventory.unequipItem(entry.equipped_by, entry.equipped_slot);
        this._renderContent();
      }
    });
  },

  // ── Equip target selector ──
  _showEquipSelect(invEntry) {
    const detail = Utils.$("#inv-detail");
    if (!detail) return;

    const template = GameData.getItem(invEntry.itemId);
    if (!template) return;

    const slot = template.category === "WEAPONS" ? "weapon" :
                 template.category === "ARMOR" ? "armor" : null;

    // Get party members to equip to
    const companions = CompanionSystem.getAllUnlockedCompanions().filter(c => c.inParty);

    let html = `<div style="padding:12px"><h4 class="inv-detail-section-title">Équiper ${template.name} sur :</h4>`;

    if (companions.length === 0) {
      html += '<p style="color:#5a6a8a;font-size:12px">Aucun compagnon dans l\'équipe</p>';
    }

    for (const { template: ct, instance } of companions) {
      const equipped = instance.equipment[slot || "accessory_1"];
      const equippedName = equipped ? (GameData.getItem(equipped)?.name || equipped) : "—";

      html += `
        <button class="inv-equip-target" data-comp-id="${ct.id}" data-slot="${slot || 'accessory_1'}">
          <span class="rarity-text-${instance.effectiveRarity}" style="font-weight:600">${ct.name}</span>
          <span style="font-size:11px;color:var(--color-text-muted)">Actuel: ${equippedName}</span>
        </button>
      `;
    }

    html += `<button class="btn btn-secondary btn-sm" id="inv-equip-cancel" style="margin-top:8px">← Retour</button></div>`;

    detail.innerHTML = html;

    setTimeout(() => {
      detail.querySelectorAll("[data-comp-id]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          Inventory.equipItem(invEntry, btn.dataset.compId, btn.dataset.slot);
          this._renderContent();
        });
      });

      Utils.$("#inv-equip-cancel")?.addEventListener("click", (e) => {
        e.stopPropagation();
        this._renderContent();
      });
    }, 0);
  }
};

// === js/ui/quest-panel.js ===
/* ═══════════════════════════════════════════
   Quest Panel UI
   Quest journal with tabs, objectives, rewards
   ═══════════════════════════════════════════ */

"use strict";

const QuestPanel = {
  _visible: false,
  _activeTab: "active",
  _selectedQuestId: null,

  init() {
    this._createOverlay();
    EventBus.on("input:quests", () => this.toggle());
    EventBus.on("quest:started", () => { if (this._visible) this._renderContent(); });
    EventBus.on("quest:completed", () => { if (this._visible) this._renderContent(); });
  },

  _createOverlay() {
    const overlay = Utils.createElement("div", { id: "quest-overlay", className: "ui-layer hidden" });
    Object.assign(overlay.style, {
      background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)",
      zIndex: "500", pointerEvents: "auto"
    });
    overlay.addEventListener("click", (e) => { if (e.target === overlay) this.close(); });

    const panel = Utils.createElement("div", { id: "quest-panel", className: "panel" });
    panel.style.width = "min(95vw, 650px)";
    panel.style.maxHeight = "85vh";
    overlay.appendChild(panel);
    Utils.$("#game-container").appendChild(overlay);
  },

  toggle() { this._visible ? this.close() : this.open(); },

  open() {
    this._visible = true;
    this._selectedQuestId = null;
    this._renderContent();
    Utils.$("#quest-overlay").classList.remove("hidden");
    Audio.playSFX("ui_open");
  },

  close() {
    this._visible = false;
    Utils.$("#quest-overlay").classList.add("hidden");
    Audio.playSFX("ui_close");
  },

  // ══════════════════════════════════════
  // RENDER
  // ══════════════════════════════════════
  _renderContent() {
    const panel = Utils.$("#quest-panel");
    if (!panel) return;
    Utils.clearElement(panel);

    // Header
    const header = Utils.createElement("div", { className: "panel-header" });
    header.innerHTML = `
      <h2 class="panel-title">📜 Journal de Quêtes</h2>
      <button class="panel-close" id="quest-close">✕</button>
    `;
    panel.appendChild(header);

    // Tabs
    const allQuests = QuestSystem.getAllQuests();
    const tabs = Utils.createElement("div", { className: "tabs", style: { padding: "0 16px" } });

    const tabDefs = [
      { id: "active", label: `En cours (${allQuests.active.length})` },
      { id: "available", label: `Disponibles (${allQuests.available.length})` },
      { id: "completed", label: `Terminées (${allQuests.completed.length})` }
    ];

    for (const t of tabDefs) {
      const btn = Utils.createElement("button", {
        className: `tab ${t.id === this._activeTab ? "active" : ""}`,
        textContent: t.label
      });
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        this._activeTab = t.id;
        this._selectedQuestId = null;
        this._renderContent();
      });
      tabs.appendChild(btn);
    }
    panel.appendChild(tabs);

    // Body
    const body = Utils.createElement("div", { className: "panel-body", style: { display: "flex", padding: "0", minHeight: "300px" } });

    // Left: quest list
    const listPane = Utils.createElement("div", { style: { width: "240px", borderRight: "1px solid var(--panel-border)", overflowY: "auto" } });
    this._renderQuestList(listPane, allQuests);
    body.appendChild(listPane);

    // Right: quest detail
    const detailPane = Utils.createElement("div", { id: "quest-detail", style: { flex: "1", overflowY: "auto", padding: "16px" } });
    if (this._selectedQuestId) {
      this._renderQuestDetail(detailPane);
    } else {
      detailPane.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#5a6a8a;font-style:italic">Sélectionnez une quête</div>';
    }
    body.appendChild(detailPane);

    panel.appendChild(body);

    // Bind close
    setTimeout(() => {
      Utils.$("#quest-close")?.addEventListener("click", (e) => { e.stopPropagation(); this.close(); });
    }, 0);
  },

  _renderQuestList(container, allQuests) {
    const quests = allQuests[this._activeTab] || [];

    if (quests.length === 0) {
      container.innerHTML = '<div style="padding:20px;color:#5a6a8a;font-style:italic;text-align:center">Aucune quête</div>';
      return;
    }

    for (const q of quests) {
      const t = q.template;
      const isSelected = t.id === this._selectedQuestId;
      const typeColors = { MAIN: "#FFD700", SECONDARY: "#64B5F6", COMPANION: "#CE93D8", REPEATABLE: "#81C784" };
      const typeIcons = { MAIN: "⭐", SECONDARY: "📋", COMPANION: "🛡️", REPEATABLE: "🔄" };

      const el = Utils.createElement("div", {
        className: `inv-item ${isSelected ? "inv-item--selected" : ""}`,
        style: { cursor: "pointer" }
      });

      el.innerHTML = `
        <div style="font-size:18px">${typeIcons[t.type] || "📜"}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.title}</div>
          <div style="font-size:10px;color:${typeColors[t.type] || '#5a6a8a'}">${t.type || "MAIN"}</div>
        </div>
      `;

      el.addEventListener("click", (e) => {
        e.stopPropagation();
        this._selectedQuestId = t.id;
        this._renderContent();
      });

      container.appendChild(el);
    }
  },

  _renderQuestDetail(container) {
    const template = GameData.getQuest(this._selectedQuestId);
    if (!template) { container.innerHTML = "Quête introuvable"; return; }

    const isActive = QuestSystem.isActive(this._selectedQuestId);
    const isCompleted = QuestSystem.isCompleted(this._selectedQuestId);
    const activeData = isActive ? QuestSystem.getActiveQuest(this._selectedQuestId) : null;

    const typeColors = { MAIN: "#FFD700", SECONDARY: "#64B5F6", COMPANION: "#CE93D8", REPEATABLE: "#81C784" };

    let html = `
      <div style="margin-bottom:16px">
        <h3 style="font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--color-text)">${template.title}</h3>
        <span style="font-size:11px;color:${typeColors[template.type] || '#5a6a8a'};font-weight:600">${template.type || "MAIN"}</span>
        ${isCompleted ? '<span style="font-size:11px;color:#4CAF50;font-weight:600;margin-left:8px">✅ Terminée</span>' : ""}
        <p style="font-size:12px;color:var(--color-text-dim);margin-top:8px">${template.description || ""}</p>
      </div>
    `;

    // Dialogue
    if (template.dialogue) {
      const dialogueText = isCompleted ? template.dialogue.complete :
                           isActive ? template.dialogue.progress :
                           template.dialogue.start;
      if (dialogueText) {
        html += `<div style="padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;border-left:3px solid var(--color-primary);margin-bottom:16px;font-size:12px;color:var(--color-text-dim);font-style:italic">"${dialogueText}"</div>`;
      }
    }

    // Objectives
    html += `<div style="margin-bottom:16px"><h4 style="font-size:12px;font-weight:700;color:var(--color-primary-light);margin-bottom:8px;border-bottom:1px solid rgba(33,150,243,0.12);padding-bottom:4px">Objectifs</h4>`;

    for (let i = 0; i < template.objectives.length; i++) {
      const info = QuestSystem.getObjectiveText(template, activeData, i);
      const checkmark = info.done ? "✅" : (isCompleted ? "✅" : "⬜");

      html += `
        <div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px">
          <span>${checkmark}</span>
          <span style="color:${info.done || isCompleted ? '#4CAF50' : 'var(--color-text-dim)'}">${info.label}</span>
          ${info.target > 1 ? `<span style="color:var(--color-text-muted);font-size:11px">(${isActive ? info.progress : (isCompleted ? info.target : 0)}/${info.target})</span>` : ""}
        </div>
      `;
    }
    html += `</div>`;

    // Rewards
    const rewards = template.rewards || {};
    html += `<div style="margin-bottom:16px"><h4 style="font-size:12px;font-weight:700;color:var(--color-secondary-light);margin-bottom:8px;border-bottom:1px solid rgba(255,152,0,0.12);padding-bottom:4px">Récompenses</h4>`;

    if (rewards.xp) html += `<div style="font-size:12px;padding:2px 0;color:var(--color-text-dim)">⭐ ${Utils.formatNumber(rewards.xp)} XP</div>`;
    if (rewards.gold) html += `<div style="font-size:12px;padding:2px 0;color:var(--color-text-dim)">💰 ${Utils.formatNumber(rewards.gold)} or</div>`;
    if (rewards.items) {
      for (const item of rewards.items) {
        const t = GameData.getItem(item.item_id || item.itemId);
        html += `<div style="font-size:12px;padding:2px 0;color:var(--color-text-dim)">📦 ${t?.name || item.item_id} ×${item.quantity || 1}</div>`;
      }
    }
    if (rewards.unlocks) {
      for (const u of rewards.unlocks) {
        html += `<div style="font-size:12px;padding:2px 0;color:var(--color-text-dim)">🔓 ${u}</div>`;
      }
    }
    html += `</div>`;

    // Actions
    html += `<div class="btn-row" style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)">`;
    if (!isActive && !isCompleted) {
      html += `<button class="btn btn-success btn-sm" id="quest-btn-start">Accepter la Quête</button>`;
    }
    if (isActive) {
      html += `<button class="btn btn-danger btn-sm" id="quest-btn-abandon">Abandonner</button>`;
    }
    html += `</div>`;

    container.innerHTML = html;

    // Bind
    setTimeout(() => {
      Utils.$("#quest-btn-start")?.addEventListener("click", (e) => {
        e.stopPropagation();
        QuestSystem.startQuest(this._selectedQuestId);
        this._renderContent();
      });
      Utils.$("#quest-btn-abandon")?.addEventListener("click", (e) => {
        e.stopPropagation();
        if (confirm("Abandonner cette quête ?")) {
          QuestSystem.abandonQuest(this._selectedQuestId);
          this._renderContent();
        }
      });
    }, 0);
  }
};

// === js/ui/dialogue.js ===
/* ═══════════════════════════════════════════
   Dialogue System — for Instances & NPC Interactions
   Supports background images, options with effects
   ═══════════════════════════════════════════ */
"use strict";

const DialogueUI = {
  _overlay: null,

  init() {
    this._overlay = Utils.createElement("div",{id:"dialogue-overlay",className:"ui-layer hidden"});
    Object.assign(this._overlay.style,{zIndex:"550",pointerEvents:"auto",background:"rgba(5,4,10,0.8)",backdropFilter:"blur(8px)"});
    Utils.$("#game-container").appendChild(this._overlay);
    EventBus.on("dialogue:open",(d)=>this.open(d));
  },

  open(data) {
    Utils.clearElement(this._overlay);
    this._overlay.classList.remove("hidden");

    const container = Utils.createElement("div",{style:{position:"absolute",inset:"0",display:"flex",flexDirection:"column",justifyContent:"flex-end"}});

    // Background image (if provided)
    if (data.background) {
      const bgDiv = Utils.createElement("div",{style:{position:"absolute",inset:"0",backgroundImage:`url(${data.background})`,backgroundSize:"cover",backgroundPosition:"center",opacity:"0.4"}});
      container.appendChild(bgDiv);
    }

    // Dialogue box
    const box = Utils.createElement("div",{style:{
      position:"relative",zIndex:"2",
      margin:"16px",padding:"24px",
      background:"linear-gradient(180deg,rgba(14,12,20,0.95),rgba(8,7,12,0.98))",
      border:"1px solid rgba(201,168,76,0.2)",
      borderRadius:"10px",
      maxHeight:"50vh",overflowY:"auto",
      boxShadow:"0 -8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.08)"
    }});

    // NPC name
    if (data.npc_name) {
      const nameEl = Utils.createElement("div",{style:{
        fontFamily:"var(--font-display)",fontSize:"16px",fontWeight:"700",
        color:"var(--color-primary)",letterSpacing:"1px",marginBottom:"12px"
      }});
      nameEl.textContent = data.npc_name;
      box.appendChild(nameEl);
    }

    // Dialogue text
    const textEl = Utils.createElement("div",{style:{
      fontSize:"14px",lineHeight:"1.7",color:"var(--color-text)",marginBottom:"20px"
    }});
    textEl.textContent = data.dialogue || "";
    box.appendChild(textEl);

    // Options
    if (data.options && data.options.length > 0) {
      const optContainer = Utils.createElement("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
      for (const opt of data.options) {
        const btn = Utils.createElement("button",{style:{
          padding:"10px 16px",textAlign:"left",
          background:"rgba(201,168,76,0.05)",
          border:"1px solid rgba(201,168,76,0.15)",
          borderRadius:"6px",
          fontFamily:"var(--font-display)",fontSize:"13px",fontWeight:"600",
          color:"var(--color-text-dim)",letterSpacing:"0.5px",
          cursor:"pointer",transition:"all 0.15s ease"
        }});
        btn.textContent = opt.label;
        btn.addEventListener("mouseenter",()=>{btn.style.background="rgba(201,168,76,0.12)";btn.style.color="var(--color-primary-light)";btn.style.borderColor="var(--color-primary-dark)";});
        btn.addEventListener("mouseleave",()=>{btn.style.background="rgba(201,168,76,0.05)";btn.style.color="var(--color-text-dim)";btn.style.borderColor="rgba(201,168,76,0.15)";});

        btn.addEventListener("click",(e)=>{
          e.stopPropagation();
          Audio.playSFX("ui_click");
          this._executeOption(opt);
        });
        optContainer.appendChild(btn);
      }
      box.appendChild(optContainer);
    }

    // Close button (if no options or as fallback)
    if (!data.options || data.options.length === 0) {
      const closeBtn = Utils.createElement("button",{style:{
        padding:"10px 24px",background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.2)",
        borderRadius:"6px",fontFamily:"var(--font-display)",fontSize:"13px",fontWeight:"600",
        color:"var(--color-primary)",cursor:"pointer",marginTop:"8px"
      }});
      closeBtn.textContent = "Fermer";
      closeBtn.addEventListener("click",(e)=>{e.stopPropagation();this.close();});
      box.appendChild(closeBtn);
    }

    // Shop button if merchant
    if (data.shop_inventory) {
      const shopBtn = Utils.createElement("button",{style:{
        padding:"10px 24px",background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.3)",
        borderRadius:"6px",fontFamily:"var(--font-display)",fontSize:"13px",fontWeight:"700",
        color:"var(--color-primary)",cursor:"pointer",marginTop:"12px",display:"block",width:"100%"
      }});
      shopBtn.textContent = "💰 Ouvrir la Boutique";
      shopBtn.addEventListener("click",(e)=>{
        e.stopPropagation(); this.close();
        InventoryPanel.openMerchant({name:data.npc_name,shop_inventory:data.shop_inventory});
      });
      box.appendChild(shopBtn);
    }

    container.appendChild(box);
    this._overlay.appendChild(container);
  },

  _executeOption(opt) {
    switch (opt.action) {
      case "close":
        this.close();
        break;
      case "toast":
        EventBus.emit("ui:toast",{message:opt.message||"",type:"info",duration:4000});
        // Apply effect if any
        if (opt.effect) {
          if (opt.effect.type==="heal") {
            GameData.state.player.stats.hp = Math.min(GameData.state.player.stats.maxHp, GameData.state.player.stats.hp + opt.effect.value);
            HUD.refresh();
          }
          if (opt.effect.type==="item") {
            Inventory.addItem(opt.effect.item_id, opt.effect.quantity||1);
          }
        }
        this.close();
        break;
      case "shop":
        this.close();
        if (opt.shop_inventory) InventoryPanel.openMerchant({name:"Marchand",shop_inventory:opt.shop_inventory});
        break;
      case "combat":
        this.close();
        if (opt.enemies) EventBus.emit("combat:start",{enemies:opt.enemies,context:opt.context||{}});
        break;
      default:
        this.close();
    }
  },

  close() {
    this._overlay.classList.add("hidden");
    Utils.clearElement(this._overlay);
  }
};

// === js/ui/devmode.js ===
/* ═══════════════════════════════════════════
   Dev Mode — v0.2 with Map Gen, Synergy Config, Leader, Multi-Categories
   ═══════════════════════════════════════════ */
"use strict";

const DevMode = {
  _active:false, _currentTab:"companions", _selectedId:null, _dirty:false,

  init(){EventBus.on("input:devmode",()=>this.toggle());},
  toggle(){this._active=!this._active;const o=Utils.$("#devmode-overlay");if(this._active){this._render();o.classList.remove("hidden");}else{o.classList.add("hidden");if(this._dirty){SaveManager.saveDevData();this._dirty=false;}}},
  close(){this._active=false;Utils.$("#devmode-overlay").classList.add("hidden");if(this._dirty){SaveManager.saveDevData();this._dirty=false;}},

  _render(){
    const o=Utils.$("#devmode-overlay");o.innerHTML="";
    const c=Utils.createElement("div",{className:"dev-container"});
    // Header
    const h=Utils.createElement("div",{className:"dev-header"});
    h.innerHTML=`<div class="dev-title">⚙️ DEV</div><div class="dev-actions"><button class="btn btn-secondary btn-sm" id="dev-export">📤</button><button class="btn btn-secondary btn-sm" id="dev-import">📥</button><button class="btn btn-danger btn-sm" id="dev-close">✕</button></div>`;
    c.appendChild(h);
    // Tabs
    const tabs=Utils.createElement("div",{className:"dev-tabs"});
    for(const t of [{id:"companions",l:"🛡️ Compagnons"},{id:"enemies",l:"👹 Ennemis"},{id:"items",l:"🎒 Items"},{id:"maps",l:"🗺️ Maps"},{id:"synergies",l:"⚡ Synergies"},{id:"settings",l:"⚙️ Réglages"}]){
      const btn=Utils.createElement("button",{className:`dev-tab ${t.id===this._currentTab?"active":""}`,textContent:t.l});
      btn.addEventListener("click",(e)=>{e.stopPropagation();this._currentTab=t.id;this._selectedId=null;this._render();});
      tabs.appendChild(btn);
    }
    c.appendChild(tabs);
    // Body
    const body=Utils.createElement("div",{className:"dev-body"});
    if(!["settings","maps","synergies"].includes(this._currentTab)){body.appendChild(this._sidebar());}
    body.appendChild(this._editor());
    c.appendChild(body);
    // Footer
    const ft=Utils.createElement("div",{className:"dev-footer"});
    ft.innerHTML=`<span class="dev-footer-info">${this._dirty?"⚠️":"✓"}</span><span class="dev-footer-info">v${GAME_VERSION}</span>`;
    c.appendChild(ft);
    o.appendChild(c);
    setTimeout(()=>{
      Utils.$("#dev-close")?.addEventListener("click",(e)=>{e.stopPropagation();this.close();});
      Utils.$("#dev-export")?.addEventListener("click",(e)=>{e.stopPropagation();SaveManager.exportDevData();});
      Utils.$("#dev-import")?.addEventListener("click",(e)=>{e.stopPropagation();const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=(ev)=>{if(ev.target.files[0])SaveManager.importDevData(ev.target.files[0]).then(()=>this._render());};inp.click();});
    },0);
  },

  _sidebar(){
    const sb=Utils.createElement("div",{className:"dev-sidebar"});
    sb.innerHTML=`<div class="dev-sidebar-header"><input type="text" class="form-input" placeholder="Rechercher..." id="dev-search"><button class="btn btn-success btn-sm" id="dev-add-new">+</button></div>`;
    const list=Utils.createElement("div",{className:"dev-list",id:"dev-list"});
    for(const item of this._getList()){
      const rc=RARITY_DATA[item.rarity]?.color||"#7a7570";
      const el=Utils.createElement("div",{className:`dev-list-item ${item.id===this._selectedId?"selected":""}`,dataset:{id:item.id}});
      el.innerHTML=`<div class="dev-list-item-icon" style="background:${rc}15;color:${rc}">${this._icon()}</div><div class="dev-list-item-info"><div class="name">${item.name}</div><div class="meta">${item.rarity||"N"} • ${(item.categories||[item.category]).join(", ")}</div></div>`;
      el.addEventListener("click",(e)=>{e.stopPropagation();this._selectedId=item.id;this._render();});
      list.appendChild(el);
    }
    if(!this._getList().length) list.innerHTML='<div style="padding:16px;color:#5c5347;text-align:center;font-style:italic">Vide</div>';
    sb.appendChild(list);
    setTimeout(()=>{
      Utils.$("#dev-add-new")?.addEventListener("click",(e)=>{e.stopPropagation();this._createNew();});
      Utils.$("#dev-search")?.addEventListener("input",(e)=>{const t=e.target.value.toLowerCase();Utils.$$("#dev-list .dev-list-item").forEach(el=>{el.style.display=el.querySelector(".name")?.textContent.toLowerCase().includes(t)?"":"none";});});
    },0);
    return sb;
  },

  _getList(){
    switch(this._currentTab){case"companions":return GameData.getAllCompanions();case"enemies":return GameData.getAllEnemies();case"items":return GameData.getAllItems();default:return[];}
  },
  _icon(){return{companions:"🛡️",enemies:"👹",items:"📦"}[this._currentTab]||"•";},

  _editor(){
    const ed=Utils.createElement("div",{className:"dev-editor",id:"dev-editor"});
    switch(this._currentTab){
      case"companions": if(!this._selectedId){ed.innerHTML='<div class="dev-editor-empty">Sélectionnez</div>';}else{ed.appendChild(this._compEditor());} break;
      case"enemies": if(!this._selectedId){ed.innerHTML='<div class="dev-editor-empty">Sélectionnez</div>';}else{ed.appendChild(this._enemyEditor());} break;
      case"items": if(!this._selectedId){ed.innerHTML='<div class="dev-editor-empty">Sélectionnez</div>';}else{ed.appendChild(this._itemEditor());} break;
      case"maps": ed.appendChild(this._mapEditor()); break;
      case"synergies": ed.appendChild(this._synergyEditor()); break;
      case"settings": ed.appendChild(this._settingsEditor()); break;
    }
    return ed;
  },

  // ═══════════════════════════════════════
  // COMPANION — multi-categories, leader skill, images
  // ═══════════════════════════════════════
  _compEditor(){
    const c=GameData.getCompanion(this._selectedId); if(!c) return Utils.createElement("div",{textContent:"?"});
    const allCats=GameData.db.categories||DEFAULT_CATEGORIES;
    const companionCats=c.categories||[c.category];
    const frag=document.createDocumentFragment();

    frag.appendChild(this._sec("Identité",`
      <div class="form-row"><div class="form-group"><label>Nom</label><input class="form-input" value="${c.name}" data-field="name"></div>
      <div class="form-group"><label>Rareté</label><select class="form-select" data-field="rarity">${RARITY_KEYS.map(r=>`<option value="${r}" ${r===c.rarity?"selected":""}>${r}</option>`).join("")}</select></div></div>
      <div class="form-group"><label>Catégories (multi)</label><div id="dev-cat-checkboxes" style="display:flex;flex-wrap:wrap;gap:6px">
