function _wlcCardCtx(nodeId, x, y){
  if(!_isAdmin()) return;
  document.getElementById('wlc-img-ctx')?.remove();
  const n = db[nodeId]; if(!n) return;
  const hasImg = !!(n.iconData || (n.icon && n.icon.startsWith('<img')));
  const s = n._wlcCard || {};
  const isCover   = s.cover && hasImg;
  const zoom      = s.zoom  !== undefined ? s.zoom  : 100;
  const posX      = s.posX  !== undefined ? s.posX  : 50;
  const posY      = s.posY  !== undefined ? s.posY  : 50;
  const txtColor  = s.txtColor  || '#d8c8c0';
  const txtWeight = s.txtWeight || '400';
  const txtSize   = s.txtSize   || 10;
  const txtShadow = s.txtShadow || 'none';

  const SHADOW_OPTIONS = [
    {val:'none',                                              label:'Aucune'},
    {val:'0 1px 4px rgba(0,0,0,.9)',                         label:'Ombre douce'},
    {val:'0 0 6px rgba(0,0,0,1),0 2px 8px rgba(0,0,0,1)',   label:'Ombre forte'},
    {val:'0 0 8px rgba(255,255,255,.8)',                      label:'Lueur blanche'},
    {val:'0 0 8px rgba(160,100,255,.9)',                      label:'Lueur violette'},
    {val:'0 0 8px rgba(255,80,30,.9)',                        label:'Lueur rouge'},
    {val:'1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000', label:'Contour noir'},
    {val:'1px 1px 0 #fff,-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff', label:'Contour blanc'},
  ];
  const shadowOpts = SHADOW_OPTIONS.map(o=>
    `<option value="${o.val}"${txtShadow===o.val?' selected':''}>${o.label}</option>`
  ).join('');

  const m = document.createElement('div');
  m.id = 'wlc-img-ctx';
  m.innerHTML = `
    <div class="ctx-title">◈ ${esc(n.name)}</div>

    <div id="wic-change-img" style="padding:9px 16px;color:#d0d8f8;cursor:pointer;letter-spacing:1px;display:flex;align-items:center;gap:8px"
      onmouseenter="this.style.background='rgba(150,80,255,.12)'" onmouseleave="this.style.background=''">
      🖼 ${n.iconData ? "Changer l'image" : 'Ajouter une image'}
    </div>
    ${n.iconData ? '<div id="wic-remove-img" style="padding:9px 16px;color:#e07878;cursor:pointer;letter-spacing:1px;display:flex;align-items:center;gap:8px" onmouseenter=\'this.style.background=\"rgba(200,80,80,.12)\"\'  onmouseleave=\'this.style.background=\"\"\'>🗑 Supprimer l\'image</div>' : ''}
    <div style="height:1px;background:rgba(150,80,255,.15);margin:4px 0"></div>

    ${hasImg ? `
    <div class="ctx-row">
      <span class="ctx-label">Mode</span>
      <button id="wic-toggle-cover" class="ctx-btn" style="${isCover?'background:rgba(150,80,255,.28);border-color:rgba(150,80,255,.6)':''}">
        ${isCover ? '✦ Image pleine' : '◻ Icône centré'}
      </button>
    </div>
    ${isCover ? `
    <div class="ctx-row">
      <span class="ctx-label">Zoom</span>
      <input type="range" id="wic-zoom" min="50" max="300" value="${zoom}">
      <span id="wic-zoom-val" style="font-size:9px;color:rgba(200,180,255,.5);min-width:32px">${zoom}%</span>
    </div>
    <div class="ctx-row">
      <span class="ctx-label">Horizontal</span>
      <input type="range" id="wic-posx" min="0" max="100" value="${posX}">
    </div>
    <div class="ctx-row">
      <span class="ctx-label">Vertical</span>
      <input type="range" id="wic-posy" min="0" max="100" value="${posY}">
    </div>
    ` : ''}
    ` : ''}

    <div class="ctx-sep"></div>

    <div class="ctx-row">
      <span class="ctx-label">Couleur</span>
      <input type="color" id="wic-txt-color" value="${txtColor.startsWith('#')?txtColor:'#d8c8c0'}"
        style="width:36px;height:24px;border:none;background:none;cursor:pointer;padding:0">
      <span id="wic-txt-color-val" style="font-size:9px;color:rgba(200,180,255,.5)">${txtColor}</span>
    </div>
    <div class="ctx-row">
      <span class="ctx-label">Taille</span>
      <input type="range" id="wic-txt-size" min="7" max="22" value="${txtSize}">
      <span id="wic-txt-size-val" style="font-size:9px;color:rgba(200,180,255,.5);min-width:28px">${txtSize}px</span>
    </div>
    <div class="ctx-row">
      <span class="ctx-label">Graisse</span>
      <div style="display:flex;gap:4px">
        ${['300','400','600','700','900'].map(w=>
          `<button class="wic-weight-btn ctx-btn" data-w="${w}"
            style="padding:3px 6px;min-width:0;font-size:9px;${txtWeight===w?'background:rgba(150,80,255,.35);border-color:rgba(150,80,255,.7)':''}">${
            {300:'Fin',400:'Normal',600:'Semi',700:'Gras',900:'Noir'}[w]
          }</button>`
        ).join('')}
      </div>
    </div>
    <div class="ctx-row">
      <span class="ctx-label">Ombre</span>
      <select id="wic-txt-shadow" style="flex:1;background:rgba(20,10,40,.9);border:1px solid rgba(150,80,255,.3);border-radius:4px;color:#c0a0f8;font-size:9px;padding:3px 5px;font-family:'Cinzel',serif">
        ${shadowOpts}
      </select>
    </div>

    <button class="ctx-btn ctx-btn-danger" id="wic-close" style="margin-top:8px">✕ Fermer</button>`;

  document.body.appendChild(m);

  // Positionner
  requestAnimationFrame(()=>{
    const r = m.getBoundingClientRect();
    m.style.left = (x + r.width > window.innerWidth ? x - r.width - 6 : x) + 'px';
    m.style.top  = (y + r.height > window.innerHeight ? y - r.height - 6 : y) + 'px';
  });

  // Helper : lire tous les réglages courants et sauvegarder
  function _saveAll(){
    const z  = parseInt(document.getElementById('wic-zoom')?.value   || zoom);
    const px = parseInt(document.getElementById('wic-posx')?.value   || posX);
    const py = parseInt(document.getElementById('wic-posy')?.value   || posY);
    const tc = document.getElementById('wic-txt-color')?.value       || txtColor;
    const ts = parseInt(document.getElementById('wic-txt-size')?.value|| txtSize);
    const tw = document.querySelector('.wic-weight-btn[data-w].active-w')?.dataset.w
               || document.querySelector(`.wic-weight-btn[data-w="${txtWeight}"]`)?.dataset.w
               || txtWeight;
    const tsh= document.getElementById('wic-txt-shadow')?.value      || txtShadow;
    n._wlcCard = { cover: isCover, zoom:z, posX:px, posY:py,
                   txtColor:tc, txtWeight:tw, txtSize:ts, txtShadow:tsh };
    save();
    // Appliquer en live sur la carte
    const card = document.querySelector(`.wlc-card[oncontextmenu*="${nodeId}"]`);
    if(card){
      const img = card.querySelector('.wlc-card-cover');
      if(img){
        img.style.objectPosition = `${px}% ${py}%`;
        img.style.transform = `scale(${z/100})`;
        img.style.transformOrigin = `${px}% ${py}%`;
      }
      const nm = card.querySelector('.wlc-card-name');
      if(nm){
        nm.style.color      = tc;
        nm.style.fontSize   = ts + 'px';
        nm.style.fontWeight = tw;
        nm.style.textShadow = tsh;
      }
      const zv = document.getElementById('wic-zoom-val');
      if(zv) zv.textContent = z + '%';
      const tsv = document.getElementById('wic-txt-size-val');
      if(tsv) tsv.textContent = ts + 'px';
      const tcv = document.getElementById('wic-txt-color-val');
      if(tcv) tcv.textContent = tc;
    }
  }

  // Boutons graisse : highlight actif
  document.querySelectorAll('.wic-weight-btn').forEach(btn=>{
    if(btn.dataset.w === txtWeight) btn.classList.add('active-w');
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.wic-weight-btn').forEach(b=>{
        b.classList.remove('active-w');
        b.style.background=''; b.style.borderColor='';
      });
      btn.classList.add('active-w');
      btn.style.background='rgba(150,80,255,.35)'; btn.style.borderColor='rgba(150,80,255,.7)';
      _saveAll();
    });
  });

  // Toggle cover mode
  // Changer / ajouter image
  document.getElementById('wic-change-img')?.addEventListener('click', ()=>{
    m.remove();
    const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.onchange = e=>{
      const file = e.target.files[0]; if(!file) return;
      _uploadToCloudinary(file, url=>{
        n.iconData = url;
        save(); renderTree(); renderWelcome();
        setTimeout(()=> _wlcCardCtx(nodeId, x, y), 80);
      });
    };
    inp.click();
  });

  // Supprimer image
  document.getElementById('wic-remove-img')?.addEventListener('click', ()=>{
    n.iconData = null;
    if(n._wlcCard) n._wlcCard.cover = false;
    save(); renderTree(); renderWelcome();
    m.remove();
  });

  document.getElementById('wic-toggle-cover')?.addEventListener('click', ()=>{
    n._wlcCard = { ...(n._wlcCard||{}), cover: !isCover };
    save(); m.remove(); renderWelcome();
    setTimeout(()=> _wlcCardCtx(nodeId, x, y), 50);
  });

  // Tous les sliders/inputs live
  ['wic-zoom','wic-posx','wic-posy','wic-txt-size'].forEach(id=>{
    document.getElementById(id)?.addEventListener('input', _saveAll);
  });
  document.getElementById('wic-txt-color')?.addEventListener('input', _saveAll);
  document.getElementById('wic-txt-shadow')?.addEventListener('change', _saveAll);

  document.getElementById('wic-close').addEventListener('click', ()=> m.remove());

  setTimeout(()=>{
    document.addEventListener('click', function _close(e){
      if(!m.contains(e.target)){ m.remove(); document.removeEventListener('click',_close); }
    });
  }, 0);
}

function renderWelcome(){
  if(_wlcAnim){ cancelAnimationFrame(_wlcAnim); _wlcAnim = null; }

  const view = document.getElementById('welcome');
  if(!view) return;

  // Build quick-access cards from rootIds — même logique d'icône que buildNode
  function _nodeIconHtml(n, size='42px'){
    if(n.iconData)
      return `<img src="${n.iconData}" style="width:${size};height:${size};object-fit:contain;border-radius:3px;display:block">`;
    if(n.icon && n.icon.startsWith('<'))
      return `<div style="width:${size};height:${size};display:flex;align-items:center;justify-content:center">${n.icon}</div>`;
    return `<span style="font-size:${size}">${n.icon||'📖'}</span>`;
  }
  const cards = rootIds.map(id => db[id]).filter(Boolean).map(n => {
    const s = n._wlcCard||{};
    const isCover = s.cover && (n.iconData || (n.icon&&n.icon.startsWith('<img')));
    const zoom  = s.zoom  !== undefined ? s.zoom  : 100;
    const posX  = s.posX  !== undefined ? s.posX  : 50;
    const posY  = s.posY  !== undefined ? s.posY  : 50;
    let coverHtml = '';
    if(isCover && n.iconData){
      coverHtml = `<img class="wlc-card-cover" src="${n.iconData}"
        style="object-position:${posX}% ${posY}%;transform:scale(${zoom/100});transform-origin:${posX}% ${posY}%">`;
    }
    return `<div class="wlc-card${isCover?' wlc-card--cover':''}"
      onclick="if(!document.getElementById('wlc-img-ctx'))wlcGo('${n.id}')"
      oncontextmenu="event.preventDefault();event.stopPropagation();_wlcCardCtx('${n.id}',event.clientX,event.clientY)">
      ${coverHtml}
      ${isCover ? '' : `<div class="wlc-card-icon">${_nodeIconHtml(n,'42px')}</div>`}
      <div class="wlc-card-name" style="${(()=>{const _s=n._wlcCard||{};const parts=[];if(_s.txtColor)parts.push('color:'+_s.txtColor);if(_s.txtWeight)parts.push('font-weight:'+_s.txtWeight);if(_s.txtSize)parts.push('font-size:'+_s.txtSize+'px');if(_s.txtShadow)parts.push('text-shadow:'+_s.txtShadow);return parts.join(';');})()}">${esc(n.name)}</div>
    </div>`;
  }).join('');

  // Stats
  const nbEntries  = Object.values(db).filter(n=>n.type==='entry').length;
  const nbGates    = Object.values(db).filter(n=>n.type==='gate'||n.kind==='gate-root').length;
  const nbCats     = Object.values(db).filter(n=>n.type==='category').length;

  view.innerHTML = `
    <canvas id="wlc-canvas"></canvas>
    <div id="wlc-ui">
      <div class="wlc-eyebrow">Codex Mondial</div>
      <div class="wlc-title">Gates of Hades</div>
      <div class="wlc-rule"></div>
      ${cards ? `<div class="wlc-grid">${cards}</div>` : ''}
      <div id="wlc-sound-ph"></div>
      <div class="wlc-hint">${nbEntries} fiches · ${nbGates} portes · ${nbCats} catégories</div>
    </div>`;

  // Éléments audio persistants body-level
  if(!document.getElementById('wlc-audio')){
    const _a=document.createElement('audio');_a.id='wlc-audio';_a.loop=true;_a.style.display='none';
    document.body.appendChild(_a);
  }
  if(!document.getElementById('wlc-sound-btn')){
    const _b=document.createElement('button');_b.id='wlc-sound-btn';
    _b.title="Son — clic droit pour options";
    _b.style.cssText='position:fixed;bottom:22px;right:22px;z-index:999;background:rgba(0,10,30,.85);border:1px solid rgba(100,150,255,.3);border-radius:50%;width:42px;height:42px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:0 0 14px rgba(60,100,220,.2);backdrop-filter:blur(4px)';
    _b.textContent='🔊';
    _b.onclick=()=>toggleWlcSound();
    _b.oncontextmenu=(e)=>{e.preventDefault();_showWlcSoundMenu(e.clientX,e.clientY);};
    document.body.appendChild(_b);
  }
  const _wlcb=document.getElementById('wlc-sound-btn');
  if(_wlcb){_wlcb.style.display='flex';_wlcb.onclick=()=>toggleWlcSound();_wlcb.oncontextmenu=(e)=>{e.preventDefault();_showWlcSoundMenu(e.clientX,e.clientY);};}

  requestAnimationFrame(startWelcomeCanvas);
  initWlcAudio();
}

function wlcGo(nodeId){
  const n = db[nodeId]; if(!n) return;
  // expand ancestors
  let p = n.parentId;
  while(p){ expanded[p]=true; p=db[p]?db[p].parentId:null; }
  selectNode(nodeId);
}

function startWelcomeCanvas(){
  // Clic droit sur le fond de l'accueil (admin seulement)
  const wlcEl = document.getElementById('welcome');
  if(wlcEl && !wlcEl._ctxBound){
    wlcEl._ctxBound = true;
    wlcEl.addEventListener('contextmenu', e=>{
      if(!_isAdmin()) return;
      // Ne pas interférer avec les clic-droits des cartes
      if(e.target.closest('.wlc-card')) return;
      e.preventDefault(); e.stopPropagation();
      _showWlcBgMenu(e.clientX, e.clientY);
    });
  }
  const canvas = document.getElementById('wlc-canvas');
  if(!canvas) return;
  const outer  = document.getElementById('welcome');
  const ctx    = canvas.getContext('2d');

  function resize(){
    canvas.width  = outer.offsetWidth  || window.innerWidth;
    canvas.height = outer.offsetHeight || window.innerHeight;
  }
  resize();
  const ro = new ResizeObserver(resize); ro.observe(outer);

  // Preload gate background
  const bgImg = new Image();
  bgImg.src = globalStatNames._wlcBg || WLC_IMG;
  // Mettre à jour l'opacité si image custom
  if(globalStatNames._wlcBg){
    canvas.style.opacity = '1'; // canvas garde son opacité normale
  }

  // Embers
  const EMBERS = [];
  function makeEmber(W, H, init){
    return {
      x: Math.random()*W,
      y: init ? Math.random()*H : H+8,
      vx: (Math.random()-.5)*.5,
      vy: -.4 - Math.random()*.7,
      r: .8 + Math.random()*1.8,
      a: .15 + Math.random()*.5,
      phase: Math.random()*Math.PI*2,
    };
  }

  // Fog puffs
  const FOG = [];
  function makeFog(W, H, init){
    return {
      x: init ? Math.random()*W : (Math.random()<.5?-200:W+200),
      y: H*(.55+Math.random()*.45),
      w: 180+Math.random()*260, h: 70+Math.random()*100,
      vx: (Math.random()-.5)*.3, vy: -.06-Math.random()*.1,
      a: .04+Math.random()*.09, phase: Math.random()*Math.PI*2,
    };
  }

  let t=0, W0=0, H0=0;
  function init(){
    const W=canvas.width, H=canvas.height; W0=W; H0=H;
    EMBERS.length=0; FOG.length=0;
    for(let i=0;i<35;i++) EMBERS.push(makeEmber(W,H,true));
    for(let i=0;i<14;i++) FOG.push(makeFog(W,H,true));
  }
  bgImg.onload = init; init();

  (function frame(){
    _wlcAnim = requestAnimationFrame(frame);
    if(!document.getElementById('wlc-canvas')){ cancelAnimationFrame(_wlcAnim); ro.disconnect(); return; }
    const W=canvas.width, H=canvas.height;
    if(W!==W0||H!==H0) init();
    ctx.clearRect(0,0,W,H);

    // BG image
    const _hasCustBg = !!globalStatNames._wlcBg;
    const _bgOp = globalStatNames._wlcBgOpacity ?? 0.35;
    if(bgImg.complete && bgImg.naturalWidth>0){
      const iw=bgImg.naturalWidth, ih=bgImg.naturalHeight;
      const sc=Math.max(W/iw,H/ih);
      if(_hasCustBg){
        // Fond noir d'abord, puis image avec opacité
        ctx.fillStyle='#080408'; ctx.fillRect(0,0,W,H);
        ctx.globalAlpha = _bgOp;
        ctx.drawImage(bgImg,(W-iw*sc)/2,(H-ih*sc)/2,iw*sc,ih*sc);
        ctx.globalAlpha = 1;
      } else {
        ctx.drawImage(bgImg,(W-iw*sc)/2,(H-ih*sc)/2,iw*sc,ih*sc);
      }
    } else {
      ctx.fillStyle='#080408'; ctx.fillRect(0,0,W,H);
    }

    // Overlay: darken for readability, keep image visible
    // Very light overlay just for title readability
    const ov=ctx.createLinearGradient(0,0,0,H*.4);
    ov.addColorStop(0,'rgba(0,5,20,.45)');
    ov.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ov; ctx.fillRect(0,0,W,H*.4);

    // Floating light motes (day-time particles)
    for(let i=EMBERS.length-1;i>=0;i--){
      const e=EMBERS[i];
      e.x+=e.vx+Math.sin(t*.012+e.phase)*.4; e.y+=e.vy;
      if(e.y<-10){ EMBERS[i]=makeEmber(W,H,false); continue; }
      const fl=.5+.5*Math.sin(t*.04+e.phase*2);
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
      // Gold/white motes instead of red embers
      ctx.fillStyle=`rgba(255,${220+Math.sin(e.phase)*30|0},${100+Math.sin(e.phase*2)*60|0},${e.a*fl})`; ctx.fill();
    }
    if(EMBERS.length<40 && t%7===0) EMBERS.push(makeEmber(W,H,false));

    // Subtle god-ray from top center
    const pulse=.7+.3*Math.sin(t*.018);
    const rayGrad=ctx.createLinearGradient(W*.48,0,W*.52,0);
    rayGrad.addColorStop(0,'rgba(0,0,0,0)');
    rayGrad.addColorStop(.5,`rgba(255,235,180,${.06*pulse})`);
    rayGrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rayGrad; ctx.fillRect(W*.3,0,W*.4,H*.6);

    // No vignette — keep image clean

    t++;
  })();
}

function startIluminiaCanvas(){
  const canvas = document.getElementById('il-canvas');
  if(!canvas) return;
  const outer = document.getElementById('il-outer');
  const ctx = canvas.getContext('2d');

  function resize(){
    canvas.width = outer.offsetWidth;
    canvas.height = Math.max(outer.scrollHeight, outer.offsetHeight, 600);
  }
  resize();
  const ro = new ResizeObserver(resize); ro.observe(outer);

  const bgImg = new Image(); bgImg.src = VASIL_IMG;

  // Lightning bolt state
  let bolt = null;
  let boltTimer = 0;
  let flashAlpha = 0;
  let thunderScheduled = false;

  function randomBolt(W, H){
    // Start from top, fork down toward the king (center-top area)
    const startX = W * (.3 + Math.random() * .4);
    const startY = 0;
    const segs = [];
    let x = startX, y = startY;
    const targetY = H * .55;
    while(y < targetY){
      const dy = 18 + Math.random()*22;
      const dx = (Math.random()-.5)*55;
      segs.push({x1:x,y1:y,x2:x+dx,y2:y+dy});
      // Occasional fork
      if(Math.random()<.22 && segs.length>2){
        let fx=x+dx, fy=y+dy;
        const fsegs=[];
        for(let i=0;i<4;i++){
          const fdy=14+Math.random()*18, fdx=(Math.random()-.5)*40;
          fsegs.push({x1:fx,y1:fy,x2:fx+fdx,y2:fy+fdy});
          fx+=fdx; fy+=fdy;
        }
        segs.push(...fsegs.map(s=>({...s,fork:true})));
      }
      x+=dx; y+=dy;
    }
    return {segs, life:0, maxLife: 6+Math.floor(Math.random()*5), startX, alpha:1};
  }

  // Rain particles
  const RAIN = [];
  function makeRain(W, H, init){
    return {
      x: Math.random()*W*1.3 - W*.15,
      y: init ? Math.random()*H : -10,
      vy: 8+Math.random()*6,
      len: 12+Math.random()*18,
      a: .08+Math.random()*.18,
    };
  }

  let t=0, W0=0, H0=0;
  function init(){
    const W=canvas.width, H=canvas.height; W0=W; H0=H;
    RAIN.length=0;
    for(let i=0;i<120;i++) RAIN.push(makeRain(W,H,true));
  }
  bgImg.onload=init; init();

  (function frame(){
    _ilAnim = requestAnimationFrame(frame);
    if(!document.getElementById('il-canvas')){ cancelAnimationFrame(_ilAnim); ro.disconnect(); return; }
    const W=canvas.width, H=canvas.height;
    if(W!==W0||H!==H0) init();
    ctx.clearRect(0,0,W,H);

    // 1. Background image
    if(bgImg.complete && bgImg.naturalWidth>0){
      const iw=bgImg.naturalWidth, ih=bgImg.naturalHeight;
      const sc=Math.min(W/iw,H/ih)*0.92;
      ctx.drawImage(bgImg,(W-iw*sc)/2,(H-ih*sc)/2,iw*sc,ih*sc);
    } else {
      ctx.fillStyle='#04020a'; ctx.fillRect(0,0,W,H);
    }

    // 2. Dark atmospheric overlay
    const ov=ctx.createLinearGradient(0,0,0,H);
    ov.addColorStop(0,'rgba(2,2,12,.75)');
    ov.addColorStop(.35,'rgba(4,3,14,.45)');
    ov.addColorStop(.7,'rgba(2,2,8,.3)');
    ov.addColorStop(1,'rgba(0,0,4,.6)');
    ctx.fillStyle=ov; ctx.fillRect(0,0,W,H);

    // 3. Lightning flash
    if(flashAlpha>0){
      ctx.fillStyle=`rgba(180,190,255,${flashAlpha})`;
      ctx.fillRect(0,0,W,H);
      flashAlpha = Math.max(0, flashAlpha-0.08);
    }

    // 4. Schedule next bolt
    boltTimer--;
    if(boltTimer<=0 && !bolt){
      boltTimer = 80 + Math.floor(Math.random()*140);
      bolt = randomBolt(W,H);
      flashAlpha = .18 + Math.random()*.22;
    }

    // 5. Draw bolt
    if(bolt){
      bolt.life++;
      const progress = bolt.life/bolt.maxLife;
      const bAlpha = (1-progress)*bolt.alpha;
      bolt.segs.forEach(seg=>{
        if(seg.fork && Math.random()<.3) return;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(seg.x1,seg.y1); ctx.lineTo(seg.x2,seg.y2);
        // Outer glow
        ctx.strokeStyle=`rgba(140,160,255,${bAlpha*.45})`;
        ctx.lineWidth = seg.fork ? 2 : 4;
        ctx.shadowColor='rgba(140,160,255,.8)';
        ctx.shadowBlur=12;
        ctx.stroke();
        // Inner white core
        ctx.strokeStyle=`rgba(240,245,255,${bAlpha})`;
        ctx.lineWidth = seg.fork ? .8 : 1.8;
        ctx.shadowBlur=4;
        ctx.stroke();
        ctx.restore();
      });
      if(bolt.life>=bolt.maxLife) bolt=null;
    }

    // 6. Rain
    ctx.save();
    ctx.strokeStyle='rgba(160,180,220,.18)';
    ctx.lineWidth=.8;
    RAIN.forEach(r=>{
      r.y+=r.vy;
      if(r.y>H+20) Object.assign(r,makeRain(W,H,false));
      ctx.beginPath();
      ctx.moveTo(r.x,r.y);
      ctx.lineTo(r.x-r.len*.25,r.y-r.len);
      ctx.globalAlpha=r.a;
      ctx.stroke();
    });
    ctx.restore();

    // No vignette

    t++;
  })();
}

function initIlAudio(){
  let audio = document.getElementById('il-audio');

  _ilAudioObj=audio;
  audio.loop=true; audio.volume=_ilAudioVol * _masterVol;
  if(_ilAudioURL && audio.src !== _ilAudioURL){ audio.src = _ilAudioURL; audio.dataset.url=_ilAudioURL; }
  if(_ilAudioURL){
    audio.play().then(()=>{ _updateIlBtn('🔊'); }).catch(()=>{
      _updateIlBtn('🔇');

function _ilLoadFile(e){

    const a=document.getElementById('il-audio');if(!a)return;
    a.src=url;a.loop=true;a.volume=_ilAudioVol;a.play().catch(()=>{});

}
function toggleIlSound(){

// Sections that get a sound button (matched by name or kind)
const CAT_AUDIO_SECTIONS = [
  'Magie et Pouvoirs','Carte','Secrets','Factions','Histoire','Royaumes & Nations'
];

function catAudioNodeId(n){
  if(!n) return null;
  if(CAT_AUDIO_SECTIONS.includes(n.name)) return n.id;
  return null;
}

function initCatAudio(nodeId){
  const n = db[nodeId]; if(!n) return;
  // Persistent audio element
  let audio = document.getElementById('cat-audio');
  if(!audio){
    audio = document.createElement('audio');
    audio.id = 'cat-audio'; audio.loop = true; audio.style.display = 'none';
    document.body.appendChild(audio);
  }
  // Persistent button
  let btn = document.getElementById('cat-sound-btn');
  if(!btn){
    btn = document.createElement('button');
    btn.id = 'cat-sound-btn';
    btn.title = 'Son d\'ambiance — clic droit pour options';
    btn.style.cssText = 'position:fixed;bottom:22px;right:22px;z-index:999;background:rgba(4,6,12,.88);border:1px solid rgba(100,120,200,.35);border-radius:50%;width:42px;height:42px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:18px;backdrop-filter:blur(4px);transition:border-color .2s';
    btn.onclick = ()=>toggleCatAudio(nodeId);
    btn.oncontextmenu = (e)=>{ e.preventDefault(); showCatAudioMenu(e.clientX, e.clientY, nodeId); };
    btn.textContent = '🔊';
    document.body.appendChild(btn);
  } else {
    // Re-bind for current nodeId
    btn.onclick = ()=>toggleCatAudio(nodeId);
    btn.oncontextmenu = (e)=>{ e.preventDefault(); showCatAudioMenu(e.clientX, e.clientY, nodeId); };
  }
  btn.style.display = 'flex';

  // Charger et lancer l'audio du nœud source
  const src = n._audio?.src;
  if(src){
    // Charger si source différente
    if(audio.src !== src){
      audio.src = src;
      audio.volume = (n._audio?.vol ?? 0.4) * _masterVol;
      audio.dataset.nodeId = nodeId;
      audio.load();
    }
    audio.play().then(()=>{ btn.textContent='🔊'; }).catch(()=>{
      // Navigateur bloque l'autoplay — mettre en file d'attente pour le 1er clic
      btn.textContent='🔇';
      if(!window._audioPendingPlay) window._audioPendingPlay=[];
      window._audioPendingPlay.push(()=>{
        audio.play().then(()=>{ btn.textContent='🔊'; }).catch(()=>{});
      });
    });
  } else {
    // Pas de source — bouton visible pour permettre d'en ajouter une
    audio.dataset.nodeId = nodeId;
    btn.textContent = '🎵';
    btn.title = "Ajouter un son d'ambiance — clic droit pour options";
  }
}

function toggleCatAudio(nodeId){
  const audio = document.getElementById('cat-audio');
  const btn   = document.getElementById('cat-sound-btn');
  if(!audio) return;
  const n = db[nodeId];
  if(!n?._audio?.src){
    // Pas de son → ouvrir le menu pour charger
    const br = btn ? btn.getBoundingClientRect() : {left: window.innerWidth-220, bottom: window.innerHeight-60};
    showCatAudioMenu(br.left, br.bottom + 8, nodeId);
    return;
  }
  if(audio.paused){
    audio.play().then(()=>{ if(btn) btn.textContent='🔊'; }).catch(()=>{});
  } else {
    audio.pause();
    if(btn) btn.textContent='🔇';
  }
}

function showCatAudioMenu(x, y, nodeId){
  if(!_isAdmin()) return;
  document.getElementById('cat-audio-menu')?.remove();
  const n = db[nodeId]; if(!n) return;
  const vol = n._audio?.vol ?? 0.4;

  const menu = document.createElement('div');
  menu.id = 'cat-audio-menu';

    <div id="cat-cm-load" style="padding:8px 16px;color:#d8ddf8;cursor:pointer;letter-spacing:1px"
      onmouseenter="this.style.background='rgba(100,120,200,.15)'"

    ${n._audio?.src ? `<div id="cat-cm-stop" style="padding:8px 16px;color:#d8ddf8;cursor:pointer;letter-spacing:1px"

    <div style="padding:8px 16px;color:#d8ddf8;letter-spacing:1px">

      <input id="cat-vol-slider" type="range" min="0" max="100" value="${Math.round(vol*100)}"
        style="width:100%;margin-top:6px;accent-color:#6070c8;display:block;cursor:pointer">
      <span id="cat-vol-val" style="font-size:9px;color:rgba(160,170,230,.6)">${Math.round(vol*100)}%</span>

        onmouseleave="this.style.background=''"
        onclick="document.getElementById('cat-audio-menu')?.remove()">✕ Fermer</div>
    </div>`;

  document.body.appendChild(menu);

  menu.querySelector('#cat-cm-load').onclick = ()=>{
    menu.remove();
    const inp = document.createElement('input'); inp.type='file'; inp.accept='audio/*';
    inp.onchange = e=>{
      const file = e.target.files[0]; if(!file) return;
      _uploadToCloudinary(file, url=>{
        if(!n._audio) n._audio={};
        n._audio.src = url;
        n._audio.vol = n._audio.vol ?? 0.4;
        save();
        initCatAudio(nodeId);
      });
    };
    inp.click();
  };

  const stopBtn = menu.querySelector('#cat-cm-stop');
  if(stopBtn) stopBtn.onclick = ()=>{
    menu.remove();
    const audio = document.getElementById('cat-audio');
    if(audio){ audio.pause(); audio.src=''; }
    delete n._audio;
    save();
    const btn = document.getElementById('cat-sound-btn');
    if(btn) btn.textContent='🔇';
  };

  menu.querySelector('#cat-vol-slider').oninput = function(){
    const v = this.value/100;
    if(!n._audio) n._audio={};
    n._audio.vol = v;
    menu.querySelector('#cat-vol-val').textContent = this.value+'%';
    const audio = document.getElementById('cat-audio');
    if(audio) audio.volume = v;
    save();
  };

  // Keep in viewport
  const r = menu.getBoundingClientRect();
  if(r.right  > window.innerWidth)  menu.style.left = (x - r.width)+'px';
  if(r.bottom > window.innerHeight) menu.style.top  = (y - r.height)+'px';

  setTimeout(()=>{ document.addEventListener('click', function _c(e){ if(!menu.contains(e.target)){ menu.remove(); document.removeEventListener('click',_c); } }); }, 0);
}

function hideCatAudio(){
  const btn   = document.getElementById('cat-sound-btn');
  const audio = document.getElementById('cat-audio');
  if(btn)   btn.style.display = 'none';
  if(audio && !audio.paused) audio.pause();

}

      onmouseenter="this.style.background='rgba(100,120,200,.15)'"
      onmouseleave="this.style.background=''">
      <span style="font-size:16px">${inherit?'🔊':'🔇'}</span>
      <span>${inherit ? 'Musique du parent active' : 'Musique du parent coupée'}</span>
    </div>
    <div style="padding:4px 16px 8px;color:rgba(160,170,230,.35);font-size:9px;font-family:'EB Garamond',serif;font-style:italic">
      ${inherit ? 'Cliquez pour couper lors de la navigation ici' : 'Cliquez pour laisser continuer la musique du parent'}

    ` : `
    <div style="padding:10px 16px;color:rgba(160,170,230,.4);font-size:10px;font-family:'EB Garamond',serif;font-style:italic">
      Aucune musique sur les catégories parentes.
    </div>
    `}
    <div style="border-top:1px solid rgba(100,120,200,.15);margin-top:4px">
      <div style="padding:8px 16px;color:rgba(160,170,230,.4);cursor:pointer;letter-spacing:1px"
        onmouseenter="this.style.background='rgba(100,120,200,.1)'"
        onmouseleave="this.style.background=''"

  document.body.appendChild(menu);

  if(hasParentAudio){

      if(cur === nodeId) renderContent(nodeId);

}

// ════════════════════════════════════════════
//  CHARACTER GRID VIEW
// ════════════════════════════════════════════
function renderCharacterGridView(v, n){
  const sortMode   = catSortState[n.id]   || 'manual';
  const searchQ    = (catSearchState[n.id] || '').toLowerCase().trim();

  // Helpers (same as division sort)
  function getAge(e){
    if(e.charAge){ const v=parseInt(e.charAge); if(!isNaN(v)) return v; }
    const f=(e.fields||[]).find(f=>f.k&&(f.k.toLowerCase().includes('âge')||f.k.toLowerCase().includes('age')));
    if(f){ const v=parseInt(f.v); if(!isNaN(v)) return v; }
    return Infinity;
  }
  function statTotal(e, cat){
    // Utiliser les stats de la version choisie dans la grille si disponible
    const _gArcIdx = e._cgGridArc !== undefined ? e._cgGridArc : -1;
    const _gArc = (_gArcIdx>=0 && e._arcs && e._arcs[_gArcIdx]) ? e._arcs[_gArcIdx] : null;
    const _stats = (_gArc && _gArc.stats && Object.keys(_gArc.stats[cat]||{}).length > 0)
      ? _gArc.stats : e.stats;
    if(!_stats||!_stats[cat]) return -1;
    const vals=Object.values(_stats[cat]);
    return vals.length ? vals.reduce((a,b)=>a+(Number(b)||0),0) : -1;
  }
  function fullName(e){ return e.name+(e.lastName?' '+e.lastName:''); }

  // Build ordered list — collect ALL characters whose ancestor is this category node
  if(!n._childOrder) n._childOrder=[];
  // Build a set of all descendant category IDs (recursive)
  function getDescendantCatIds(nodeId, acc){
    acc = acc || new Set();
    const nd = db[nodeId]; if(!nd) return acc;
    (nd.children||[]).forEach(cid=>{
      const c=db[cid]; if(!c) return;
      if(c.type==='category'){ acc.add(cid); getDescendantCatIds(cid, acc); }
    });
    return acc;
  }
  const descendantCatIds = getDescendantCatIds(n.id);
  // Collect direct character entries
  const directChars = (n.children||[]).map(id=>db[id]).filter(e=>e&&e.type==='entry'&&e.entryType==='character');
  // Collect characters from ALL descendant categories (any depth)
  // Also scan db for any character whose parentId is in our tree (catches orphaned but parentId-linked entries)
  const charSourceMap = {};
  const subCatCharsAll = [];
  descendantCatIds.forEach(cid=>{
    const c=db[cid]; if(!c) return;
    // from children array
    (c.children||[]).map(id=>db[id]).filter(e=>e&&e.type==='entry'&&e.entryType==='character').forEach(e=>{
      charSourceMap[e.id]=c.name; subCatCharsAll.push(e);
    });
  });
  // Also scan full db for entries whose parentId is in this tree but may not be in children arrays
  Object.values(db).forEach(e=>{
    if(e.type==='entry'&&e.entryType==='character'&&e.parentId!==n.id&&descendantCatIds.has(e.parentId)){
      if(!subCatCharsAll.find(x=>x.id===e.id)){
        const parentNode=db[e.parentId];
        charSourceMap[e.id]=parentNode?parentNode.name:'';
        subCatCharsAll.push(e);
      }
    }
  });
  // Also collect characters from sibling categories (same parent) — e.g. "Les Gardiens" sibling of "Liste des Personnages"
  if(n.parentId && db[n.parentId]){
    const siblings=(db[n.parentId].children||[]).map(id=>db[id]).filter(c=>c&&c.type==='category'&&c.id!==n.id&&!c._isDivision&&!c._isDivisionParent&&c.name!=='Les 13 Divisions');
    siblings.forEach(sib=>{
      (sib.children||[]).map(id=>db[id]).filter(e=>e&&e.type==='entry'&&e.entryType==='character').forEach(e=>{
        if(!subCatCharsAll.find(x=>x.id===e.id)&&!directChars.find(x=>x.id===e.id)){
          charSourceMap[e.id]=sib.name;
          subCatCharsAll.push(e);
        }
      });
    });
  }
  const seen = new Set();
  const charEnts = [...directChars, ...subCatCharsAll].filter(e=>{ if(seen.has(e.id)) return false; seen.add(e.id); return true; });
  // Ensure _childOrder is in sync (add new, remove deleted)
  const knownIds = new Set(n._childOrder);
  charEnts.forEach(e=>{ if(!knownIds.has(e.id)) n._childOrder.push(e.id); });
  n._childOrder = n._childOrder.filter(id=>charEnts.find(e=>e.id===id));

  // Apply search filter
  const statusFilter = catStatusFilter[n.id] || '';
  let displayEnts = charEnts.filter(e=>{
    if(statusFilter && e.charStatus !== statusFilter) return false;
    if(!searchQ) return true;
    const hay=(fullName(e)+' '+(e.subtitle||'')+' '+(e.charAge||'')).toLowerCase();
    return hay.includes(searchQ);
  });

  // Apply sort
  if(sortMode==='manual'){
    displayEnts.sort((a,b)=>n._childOrder.indexOf(a.id)-n._childOrder.indexOf(b.id));
  } else if(sortMode==='alpha'){
    displayEnts.sort((a,b)=>fullName(a).localeCompare(fullName(b),'fr',{sensitivity:'base'}));
  } else if(sortMode==='age_asc'||sortMode==='age_desc'){
    displayEnts.sort((a,b)=>{
      const da=getAge(a),db2=getAge(b);
      if(da===db2) return fullName(a).localeCompare(fullName(b),'fr',{sensitivity:'base'});
      return sortMode==='age_asc' ? da-db2 : db2-da;
    });
  } else if(sortMode==='phys'||sortMode==='magic'||sortMode==='intel'){
    const cat=sortMode==='phys'?'phys':sortMode==='magic'?'magic':'intel';
    displayEnts.sort((a,b)=>{
      const sa=statTotal(a,cat),sb=statTotal(b,cat);
      if(sa===sb) return fullName(a).localeCompare(fullName(b),'fr',{sensitivity:'base'});
      return sb-sa;
    });
  }

  // Mode catégories personnalisées
  let customCatHTML = '';
  if(sortMode === 'custom_cat' && n._cgCats && n._cgCats.length > 0){
    customCatHTML = n._cgCats.map(cat=>{
      const members = (cat.members||[]).map(id=>db[id]).filter(Boolean)
        .filter(e=>{ // apply search/status filter
          if(statusFilter && e.charStatus !== statusFilter) return false;
          if(!searchQ) return true;
          return (fullName(e)+' '+(e.subtitle||'')).toLowerCase().includes(searchQ);
        });
      return `<div style="margin-bottom:24px">
        <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(200,168,76,.5);margin-bottom:12px;display:flex;align-items:center;gap:10px">
          <span style="flex:1;height:1px;background:linear-gradient(90deg,rgba(200,168,76,.2),transparent)"></span>
          🏷 ${esc(cat.name||'Sans nom')}
          <span style="flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,76,.2))"></span>
        </div>
        <div class="cg-grid">${members.map(e=>charCardHTML(e)).join('')||'<div style="color:rgba(200,168,76,.2);font-family:EB Garamond,serif;font-style:italic;padding:12px">Aucun personnage</div>'}</div>
      </div>`;
    }).join('');
    // personnages sans catégorie
    const assignedIds = new Set(n._cgCats.flatMap(c=>c.members||[]));
    const uncatChars = displayEnts.filter(e=>!assignedIds.has(e.id));
    if(uncatChars.length > 0){
      customCatHTML += `<div style="margin-bottom:24px">
        <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(160,140,200,.3);margin-bottom:12px;display:flex;align-items:center;gap:10px">
          <span style="flex:1;height:1px;background:linear-gradient(90deg,rgba(160,140,200,.1),transparent)"></span>
          Non classés
          <span style="flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(160,140,200,.1))"></span>
        </div>
        <div class="cg-grid">${uncatChars.map(e=>charCardHTML(e)).join('')}</div>
      </div>`;
    }
    displayEnts = []; // on gère l'affichage nous-mêmes
  }

  // Non-character entries in this category (subcats, other entries)

  // Build card HTML (uses charSourceMap from outer scope)
  function charCardHTML(e){
      const _gridArcIdx = e._cgGridArc !== undefined ? e._cgGridArc : -1;
      const _gridArc = (_gridArcIdx>=0 && e._arcs && e._arcs[_gridArcIdx]) ? e._arcs[_gridArcIdx] : null;
      const _gridImg = (_gridArc && _gridArc.image) || (e.images&&e.images[0]) || null;
      const _gridAge = (_gridArc && _gridArc.age) || e.charAge || '';
      const _gridSub = (_gridArc && _gridArc.subtitle) || e.subtitle || '';
      // Position recadrage : cherche d'abord l'arc actif, puis la fiche
      const _imgPosKey = _gridArcIdx >= 0 ? `_cgImgPos_${_gridArcIdx}` : '_cgImgPos';
      const _imgPx = e[_imgPosKey+'X'] !== undefined ? e[_imgPosKey+'X'] : 50;
      const _imgPy = e[_imgPosKey+'Y'] !== undefined ? e[_imgPosKey+'Y'] : 50;
      const img=_gridImg
        ? `<div class="cg-portrait"><img src="${_gridImg}" alt="" style="object-position:${_imgPx}% ${_imgPy}%"></div>`
        : `<div class="cg-portrait cg-portrait-ph">${e.icon||'🧙'}</div>`;
      const age=_gridAge?`<span class="cg-age">${esc(_gridAge)}</span>`:'';
      const sourceName=charSourceMap[e.id];
      const sourceBadge=sourceName?`<div class="cg-source-badge">${esc(sourceName)}</div>`:'';
      if(!_isAdmin() && e._hidden) return `<div class="cg-card card-hidden-visitor"><div class="chv-mark">?</div></div>`;
      if(_isAdmin() && e._hidden) {
        // Admin voit la carte normalement mais avec une légère teinte
      }
      // Effet visuel selon le statut
      const statusStyle = e.charStatus==='Décédé'
        ? 'filter:grayscale(.85) brightness(.75);opacity:.7;'
        : e.charStatus==='Disparu'
        ? 'filter:sepia(.6) hue-rotate(160deg) brightness(.8);opacity:.8;'
        : '';
      const statusDot = e.charStatus==='Vivant'
        ? '<span style="position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:#6acd8d;box-shadow:0 0 5px #6acd8d"></span>'
        : e.charStatus==='Décédé'
        ? '<span style="position:absolute;top:6px;right:6px;font-size:10px">💀</span>'
        : e.charStatus==='Disparu'
        ? '<span style="position:absolute;top:6px;right:6px;font-size:10px">🌀</span>'
        : '';
      const ctxHandler = _isAdmin() ? `oncontextmenu="event.preventDefault();event.stopPropagation();_cgCardCtx(event,'${e.id}','${n.id}')"` : '';
      return `<div class="cg-card${e._hidden?' cg-card-admin-hidden':''}" id="cgc-${e.id}" draggable="true"
        style="${statusStyle}"
        ondragstart="cgDragStart(event,'${e.id}','${n.id}')"
        ondragover="cgDragOver(event,'${e.id}','${n.id}')"
        ondrop="cgDrop(event,'${e.id}','${n.id}')"
        ondragend="cgDragEnd(event)"
        onclick="selectNode('${e.id}')"
        ${ctxHandler}>
        ${img}
        ${statusDot}
        ${sourceBadge}
        <div class="cg-info">
          <div class="cg-name">${esc(fullName(e))}</div>
          ${_gridSub?`<div class="cg-sub">${esc(_gridSub)}</div>`:''}
          ${age}
        </div>
        ${(()=>{
          const visibleArcs = e._arcs ? e._arcs.filter((_,ai)=>_isAdmin()||(!(e._hiddenArcs||[]).includes(ai))) : [];
          if(!visibleArcs.length) return '';
          const currentArc = e._cgGridArc !== undefined ? e._cgGridArc : -1;
          const arcName = currentArc>=0 && e._arcs[currentArc] ? e._arcs[currentArc].name : 'Fiche principale';
          return `<div style="position:absolute;bottom:0;left:0;right:0;padding:2px 4px;background:rgba(20,10,40,.75);display:flex;align-items:center;justify-content:space-between;gap:3px"
            onclick="event.stopPropagation();_cgArcPicker(event,'${e.id}',event.currentTarget)"
            title="Changer la version affichée">
            <span style="font-size:6px;font-family:'Cinzel',serif;color:rgba(200,175,255,.6);letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(arcName.slice(0,12))}</span>
            <span style="font-size:8px;color:rgba(160,120,255,.5)">◈</span>
          </div>`;
        })()}
      </div>`;
    }
  const nonCharChildren = (n.children||[]).map(id=>db[id]).filter(e=>e&&!(e.type==='entry'&&e.entryType==='character'));

  // Build card HTML
  



  const sortBtns=[
    {key:'manual', label:'✥ Manuel'},
    {key:'alpha',  label:'A → Z'},
    {key:'age_asc',label:'Âge ↑'},
    {key:'age_desc',label:'Âge ↓'},
    {key:'phys',   label:'⚔ Physique'},
    {key:'magic',  label:'🔮 Magie'},
    {key:'intel',  label:'📜 Intellect'},
    {key:'custom_cat', label:'🏷 Catégories'},
  ];

  const catIcon = n.iconData ? `<img class="cv-icon-img" src="${n.iconData}" alt="">` : `<div class="cv-icon-big">${n.icon||'🧙'}</div>`;

  // Trouver les sous-catégories spéciales (Comparatif, Gardiens)
  const subCats = (n.children||[]).map(id=>db[id]).filter(c=>c&&c.type==='category');
  const comparatifNode = subCats.find(c=>c.kind==='comparatif');
  const gardiensNode   = subCats.find(c=>c.kind==='gardiens');
  const otherSubCats   = subCats.filter(c=>c.kind!=='comparatif'&&c.kind!=='gardiens');

  const specialBtns = [

function _toggleArcHidden(charId, arcIdx){
  const n = db[charId]; if(!n) return;
  if(!n._hiddenArcs) n._hiddenArcs = [];
  const i = n._hiddenArcs.indexOf(arcIdx);
  if(i >= 0) n._hiddenArcs.splice(i, 1);
  else n._hiddenArcs.push(arcIdx);
  save();
  renderContent(n.parentId||charId);
}

function _cgCropSave(charId){

function _migrateGardiensToFactions(){
  // Trouver Les Gardiens
  const gardiens = Object.values(db).find(n=>n.kind==='gardiens'||n.name==='Les Gardiens');
  if(!gardiens) return;

  // Trouver Factions
  const factions = Object.values(db).find(n=>n.type==='category'&&n.name==='Factions');
  if(!factions) return;

  // Déjà migré ?
  if(gardiens.parentId === factions.id) return;

  const oldParentId = gardiens.parentId;
  const oldParent = db[oldParentId];

  // Retirer des enfants de l'ancien parent
  if(oldParent && oldParent.children){
    oldParent.children = oldParent.children.filter(id=>id!==gardiens.id);
  }

  // Ajouter dans Factions
  gardiens.parentId = factions.id;
  if(!factions.children) factions.children=[];
  if(!factions.children.includes(gardiens.id)) factions.children.push(gardiens.id);

  // Les fiches des gardiens gardent leur parentId original (Personnages ou sous-cat)
  // → on ne touche PAS aux entries enfants, seulement à la catégorie Gardiens elle-même
  // renderCharacterGridView collecte déjà les personnages par parentId récursif,
  // donc ils restent visibles dans Personnages via leur parentId qui pointe toujours là

  save();
  console.log('[GoH] Les Gardiens déplacé vers Factions');
}

function _ensureSolaris(){
  // Chercher si une catégorie Solaris existe déjà
  const existing = Object.values(db).find(n=>n.kind==='solaris'||n.name==='Solaris');
  if(existing) return; // déjà là

  // Trouver le nœud Factions pour y rattacher Solaris
  const factionsNode = Object.values(db).find(n=>n.type==='category'&&n.name==='Factions');
  if(!factionsNode) return; // pas encore de Factions dans ce codex

  const id = 'solaris_'+Date.now();
  db[id] = {
    id, type:'category', kind:'solaris',
    name:'Solaris', icon:'☀',
    subtitle:'Faction du système solaire',
    parentId: factionsNode.id,
    children: [], iconData: null,
    _solarBodies: {}
  };
  if(!factionsNode.children) factionsNode.children=[];
  factionsNode.children.push(id);
  save();
}

function _arcPrefLoad(){
  try{
    const raw = localStorage.getItem('goh_arc_prefs');
    if(!raw) return;
    const prefs = JSON.parse(raw);
    // Appliquer les prefs visiteur sur db sans écraser les choix admin
    if(!_isAdmin()){
      Object.entries(prefs).forEach(([id, idx])=>{
        if(db[id] && !(db[id]._hiddenArcs||[]).includes(idx)) db[id]._cgGridArc = idx;
      });
    }
  } catch(e){}
}
function _arcPrefSave(charId, idx){
  try{
    const raw = localStorage.getItem('goh_arc_prefs');
    const prefs = raw ? JSON.parse(raw) : {};
    if(idx === -1) delete prefs[charId];
    else prefs[charId] = idx;
    localStorage.setItem('goh_arc_prefs', JSON.stringify(prefs));
  } catch(e){}
}

function _cgArcPicker(e, charId, anchor){
  e.stopPropagation();
  document.getElementById('_cgap')?.remove();
  document.getElementById('_cgap-ov')?.remove();
  const n = db[charId]; if(!n) return;
  const currentArc = n._cgGridArc !== undefined ? n._cgGridArc : -1;
  const menu = document.createElement('div');
  menu.id = '_cgap';
  const r = anchor.getBoundingClientRect();
  menu.style.cssText = `position:fixed;left:${r.left}px;top:${r.top-4}px;transform:translateY(-100%);z-index:9999;
    background:rgba(12,8,24,.97);border:1px solid rgba(140,80,255,.4);border-radius:6px;
    padding:4px 0;min-width:160px;font-family:'Cinzel',serif;font-size:9px;
    box-shadow:0 -4px 20px rgba(0,0,0,.8)`;
  // Overlay bloqueur
  const ov = document.createElement('div');
  ov.id = '_cgap-ov';
  ov.style.cssText = 'position:fixed;inset:0;z-index:9998;background:transparent;cursor:default';
  const closeAll = ()=>{ menu.remove(); ov.remove(); };
  ov.onclick = (ev)=>{ ev.stopPropagation(); closeAll(); };
  ov.oncontextmenu = (ev)=>{ ev.preventDefault(); ev.stopPropagation(); closeAll(); };
  function row(label, idx, active){
    const r2 = document.createElement('div');
    r2.style.cssText = `padding:7px 14px;cursor:pointer;color:${active?'rgba(220,195,255,.9)':'rgba(180,155,240,.55)'};
      background:${active?'rgba(140,80,255,.15)':''};display:flex;align-items:center;gap:6px`;
    r2.onmouseenter = ()=>r2.style.background='rgba(140,80,255,.15)';
    r2.onmouseleave = ()=>r2.style.background=active?'rgba(140,80,255,.15)':'';
    r2.innerHTML = `${active?'✓':'◈'} ${label}`;
    r2.onclick = (ev)=>{
      ev.stopPropagation();
      closeAll();
      n._cgGridArc = idx;
      if(_isAdmin()) save();         // Admin → Supabase
      else _arcPrefSave(charId, idx); // Visiteur → localStorage
      renderContent(n.parentId||charId);
    };
    menu.appendChild(r2);
  }
  row('Fiche principale', -1, currentArc === -1);
  (n._arcs||[]).forEach((arc, i)=>{
    if(!_isAdmin() && (n._hiddenArcs||[]).includes(i)) return;
    row(arc.name||'Arc '+(i+1), i, currentArc === i);
  });
  document.body.appendChild(ov);
  document.body.appendChild(menu);
  // Ajuster si déborde
  requestAnimationFrame(()=>{
    const br = menu.getBoundingClientRect();
    if(br.left < 4) menu.style.left = '4px';
    if(br.right > window.innerWidth) menu.style.left = (window.innerWidth - br.width - 4)+'px';
    if(br.top < 4) { menu.style.top = r.bottom+'px'; menu.style.transform = ''; }
  });
}

function _cgCardCtx(e, entryId, parentId){
  if(!_isAdmin()) return;
  document.getElementById('_cgc-ctx')?.remove();
  const n = db[entryId]; if(!n) return;
  const isHidden = n._hidden === true;
  const menu = document.createElement('div');
  menu.id = '_cgc-ctx';
  menu.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;z-index:9999;
    background:rgba(8,6,14,.97);border:1px solid rgba(200,168,76,.3);border-radius:6px;
    padding:4px 0;min-width:200px;font-family:'Cinzel',serif;font-size:10px;
    box-shadow:0 8px 28px rgba(0,0,0,.8)`;
  const title = document.createElement('div');
  title.style.cssText = 'padding:7px 14px 5px;font-size:8px;letter-spacing:2px;color:rgba(200,168,76,.4);border-bottom:1px solid rgba(200,168,76,.1);margin-bottom:4px';
  title.textContent = n.name||entryId;
  menu.appendChild(title);
  function row(icon, label, fn, danger){
    const r = document.createElement('div');
    r.style.cssText = `padding:8px 14px;cursor:pointer;color:${danger?'rgba(220,80,80,.7)':'rgba(210,185,120,.7)'};display:flex;gap:8px;align-items:center`;
    r.onmouseenter = ()=>r.style.background='rgba(200,168,76,.1)';
    r.onmouseleave = ()=>r.style.background='';
    r.innerHTML = `${icon} ${label}`;
    r.onclick = ()=>{ menu.remove(); fn(); };
    menu.appendChild(r);
  }
  // Recadrer l'image (admin seulement)
  const _gridImgForCrop = (n._cgGridArc !== undefined && n._cgGridArc >= 0 && n._arcs && n._arcs[n._cgGridArc]?.image)
    ? n._arcs[n._cgGridArc].image
    : (n.images && n.images[0]);
  if(_gridImgForCrop){
    row("✂", "Recadrer l'image dans la grille", ()=>_cgCropModal(entryId));
  }
  const sep_crop = document.createElement('div');
  sep_crop.style.cssText = 'height:1px;background:rgba(200,168,76,.1);margin:4px 0';
  menu.appendChild(sep_crop);
  // Version affichée dans la grille
  if(n._arcs && n._arcs.length > 0){
    const currentGridArc = (n._cgGridArc !== undefined) ? n._cgGridArc : -1;
    const sep0 = document.createElement('div');
    sep0.style.cssText = 'padding:4px 14px 4px;font-size:7.5px;letter-spacing:1.5px;color:rgba(200,168,76,.3)';
    sep0.textContent = 'VERSION DANS LA GRILLE';
    menu.appendChild(sep0);
    // Version principale
    row(currentGridArc===-1?'✓':'', 'Fiche principale', ()=>{
      n._cgGridArc = -1; save(); renderContent(parentId);
    });
    n._arcs.forEach((arc,i)=>{
      row(currentGridArc===i?'✓':'◈', arc.name||'Arc '+(i+1), ()=>{
        n._cgGridArc = i; save(); renderContent(parentId);
      });
    });
    const sep1 = document.createElement('div');
    sep1.style.cssText = 'height:1px;background:rgba(200,168,76,.1);margin:4px 0';
    menu.appendChild(sep1);
  }
  // Masquer/démasquer le personnage
  row(isHidden?'👁':'🚫', isHidden?'Rendre visible aux visiteurs':'Masquer aux visiteurs', ()=>{
    _toggleNodeHidden(entryId);
  });
  // Masquer une version alternative spécifique
  if(n._arcs && n._arcs.length > 0){
    const sep = document.createElement('div');
    sep.style.cssText = 'height:1px;background:rgba(200,168,76,.1);margin:4px 0';
    menu.appendChild(sep);
    const arcTitle = document.createElement('div');
    arcTitle.style.cssText = 'padding:5px 14px;font-size:7.5px;letter-spacing:1.5px;color:rgba(200,168,76,.3)';
    arcTitle.textContent = 'VERSIONS ALTERNATIVES';
    menu.appendChild(arcTitle);
    n._arcs.forEach((arc, i)=>{
      const isArcHidden = (n._hiddenArcs||[]).includes(i);
      row(isArcHidden?'👁':'🚫',
        `${isArcHidden?'Afficher':'Masquer'} : ${arc.name||'Arc '+(i+1)}`,
        ()=>{ _toggleArcHidden(entryId, i); }
      );
    });
  }
  // Overlay invisible qui bloque tous les clics derrière le menu
  document.getElementById('_cgc-ctx-overlay')?.remove();
  const overlay = document.createElement('div');
  overlay.id = '_cgc-ctx-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9998;background:transparent;cursor:default';
  const closeAll = ()=>{ menu.remove(); overlay.remove(); };
  overlay.onclick = closeAll;
  overlay.oncontextmenu = (ev)=>{ ev.preventDefault(); closeAll(); };
  document.body.appendChild(overlay);
  document.body.appendChild(menu);
  // Patcher chaque row pour fermer l'overlay aussi
  Array.from(menu.children).forEach(el=>{
    if(el.onclick){
      const orig = el.onclick.bind(el);
      el.onclick = (ev)=>{ overlay.remove(); orig(ev); };
    }
  });
  requestAnimationFrame(()=>{
    const r=menu.getBoundingClientRect();
    if(r.right>window.innerWidth) menu.style.left=(e.clientX-r.width)+'px';
    if(r.bottom>window.innerHeight) menu.style.top=(e.clientY-r.height)+'px';
  });
}

function _cgCatAdd(nodeId){
  const n=db[nodeId]; if(!n) return;
  if(!n._cgCats) n._cgCats=[];
  n._cgCats.push({name:'Nouvelle catégorie',members:[]});
  window._cgcats_data=n._cgCats;
  _cgShowCatManager(nodeId);
}
function _cgCatDelete(ci, nodeId){
  const n=db[nodeId]; if(!n||!n._cgCats) return;

}
function _cgCatRemoveMember(ci, mi, nodeId){

function _cgCatPickMember(ci, nodeId, entryId){
  document.getElementById('_cgcat-picker')?.remove();
  const n=db[nodeId]; if(!n||!n._cgCats||!n._cgCats[ci]) return;
  if(!(n._cgCats[ci].members||[]).includes(entryId)){
    n._cgCats[ci].members = n._cgCats[ci].members||[];
    n._cgCats[ci].members.push(entryId);
  }
  window._cgcats_data=n._cgCats;
  _cgShowCatManager(nodeId);
}
function _cgCatSaveAll(nodeId){

  if(window._cgcats_data) n._cgCats=window._cgcats_data;

}

function catSort(nodeId, mode){
  if(mode === 'custom_cat'){
    _cgShowCatManager(nodeId);
    return;
  }
  catSortState[nodeId]=mode;
  renderContent(nodeId);
}
function catFilterStatus(nodeId, status){
  catStatusFilter[nodeId]=status;
  renderContent(nodeId);
}
function catSearch(nodeId, q){
  catSearchState[nodeId]=q;
  renderContent(nodeId);
}

// Drag & drop for character grid
let _cgDragId=null, _cgDragNodeId=null;
function cgDragStart(e, entryId, nodeId){
  _cgDragId=entryId; _cgDragNodeId=nodeId;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{ const el=document.getElementById('cgc-'+entryId); if(el) el.classList.add('cg-dragging'); },0);
}
function cgDragOver(e, targetId, nodeId){
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  // Highlight target
  document.querySelectorAll('.cg-card').forEach(el=>el.classList.remove('cg-over'));
  if(targetId!==_cgDragId){ const el=document.getElementById('cgc-'+targetId); if(el) el.classList.add('cg-over'); }
}
function cgDrop(e, targetId, nodeId){
  e.preventDefault();
  document.querySelectorAll('.cg-card').forEach(el=>el.classList.remove('cg-over','cg-dragging'));
  if(!_cgDragId||_cgDragId===targetId) return;
  const n=db[nodeId]; if(!n||!n._childOrder) return;
  // Switch to manual sort when user drags
  catSortState[nodeId]='manual';
  const order=n._childOrder;
  const fromIdx=order.indexOf(_cgDragId);
  const toIdx=order.indexOf(targetId);
  if(fromIdx<0||toIdx<0) return;
  order.splice(fromIdx,1);
  order.splice(toIdx,0,_cgDragId);
  save();
  renderContent(nodeId);
  _cgDragId=null; _cgDragNodeId=null;
}
function cgDragEnd(e){
  document.querySelectorAll('.cg-card').forEach(el=>el.classList.remove('cg-over','cg-dragging'));
  _cgDragId=null; _cgDragNodeId=null;
}

function _showCatBgMenu(nodeId, x, y){
  if(!_isAdmin()) return;
  document.getElementById('_cat-bg-menu')?.remove();
  const n = db[nodeId]; if(!n) return;
  const hasBg = !!n._bgImage;

  const m = document.createElement('div');
  m.id = '_cat-bg-menu';
  m.style.cssText = `position:fixed;left:${x}px;top:${y}px;z-index:9999;
    background:rgba(4,6,14,.97);border:1px solid rgba(100,150,255,.35);border-radius:7px;
    padding:6px 0;min-width:210px;font-family:'Cinzel',serif;font-size:11px;
    box-shadow:0 8px 32px rgba(0,0,0,.85);backdrop-filter:blur(6px)`;

  m.innerHTML = `
    <div style="padding:7px 14px;font-size:8.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(120,160,255,.45);border-bottom:1px solid rgba(100,150,255,.15);margin-bottom:4px">🖼 ${esc(n.name)}</div>
    <div id="_cbg-load" style="padding:9px 16px;color:#d0d8f8;cursor:pointer;letter-spacing:1px"
      onmouseenter="this.style.background='rgba(100,150,255,.12)'" onmouseleave="this.style.background=''">
      ${hasBg ? '🔄 Changer l\'image de fond' : '🖼 Ajouter une image de fond'}
    </div>
    ${hasBg ? `
    <div style="padding:7px 16px 0;color:rgba(160,180,255,.4);font-size:9px;font-family:'EB Garamond',serif;font-style:italic">Opacité</div>
    <div style="padding:4px 16px 10px;display:flex;align-items:center;gap:8px">
      <input type="range" id="_cbg-opacity" min="5" max="100" value="${Math.round((n._bgOpacity??0.18)*100)}"
        style="flex:1;accent-color:#6080e0;cursor:pointer">
      <span id="_cbg-opval" style="font-size:9px;color:rgba(160,180,255,.5);min-width:30px">${Math.round((n._bgOpacity??0.18)*100)}%</span>
    </div>
    <div id="_cbg-remove" style="padding:9px 16px;color:#e07878;cursor:pointer;letter-spacing:1px"
      onmouseenter="this.style.background='rgba(200,80,80,.12)'" onmouseleave="this.style.background=''">
      🗑 Supprimer l'image
    </div>` : ''}
    <div style="border-top:1px solid rgba(100,150,255,.12);margin-top:4px">
      <div style="padding:8px 16px;color:rgba(160,170,230,.4);cursor:pointer"
        onmouseenter="this.style.background='rgba(100,150,255,.08)'" onmouseleave="this.style.background=''"
        onclick="document.getElementById('_cat-bg-menu')?.remove()">✕ Fermer</div>
    </div>`;

  document.body.appendChild(m);

  // Positionner
  requestAnimationFrame(()=>{
    const r = m.getBoundingClientRect();
    if(r.right  > window.innerWidth)  m.style.left = (x - r.width  - 6) + 'px';
    if(r.bottom > window.innerHeight) m.style.top  = (y - r.height - 6) + 'px';
  });

  // Charger image
  m.querySelector('#_cbg-load').onclick = ()=>{
    m.remove();
    const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.onchange = e=>{
      const file = e.target.files[0]; if(!file) return;
      _uploadToCloudinary(file, url=>{
        n._bgImage   = url;
        n._bgOpacity = n._bgOpacity ?? 0.18;
        save();
        renderContent(nodeId);
      });
    };
    inp.click();
  };

  // Opacité live
  const opSlider = m.querySelector('#_cbg-opacity');
  const opVal    = m.querySelector('#_cbg-opval');
  if(opSlider) opSlider.oninput = function(){
    const v = this.value / 100;
    n._bgOpacity = v;
    if(opVal) opVal.textContent = this.value + '%';
    // Appliquer en live sur tous les éléments de fond possibles
    const bg = document.getElementById('_cat-bg-layer');
    if(bg) bg.style.opacity = v;
    const secBg = document.getElementById('sec-bg');
    if(secBg) secBg.style.opacity = v;
    save();
  };

  // Supprimer
  const rmBtn = m.querySelector('#_cbg-remove');
  if(rmBtn) rmBtn.onclick = ()=>{
    delete n._bgImage; delete n._bgOpacity;
    save(); m.remove();
    renderContent(nodeId);
  };

  setTimeout(()=>{
    document.addEventListener('click', function _c(e){
      if(!m.contains(e.target)){ m.remove(); document.removeEventListener('click',_c); }
    });
  }, 0);
}

// Injecter l'image de fond dans un conteneur existant
function _injectCatBg(containerId, nodeId){
  const n = db[nodeId]; if(!n || !n._bgImage) return;
  const container = document.getElementById(containerId); if(!container) return;
  // Retirer l'ancienne si elle existe
  document.getElementById('_cat-bg-layer')?.remove();
  const img = document.createElement('img');
  img.id = '_cat-bg-layer';
  img.src = n._bgImage;
  // Déterminer le z-index selon le conteneur
  // hroot/groot/broot ont un canvas en z-index:1, l'image doit être en z-index:2 pour apparaître
  const _bgZIndex = ['hroot-outer','groot-outer','broot-outer','il-outer','hg-outer'].includes(containerId) ? 2 : 0;
  img.style.cssText = `position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    opacity:${n._bgOpacity??0.18};pointer-events:none;z-index:${_bgZIndex};border-radius:inherit`;
  container.style.position = 'relative';
  container.insertBefore(img, container.firstChild);
  // Clic droit sur le conteneur pour le menu
  container.oncontextmenu = e=>{ e.preventDefault(); _showCatBgMenu(nodeId, e.clientX, e.clientY); };
}

function renderSolarisImmersive(v, n){
  v.style.padding='0'; v.style.overflow='hidden'; v.style.background='#000';
  v.innerHTML='';
  if(window._solarisAnim){ cancelAnimationFrame(window._solarisAnim); window._solarisAnim=null; }

  // ── Nœuds de la toile ──
  const NODES = [
    { id:'sun',     name:'SOLARIS PRIME', role:'NOYAU CENTRAL',       rank:0, ring:0, idx:0 },
    { id:'mercury', name:'MERCURE',       role:'AGENT INFILTRATION',   rank:1, ring:1, idx:0 },
    { id:'venus',   name:'VÉNUS',         role:'CELLULE SÉDUCTION',    rank:1, ring:1, idx:1 },
    { id:'earth',   name:'TERRA',         role:'BASE OPÉRATIONNELLE',  rank:1, ring:1, idx:2 },
    { id:'mars',    name:'MARS',          role:'DIVISION COMBAT',      rank:1, ring:1, idx:3 },
    { id:'jupiter', name:'JUPITER',       role:'CONSEIL EXTERNE',      rank:2, ring:2, idx:0 },
