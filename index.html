    { id:'neptune', name:'NEPTUNE',       role:'UNITÉ FANTÔME',        rank:2, ring:2, idx:3 },
  ];

  const C = { // Couleurs
    bg:'#00020a', accent:'#00e5ff', dim:'rgba(0,229,255,.08)',
    gold:'#ffd060', danger:'#ff2244', web:'rgba(0,180,255,.18)',
    webHover:'rgba(0,229,255,.5)', pulse:'rgba(0,229,255,.35)',
    r1:'#00e5ff', r2:'#7040ff', core:'#ffe080'
  };

  function getEntry(id){ return n._solarBodies&&n._solarBodies[id]?db[n._solarBodies[id]]:null; }
  function isVisible(id){ const e=getEntry(id); return _isAdmin()||!e||!e._hidden; }

  // ── DOM ──
  const wrap=document.createElement('div');
  wrap.style.cssText=`position:relative;width:100%;height:100%;overflow:hidden;background:${C.bg};font-family:'Courier New',monospace`;
  v.appendChild(wrap);

  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;z-index:1';
  wrap.appendChild(canvas);

  // Scanlines overlay
  const scans=document.createElement('div');
  scans.style.cssText=`position:absolute;inset:0;pointer-events:none;z-index:4;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,229,255,.012) 3px,rgba(0,229,255,.012) 4px)`;
  wrap.appendChild(scans);

  // HUD haut-gauche
  const hud=document.createElement('div');
  hud.style.cssText='position:absolute;top:16px;left:16px;z-index:10;pointer-events:none';
  hud.innerHTML=`
    <div style="font-size:11px;color:${C.accent};letter-spacing:3px;margin-bottom:3px;text-shadow:0 0 8px ${C.accent}">◈ SOLARIS NETWORK</div>
    <div style="font-size:7px;color:rgba(0,229,255,.35);letter-spacing:2px" id="_sn-sub">TOILE ACTIVE — ${NODES.length} NŒUDS</div>
    <div style="font-size:7px;color:rgba(0,229,255,.2);margin-top:2px" id="_sn-coord">--</div>`;
  wrap.appendChild(hud);

  // HUD haut-droit
  const hudr=document.createElement('div');
  hudr.style.cssText='position:absolute;top:16px;right:16px;z-index:10;pointer-events:none;text-align:right';
  hudr.innerHTML=`
    <div style="font-size:9px;color:${C.danger};letter-spacing:2px" id="_sn-alert">● RÉSEAU CHIFFRÉ</div>
    <div style="font-size:7px;color:rgba(255,34,68,.35);margin-top:2px">ACCÈS : ${_isAdmin()?'OMEGA':'RESTREINT'}</div>`;
  wrap.appendChild(hudr);

  // Bouton retour
  const btn=document.createElement('button');
  btn.style.cssText=`position:absolute;bottom:18px;left:18px;z-index:10;
    background:transparent;border:1px solid rgba(0,229,255,.2);
    color:rgba(0,229,255,.5);font-family:monospace;font-size:9px;letter-spacing:2px;
    padding:7px 14px;cursor:pointer`;
  btn.textContent='◄ QUITTER';
  btn.onclick=()=>{ cancelAnimationFrame(window._solarisAnim); renderContent(n.parentId||n.id); };
  btn.onmouseenter=()=>btn.style.borderColor='rgba(0,229,255,.5)';
  btn.onmouseleave=()=>btn.style.borderColor='rgba(0,229,255,.2)';
  wrap.appendChild(btn);

  // Panneau dossier
  const panel=document.createElement('div');
  panel.id='_sn-panel';
  panel.style.cssText=`position:absolute;right:0;top:0;bottom:0;width:290px;z-index:20;
    background:rgba(0,2,12,.96);border-left:1px solid rgba(0,229,255,.12);
    transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;overflow:hidden`;
  wrap.appendChild(panel);

  // CSS anim
  if(!document.getElementById('_sn-css')){
    const s=document.createElement('style');s.id='_sn-css';
    s.textContent=`
      @keyframes _snBlink{0%,100%{opacity:1}50%{opacity:.25}}
      @keyframes _snPulseRing{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.5);opacity:0}}
      #_sn-alert{animation:_snBlink 2.5s ease-in-out infinite}
    `;
    document.head.appendChild(s);
  }

  // ── Canvas state ──
  let W=wrap.clientWidth, H=wrap.clientHeight;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');

  let cx=W/2, cy=H/2; // camera pan
  let zoom=1, targetZoom=1;
  let isDragging=false, dragStart={x:0,y:0}, camStart={x:0,y:0};
  let hovered=null, selected=null;
  let time=0;

  // Positions des nœuds (toile d'araignée — rayons concentriques + fils)
  // Anneau 0 = centre, anneau 1 = 4 nœuds, anneau 2 = 4 nœuds extérieurs
  const RING_R = [0, 170, 340]; // rayons en px monde
  function nodeWorldPos(nd){
    if(nd.ring===0) return {x:0,y:0};
    const count = NODES.filter(x=>x.ring===nd.ring).length;
    const baseAngle = nd.ring===1 ? -Math.PI/4 : 0;
    const a = baseAngle + (nd.idx/count)*Math.PI*2 - Math.PI/2;
    return {x:Math.cos(a)*RING_R[nd.ring], y:Math.sin(a)*RING_R[nd.ring]};
  }
  function toScreen(wx,wy){ return {x:cx+wx*zoom, y:cy+wy*zoom}; }
  function toWorld(sx,sy){ return {x:(sx-cx)/zoom, y:(sy-cy)/zoom}; }

  // Fils de la toile (toutes les connexions)
  // On connecte : centre→ring1, centre→ring2, ring1→ring1 (adjacent), ring1→ring2 (same idx), ring2→ring2 (adjacent)
  const THREADS = [];
  function addThread(a,b){ THREADS.push({a,b}); }
  const ring1 = NODES.filter(x=>x.ring===1);
  const ring2 = NODES.filter(x=>x.ring===2);
  NODES.filter(x=>x.ring===1).forEach(nd=>addThread('sun',nd.id));
  NODES.filter(x=>x.ring===2).forEach(nd=>addThread('sun',nd.id));
  // Anneau 1 → anneau 1 (entre voisins)
  ring1.forEach((nd,i)=>addThread(nd.id, ring1[(i+1)%ring1.length].id));
  // Anneau 2 → anneau 2 (entre voisins)
  ring2.forEach((nd,i)=>addThread(nd.id, ring2[(i+1)%ring2.length].id));
  // Diagonales anneau 1 → anneau 2 (même idx)
  ring1.forEach((nd)=>{ const match=ring2.find(x=>x.idx===nd.idx); if(match) addThread(nd.id,match.id); });
  // Quelques fils diagonaux supplémentaires pour remplir la toile
  ring1.forEach((nd,i)=>addThread(nd.id, ring2[(i+1)%ring2.length].id));

  // Particules sur les fils (données qui transitent)
  const PACKETS = [];
  function spawnPacket(){
    const t2=THREADS[Math.floor(Math.random()*THREADS.length)];
    const fromA=Math.random()>.5;
    PACKETS.push({
      from:fromA?t2.a:t2.b, to:fromA?t2.b:t2.a,
      progress:0, speed:.004+Math.random()*.008,
      alpha:.6+Math.random()*.4, size:1+Math.random()*1.5
    });
  }
  const spawnInterval=setInterval(spawnPacket,400);

  // Vibrations des fils au survol
  const threadVibs={};

  // ── DRAW ──
  function draw(){
    ctx.clearRect(0,0,W,H);

    // Fond
    const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.8);
    bg.addColorStop(0,'#00060f'); bg.addColorStop(.6,'#000208'); bg.addColorStop(1,'#000002');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // Cercles concentriques de la toile
    [1,2].forEach(ring=>{
      const sp=toScreen(0,0);
      const r=RING_R[ring]*zoom;
      ctx.strokeStyle=`rgba(0,150,200,${.06+ring*.02})`;
      ctx.lineWidth=.5;
      ctx.setLineDash([6,10]);
      ctx.beginPath(); ctx.arc(sp.x,sp.y,r,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    });

    // ── Fils de la toile ──
    THREADS.forEach(th=>{
      const na=NODES.find(x=>x.id===th.a), nb=NODES.find(x=>x.id===th.b);
      if(!na||!nb) return;
      const pA=toScreen(nodeWorldPos(na).x,nodeWorldPos(na).y);
      const pB=toScreen(nodeWorldPos(nb).x,nodeWorldPos(nb).y);
      const key=th.a+':'+th.b;
      const isHovThread=(hovered&&(hovered===th.a||hovered===th.b));
      const isSelThread=(selected&&(selected===th.a||selected===th.b));

      // Vibration
      if(isHovThread&&!threadVibs[key]) threadVibs[key]={amp:3,phase:Math.random()*Math.PI*2};
      if(!isHovThread&&threadVibs[key]){ threadVibs[key].amp*=.92; if(threadVibs[key].amp<.05) delete threadVibs[key]; }

      const vib=threadVibs[key];
      const mid={x:(pA.x+pB.x)/2, y:(pA.y+pB.y)/2};
      let cpX=mid.x, cpY=mid.y;
      if(vib){
        vib.phase+=.15;
        const perp={x:-(pB.y-pA.y),y:pB.x-pA.x};
        const len=Math.hypot(perp.x,perp.y)||1;
        cpX=mid.x+(perp.x/len)*Math.sin(vib.phase)*vib.amp;
        cpY=mid.y+(perp.y/len)*Math.sin(vib.phase)*vib.amp;
      } else {
        // Légère courbure naturelle de la toile
        const perp={x:-(pB.y-pA.y),y:pB.x-pA.x};
        const len=Math.hypot(perp.x,perp.y)||1;
        const curve=(Math.sin(time*.3+na.idx+nb.idx))*1.5*zoom;
        cpX=mid.x+(perp.x/len)*curve;
        cpY=mid.y+(perp.y/len)*curve;
      }

      const alpha = isSelThread?.55:isHovThread?.4:.14;
      const col = isSelThread?C.accent:isHovThread?C.accent:C.web;

      // Fil principal
      ctx.strokeStyle=isSelThread||isHovThread?C.accent:`rgba(0,180,220,${alpha})`;
      ctx.lineWidth=isSelThread?1.2:.5;
      ctx.globalAlpha=alpha;
      ctx.beginPath(); ctx.moveTo(pA.x,pA.y); ctx.quadraticCurveTo(cpX,cpY,pB.x,pB.y); ctx.stroke();
      ctx.globalAlpha=1;

      // Reflet lumineux sur fil sélectionné
      if(isSelThread){
        const grad=ctx.createLinearGradient(pA.x,pA.y,pB.x,pB.y);
        grad.addColorStop(0,'transparent'); grad.addColorStop(.5,`rgba(0,229,255,.25)`); grad.addColorStop(1,'transparent');
        ctx.strokeStyle=grad; ctx.lineWidth=3; ctx.globalAlpha=.4;
        ctx.beginPath(); ctx.moveTo(pA.x,pA.y); ctx.quadraticCurveTo(cpX,cpY,pB.x,pB.y); ctx.stroke();
        ctx.globalAlpha=1;
      }
    });

    // ── Paquets de données sur les fils ──
    PACKETS.forEach((pk,i)=>{
      const na=NODES.find(x=>x.id===pk.from), nb=NODES.find(x=>x.id===pk.to);
      if(!na||!nb){ PACKETS.splice(i,1); return; }
      pk.progress+=pk.speed;
      if(pk.progress>1){ PACKETS.splice(i,1); return; }
      const pA=toScreen(nodeWorldPos(na).x,nodeWorldPos(na).y);
      const pB=toScreen(nodeWorldPos(nb).x,nodeWorldPos(nb).y);
      const mid={x:(pA.x+pB.x)/2,y:(pA.y+pB.y)/2};
      const t2=pk.progress;
      // Bézier
      const x=(1-t2)*(1-t2)*pA.x+2*(1-t2)*t2*mid.x+t2*t2*pB.x;
      const y=(1-t2)*(1-t2)*pA.y+2*(1-t2)*t2*mid.y+t2*t2*pB.y;
      // Traîne
      for(let j=0;j<6;j++){
        const jt=Math.max(0,t2-j*.02);
        const jx=(1-jt)*(1-jt)*pA.x+2*(1-jt)*jt*mid.x+jt*jt*pB.x;
        const jy=(1-jt)*(1-jt)*pA.y+2*(1-jt)*jt*mid.y+jt*jt*pB.y;
        ctx.fillStyle=`rgba(0,229,255,${pk.alpha*(1-j/6)*.5})`;
        ctx.beginPath(); ctx.arc(jx,jy,.8,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle=`rgba(180,240,255,${pk.alpha})`;
      ctx.beginPath(); ctx.arc(x,y,pk.size,0,Math.PI*2); ctx.fill();
    });

    // ── Nœuds ──
    NODES.forEach(nd=>{
      const vis=isVisible(nd.id);
      if(!vis&&!_isAdmin()) return;
      const wp=nodeWorldPos(nd);
      const sp=toScreen(wp.x,wp.y);
      const isHov=hovered===nd.id, isSel=selected===nd.id;
      const entry=getEntry(nd.id);
      const r=(nd.ring===0?22:nd.ring===1?13:11)*zoom;

      if(!vis&&_isAdmin()){
        ctx.strokeStyle='rgba(255,34,68,.2)'; ctx.lineWidth=1; ctx.setLineDash([3,4]);
        ctx.beginPath(); ctx.arc(sp.x,sp.y,r,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle='rgba(255,34,68,.35)';
        ctx.font=`${Math.max(6,6*zoom)}px monospace`; ctx.textAlign='center';
        ctx.fillText('◌',sp.x,sp.y+2);
        return;
      }

      // Anneaux de pulse (nœud sélectionné)
      if(isSel){
        [1.8,2.6].forEach((mult,pi)=>{
          const pr=(r*mult)*(1+Math.sin(time*2+pi*1.2)*.08);
          ctx.strokeStyle=`rgba(0,229,255,${.15-pi*.05})`;
          ctx.lineWidth=.8; ctx.globalAlpha=.6+Math.sin(time*2+pi)*(.2);
          ctx.beginPath(); ctx.arc(sp.x,sp.y,pr,0,Math.PI*2); ctx.stroke();
          ctx.globalAlpha=1;
        });
      }

      // Halo
      const haloA=isHov?.18:isSel?.22:.08+Math.sin(time*1.2+nd.idx)*.03;
      const haloCol=nd.ring===0?C.core:nd.ring===1?C.r1:C.r2;
      const hg=ctx.createRadialGradient(sp.x,sp.y,r*.3,sp.x,sp.y,r*2.5);
      hg.addColorStop(0,haloCol.replace(')',`,${haloA})`).replace('#',`rgba(`).replace(/([0-9a-f]{2})/gi,(m)=>parseInt(m,16)+','));
      // Simple approach:
      if(nd.ring===0){
        const hg2=ctx.createRadialGradient(sp.x,sp.y,r*.2,sp.x,sp.y,r*2.8);
        hg2.addColorStop(0,`rgba(255,210,80,${haloA})`); hg2.addColorStop(1,'transparent');
        ctx.fillStyle=hg2; ctx.beginPath(); ctx.arc(sp.x,sp.y,r*2.8,0,Math.PI*2); ctx.fill();
      } else if(nd.ring===1){
        const hg2=ctx.createRadialGradient(sp.x,sp.y,r*.2,sp.x,sp.y,r*2.5);
        hg2.addColorStop(0,`rgba(0,229,255,${haloA})`); hg2.addColorStop(1,'transparent');
        ctx.fillStyle=hg2; ctx.beginPath(); ctx.arc(sp.x,sp.y,r*2.5,0,Math.PI*2); ctx.fill();
      } else {
        const hg2=ctx.createRadialGradient(sp.x,sp.y,r*.2,sp.x,sp.y,r*2.2);
        hg2.addColorStop(0,`rgba(112,64,255,${haloA})`); hg2.addColorStop(1,'transparent');
        ctx.fillStyle=hg2; ctx.beginPath(); ctx.arc(sp.x,sp.y,r*2.2,0,Math.PI*2); ctx.fill();
      }

      // Corps du nœud
      let nodeGrad;
      if(nd.ring===0){
        nodeGrad=ctx.createRadialGradient(sp.x-r*.3,sp.y-r*.3,r*.1,sp.x,sp.y,r);
        nodeGrad.addColorStop(0,'#fff8c0'); nodeGrad.addColorStop(.5,'#ffa820'); nodeGrad.addColorStop(1,'#c05000');
      } else if(nd.ring===1){
        nodeGrad=ctx.createRadialGradient(sp.x-r*.3,sp.y-r*.3,r*.1,sp.x,sp.y,r);
        nodeGrad.addColorStop(0,'rgba(160,240,255,.95)'); nodeGrad.addColorStop(.6,'rgba(0,180,220,.85)'); nodeGrad.addColorStop(1,'rgba(0,60,100,.9)');
      } else {
        nodeGrad=ctx.createRadialGradient(sp.x-r*.3,sp.y-r*.3,r*.1,sp.x,sp.y,r);
        nodeGrad.addColorStop(0,'rgba(180,140,255,.95)'); nodeGrad.addColorStop(.6,'rgba(100,60,220,.85)'); nodeGrad.addColorStop(1,'rgba(30,10,80,.9)');
      }
      ctx.fillStyle=nodeGrad;
      ctx.beginPath(); ctx.arc(sp.x,sp.y,r,0,Math.PI*2); ctx.fill();

      // Contour
      ctx.strokeStyle=isHov||isSel?'rgba(0,229,255,.8)':'rgba(0,200,255,.3)';
      ctx.lineWidth=isHov||isSel?1.5:.6;
      ctx.beginPath(); ctx.arc(sp.x,sp.y,r,0,Math.PI*2); ctx.stroke();

      // Portrait miniature si disponible
      if(entry&&entry.images&&entry.images[0]&&vis&&zoom>.5){
        try{
          const img=new Image(); img.src=entry.images[0];
          if(img.complete&&img.naturalWidth>0){
            ctx.save(); ctx.beginPath(); ctx.arc(sp.x,sp.y,r*.85,0,Math.PI*2); ctx.clip();
            ctx.globalAlpha=.75;
            ctx.drawImage(img,sp.x-r*.85,sp.y-r*.85,r*1.7,r*1.7);
            ctx.globalAlpha=1; ctx.restore();
          }
        }catch(e){}
      }

      // Label
      if(zoom>.35){
        const labelY=sp.y+r+(nd.ring===0?18:14)*zoom;
        ctx.fillStyle=nd.ring===0?C.gold:isHov||isSel?C.accent:'rgba(0,210,255,.7)';
        ctx.font=`${Math.max(7,nd.ring===0?10:8)*zoom}px monospace`;
        ctx.textAlign='center'; ctx.globalAlpha=.9;
        ctx.fillText(nd.name,sp.x,labelY);
        if(zoom>.6&&nd.ring>0){
          ctx.fillStyle='rgba(0,180,255,.35)';
          ctx.font=`${Math.max(6,6*zoom)}px monospace`;
          ctx.fillText(nd.role,sp.x,labelY+(nd.ring===0?14:12)*zoom);
        }
        ctx.globalAlpha=1;
      }

      // Indicateur CLASSIFIÉ
      if(entry&&entry._hidden&&_isAdmin()){
        ctx.fillStyle='rgba(255,34,68,.7)';
        ctx.font=`${Math.max(6,6*zoom)}px monospace`;
        ctx.textAlign='center';
        ctx.fillText('◈',sp.x,sp.y-r-4*zoom);
      }
    });

    // Coords HUD
    const wc=toWorld(W/2,H/2);
    const el=document.getElementById('_sn-coord');
    if(el) el.textContent=`PAN ${wc.x.toFixed(0)},${wc.y.toFixed(0)} · ZOOM ${(zoom*100).toFixed(0)}%`;
  }

  // ── Loop ──
  function loop(){
    window._solarisAnim=requestAnimationFrame(loop);
    time+=.005;
    zoom+=(targetZoom-zoom)*.1;
    draw();
  }
  loop();

  // ── Interactions souris ──
  function getNodeAt(sx,sy){
    const wp=toWorld(sx,sy);
    let best=null, bestD=Infinity;
    NODES.forEach(nd=>{
      if(!isVisible(nd.id)) return;
      const p=nodeWorldPos(nd);
      const d=Math.hypot(p.x-wp.x,p.y-wp.y);
      const hr=(nd.ring===0?28:16)/zoom;
      if(d<hr&&d<bestD){ bestD=d; best=nd; }
    });
    return best;
  }

  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect(), sx=e.clientX-r.left, sy=e.clientY-r.top;
    if(isDragging){ cameraX_=camStart.x+(sx-dragStart.x); cy=camStart.y+(sy-dragStart.y); cx=cameraX_; return; }
    const nd=getNodeAt(sx,sy);
    hovered=nd?nd.id:null;
    canvas.style.cursor=nd?'pointer':'crosshair';
  });
  canvas.addEventListener('mousedown',e=>{
    const r=canvas.getBoundingClientRect();
    isDragging=true; dragStart={x:e.clientX-r.left,y:e.clientY-r.top}; camStart={x:cx,y:cy};
  });
  let cameraX_=cx;
  canvas.addEventListener('mouseup',e=>{
    const r=canvas.getBoundingClientRect();
    const dx=Math.abs(e.clientX-r.left-dragStart.x), dy=Math.abs(e.clientY-r.top-dragStart.y);
    isDragging=false;
    if(dx<5&&dy<5){
      const nd=getNodeAt(e.clientX-r.left,e.clientY-r.top);
      if(nd){ selected=nd.id; openPanel(nd.id); }
      else { selected=null; panel.style.transform='translateX(100%)'; }
    }
  });
  canvas.addEventListener('mouseleave',()=>{ isDragging=false; hovered=null; });
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    targetZoom=Math.max(.2,Math.min(3,targetZoom*(e.deltaY>0?.88:1.14)));
  },{passive:false});

  // Touch
  let ltd=0;
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===1){ isDragging=true; dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY}; camStart={x:cx,y:cy}; }
    else if(e.touches.length===2) ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  });
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&isDragging){ cx=camStart.x+(e.touches[0].clientX-dragStart.x); cy=camStart.y+(e.touches[0].clientY-dragStart.y); cameraX_=cx; }
    else if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); targetZoom=Math.max(.2,Math.min(3,targetZoom*(d/ltd))); ltd=d; }
  },{passive:false});
  canvas.addEventListener('touchend',()=>{ isDragging=false; });

  // ── Panneau dossier ──
  function openPanel(bodyId){
    const nd=NODES.find(x=>x.id===bodyId); if(!nd) return;
    const entry=getEntry(bodyId);
    const vis=isVisible(bodyId);
    const hcol=nd.ring===0?C.gold:nd.ring===1?C.r1:C.r2;

    let portraitHTML;
    if(!vis){
      portraitHTML=`<div style="height:140px;border:1px solid rgba(255,34,68,.15);display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,34,68,.02);margin-bottom:14px">
        <div style="font-size:11px;color:rgba(255,34,68,.4);letter-spacing:3px">ACCÈS REFUSÉ</div>
        <div style="font-size:8px;color:rgba(255,34,68,.2);margin-top:4px;letter-spacing:1px">HABILITATION INSUFFISANTE</div>
      </div>`;
    } else if(entry&&entry.images&&entry.images[0]){
      portraitHTML=`<div style="position:relative;height:150px;overflow:hidden;margin-bottom:14px">
        <img src="${entry.images[0]}" style="width:100%;height:100%;object-fit:cover;filter:${entry._hidden?'brightness(.4)':'none'}">
        <div style="position:absolute;inset:0;background:linear-gradient(transparent 55%,rgba(0,2,12,.95))"></div>
        <div style="position:absolute;bottom:6px;left:10px;font-size:7px;color:${hcol};letter-spacing:2px">${entry._hidden?'CLASSIFIÉ':'IDENTIFIÉ'}</div>
      </div>`;
    } else {
      portraitHTML=`<div style="height:80px;border:1px dashed rgba(0,229,255,.1);display:flex;align-items:center;justify-content:center;margin-bottom:14px">
        <div style="font-size:8px;color:rgba(0,229,255,.2);letter-spacing:2px">AUCUN DOSSIER VISUEL</div>
      </div>`;
    }

    const statsHTML=entry&&entry.stats&&vis?`
      <div style="border-top:1px solid rgba(0,229,255,.08);padding-top:10px;margin-top:10px">
        ${['phys','magic','intel'].map(cat=>{
          const vals=Object.values(entry.stats[cat]||{}).map(Number).filter(v=>v>0);
          if(!vals.length) return '';
          const avg=Math.round(vals.reduce((a,b2)=>a+b2,0)/vals.length);
          const label=cat==='phys'?'PHYSIQUE':cat==='magic'?'MAGIE':'INTEL';
          const col=cat==='phys'?'#ff7040':cat==='magic'?'#9050ff':'#30c8ff';
          return `<div style="margin-bottom:5px">
            <div style="display:flex;justify-content:space-between;font-size:7px;color:${col};margin-bottom:2px;letter-spacing:1px"><span>${label}</span><span>${avg}</span></div>
            <div style="height:1px;background:rgba(255,255,255,.06)"><div style="height:100%;width:${avg}%;background:${col}"></div></div>
          </div>`;
        }).join('')}
      </div>`:'' ;

    let actions='';
    if(_isAdmin()){
      if(entry){
        actions=`
          <button onclick="selectNode('${entry.id}');document.getElementById('_sn-panel').style.transform='translateX(100%)'"
            style="width:100%;padding:8px;background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.25);color:${C.accent};font-family:monospace;font-size:9px;letter-spacing:2px;cursor:pointer;margin-bottom:5px"
            onmouseenter="this.style.background='rgba(0,229,255,.12)'" onmouseleave="this.style.background='rgba(0,229,255,.05)'">► OUVRIR DOSSIER</button>
          <button onclick="window._solarToggleVisible('${bodyId}','${n.id}')"
            style="width:100%;padding:7px;background:${entry._hidden?'rgba(255,34,68,.05)':'rgba(255,34,68,.02)'};border:1px solid rgba(255,34,68,${entry._hidden?.25:.1});color:rgba(255,34,68,${entry._hidden?.6:.35});font-family:monospace;font-size:8px;letter-spacing:1px;cursor:pointer"
            onmouseenter="this.style.background='rgba(255,34,68,.1)'" onmouseleave="this.style.background='${entry._hidden?'rgba(255,34,68,.05)':'rgba(255,34,68,.02)'}'">
            ${entry._hidden?'▲ RÉVÉLER':'▼ RECLASSIFIER'}</button>`;
      } else {
        actions=`<button onclick="window._solarLinkEntry('${bodyId}','${n.id}')"
          style="width:100%;padding:8px;background:transparent;border:1px dashed rgba(0,229,255,.15);color:rgba(0,229,255,.4);font-family:monospace;font-size:8px;letter-spacing:2px;cursor:pointer"
          onmouseenter="this.style.background='rgba(0,229,255,.06)'" onmouseleave="this.style.background='transparent'">+ ENREGISTRER DOSSIER</button>`;
      }
    } else if(vis&&entry){
      actions=`<button onclick="selectNode('${entry.id}');document.getElementById('_sn-panel').style.transform='translateX(100%)'"
        style="width:100%;padding:8px;background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.25);color:${C.accent};font-family:monospace;font-size:9px;letter-spacing:2px;cursor:pointer"
        onmouseenter="this.style.background='rgba(0,229,255,.12)'" onmouseleave="this.style.background='rgba(0,229,255,.05)'">► ACCÉDER AU DOSSIER</button>`;
    }

    panel.innerHTML=`
      <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,${hcol},transparent)"></div>
      <div style="padding:14px 16px;border-bottom:1px solid rgba(0,229,255,.07)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-size:7px;color:rgba(0,229,255,.25);letter-spacing:2px">NŒUD #${String(NODES.findIndex(x=>x.id===bodyId)).padStart(3,'0')}</div>
          <button onclick="document.getElementById('_sn-panel').style.transform='translateX(100%)';selected=null" style="background:none;border:none;color:rgba(0,229,255,.3);cursor:pointer;font-size:11px">✕</button>
        </div>
        <div style="font-size:12px;color:${hcol};letter-spacing:3px;margin-bottom:3px">${vis||_isAdmin()?nd.name:'████████'}</div>
        <div style="font-size:8px;color:rgba(0,229,255,.35);letter-spacing:1px;margin-bottom:8px">${nd.role}</div>
        <div style="display:flex;gap:5px">
          <span style="font-size:6px;padding:2px 7px;border:1px solid rgba(0,229,255,.15);color:rgba(0,229,255,.4);letter-spacing:1px">${nd.rank===0?'OMEGA':nd.rank===1?'ALPHA':'BETA'}</span>
          ${entry?`<span style="font-size:6px;padding:2px 7px;border:1px solid ${entry._hidden?'rgba(255,34,68,.25)':'rgba(0,229,255,.12)'};color:${entry._hidden?'rgba(255,34,68,.55)':'rgba(0,229,255,.35)'};letter-spacing:1px">${entry._hidden?'SECRET':'ACTIF'}</span>`:''}
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:14px 16px;scrollbar-width:thin;scrollbar-color:rgba(0,229,255,.15) transparent">
        ${portraitHTML}
        ${entry&&entry.charBio&&vis?`<div style="font-size:10px;color:rgba(0,210,255,.45);line-height:1.7;margin-bottom:12px">${esc(entry.charBio.slice(0,180))}${entry.charBio.length>180?'…':''}</div>`:''}
        ${statsHTML}
        <div style="margin-top:12px">${actions}</div>
      </div>
    `;
    panel.style.transform='translateX(0)';

    // Zoom léger vers le nœud cliqué
    const wp=nodeWorldPos(nd);
    const tx=W/2-wp.x*zoom, ty=H/2-wp.y*zoom;
    let p=0; const sx0=cx,sy0=cy;
    const fly=()=>{ p+=.07; cx=sx0+(tx-sx0)*Math.min(1,p); cy=sy0+(ty-sy0)*Math.min(1,p); cameraX_=cx; if(p<1) requestAnimationFrame(fly); };
    fly();
  }

  window._solarLinkEntry=function(bodyId,catId){
    const chars=Object.values(db).filter(e=>e.type==='entry'&&e.entryType==='character');
    document.getElementById('_solar-link-modal')?.remove();
    const m=document.createElement('div');
    m.id='_solar-link-modal';
    m.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;padding:20px;font-family:monospace';
    m.innerHTML=`<div style="background:#00020a;border:1px solid rgba(0,229,255,.25);padding:20px;width:min(420px,96vw);max-height:80vh;display:flex;flex-direction:column;gap:10px">
      <div style="font-size:10px;color:${C.accent};letter-spacing:3px">ENREGISTRER NŒUD — ${NODES.find(b=>b.id===bodyId)?.name||bodyId}</div>
      <input placeholder="RECHERCHER..." oninput="
        const q=this.value.toLowerCase();
        this.nextElementSibling.innerHTML=Object.values(db).filter(e=>e.type==='entry'&&e.entryType==='character'&&(e.name+' '+(e.lastName||'')).toLowerCase().includes(q))
          .map(e=>'<div style=\"padding:7px 10px;cursor:pointer;color:rgba(0,229,255,.7);font-size:10px;border-bottom:1px solid rgba(0,229,255,.05)\" onmouseenter=\"this.style.background=\\'rgba(0,229,255,.05)\\'\" onmouseleave=\"this.style.background=\\'\\'\" onclick=\"_solarDoLink(\\'${bodyId}\\',\\'${catId}\\',\\''+e.id+'\\')\">'+(e.name+(e.lastName?' '+e.lastName:''))+'</div>').join('')||'<div style=\"color:rgba(0,229,255,.2);padding:8px;font-size:9px\">AUCUN RÉSULTAT</div>'
      " style="background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.15);padding:7px 10px;color:${C.accent};font-family:monospace;font-size:10px;outline:none;letter-spacing:1px">
      <div style="overflow-y:auto;max-height:45vh;border:1px solid rgba(0,229,255,.08)">${chars.map(e=>`<div style="padding:7px 10px;cursor:pointer;color:rgba(0,229,255,.7);font-size:10px;border-bottom:1px solid rgba(0,229,255,.05)" onmouseenter="this.style.background='rgba(0,229,255,.05)'" onmouseleave="this.style.background=''" onclick="_solarDoLink('${bodyId}','${catId}','${e.id}')">${e.name+(e.lastName?' '+e.lastName:'')}</div>`).join('')}</div>
      <button onclick="document.getElementById('_solar-link-modal').remove()" style="padding:7px;background:none;border:1px solid rgba(0,229,255,.1);color:rgba(0,229,255,.35);font-family:monospace;font-size:9px;cursor:pointer;letter-spacing:2px">ANNULER</button>
    </div>`;
    document.body.appendChild(m);
    m.addEventListener('click',e=>{ if(e.target===m) m.remove(); });
  };
  window._solarDoLink=function(bodyId,catId,entryId){
    document.getElementById('_solar-link-modal')?.remove();
    const cat=db[catId]; if(!cat) return;
    if(!cat._solarBodies) cat._solarBodies={};
    cat._solarBodies[bodyId]=entryId;
    const entry=db[entryId]; if(entry) entry._hidden=true;
    save(); openPanel(bodyId);
  };
  window._solarToggleVisible=function(bodyId,catId){
    const cat=db[catId]; if(!cat||!cat._solarBodies) return;
    const eid=cat._solarBodies[bodyId]; if(!eid) return;
    const entry=db[eid]; if(!entry) return;
    entry._hidden=!entry._hidden;
    save(); openPanel(bodyId);
  };

  const ro=new ResizeObserver(()=>{
    W=wrap.clientWidth; H=wrap.clientHeight;
    canvas.width=W; canvas.height=H;
    cx=W/2; cy=H/2; cameraX_=cx;
  });
  ro.observe(wrap);

  // Cleanup
  const origSelectNode=window.selectNode;
  v._cleanup=()=>{ clearInterval(spawnInterval); cancelAnimationFrame(window._solarisAnim); };
}



function renderCategory(v,n){
  // ── Histoire — check en premier (priorité absolue) ──
  if(n.kind==='histoire-root' || n.name==='Histoire' || n.name==='Histoire de Pyli'){
    renderHistoireRootImmersive(v,n);
    return;
  }

  const isGateRoot=n.kind==='gate-root';

  // ── Special immersive render for gate-root ──
  if(isGateRoot){
    renderGateRootImmersive(v,n);
    return;
  }

  // ── Solaris — système solaire immersif ──
  if(n.kind==='solaris' || n.name==='Solaris'){
    renderSolarisImmersive(v,n);
    return;
  }

  // ── Special immersive render for Iluminia (world) ──
  if(n.kind==='world'){
    renderIluminiaImmersive(v,n);
    return;
  }

  // ── Special immersive render for Les Gardiens ──
  if(n.kind==='gardiens'){
    renderGardiensImmersive(v,n);
    return;
  }

  // ── Special immersive render for Royaumes & Nations / Géographie / Pays ──
  if(n.name==='Royaumes & Nations'||n.kind==='world-root'||n.name==='Géographie'){
    renderGeographieImmersive(v,n);
    return;
  }

  // ── Special immersive render for Division subcategory ──
  {
    const parentNode = n.parentId && db[n.parentId];
    if(n._isDivision || n.type==='division' ||
       (parentNode && (parentNode.name==='Les 13 Divisions' || parentNode._isDivisionParent) && n.type==='category') ||
       (n.type==='category' && n.parentId && (() => { let p=db[n.parentId]; return p && (p.name==='Les 13 Divisions'||p._isDivisionParent); })())){
      // Ensure _isDivision flag is set
      if(!n._isDivision){ n._isDivision=true; if(!n.divMembers) n.divMembers=[{name:'— À définir',rank:'Rang 1',entryId:null},{name:'— À définir',rank:'Rang 2',entryId:null},{name:'— À définir',rank:'Rang 3',entryId:null},{name:'— À définir',rank:'Rang 4',entryId:null}]; save(); }
      renderDivisionImmersive(v,n);
      return;
    }
  }

  // ── Special immersive render for Magie & Pouvoirs ──
  if(n.kind==='magie-root'){
    renderMagieImmersive(v,n);
    return;
  }
  // ── Vue immersive pour sous-catégories Magie/Énergie ──
  if(n.kind==='magie-sub'){
    renderMagieSubImmersive(v,n);
    return;
  }



  if(n.name==='Secrets'){
    renderSecretsImmersive(v,n);
    return;
  }
  // ── Musicothèque ──
  if(n.kind==='music-lib'){
    renderMusicLib(v,n);
    return;
  }

  if(n.kind==='carte'){
    renderCarteImmersive(v,n);
    return;
  }
  if(n.kind==='comparatif'){
    renderComparatifView(v,n);
    return;
  }
  // ── Nouvelles catégories racine ──

  if(n.kind==='bestiaire-root'){
    renderBestiaireImmersive(v,n);
    return;
  }
  if(n.kind==='artefacts-root'){
    renderArtefactsImmersive(v,n);
    return;
  }
  if(n.kind==='lore-root'){
    renderLoreImmersive(v,n);
    return;
  }

  const children=(n.children||[]).map(id=>db[id]).filter(Boolean);
  const cats=children.filter(c=>c.type==='category'||c.type==='gate');
  const ents=children.filter(c=>c.type==='entry');

  // ── Special character-grid view — pour toute catégorie de personnages (hors divisions) ──
  function isInDivisionTree(node){
    if(!node) return false;
    if(node._isDivision || node._isDivisionParent || node.name==='Les 13 Divisions') return true;
    return isInDivisionTree(db[node.parentId]);
  }
  if(!isInDivisionTree(n)){
    // Direct characters in this category
    const charEnts=ents.filter(e=>e.entryType==='character');
    // Non-character entries (blocks activation if mixed)
    const nonCharEnts=ents.filter(e=>e.entryType!=='character');
    // Show grid if this category has characters and no non-character entries
    if(charEnts.length>0 && nonCharEnts.length===0){
      renderCharacterGridView(v,n);
      return;
    }
  }

  let h=`<div class="ev-wrap">
    <div class="cv-head">
      ${n.iconData ? `<img class="cv-icon-img" src="${n.iconData}" alt="">` : `<div class="cv-icon-big">${n.icon||'📁'}</div>`}
      <div>
        <div class="cv-title${isGateRoot?' cv-gate-title':''}">${esc(n.name)}</div>
        ${n.subtitle?`<div class="cv-desc">${esc(n.subtitle)}</div>`:''}
      </div>
    </div>`;

  if(cats.length){
    h+=`<div class="sec-label">${isGateRoot?'Portes':'Sous-catégories'}</div><div class="cards">`;
    cats.forEach(c=>{
      if(!_isAdmin() && c._hidden){
        h+=`<div class="card card-hidden-visitor" style="pointer-events:none"><div class="chv-mark">?</div></div>`;
        return;
      }
      const cnt=countAll(c.id);
      const isG=c.type==='gate';
      const iconHtml=c.iconData
        ? `<img class="card-icon-img" src="${c.iconData}" alt="">`
        : `<div class="card-no-img" style="height:60px">${c.icon||'📁'}</div>`;
      const hiddenDim = c._hidden && _isAdmin() ? ' card-admin-dim' : '';
      h+=`<div class="card${isG?' gate-card':''}${hiddenDim}" onclick="selectNode('${c.id}')" oncontextmenu="event.preventDefault();event.stopPropagation();showAudioInheritMenu('${c.id}',event.clientX,event.clientY)">
        ${iconHtml}
        <div class="card-badge${isG?' gate':''}">${isG?'PORTE':'CATÉGORIE'}</div>
        <div class="card-name">${esc(c.name)}</div>
        ${c.subtitle?`<div class="card-sub">${esc(c.subtitle)}</div>`:''}
        <div style="margin-top:7px;font-family:'Cinzel',serif;font-size:9px;color:var(--text3)">${cnt} élément${cnt>1?'s':''}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  if(ents.length){
    const abilityEnts = ents.filter(e=>e.entryType==='ability');
    const otherEnts   = ents.filter(e=>e.entryType!=='ability');

    // ── Grille Abilities ──
    if(abilityEnts.length){
      const themeCol = n._triangleColor || '#7040c8';
      const rgb = themeCol.length===7 ? `${parseInt(themeCol.slice(1,3),16)},${parseInt(themeCol.slice(3,5),16)},${parseInt(themeCol.slice(5,7),16)}` : '112,64,200';
      h+=`<div class="sec-label" style="color:${themeCol}99">⚡ Capacités</div>`;
      h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:18px">`;
      abilityEnts.forEach(e=>{
        const rank=e.abilityRank||'';
        const rankCol=rank?abilityRankColor(rank):'transparent';
        const img=e.images&&e.images[0]
          ? `<div style="width:100%;height:110px;overflow:hidden;border-radius:5px 5px 0 0"><img src="${e.images[0]}" style="width:100%;height:100%;object-fit:cover"></div>`
          : `<div style="width:100%;height:80px;display:flex;align-items:center;justify-content:center;font-size:32px;color:rgba(${rgb},.25)">⚡</div>`;
        h+=`<div onclick="selectNode('${e.id}')" style="background:rgba(${rgb},.07);border:1px solid rgba(${rgb},.22);border-radius:6px;cursor:pointer;transition:all .18s;overflow:hidden" onmouseenter="this.style.background='rgba(${rgb},.14)';this.style.borderColor='rgba(${rgb},.45)'" onmouseleave="this.style.background='rgba(${rgb},.07)';this.style.borderColor='rgba(${rgb},.22)'">
          ${img}
          <div style="padding:8px 10px">
            ${rank?`<div style="display:inline-block;font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:${rankCol};background:${rankCol}22;border:1px solid ${rankCol}55;padding:1px 7px;border-radius:3px;margin-bottom:5px">${esc(rank)}</div>`:''}
            <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--text);letter-spacing:.5px;margin-bottom:3px">${esc(e.name)}</div>
            ${e.abilitySchool?`<div style="font-size:10px;color:rgba(${rgb},.65);font-style:italic">${esc(e.abilitySchool)}</div>`:''}
            ${e.subtitle?`<div style="font-size:10px;color:var(--text3)">${esc(e.subtitle)}</div>`:''}
          </div>
        </div>`;
      });
      h+=`</div>`;
    }

    // ── Autres entrées génériques ──
    if(otherEnts.length){
      h+=`<div class="sec-label">Entrées</div><div class="cards">`;
      otherEnts.forEach(e=>{
        const img=e.images&&e.images[0]
          ? `<div class="card-img-wrap"><img class="card-img" src="${e.images[0]}"></div>`
          : e.iconData
            ? `<img class="card-icon-img" style="margin-top:10px" src="${e.iconData}" alt="">`
            : `<div class="card-no-img">${e.icon||'📄'}</div>`;
        if(!_isAdmin() && e._hidden){
          h+=`<div class="card card-hidden-visitor"><div class="chv-mark">?</div></div>`;
        } else {
          h+=`<div class="card${e._hidden&&_isAdmin()?' card-admin-dim':''}" onclick="selectNode('${e.id}')">
            ${img}
            <div class="card-badge">${esc(n.name)}</div>
            <div class="card-name">${esc(e.name)}</div>
            ${e.subtitle?`<div class="card-sub">${esc(e.subtitle)}</div>`:''}
          </div>`;
        }
      });
      h+=`</div>`;
    }
  }

  if(!cats.length&&!ents.length) h+=`<div class="empty">Catégorie vide. Ajoutez une sous-catégorie ou une entrée.</div>`;

  h+=`<div class="ev-actions">
    ${n.kind!=='gate-root'&&n.kind!=='world-root'&&n.kind!=='magie-sub'&&n.kind!=='magie-root'?`<button class="btn p" onclick="openNewEntryModal('${n.id}','character')" style="border-color:#5a3d7a;color:#9b6fd4">✦ + Personnage</button>`:''}
    ${n.kind!=='gate-root'&&n.kind!=='world-root'&&n.kind!=='magie-sub'&&n.kind!=='magie-root'?`<button class="btn p" onclick="openNewEntryModal('${n.id}','map')" style="border-color:#1a4a2a;color:#5aad7a">🗺 + Carte</button>`:''}
    ${n.kind==='magie-sub'?`<button class="btn p" onclick="openNewEntryModal('${n.id}','ability')" style="border-color:#6040b0;color:#a870e8">⚡ + Capacité</button>`:''}
    ${n.kind!=='gate-root'&&n.kind!=='world-root'&&n.kind!=='magie-sub'?`<button class="btn p" onclick="openNewEntryModal('${n.id}','generic')">+ Entrée</button>`:''}
    ${n.kind==='gate-root'?`<button class="btn gate-btn" onclick="openNewGateModal('${n.id}')">+ Porte</button>`:`<button class="btn p" onclick="openNewCatModal('${n.id}','generic')">+ Sous-catégorie</button>`}
    ${n.name==='Les 13 Divisions'?'<button class="btn p" onclick="generateAllDivisions(\''+n.id+'\')" style="border-color:#8855cc;color:#c090ff">⚔ Générer les 13 Divisions</button>':''}
    <button class="btn" onclick="openEditModal('${n.id}')">✎ Modifier</button>
    <button class="btn d" onclick="doDelete('${n.id}')">✕ Supprimer</button>
  </div></div>`;
  v.innerHTML=h;
  // Image de fond + clic droit
  const ew = v.querySelector('.ev-wrap');
  if(ew){
    ew.id = '_cat-generic-wrap';
    ew.style.position = 'relative';
    _injectCatBg('_cat-generic-wrap', n.id);
    ew.oncontextmenu = e=>{ if(e.target.closest('.card')||e.target.closest('.cg-card')) return; e.preventDefault(); _showCatBgMenu(n.id, e.clientX, e.clientY); };
  }
  // Note: audio is handled by renderContent via findInheritedAudioNodeId
}

function renderGateEntry(v,n){

  const GATE_THEMES = {

      name:'Mort', bg:'#000005', accent:'#3a7aaa', accent2:'#0a2040',

      sealSymbol:'skull', initCanvas: _gateCanvasMort

    1: { // Orgueil
      name:'Orgueil', bg:'#0a0010', accent:'#c8a020', accent2:'#4a0080',
      textColor:'#e8d080', glowColor:'rgba(200,160,32,', titleColor:'#ffe888',
      sealSymbol:'crown', initCanvas: _gateCanvasOrgueil
    },
    2: { // Avarice
      name:'Avarice', bg:'#010a02', accent:'#20a040', accent2:'#c8a020',
      textColor:'#80d890', glowColor:'rgba(32,160,64,', titleColor:'#b8f8c0',
      sealSymbol:'eye', initCanvas: _gateCanvasAvarice
    },
    3: { // Envie

    },
    4: { // Colère
      name:'Colère', bg:'#0a0100', accent:'#e03010', accent2:'#ff8020',
      textColor:'#ff9060', glowColor:'rgba(224,48,16,', titleColor:'#ffb888',
      sealSymbol:'fist', initCanvas: _gateCanvasColere
    },
    5: { // Luxure

      textColor:'#e880a0', glowColor:'rgba(192,32,96,', titleColor:'#ffb0c8',
      sealSymbol:'rose', initCanvas: _gateCanvasLuxure
    },
    6: { // Gourmandise
      name:'Gourmandise', bg:'#080200', accent:'#c05010', accent2:'#802000',
      textColor:'#e09050', glowColor:'rgba(192,80,16,', titleColor:'#ffc880',
      sealSymbol:'vortex', initCanvas: _gateCanvasGourmandise
    },
    7: { // Paresse
      name:'Paresse', bg:'#010308', accent:'#2040a0', accent2:'#080820',
      textColor:'#6080c0', glowColor:'rgba(32,64,160,', titleColor:'#a0b8e8',
      sealSymbol:'chain', initCanvas: _gateCanvasParesse

  // Cleanup

  v.innerHTML='';
  v.style.padding='0'; v.style.overflow='hidden'; v.style.background=bg;

  const wrap = document.createElement('div');
  wrap.style.cssText=`position:relative;width:100%;min-height:100vh;background:${bg};overflow:hidden;`;
  v.appendChild(wrap);

  // Canvas fond
  const canvas = document.createElement('canvas');
  canvas.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0';
  wrap.appendChild(canvas);

  // Sceau central (SVG dessiné)
  const sealContainer = document.createElement('div');
  sealContainer.style.cssText=`position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;opacity:0;transition:opacity 1.2s ease;`;
  sealContainer.innerHTML = _gateSealSVG(theme.sealSymbol, accent, accent2);
  wrap.appendChild(sealContainer);

  // Contenu principal
  const main = document.createElement('div');
  main.style.cssText=`position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 20px 80px;`;
  wrap.appendChild(main);

  // Numéro de porte
  const numEl = document.createElement('div');
  numEl.style.cssText=`font-family:'Cinzel Decorative',serif;font-size:clamp(48px,8vw,96px);color:${accent};
    opacity:0;letter-spacing:8px;text-align:center;line-height:1;margin-bottom:12px;
    text-shadow:0 0 40px ${glowColor}.8),0 0 80px ${glowColor}.3);
    transform:scale(1.4);transition:all 1.4s cubic-bezier(.16,1,.3,1)`;
  numEl.textContent = String(gn).padStart(2,'0');
  main.appendChild(numEl);

  // Séparateur
  const sep = document.createElement('div');
  sep.style.cssText=`width:0;height:1px;background:linear-gradient(90deg,transparent,${accent},transparent);
    margin:16px auto;transition:width 1s ease .8s;`;
  main.appendChild(sep);

  // Titre porte (lettres animées)
  const titleEl = document.createElement('div');
  titleEl.style.cssText=`font-family:'Cinzel Decorative',serif;font-size:clamp(24px,4vw,52px);
    color:${titleColor};text-align:center;letter-spacing:6px;text-transform:uppercase;
    text-shadow:0 0 24px ${glowColor}.6),0 0 48px ${glowColor}.2);margin-bottom:8px;`;

    `<span style="opacity:0;display:inline-block;transform:translateY(20px);transition:all .5s ease;">${ch==' '?'&nbsp;':esc(ch)}</span>`
  ).join('');
  main.appendChild(titleEl);

  // Sous-titre
  if(n.subtitle){
    const subEl = document.createElement('div');
    subEl.style.cssText=`font-family:'EB Garamond',serif;font-size:clamp(14px,1.8vw,20px);
      color:${textColor};font-style:italic;text-align:center;opacity:0;
      margin-bottom:32px;letter-spacing:2px;transition:opacity 1s ease 2s;
      text-shadow:0 0 12px ${glowColor}.4);`;
    subEl.textContent=n.subtitle;
    main.appendChild(subEl);
  }

  // Badge statut
  const statusColors={Scellée:'#4a9a5a',Affaiblie:'#c8a020',Brisée:'#c03020',Inconnue:'#6060a0'};
  const sc=statusColors[n.status]||'#6060a0';
  const statusEl = document.createElement('div');
  statusEl.style.cssText=`display:flex;align-items:center;gap:8px;padding:6px 18px;
    border:1px solid ${sc}55;border-radius:20px;background:${sc}18;
    font-family:'Cinzel',serif;font-size:11px;color:${sc};letter-spacing:2px;
    opacity:0;margin-bottom:40px;transition:opacity .8s ease 2.5s;`;

// ── CANVAS ANIMATIONS ──
function _gateCanvasMort(canvas, theme){
  const ctx=canvas.getContext('2d');
  const souls=Array.from({length:60},()=>({
    x:Math.random()*canvas.width, y:canvas.height+Math.random()*200,
    vx:(Math.random()-.5)*.4, vy:-(.3+Math.random()*.6),
    r:1+Math.random()*2, life:Math.random(), alpha:0,
    wobble:Math.random()*Math.PI*2, wobbleSpeed:.01+Math.random()*.02
  }));
  // Cracks
  const cracks=Array.from({length:12},()=>({
    x:Math.random()*canvas.width, y:canvas.height*.7+Math.random()*canvas.height*.3,
    angle:-Math.PI/4+Math.random()*Math.PI/2,
    len:40+Math.random()*80, branches:[]
  }));
  cracks.forEach(c=>{
    for(let i=0;i<3;i++) c.branches.push({
      angle:c.angle+(Math.random()-.5)*.6,
      len:c.len*(.3+Math.random()*.4),
      start:.2+Math.random()*.6
    });
  });

  function frame(){
    window._gateAnimId=requestAnimationFrame(frame);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Fond gradient
    const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,canvas.width*.7);
    g.addColorStop(0,'#060815'); g.addColorStop(1,'#000005');
    ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Brume au sol
    const mg=ctx.createLinearGradient(0,canvas.height*.6,0,canvas.height);
    mg.addColorStop(0,'transparent'); mg.addColorStop(1,'rgba(10,20,40,.5)');
    ctx.fillStyle=mg; ctx.fillRect(0,canvas.height*.6,canvas.width,canvas.height*.4);

    // Cracks
    ctx.strokeStyle='rgba(58,122,170,.35)'; ctx.lineWidth=1;
    cracks.forEach(c=>{
      ctx.beginPath(); ctx.moveTo(c.x,c.y);
      ctx.lineTo(c.x+Math.cos(c.angle)*c.len, c.y+Math.sin(c.angle)*c.len);
      ctx.stroke();
      c.branches.forEach(b=>{
        const sx=c.x+Math.cos(c.angle)*c.len*b.start;
        const sy=c.y+Math.sin(c.angle)*c.len*b.start;
        ctx.beginPath(); ctx.moveTo(sx,sy);
        ctx.lineTo(sx+Math.cos(b.angle)*b.len, sy+Math.sin(b.angle)*b.len);
        ctx.stroke();
      });
    });

    // Âmes
    souls.forEach(s=>{
      s.wobble+=s.wobbleSpeed;
      s.x+=s.vx+Math.sin(s.wobble)*.3;
      s.y+=s.vy;
      s.life+=.004;
      if(s.life<.3) s.alpha=s.life/.3;
      else if(s.life>.7) s.alpha=1-(s.life-.7)/.3;
      else s.alpha=1;
      if(s.y<-20) { s.y=canvas.height+10; s.x=Math.random()*canvas.width; s.life=Math.random()*.2; }
      const sg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3);
      sg.addColorStop(0,`rgba(120,180,220,${s.alpha*.7})`);
      sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r*3,0,Math.PI*2); ctx.fill();
    });

    // Lueur centrale
    const cg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,200);
    cg.addColorStop(0,'rgba(30,60,100,.08)'); cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(canvas.width/2,canvas.height/2,200,0,Math.PI*2); ctx.fill();
  }
  frame();
}

function _gateCanvasOrgueil(canvas, theme){
  const ctx=canvas.getContext('2d');
  let t=0;
  const rays=Array.from({length:12},(_,i)=>({ angle:i*(Math.PI*2/12), speed:.0002+Math.random()*.0003 }));
  const particles=Array.from({length:80},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    vx:(Math.random()-.5)*.2, vy:-.1-Math.random()*.3,
    r:.5+Math.random()*1.5, alpha:Math.random()
  }));

  function frame(){
    window._gateAnimId=requestAnimationFrame(frame); t+=.016;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const bg=ctx.createRadialGradient(canvas.width/2,0,0,canvas.width/2,canvas.height/2,canvas.height);
    bg.addColorStop(0,'#18002a'); bg.addColorStop(.5,'#0c0018'); bg.addColorStop(1,'#000008');
    ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Rayons divins
    ctx.save(); ctx.translate(canvas.width/2,-50);
    rays.forEach((r,i)=>{
      r.angle+=r.speed;
      const spread=.04+Math.sin(t*.3+i)*.02;
      const gr=ctx.createLinearGradient(0,0,Math.cos(r.angle)*canvas.height*1.5,Math.sin(r.angle)*canvas.height*1.5);
      gr.addColorStop(0,`rgba(200,160,32,${.15+Math.sin(t+i)*.05})`);
      gr.addColorStop(1,'transparent');
      ctx.fillStyle=gr;
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(r.angle-spread)*canvas.height*1.8,Math.sin(r.angle-spread)*canvas.height*1.8);
      ctx.lineTo(Math.cos(r.angle+spread)*canvas.height*1.8,Math.sin(r.angle+spread)*canvas.height*1.8);
      ctx.closePath(); ctx.fill();
    });
    ctx.restore();

    // Particules dorées ascendantes
    particles.forEach(p=>{
      p.x+=p.vx+Math.sin(t+p.alpha*10)*.15; p.y+=p.vy;
      p.alpha-=.002;
      if(p.alpha<=0||p.y<-10){ p.x=Math.random()*canvas.width; p.y=canvas.height+10; p.alpha=.5+Math.random()*.5; }
      ctx.fillStyle=`rgba(220,180,40,${p.alpha*.8})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    });

    // Lueur centrale
    const cg=ctx.createRadialGradient(canvas.width/2,canvas.height*.35,0,canvas.width/2,canvas.height*.35,300);
    cg.addColorStop(0,`rgba(200,160,32,${.06+Math.sin(t*.5)*.02})`); cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg; ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  frame();
}

function _gateCanvasAvarice(canvas, theme){
  const ctx=canvas.getContext('2d');
  let t=0;
  const coins=Array.from({length:50},()=>({
    x:Math.random()*canvas.width, y:-20-Math.random()*canvas.height,
    vy:.8+Math.random()*1.5, spin:Math.random()*Math.PI*2, spinSpeed:(.02+Math.random()*.04)*(Math.random()>.5?1:-1),
    r:4+Math.random()*8, wobble:Math.random()*Math.PI*2
  }));

  function drawCoin(x,y,r,spin){
    const scaleX=Math.abs(Math.cos(spin));
    ctx.save(); ctx.translate(x,y); ctx.scale(scaleX,1);
    const cg=ctx.createRadialGradient(-r*.3,-r*.3,0,0,0,r);
    cg.addColorStop(0,'#ffe870'); cg.addColorStop(.7,'#c8a020'); cg.addColorStop(1,'#806010');
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.ellipse(0,0,r,r,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#ffe040'; ctx.lineWidth=.8; ctx.stroke();
    ctx.restore();
  }

  function frame(){
    window._gateAnimId=requestAnimationFrame(frame); t+=.016;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const bg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,canvas.width*.7);
    bg.addColorStop(0,'#030a02'); bg.addColorStop(1,'#010501');
    ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Reflet sol
    const sg=ctx.createLinearGradient(0,canvas.height*.75,0,canvas.height);
    sg.addColorStop(0,'transparent'); sg.addColorStop(1,'rgba(30,80,20,.3)');
    ctx.fillStyle=sg; ctx.fillRect(0,canvas.height*.75,canvas.width,canvas.height*.25);

    coins.forEach(c=>{
      c.y+=c.vy; c.spin+=c.spinSpeed; c.wobble+=.02;
      c.x+=Math.sin(c.wobble)*.3;
      if(c.y>canvas.height+20){ c.y=-20; c.x=Math.random()*canvas.width; }
      drawCoin(c.x,c.y,c.r,c.spin);
    });

    // Lueur verte
    const gg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,250);
    gg.addColorStop(0,`rgba(20,100,40,${.05+Math.sin(t*.4)*.02})`); gg.addColorStop(1,'transparent');
    ctx.fillStyle=gg; ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  frame();
}

function _gateCanvasEnvie(canvas, theme){
  const ctx=canvas.getContext('2d');
  let t=0;
  const serpents=Array.from({length:4},(_,i)=>({
    offset:i*(Math.PI*2/4), speed:.008+i*.003, amp:60+i*20, freq:.015+i*.003, alpha:.3+i*.15
  }));
  const eyes=Array.from({length:8},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    phase:Math.random()*Math.PI*2, blinkTimer:Math.random()*100, r:4+Math.random()*6
  }));

  function frame(){
    window._gateAnimId=requestAnimationFrame(frame); t+=.012;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const bg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,canvas.width*.7);
    bg.addColorStop(0,'#010a01'); bg.addColorStop(1,'#000300');
    ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Brume verte
    const mg=ctx.createRadialGradient(canvas.width/2,canvas.height*.6,0,canvas.width/2,canvas.height*.6,canvas.width*.5);
    mg.addColorStop(0,`rgba(20,80,10,${.08+Math.sin(t*.3)*.03})`); mg.addColorStop(1,'transparent');
    ctx.fillStyle=mg; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Serpents sinusoïdaux
    serpents.forEach(s=>{
      ctx.beginPath();
      for(let x=0;x<=canvas.width;x+=2){
        const y=canvas.height/2+Math.sin((x*s.freq)+(t*s.speed*100)+s.offset)*s.amp+Math.sin((x*s.freq*.5)+(t*s.speed*60))*(s.amp*.3);
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      const sg=ctx.createLinearGradient(0,0,canvas.width,0);
      sg.addColorStop(0,'transparent'); sg.addColorStop(.3,`rgba(60,180,20,${s.alpha})`);
      sg.addColorStop(.7,`rgba(80,200,30,${s.alpha})`); sg.addColorStop(1,'transparent');
      ctx.strokeStyle=sg; ctx.lineWidth=2; ctx.stroke();
    });

    // Yeux qui clignotent
    eyes.forEach(e=>{
      e.blinkTimer--; e.phase+=.04;
      const open = e.blinkTimer>5?1:Math.max(0,(e.blinkTimer+5)/5);
      if(e.blinkTimer<-60) e.blinkTimer=60+Math.random()*100;
      const a=(.3+Math.sin(e.phase)*.2)*open;
      ctx.fillStyle=`rgba(80,200,20,${a*.8})`;
      ctx.beginPath(); ctx.ellipse(e.x,e.y,e.r,e.r*open,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`rgba(5,20,5,${a})`;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r*.4,0,Math.PI*2); ctx.fill();
    });
  }
  frame();
}

function _gateCanvasColere(canvas, theme){
  const ctx=canvas.getContext('2d');
  let t=0;
  const particles=Array.from({length:200},()=>({
    x:Math.random()*canvas.width, y:canvas.height+Math.random()*100,
    vx:(Math.random()-.5)*2, vy:-1.5-Math.random()*3,
    life:Math.random(), maxLife:.5+Math.random()*.5, r:1+Math.random()*3,
    hue:Math.random()*40 // 0=red, 40=orange
  }));
  const embers=Array.from({length:40},()=>({
    x:Math.random()*canvas.width, y:canvas.height*.3+Math.random()*canvas.height*.7,
    vx:(Math.random()-.5)*1.5, vy:-1-Math.random()*2,
    life:Math.random(), r:.5+Math.random()*1.5
  }));

  function frame(){
    window._gateAnimId=requestAnimationFrame(frame); t+=.02;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Fond
    const bg=ctx.createLinearGradient(0,0,0,canvas.height);
    bg.addColorStop(0,'#080000'); bg.addColorStop(.5,'#120100'); bg.addColorStop(1,'#1a0200');
    ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Lueur de feu au sol
    for(let i=0;i<3;i++){
      const fg=ctx.createRadialGradient(
        canvas.width/2+Math.sin(t*1.3+i)*80, canvas.height,0,
        canvas.width/2, canvas.height, canvas.width*.6
      );
      fg.addColorStop(0,`rgba(${180+i*20},${30+i*20},0,${.15+Math.sin(t*2+i)*.05})`);
      fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg; ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // Flammes
    particles.forEach(p=>{
      p.x+=p.vx+Math.sin(t*2+p.y*.01)*.5;
      p.y+=p.vy; p.life+=.02;
      p.vx*=.99;
      if(p.life>=p.maxLife){ p.y=canvas.height+5; p.x=canvas.width*.2+Math.random()*canvas.width*.6; p.life=0; p.vx=(Math.random()-.5)*2; }
      const progress=p.life/p.maxLife;
      const alpha=(1-progress)*0.7;
      const r=200+p.hue*1.5, g=p.hue*3, b=0;
      ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(1-progress*.5),0,Math.PI*2); ctx.fill();
    });

    // Braises
    embers.forEach(e=>{
      e.x+=e.vx+Math.sin(t*3+e.life*5)*.8; e.y+=e.vy; e.life+=.015;
      if(e.life>1){ e.y=canvas.height*.5+Math.random()*canvas.height*.5; e.x=Math.random()*canvas.width; e.life=0; }
      ctx.fillStyle=`rgba(255,${100+Math.random()*100},0,${(1-e.life)*.8})`;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
    });
  }
  frame();
}

function _gateCanvasLuxure(canvas, theme){
  const ctx=canvas.getContext('2d');
  let t=0;
  const blobs=Array.from({length:8},(_,i)=>({
    x:canvas.width*.3+Math.random()*canvas.width*.4,
    y:canvas.height*.3+Math.random()*canvas.height*.4,
    r:60+Math.random()*80, speedX:.3+Math.random()*.4, speedY:.2+Math.random()*.3,
    phase:i*(Math.PI*2/8), hue:300+Math.random()*60
  }));

  function frame(){
    window._gateAnimId=requestAnimationFrame(frame); t+=.008;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const bg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,canvas.width*.7);
    bg.addColorStop(0,'#0d0005'); bg.addColorStop(1,'#030001');
    ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

    blobs.forEach((b,i)=>{
      b.x=canvas.width/2+Math.cos(t*b.speedX+b.phase)*canvas.width*.3;
      b.y=canvas.height/2+Math.sin(t*b.speedY+b.phase*1.3)*canvas.height*.2;
      const r=b.r*(1+Math.sin(t*2+i)*.15);
      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,r);
      const pulse=.12+Math.sin(t*1.5+i)*.04;
      g.addColorStop(0,`hsla(${b.hue},80%,50%,${pulse})`);
      g.addColorStop(.5,`hsla(${b.hue+20},70%,40%,${pulse*.5})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(b.x,b.y,r,0,Math.PI*2); ctx.fill();
    });

    // Pétales
    ctx.fillStyle='rgba(180,40,80,.03)';
    for(let i=0;i<5;i++){
      const px=canvas.width/2+Math.cos(t*.2+i*1.2)*canvas.width*.4;
      const py=canvas.height/2+Math.sin(t*.15+i*.8)*canvas.height*.3;
      ctx.beginPath(); ctx.ellipse(px,py,3,8,t*.5+i,0,Math.PI*2); ctx.fill();
    }
  }
  frame();
}

function _gateCanvasGourmandise(canvas, theme){
  const ctx=canvas.getContext('2d');
  let t=0;
  const rings=Array.from({length:6},(_,i)=>({ r:30+i*35, speed:.008-i*.001, alpha:.4-i*.05 }));
  const particles=Array.from({length:100},()=>({
    angle:Math.random()*Math.PI*2, dist:20+Math.random()*200,
    speed:(.005+Math.random()*.015)*(Math.random()>.5?1:-1),
    r:1+Math.random()*2.5, alpha:Math.random()
  }));

  function frame(){
    window._gateAnimId=requestAnimationFrame(frame); t+=.012;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const bg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,canvas.width*.7);
    bg.addColorStop(0,'#0d0500'); bg.addColorStop(1,'#030100');
    ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

    const cx=canvas.width/2, cy=canvas.height/2;

    // Vortex spirale
    ctx.save(); ctx.translate(cx,cy);
    rings.forEach((r,i)=>{
      r.speed+=.0001;
      ctx.strokeStyle=`rgba(192,80,16,${r.alpha+Math.sin(t*2+i)*.05})`;
      ctx.lineWidth=2;
      ctx.beginPath();
      for(let a=0;a<Math.PI*2;a+=.05){
        const d=r.r+Math.sin(a*6+t*3+i)*(r.r*.1);
        a===0?ctx.moveTo(Math.cos(a)*d,Math.sin(a)*d):ctx.lineTo(Math.cos(a)*d,Math.sin(a)*d);
      }
      ctx.closePath(); ctx.stroke();
    });

    // Particules aspirées vers le centre
    particles.forEach(p=>{
      p.angle+=p.speed*(1+(200-p.dist)*.005);
      p.dist=Math.max(5,p.dist-.15);
      if(p.dist<6){ p.angle=Math.random()*Math.PI*2; p.dist=150+Math.random()*100; p.alpha=.3+Math.random()*.7; }
      const x=Math.cos(p.angle)*p.dist, y=Math.sin(p.angle)*p.dist;
      ctx.fillStyle=`rgba(220,120,40,${p.alpha*(p.dist/200)})`;
      ctx.beginPath(); ctx.arc(x,y,p.r,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();

    // Lueur centrale
    const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,100);
    cg.addColorStop(0,`rgba(200,80,20,${.1+Math.sin(t*.8)*.04})`); cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(cx,cy,100,0,Math.PI*2); ctx.fill();
  }
  frame();
}

function _gateCanvasParesse(canvas, theme){
  const ctx=canvas.getContext('2d');
  let t=0;
  const stars=Array.from({length:120},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    r:.3+Math.random()*1.5, phase:Math.random()*Math.PI*2,
    dimSpeed:.003+Math.random()*.005, dimmed:false, dimTimer:Math.random()*200
  }));
  const nebulae=Array.from({length:4},(_,i)=>({
    x:canvas.width*(.2+i*.2), y:canvas.height*(.3+Math.sin(i)*(.2)),
    r:100+i*40, phase:i*Math.PI/2
  }));

  function frame(){
    window._gateAnimId=requestAnimationFrame(frame); t+=.004; // Très lent
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const bg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,canvas.width*.8);
    bg.addColorStop(0,'#03040e'); bg.addColorStop(1,'#010208');
    ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Nébuleuses lentes
    nebulae.forEach((n,i)=>{
      n.x+=Math.sin(t*.1+n.phase)*.2; n.y+=Math.cos(t*.08+n.phase)*.1;
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0,`rgba(20,40,120,${.06+Math.sin(t*.2+i)*.02})`);
      g.addColorStop(.5,`rgba(10,20,80,${.03+Math.sin(t*.15+i)*.01})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    });

    // Étoiles qui s'éteignent lentement
    stars.forEach(s=>{
      s.dimTimer--;
      if(s.dimTimer<0){
        s.dimmed=!s.dimmed;
        s.dimTimer=(s.dimmed?150:80)+Math.random()*200;
      }
      const targetAlpha=s.dimmed?.05:.7;
      const currentAlpha=.4+Math.sin(s.phase+t*s.dimSpeed)*.35;
      const a=s.dimmed?Math.max(.02,currentAlpha*.2):currentAlpha;
      s.phase+=s.dimSpeed*.5;
      ctx.fillStyle=`rgba(100,130,200,${a})`;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });

    // Brume froide
    const mg=ctx.createLinearGradient(0,canvas.height*.4,0,canvas.height);
    mg.addColorStop(0,'transparent'); mg.addColorStop(1,`rgba(5,8,25,${.4+Math.sin(t*.1)*.1})`);
    ctx.fillStyle=mg; ctx.fillRect(0,canvas.height*.4,canvas.width,canvas.height*.6);
  }
  frame();
}

const ABILITY_RANKS = ['S+','S','S-','A+','A','A-','B+','B','B-','C+','C','C-','D+','D','D-','E+','E','E-','F+','F','F-'];
function abilityRankColor(rank){
  const base = rank ? rank.replace(/[+-]/g,'') : '';
  const map = {S:'#ffd700',A:'#e08030',B:'#8050d0',C:'#3080d0',D:'#30905a',E:'#707070',F:'#484848'};
  return map[base]||'#808080';
}

// Détecter la couleur thème d'une capacité selon sa catégorie parente
function abilityThemeColor(n){
  let id = n.parentId;
  while(id){
    const nd = db[id];
    if(!nd) break;
    if(nd._triangleColor) return nd._triangleColor;
    if(nd.kind==='magie-sub') return nd._triangleColor||'#7040c8';
    id = nd.parentId||null;
  }
  return '#7040c8';
}

function renderEntry(v,n){
  if(n.entryType==='map'){renderMapEntry(v,n);return;}
  if(n.entryType==='ability'){renderAbilityEntry(v,n);return;}
  // Fiche chasseur pour les entrées du Bestiaire
  if(n.entryType==='creature'||_isInBestiaire(n)){ renderBestiaryEntry(v,n); return; }
  if(n.entryType==='artefact'||_isInArtefacts(n)){ renderArtefactEntry(v,n); return; }
  if(n.entryType==='secret'){ _secOpenScrollEntry(v,n); return; }
  if(n.entryType==='lore'||_isInLore(n)){ renderLoreEntry(v,n); return; }
  const parent=n.parentId?db[n.parentId]:null;
  const isChar=n.entryType==='character';
  let h=`<div class="ev-wrap"><div class="ev-header">`;

  // ── Portrait (large) — prend en compte l'arc actif ──
  const _pArcIdx = window._arcView&&window._arcView[n.id]!==undefined?window._arcView[n.id]:-1;
  const _pArc = (isChar&&_pArcIdx>=0&&n._arcs&&n._arcs[_pArcIdx])?n._arcs[_pArcIdx]:null;
  const _effectiveSubtitle = (_pArc&&_pArc.subtitle) ? _pArc.subtitle : (n.subtitle||'');
  const _portSrc = _pArc&&_pArc.image ? _pArc.image : (n.images&&n.images[0]?n.images[0]:null);
  const mainImg=_portSrc?
    `<img src="${_portSrc}" style="width:220px;height:290px;object-fit:cover;border-radius:5px;border:1px solid var(--border2);display:block;cursor:zoom-in;box-shadow:0 6px 28px rgba(0,0,0,.6)" onclick="openLB('${_portSrc}')">`:
    n.iconData?
    `<img src="${n.iconData}" style="width:220px;height:220px;object-fit:contain;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);display:block">`:
    `<div class="ev-portrait-ph" style="width:220px;height:290px" onclick="openEditModal('${n.id}')"><div style="font-size:42px;opacity:.25">🖼</div><div>Ajouter portrait</div></div>`;
  h+=`<div class="ev-portrait" style="flex-shrink:0;width:220px">${mainImg}</div>`;

  // ── Meta ──
  h+=`<div class="ev-meta">`;
  if(isChar) h+=`<div style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;color:#8b6fd4;margin-bottom:6px;text-transform:uppercase">✦ Personnage</div>`;
  else if(parent) h+=`<div class="ev-type">${parent.icon||''} ${esc(parent.name)}</div>`;

  const displayName=isChar&&n.lastName?`${esc(n.name)} <span style="color:var(--gold)">${esc(n.lastName)}</span>`:esc(n.name);
  h+=`<div class="ev-name">${displayName}</div>`;
  // Utiliser le subtitle/âge de l'arc actif si disponible
  const _effSubtitle = (_pArc&&_pArc.subtitle) ? _pArc.subtitle : (n.subtitle||'');
  const _effAge      = (_pArc&&_pArc.age)      ? _pArc.age      : (n.charAge||'');
  const _effGender   = n.charGender||'';
  const _effStatus   = n.charStatus||'';
  const _effArtefacts= (_pArc&&_pArc.artefacts) ? _pArc.artefacts : (n.charGoals||''); // fallback
  if(_effSubtitle) h+=`<div class="ev-sub">${esc(_effSubtitle)}</div>`;

  if(isChar){
    const infos=[];
    if(_effAge)    infos.push({icon:'⏳',v:_effAge});
    if(_effGender) infos.push({icon:'👤',v:_effGender});
    if(_effStatus){
      const sc={Vivant:'#6acd8d',Décédé:'#e05050',Disparu:'#e8c97a',Inconnu:'#a89cc0',Autre:'#a89cc0'}[_effStatus]||'#a89cc0';
      infos.push({icon:'💠',v:_effStatus,color:sc});
    }
    if(infos.length) h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${infos.map(i=>`<span style="font-size:12px;background:var(--bg3);border:1px solid var(--border2);padding:3px 9px;border-radius:20px;color:${i.color||'var(--text2)'}">${i.icon} ${esc(i.v)}</span>`).join('')}</div>`;
  }

  const linksHtml=buildLinksDisplay(n);
  if(linksHtml) h+=`<div class="ev-links">${linksHtml}</div>`;
  if(n.tags&&n.tags.length) h+=`<div class="ev-tags">${n.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`;
  if(n.fields&&n.fields.length) h+=`<div class="ev-fields">${n.fields.map(f=>`<div class="ef"><div class="ef-k">${esc(f.k)}</div><div class="ef-v">${esc(f.v)}</div></div>`).join('')}</div>`;

  // ── View / Edit buttons inside header ──
  h+=`<div class="entry-edit-actions" style="margin-top:auto;padding-top:14px;display:flex;gap:7px;flex-wrap:wrap">
    <button class="btn p" onclick="openEditModal('${n.id}')">✎ Modifier</button>
    ${isChar?`<button class="btn" onclick="openFamilyTree('${n.id}')" style="border-color:#2a3d55;color:#7aadcd">👨‍👩‍👧 Famille</button>`:''}
    ${isChar?`<button class="btn" onclick="openArcModal('${n.id}',null)" style="border-color:#3d2a55;color:#b07aef">◈ + Arc</button>`:''}
    <button class="btn d" onclick="doDelete('${n.id}')">✕ Supprimer</button>
  </div>`;
  // Timeline des arcs
  if(isChar && n._arcs && n._arcs.length){
    h+=`<div style="margin:18px 0 0;display:flex;gap:0;align-items:center;flex-wrap:wrap">`;
    h+=`<span style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:rgba(160,120,240,.5);margin-right:10px;text-transform:uppercase">Arcs</span>`;
    const arcIdx=window._arcView&&window._arcView[n.id]!==undefined?window._arcView[n.id]:-1;
    h+=`<span class="arc-pill${arcIdx===-1?' arc-pill-active':''}" onclick="_arcSelect('${n.id}',-1)">Fiche principale</span>`;
    n._arcs.forEach((arc,i)=>{
      // Masquer les arcs cachés aux visiteurs
      if(!_isAdmin() && (n._hiddenArcs||[]).includes(i)) return;
      const arcDimmed = _isAdmin() && (n._hiddenArcs||[]).includes(i);
      h+=`<span class="arc-pill${arcIdx===i?' arc-pill-active':''}" style="${arcDimmed?'opacity:.4;text-decoration:line-through;':''}" onclick="_arcSelect('${n.id}',${i})">${esc(arc.name)}${_isAdmin()?`<span class="arc-pill-edit" onclick="event.stopPropagation();openArcModal('${n.id}',${i})">✎</span>`:''}</span>`;
    });
    h+=`</div>`;
  }
  h+=`</div></div>`; // close ev-meta + ev-header

  // ── Character sections ──
  if(isChar){
    // Vérifier si un arc est actif
    const _arcIdx = window._arcView&&window._arcView[n.id]!==undefined?window._arcView[n.id]:-1;
    const _arcData = (_arcIdx>=0 && n._arcs && n._arcs[_arcIdx]) ? n._arcs[_arcIdx] : null;
    // Afficher badge arc actif si applicable
    if(_arcData){
      h+=`<div style="background:rgba(140,80,255,.1);border:1px solid rgba(140,80,255,.3);border-radius:6px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">◈</span>
        <div>
          <div style="font-family:'Cinzel',serif;font-size:11px;color:#c09aef;letter-spacing:1px">${esc(_arcData.name)}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">Version alternative — stats, portrait et bio spécifiques à cet arc</div>
        </div>
        <span class="entry-edit-actions" style="display:flex;gap:6px;margin-left:auto"><button onclick="openArcModal('${n.id}',${_arcIdx})" style="padding:4px 10px;background:rgba(140,80,255,.15);border:1px solid rgba(140,80,255,.4);border-radius:4px;color:#c09aef;font-family:'Cinzel',serif;font-size:9px;cursor:pointer">✎ Modifier</button><button onclick="_arcDelete('${n.id}',${_arcIdx})" style="padding:4px 10px;background:rgba(200,60,60,.1);border:1px solid rgba(200,60,60,.3);border-radius:4px;color:#e07070;font-family:'Cinzel',serif;font-size:9px;cursor:pointer">✕</button></span>
      </div>`;
    }
    // Données à afficher (arc ou fiche principale)
    const _bio    = _arcData ? (_arcData.bio    || '') : (n.charBio    || '');
    const _powers = _arcData ? (_arcData.powers || '') : (n.charPowers || '');
    const _goals  = _arcData ? (_arcData.goals  || '') : (n.charGoals  || '');
    const sections=[
      {label:'Biographie',          val:_bio},
      {label:'Capacités & Pouvoirs',val:_powers},
      {label:'Objectifs & Motivations',val:_goals},
    ];
    sections.forEach(s=>{
      if(s.val) h+=`<div class="sec-label">${s.label}</div><div style="background:var(--bg2);border:1px solid var(--border);border-left:2px solid var(--gold-dim);border-radius:4px;padding:14px 18px;margin-bottom:6px;font-size:15px;line-height:1.85;white-space:pre-wrap;color:var(--text)">${esc(s.val)}</div>`;
    });
    if(!_bio&&!_powers&&!_goals&&!n.body) h+=`<div class="empty">Fiche vide — cliquez sur Modifier pour remplir.</div>`;
  }

  if(n.body) h+=`<div class="sec-label">${isChar?'Notes supplémentaires':'Contenu'}</div><div class="ev-body">${esc(n.body)}</div>`;
  else if(!isChar) h+=`<div class="empty">Aucun contenu. Cliquez sur Modifier.</div>`;

  // ── Stats radar — prend en compte l'arc actif ──
  const _rArcIdx = window._arcView&&window._arcView[n.id]!==undefined?window._arcView[n.id]:-1;
  const _rArc = (isChar&&_rArcIdx>=0&&n._arcs&&n._arcs[_rArcIdx])?n._arcs[_rArcIdx]:null;
  const _rStats = (_rArc&&_rArc.stats&&hasAnyStats(_rArc.stats)) ? _rArc.stats : n.stats;
  if(_rStats&&hasAnyStats(_rStats)){ window._radarNodeId=n.id; h+=buildRadarSection(_rStats,n.id); }

  // ── Extra gallery images (skip index 0 = portrait) ──
  if(n.images&&n.images.length>1){
    h+=`<div class="sec-label">Galerie</div><div class="ev-gallery">${n.images.slice(1).map(s=>`<img class="gal-img" src="${s}" onclick="openLB('${s}')">`).join('')}</div>`;
  }

  h+=`</div>`; // close ev-wrap
  v.innerHTML=h;

  const _drArcIdx = window._arcView&&window._arcView[n.id]!==undefined?window._arcView[n.id]:-1;
  const _drArc = (isChar&&_drArcIdx>=0&&n._arcs&&n._arcs[_drArcIdx])?n._arcs[_drArcIdx]:null;
  const _drStats = (_drArc&&_drArc.stats&&hasAnyStats(_drArc.stats))?_drArc.stats:n.stats;
  if(_drStats&&hasAnyStats(_drStats)) drawRadars(_drStats);
}

function hasAnyStats(stats){
  return Object.values(stats).some(cat=>Object.values(cat).some(v=>v>0));
}

  document.head.appendChild(s);

  const children=(n.children||[]).map(id=>db[id]).filter(Boolean);
  const subs=children.filter(c=>c.kind==='magie-sub'||c.kind==='gate-root');

  // Positions des 3 coins du triangle (top, bottom-left, bottom-right)
  const positions=[
    {top:'0%',   left:'50%',  transform:'translate(-50%,0)',    label:'top'},
    {top:'72%',  left:'3%',   transform:'translate(0,-50%)',    label:'bot-left'},
    {top:'72%',  left:'97%',  transform:'translate(-100%,-50%)',label:'bot-right'},
  ];

  const COLORS=['#7040c8','#c87820','#c83020'];

  const cornersHTML = subs.slice(0,3).map((sub,i)=>{
    const pos=positions[i];
    const isGate=sub.kind==='gate-root';
    const col=sub._triangleColor||COLORS[i];
    const bgImg=sub._triangleImg?`<img class="magie-corner-bg" src="${sub._triangleImg}">`:
      (isGate&&sub.bgImage)?`<img class="magie-corner-bg" src="${sub.bgImage}">`:'';
    const cnt=countAll(sub.id);
    const rgb=hexToRgb(col);
    const iconHtml=sub.icon&&sub.icon.startsWith('<')?
      `<div class="magie-corner-icon" style="display:flex;align-items:center;justify-content:center">${sub.icon}</div>`:
      `<div class="magie-corner-icon">${sub.icon||'\U0001f52e'}</div>`;
    return `<div class="magie-corner" style="position:absolute;top:${pos.top};left:${pos.left};transform:${pos.transform}"

      oncontextmenu="event.preventDefault();_showTriangleMenu('${sub.id}',event.clientX,event.clientY)">

        ${bgImg}
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(${rgb},.18),transparent 75%);border-radius:8px"></div>
        ${iconHtml}
        <div class="magie-corner-name" style="color:${col}">${esc(sub.name)}</div>
        <div class="magie-corner-count">${cnt} élément${cnt!==1?'s':''}</div>
      </div>
    </div>`;
  }).join('');

  const RUNES='ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛊᛏᛒᛖᛗᛚᛜᛞᛟ';
  const runesHTML=Array.from({length:10},(_,i)=>{
    const r=RUNES[i%RUNES.length];
    return `<div class="magie-rune" style="top:${(5+Math.random()*87).toFixed(1)}%;left:${(2+Math.random()*93).toFixed(1)}%;font-size:${(16+Math.random()*38).toFixed(0)}px;animation-delay:${(Math.random()*9).toFixed(1)}s">${r}</div>`;
  }).join('');

  v.style.padding='0'; v.style.overflow='auto';
  v.innerHTML=`<div id="magie-outer">
    <canvas id="magie-canvas"></canvas>
    ${runesHTML}
    <div id="magie-ui">
      <div class="magie-eyebrow">Codex Arcanum</div>
      <div class="magie-title">${esc(n.name)}</div>
      <div class="magie-rule"></div>
      <div class="magie-sub">${esc(n.subtitle||'Systèmes magiques, artefacts, capacités')}</div>
      <div id="magie-triangle-wrap">
        <svg class="magie-tri-svg" viewBox="0 0 500 480" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="tri-glow"><feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <!-- Triangle principal -->
          <polygon points="250,30 30,440 470,440"
            fill="none" stroke="rgba(150,80,255,.18)" stroke-width="1.5"/>
          <!-- Triangle intérieur (inversé) -->
          <polygon points="250,380 110,130 390,130"
            fill="none" stroke="rgba(150,80,255,.10)" stroke-width="1"/>
          <!-- Lignes reliant les triangles -->
          <line x1="250" y1="30"  x2="250" y2="380" stroke="rgba(150,80,255,.07)" stroke-width="1"/>
          <line x1="30"  y1="440" x2="110" y2="130" stroke="rgba(150,80,255,.07)" stroke-width="1"/>
          <line x1="470" y1="440" x2="390" y2="130" stroke="rgba(150,80,255,.07)" stroke-width="1"/>
          <!-- Point central -->
          <circle cx="250" cy="253" r="4" fill="rgba(160,90,255,.35)" filter="url(#tri-glow)"/>
        </svg>
        ${cornersHTML}
      </div>
      <div class="magie-btn-row">
        <button class="btn" onclick="openEditModal('${n.id}')">✎ Modifier</button>
      </div>
    </div>
  </div>`;

  _startMagieCanvas();
  initCatAudio(n.id);
  _injectCatBg('magie-outer', n.id);
  document.getElementById('magie-outer').oncontextmenu = e=>{ if(e.target.closest('.magie-corner')) return; e.preventDefault(); _showCatBgMenu(n.id, e.clientX, e.clientY); };
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function _startMagieCanvas(){
  const canvas=document.getElementById('magie-canvas');
  if(!canvas) return;
  const outer=document.getElementById('magie-outer');
  if(!outer) return;
  const ctx=canvas.getContext('2d');
  canvas.width=outer.offsetWidth||800;
  canvas.height=Math.max(outer.offsetHeight||600, window.innerHeight);
  const ro=new ResizeObserver(()=>{
    canvas.width=outer.offsetWidth||800;
    canvas.height=Math.max(outer.offsetHeight||600,window.innerHeight);
  }); ro.observe(outer);

  const NUM=6;
  const circles=Array.from({length:NUM},(_,i)=>({
    x:canvas.width*(.15+.7*Math.random()), y:canvas.height*(.1+.8*Math.random()),
    r:55+i*40, speed:(i%2===0?1:-1)*(.1+Math.random()*.2),
    angle:Math.random()*Math.PI*2, segs:5+i*2,
    alpha:.035+Math.random()*.065, hue:258+Math.random()*55
  }));
  const parts=Array.from({length:60},()=>({
    x:Math.random()*2000, y:Math.random()*2000,
    vx:(Math.random()-.5)*.35, vy:-(.08+Math.random()*.45),
    r:.5+Math.random()*1.6, life:Math.random(),
    maxLife:.35+Math.random()*.65, hue:248+Math.random()*80
  }));
  let t=0;
  function frame(){
    if(!document.getElementById('magie-canvas')){ cancelAnimationFrame(_magieAnim); ro.disconnect(); return; }
    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);
    const vg=ctx.createRadialGradient(W*.5,H*.42,H*.08,W*.5,H*.5,H*.9);
    vg.addColorStop(0,'rgba(14,8,30,.0)'); vg.addColorStop(1,'rgba(2,1,6,.88)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
    circles.forEach(c=>{
      c.angle+=c.speed*.011;
      ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${c.hue},72%,67%,${c.alpha})`; ctx.lineWidth=1; ctx.stroke();
      ctx.beginPath(); ctx.arc(c.x,c.y,c.r*.72,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${c.hue+18},62%,72%,${c.alpha*.55})`; ctx.lineWidth=.5; ctx.stroke();
      for(let i=0;i<c.segs;i++){
        const a=c.angle+(Math.PI*2/c.segs)*i;
        const x1=c.x+Math.cos(a)*c.r*.42, y1=c.y+Math.sin(a)*c.r*.42;
        const x2=c.x+Math.cos(a)*c.r, y2=c.y+Math.sin(a)*c.r;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
        ctx.strokeStyle=`hsla(${c.hue+28},65%,72%,${c.alpha*.75})`; ctx.lineWidth=.55; ctx.stroke();
        const gw=ctx.createRadialGradient(x2,y2,0,x2,y2,5);
        gw.addColorStop(0,`hsla(${c.hue},92%,82%,${c.alpha*3.5})`); gw.addColorStop(1,'transparent');
        ctx.fillStyle=gw; ctx.beginPath(); ctx.arc(x2,y2,5,0,Math.PI*2); ctx.fill();
      }
    });
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.life+=.004;
      if(p.life>p.maxLife||p.y<-10){ p.x=Math.random()*W; p.y=H+5; p.life=0; p.maxLife=.35+Math.random()*.65; p.hue=248+Math.random()*80; }
      const a=Math.sin((p.life/p.maxLife)*Math.PI)*.5;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`hsla(${p.hue},82%,75%,${a})`; ctx.fill();
    });
    const pulse=.5+.5*Math.sin(t*.016);
    const cg=ctx.createRadialGradient(W*.5,H*.36,0,W*.5,H*.36,W*.38);
    cg.addColorStop(0,`rgba(115,45,210,${.045*pulse})`); cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);
    t++; _magieAnim=requestAnimationFrame(frame);
  }
  frame();
}
