<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gates of Hades — Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #08070a;
  --bg2:     #0e0c12;
  --bg3:     #141118;
  --bg4:     #1c1824;
  --border:  #2a2535;
  --border2: #3a3450;
  --crimson: #8b1a1a;
  --crimson2:#c0392b;
  --gold:    #c9a84c;
  --gold2:   #e8c97a;
  --gold3:   #f5e4b0;
  --gold-dim:#6a5520;
  --violet:  #5a3d7a;
  --violet2: #8b5fbf;
  --text:    #e4ddf0;
  --text2:   #a89cc0;
  --text3:   #6a6080;
  --hellred: #3d0a0a;
  --sidebar: 268px;
  --r: 4px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

body {
  font-family:'EB Garamond',serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ══ TOPBAR ══════════════════════════════════════════ */
#topbar {
  height:52px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 18px;
  flex-shrink:0;
  position:relative;
  z-index:10;
}
@keyframes pulse-online{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
#topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim) 40%,var(--crimson) 60%,transparent);
  opacity:.5;
}
#logo{
  font-family:'Cinzel Decorative',serif;
  font-size:15px;
  color:var(--gold2);
  letter-spacing:1px;
  white-space:nowrap;
  text-shadow:0 0 20px rgba(201,168,76,.3);
  display:flex;
  align-items:center;
  gap:8px;
  transition:text-shadow .2s, opacity .2s;
}
#logo:hover{
  text-shadow:0 0 30px rgba(220,100,30,.5), 0 0 10px rgba(201,168,76,.4);
  opacity:.85;
}
#logo .gate-icon{font-size:20px;opacity:.8}
#logo .sub{font-size:9px;color:var(--text3);letter-spacing:3px;display:block;margin-top:2px;font-family:'Cinzel',serif}

#search-wrap{flex:1;max-width:380px;position:relative}
#search{
  width:100%;
  background:var(--bg3);
  border:1px solid var(--border2);
  color:var(--text);
  font-family:'EB Garamond',serif;
  font-size:14px;
  padding:7px 12px 7px 32px;
  border-radius:var(--r);
  outline:none;
  transition:border-color .2s;
}
#search:focus{border-color:var(--gold-dim)}
#search::placeholder{color:var(--text3)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:13px}

.topbtn{
  background:var(--bg3);
  border:1px solid var(--border2);
  color:var(--text2);
  font-family:'Cinzel',serif;
  font-size:10px;
  letter-spacing:.5px;
  padding:6px 12px;
  border-radius:var(--r);
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.topbtn:hover{border-color:var(--gold-dim);color:var(--gold2)}
.topbtn.gold{background:linear-gradient(135deg,#2a1f06,#150f02);border-color:var(--gold-dim);color:var(--gold2)}
.topbtn.gold:hover{border-color:var(--gold);color:var(--gold3);box-shadow:0 0 12px rgba(201,168,76,.15)}
.topbtn.red{border-color:#3d1515;color:#a04040}
.topbtn.red:hover{border-color:var(--crimson2);color:#e05050}
#topbar-r{margin-left:auto;display:flex;gap:7px;align-items:center}

/* ══ LAYOUT ══════════════════════════════════════════ */
#main{display:flex;flex:1;overflow:hidden}

/* ══ SIDEBAR ══════════════════════════════════════════ */
#sidebar{
  width:var(--sidebar);
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  overflow:hidden;
}
#sidebar-head{
  padding:10px 12px 8px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.sh-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
#tree{flex:1;overflow-y:auto;padding:6px 0}

/* tree nodes */
.tn{user-select:none}
.tr{
  display:flex;align-items:center;gap:4px;
  padding:5px 8px;cursor:pointer;
  border-radius:3px;margin:1px 5px;
  transition:background .12s;position:relative;min-height:28px;
}
.tr:hover{background:var(--bg3)}
.tr.active{background:var(--bg4)}
.tr.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--gold);border-radius:1px}
.tr.gate-node.active::before{background:var(--crimson2)}
.tr.drag-over{background:#1e1830;outline:2px dashed var(--gold-dim);outline-offset:-2px}
.tr.dragging{opacity:.4;pointer-events:none}
.root-drop-zone{height:12px;margin:0 6px;border-radius:3px;transition:all .12s;border:2px solid transparent}
.root-drop-zone--active{height:22px;background:rgba(160,100,255,.15);border:2px dashed rgba(160,100,255,.6);margin:0 6px}
body.is-dragging .root-drop-zone{height:18px}
.drag-handle{width:12px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--text3);opacity:0;cursor:grab;font-size:10px;flex-shrink:0;transition:opacity .12s}
.tr:hover .drag-handle{opacity:.5}
.drag-handle:active{cursor:grabbing}
.tt{width:14px;height:14px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:8px;flex-shrink:0;transition:transform .15s}
.tt.open{transform:rotate(90deg)}
.tt.leaf{opacity:0;pointer-events:none}
.ti{font-size:13px;flex-shrink:0}
.tl{font-family:'EB Garamond',serif;font-size:13.5px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr.active .tl{color:var(--gold2)}
.tr.gate-node.active .tl{color:#e07070}
.tc{font-size:9px;color:var(--text3);background:var(--bg3);padding:1px 5px;border-radius:10px;flex-shrink:0}
.ta{display:none;gap:2px;flex-shrink:0}
.tr:hover .ta{display:flex}
.tab{width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:10px;color:var(--text3);border:none;background:transparent;cursor:pointer;transition:all .12s}
.tab:hover{background:var(--bg2);color:var(--gold2)}
.tab.del:hover{color:var(--crimson2)}
.tc-wrap{padding-left:14px}

/* sidebar sections */
.sidebar-section{
  padding:6px 10px 3px;
  font-family:'Cinzel',serif;
  font-size:8px;letter-spacing:2.5px;color:var(--text3);
  text-transform:uppercase;margin-top:4px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-section:first-child{border-top:none}
.ss-add{cursor:pointer;font-size:14px;opacity:.5;transition:opacity .15s}
.ss-add:hover{opacity:1;color:var(--gold2)}

/* GATE sidebar marker */
.gate-badge{
  font-size:8px;padding:1px 4px;border-radius:2px;
  background:rgba(139,26,26,.4);color:#c06060;
  border:1px solid rgba(139,26,26,.4);
  font-family:'Cinzel',serif;letter-spacing:.5px;
}

/* ══ CONTENT ══════════════════════════════════════════ */
#content{flex:1;display:flex;flex-direction:column;overflow:hidden}

#breadcrumb{
  padding:8px 22px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;
  font-family:'Cinzel',serif;font-size:10px;color:var(--text3);
  background:var(--bg2);flex-shrink:0;
}
.crumb{cursor:pointer;transition:color .15s}.crumb:hover{color:var(--gold2)}.crumb.last{color:var(--gold)}
.crumb-sep{opacity:.4}

#view{flex:1;overflow-y:auto;padding:26px 30px}

/* ══ WELCOME ══════════════════════════════════════════ */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:14px}
.w-icon{font-size:70px;opacity:.1}
.w-h{font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--gold2);opacity:.35}
.w-p{color:var(--text3);font-size:15px;max-width:380px;line-height:1.7}
#welcome{position:relative;width:100%;height:100%;overflow:hidden;background:#000;padding:0!important}
#wlc-canvas{position:absolute;inset:0;pointer-events:none;z-index:1}
#wlc-ui{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px 20px;gap:0}
.wlc-eyebrow{font-family:'Cinzel',serif;font-size:9px;letter-spacing:6px;color:rgba(200,80,40,.6);text-transform:uppercase;margin-bottom:18px}
.wlc-title{font-family:'Cinzel Decorative',serif;font-size:clamp(28px,5vw,64px);color:#f8f2e0;text-shadow:0 0 60px rgba(255,220,100,.35),0 0 20px rgba(180,160,60,.25),0 2px 16px rgba(0,0,0,.9);letter-spacing:8px;text-align:center;line-height:1.1;margin-bottom:10px}
.wlc-rule{width:280px;height:1px;background:linear-gradient(90deg,transparent,rgba(220,50,10,.5),transparent);margin:0 auto 14px}
.wlc-sub{font-family:'EB Garamond',serif;font-size:15px;color:rgba(240,230,200,.55);font-style:italic;letter-spacing:3px;text-align:center;margin-bottom:48px}
.wlc-grid{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:860px;margin-bottom:40px}
.wlc-card{background:rgba(8,4,4,.82);border:1px solid rgba(200,50,20,.2);border-radius:8px;padding:22px 18px 18px;min-width:160px;width:160px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;text-align:center;backdrop-filter:blur(3px);display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;overflow:hidden}
.wlc-card:hover{transform:translateY(-5px);border-color:rgba(220,70,30,.5);box-shadow:0 10px 32px rgba(0,0,0,.65),0 0 20px rgba(200,40,10,.15)}
.wlc-card-icon{font-size:38px;display:flex;align-items:center;justify-content:center;width:52px;height:52px;line-height:1;position:relative;z-index:1}
.wlc-card-name{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:#d8c8c0;text-transform:uppercase;line-height:1.4;position:relative;z-index:1}
.wlc-card-cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 50%;z-index:0;border-radius:8px;pointer-events:none}
.wlc-card--cover .wlc-card-name{text-shadow:0 1px 8px rgba(0,0,0,.9),0 0 20px rgba(0,0,0,.8);color:#fff}
.wlc-card--cover .wlc-card-icon{filter:drop-shadow(0 2px 6px rgba(0,0,0,.8))}
.wlc-card--cover{padding:0;justify-content:flex-end;min-height:140px}
.wlc-card--cover .wlc-card-name{padding:0 10px 14px;width:100%}
.wlc-card--cover .wlc-card-icon{position:absolute;top:14px;left:50%;transform:translateX(-50%)}
#wlc-img-ctx{position:fixed;z-index:10000;background:rgba(4,2,10,.97);border:1px solid rgba(150,80,255,.35);border-radius:8px;padding:10px 14px;min-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.85);font-family:'Cinzel',serif;font-size:11px;color:#d0c8f0}
#wlc-img-ctx .ctx-title{font-size:8.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(160,120,255,.5);border-bottom:1px solid rgba(150,80,255,.15);padding-bottom:7px;margin-bottom:9px}
#wlc-img-ctx .ctx-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#wlc-img-ctx .ctx-label{font-size:9px;letter-spacing:1px;color:rgba(200,180,255,.6);min-width:60px}
#wlc-img-ctx input[type=range]{flex:1;accent-color:#9060e0;height:3px}
#wlc-img-ctx .ctx-btn{width:100%;margin-top:4px;padding:6px 0;background:rgba(150,80,255,.12);border:1px solid rgba(150,80,255,.3);border-radius:4px;color:#c0a0f8;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;cursor:pointer;transition:background .15s}
#wlc-img-ctx .ctx-btn:hover{background:rgba(150,80,255,.25)}
#wlc-img-ctx .ctx-btn.ctx-btn-danger{background:rgba(200,50,30,.1);border-color:rgba(200,50,30,.3);color:#e07060}
#wlc-img-ctx .ctx-btn.ctx-btn-danger:hover{background:rgba(200,50,30,.22)}
#wlc-img-ctx .ctx-sep{height:1px;background:rgba(150,80,255,.15);margin:8px 0}
.wlc-hint{font-family:'EB Garamond',serif;font-size:12px;color:rgba(180,140,120,.3);letter-spacing:2px;font-style:italic}

/* ══ CATEGORY VIEW ══════════════════════════════════ */
.cv-head{margin-bottom:22px;display:flex;align-items:flex-start;gap:18px}
.cv-icon-big{font-size:52px;opacity:.6;flex-shrink:0;margin-top:4px}
.cv-title{font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--gold2);margin-bottom:4px;line-height:1.2}
.cv-desc{color:var(--text2);font-size:15px;font-style:italic;line-height:1.6}
.cv-gate-title{color:#e07070}

.sec-label{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text3);margin:18px 0 10px;display:flex;align-items:center;gap:8px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;margin-bottom:16px}
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);opacity:0;transition:opacity .2s}
.card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.card:hover::before{opacity:1}
.card.gate-card::before{background:linear-gradient(90deg,transparent,var(--crimson),transparent)}
.card-img-wrap{width:100%;height:100px;margin-bottom:10px;border-radius:2px;overflow:hidden;border:1px solid var(--border)}
.card-img{width:100%;height:100%;object-fit:cover}
.card-no-img{width:100%;height:80px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:26px;opacity:.3;border-radius:2px;margin-bottom:10px}
.card-badge{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:3px}
.card-badge.gate{color:#7a3030}
.card-name{font-family:'Cinzel',serif;font-size:12.5px;color:var(--text);margin-bottom:3px;line-height:1.3}
.card-sub{font-size:12px;color:var(--text3);font-style:italic}

/* ══ ENTRY VIEW ══════════════════════════════════════ */
.ev-wrap{animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.ev-header{
  display:flex;align-items:flex-start;gap:24px;
  padding-bottom:22px;margin-bottom:22px;
  border-bottom:1px solid var(--border);position:relative;
}
.ev-header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent);opacity:.4}

.ev-portrait{flex-shrink:0;width:200px}
.ev-portrait img{width:130px;height:170px;object-fit:cover;border-radius:3px;border:1px solid var(--border2);display:block;cursor:zoom-in}
.ev-portrait-ph{
  width:130px;height:170px;background:var(--bg3);border:1px dashed var(--border2);border-radius:3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text3);
  font-size:11px;cursor:pointer;transition:all .2s;text-align:center;padding:10px;
}
.ev-portrait-ph:hover{border-color:var(--gold-dim);color:var(--gold2);background:var(--bg4)}

.ev-meta{flex:1}
.ev-type{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:5px}
.ev-name{font-family:'Cinzel',serif;font-size:24px;color:var(--gold3);line-height:1.2;margin-bottom:5px;text-shadow:0 0 25px rgba(201,168,76,.12)}
.ev-sub{font-style:italic;color:var(--text2);font-size:15px;margin-bottom:12px}

/* links row */
.ev-links{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.ev-link{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;
  padding:4px 10px;border-radius:20px;
  background:var(--bg4);border:1px solid var(--border2);color:var(--text2);
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;
}
.ev-link:hover{border-color:var(--gold-dim);color:var(--gold2);background:var(--bg3)}
.ev-link.kingdom{border-color:#2a3550;color:#6a90c0}
.ev-link.kingdom:hover{border-color:#4060a0;color:#90b8e8}
.ev-link.faction{border-color:#2a3a2a;color:#5a8a5a}
.ev-link.faction:hover{border-color:#4a7a4a;color:#80b880}
.ev-link.gate{border-color:#3d1515;color:#a06060}
.ev-link.gate:hover{border-color:var(--crimson);color:#e08080}

.ev-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:1px;padding:3px 8px;border-radius:20px;background:var(--bg4);border:1px solid var(--border2);color:var(--text3)}

.ev-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;margin-bottom:12px}
.ef{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px}
.ef-k{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:2px}
.ef-v{font-size:14px;color:var(--text)}

.ev-body{font-size:16px;line-height:1.85;color:var(--text);white-space:pre-wrap;margin-bottom:16px}

.ev-gallery{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.gal-img{height:110px;border-radius:3px;border:1px solid var(--border);cursor:zoom-in;transition:transform .2s}
.gal-img:hover{transform:scale(1.03)}

.ev-actions{display:flex;gap:7px;padding-top:18px;border-top:1px solid var(--border);margin-top:16px;flex-wrap:wrap}

/* ══ STAT RADAR ══════════════════════════════════════ */
.radar-section{margin:20px 0}
.radar-section-title{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.radar-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.radar-container{
  display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;
}
.radar-chart-wrap{
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:16px;flex:1;min-width:280px;
}
.radar-chart-label{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:10px;text-align:center;
}
.radar-chart-label.phys{color:#6a9fd4}
.radar-chart-label.magic{color:#9b6fd4}
.radar-chart-label.intel{color:#6acd8d}

.radar-stats-panel{
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:14px 16px;min-width:200px;flex-shrink:0;
}
.rsp-cat{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.rsp-cat:first-child{margin-top:0}
.rsp-cat.phys{color:#6a9fd4}
.rsp-cat.magic{color:#9b6fd4}
.rsp-cat.intel{color:#6acd8d}
.rsp-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.rsp-name{font-size:12.5px;color:var(--text2);flex:1;white-space:nowrap}
.rsp-bar-wrap{width:80px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;flex-shrink:0}
.rsp-bar{height:100%;border-radius:3px;transition:width .3s}
.rsp-bar.phys{background:linear-gradient(90deg,#3a5f8a,#6a9fd4)}
.rsp-bar.magic{background:linear-gradient(90deg,#5a3a8a,#9b6fd4)}
.rsp-bar.intel{background:linear-gradient(90deg,#2a7a4a,#6acd8d)}
.rsp-val{font-family:'Cinzel',serif;font-size:10px;color:var(--text3);flex-shrink:0;width:20px;text-align:right}

/* ══ GATE VIEW ══════════════════════════════════════ */
.gate-header{
  background:linear-gradient(135deg,var(--hellred),#1a0a0a);
  border:1px solid var(--crimson);
  border-radius:6px;padding:20px 24px;margin-bottom:22px;
  position:relative;overflow:hidden;
}
.gate-header::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;
  background:radial-gradient(circle,rgba(139,26,26,.4),transparent 70%);
}
.gate-num{font-family:'Cinzel Decorative',serif;font-size:36px;color:rgba(139,26,26,.4);position:absolute;right:20px;top:10px;line-height:1}
.gate-title{font-family:'Cinzel Decorative',serif;font-size:18px;color:#e07070;margin-bottom:4px;text-shadow:0 0 20px rgba(192,57,43,.3)}
.gate-subtitle{color:#a06060;font-style:italic;font-size:15px}
.gate-status-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;
  padding:4px 10px;border-radius:20px;margin-top:10px;
  background:rgba(139,26,26,.3);border:1px solid var(--crimson);color:#e07070;
}
.gate-status-dot{width:6px;height:6px;border-radius:50%;background:var(--crimson2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ══ SEARCH ══════════════════════════════════════════ */
.sr-item{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s;
}
.sr-item:hover{border-color:var(--gold-dim);background:var(--bg3)}
.sr-path{font-family:'Cinzel',serif;font-size:8.5px;color:var(--text3);letter-spacing:1px;margin-bottom:3px}
.sr-name{font-family:'Cinzel',serif;font-size:14px;color:var(--gold2);margin-bottom:3px}
.sr-prev{font-size:13px;color:var(--text2);font-style:italic}

/* ══ MODAL ══════════════════════════════════════════ */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
#overlay.open{display:flex}
#modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:6px;width:660px;max-width:95vw;max-height:92vh;
  overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,.7),0 0 0 1px rgba(201,168,76,.06);
}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mt{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--gold2)}
.mc{background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;transition:color .15s;padding:2px}
.mc:hover{color:var(--text)}
.mb{padding:18px 22px}
.mf{padding:12px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px}

/* forms */
.fg{margin-bottom:14px}
.fl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:5px}
.fi,.fsel,.fta{
  width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  font-family:'EB Garamond',serif;font-size:15px;padding:7px 11px;
  border-radius:var(--r);outline:none;transition:border-color .2s;
}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--gold-dim)}
.fta{min-height:110px;resize:vertical;line-height:1.6}
.fsel option{background:var(--bg3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fhint{font-size:11.5px;color:var(--text3);margin-top:3px;font-style:italic}

/* icon picker */
.ig{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;max-height:130px;overflow-y:auto;margin-bottom:2px}
.io{text-align:center;padding:7px 3px;border-radius:3px;cursor:pointer;font-size:17px;transition:background .12s;border:1px solid transparent}
.io:hover{background:var(--bg3);border-color:var(--border2)}
.io.sel{background:var(--bg4);border-color:var(--gold-dim)}

/* custom icon image */
.icon-upload-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.icon-upload-btn{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;
  padding:5px 12px;border-radius:var(--r);border:1px dashed var(--border2);
  background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;
}
.icon-upload-btn:hover{border-color:var(--gold-dim);color:var(--gold2)}
.icon-current-preview{
  width:36px;height:36px;border-radius:4px;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  background:var(--bg3);font-size:20px;overflow:hidden;flex-shrink:0;
}
.icon-current-preview img{width:100%;height:100%;object-fit:contain}
.icon-img-clear{font-size:10px;color:var(--text3);cursor:pointer;transition:color .15s;border:none;background:none;padding:2px 6px}
.icon-img-clear:hover{color:var(--crimson2)}

/* tree image icon */
.ti-img{width:18px;height:18px;object-fit:contain;border-radius:2px;flex-shrink:0;display:block}

/* card image icon */
.card-icon-img{width:48px;height:48px;object-fit:contain;margin:0 auto 8px;display:block}

/* big header icon */
.cv-icon-img{width:64px;height:64px;object-fit:contain;opacity:.85;flex-shrink:0;margin-top:4px}

/* custom fields */
.cfl{display:flex;flex-direction:column;gap:7px;margin-bottom:7px}
.cfr{display:flex;gap:7px;align-items:center}
.cfr .fi{margin:0}
.rfb{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:12px;color:var(--text3);border:1px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;transition:all .15s}
.rfb:hover{border-color:var(--crimson2);color:var(--crimson2)}

/* image upload */
.iua{border:1px dashed var(--border2);border-radius:var(--r);padding:16px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text3);font-size:13px}
.iua:hover{border-color:var(--gold-dim);color:var(--gold2);background:var(--bg3)}
.ipr{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.ipi{position:relative;width:72px;height:72px}
.ipi img{width:72px;height:72px;object-fit:cover;border-radius:2px;border:1px solid var(--border)}
.iprm{position:absolute;top:-3px;right:-3px;width:16px;height:16px;background:var(--crimson);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:background .15s}
.iprm:hover{background:var(--crimson2)}

/* stat sliders */
.stat-group{margin-bottom:12px}
.sg-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding-bottom:6px;margin-bottom:8px;border-bottom:1px solid var(--border)}
.sg-title.phys{color:#6a9fd4}
.sg-title.magic{color:#9b6fd4}
.sg-title.intel{color:#6acd8d}
.sr-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sr-lbl{font-size:12.5px;color:var(--text2);width:130px;flex-shrink:0}
.sr-inp{flex:1;accent-color:var(--gold);cursor:pointer}
.sr-num{font-family:'Cinzel',serif;font-size:10px;color:var(--text3);width:22px;text-align:right;flex-shrink:0}

/* link selector */
.link-selector{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.ls-option{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;
  padding:4px 9px;border-radius:20px;border:1px solid var(--border2);
  color:var(--text3);cursor:pointer;transition:all .15s;background:var(--bg3);
}
.ls-option:hover{border-color:var(--border2);color:var(--text2)}
.ls-option.selected{background:var(--bg4);border-color:var(--gold-dim);color:var(--gold2)}

/* buttons */
.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.5px;padding:6px 14px;border-radius:var(--r);cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--gold-dim);color:var(--gold2)}
.btn.p{background:linear-gradient(135deg,#2a1f06,#150f02);border-color:var(--gold-dim);color:var(--gold2)}
.btn.p:hover{border-color:var(--gold);color:var(--gold3);box-shadow:0 0 10px rgba(201,168,76,.12)}
.btn.d{color:#a04040;border-color:#3d1515}.btn.d:hover{border-color:var(--crimson2);color:#e05050}
.btn.gate-btn{background:linear-gradient(135deg,#2a0808,#0d0303);border-color:var(--crimson);color:#e07070}
.btn.gate-btn:hover{box-shadow:0 0 12px rgba(139,26,26,.3)}

/* Family tree modal */
#family-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:flex-start;justify-content:center;overflow-y:auto;padding:30px 16px}
#family-overlay.open{display:flex}
#family-box{background:var(--bg1);border:1px solid var(--border2);border-radius:8px;width:100%;max-width:820px;min-height:200px}
.fam-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.fam-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--gold2)}
.fam-tree{padding:24px 20px;display:flex;flex-direction:column;gap:28px}
.fam-row{display:flex;flex-direction:column;gap:8px}
.fam-row-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);padding-bottom:4px;border-bottom:1px solid var(--border)}
.fam-members{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px}
.fam-card{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;width:80px;transition:transform .15s}
.fam-card:hover{transform:translateY(-2px)}
.fam-card:hover .fam-card-name{color:var(--gold2)}
.fam-avatar{width:56px;height:74px;border-radius:4px;object-fit:cover;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px}
.fam-avatar img{width:56px;height:74px;border-radius:4px;object-fit:cover}
.fam-card-name{font-size:11px;color:var(--text2);text-align:center;line-height:1.3;word-break:break-word}
.fam-card-sub{font-size:9px;color:var(--text3);text-align:center}
.fam-add-btn{width:56px;height:74px;border-radius:4px;border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.fam-add-btn:hover{border-color:var(--gold-dim);color:var(--gold2)}
.fam-pick-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;align-items:center;justify-content:center}
.fam-pick-overlay.open{display:flex}
.fam-pick-box{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;width:400px;max-width:92vw;max-height:70vh;display:flex;flex-direction:column}
.fam-pick-search{padding:10px 14px;border-bottom:1px solid var(--border)}
.fam-pick-list{overflow-y:auto;flex:1;padding:6px}
.fam-pick-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:4px;cursor:pointer;transition:background .12s}
.fam-pick-item:hover{background:var(--bg3)}
.fam-pick-avatar{width:30px;height:38px;border-radius:3px;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fam-pick-avatar img{width:30px;height:38px;object-fit:cover;border-radius:3px}

/* lightbox */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;align-items:center;justify-content:center;cursor:zoom-out}
#lb.open{display:flex}
#lb img{max-width:90vw;max-height:90vh;border-radius:3px}

/* ══ CHARACTER GRID VIEW ══════════════════════════════ */
.cg-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
.cg-search-wrap{position:relative;flex:1;min-width:180px;max-width:340px}
.cg-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.cg-search{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'EB Garamond',serif;font-size:14px;padding:7px 30px 7px 30px;border-radius:var(--r);outline:none;transition:border-color .2s}
.cg-search:focus{border-color:var(--gold-dim)}
.cg-search::placeholder{color:var(--text3)}
.cg-search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0;line-height:1}
.cg-search-clear:hover{color:var(--text2)}
.cg-sort-btns{display:flex;flex-wrap:wrap;gap:5px}
.cg-sort-btn{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.6px;padding:5px 11px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.cg-sort-btn:hover{border-color:var(--gold-dim);color:var(--gold2)}
.cg-sort-btn.active{background:linear-gradient(135deg,#2a1f06,#150f02);border-color:var(--gold-dim);color:var(--gold2)}

.cg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:8px}
.cg-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .18s;position:relative;user-select:none}
.cg-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);opacity:0;transition:opacity .2s}
.cg-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-2px)}
.cg-card:hover::before{opacity:1}
.cg-card.cg-dragging{opacity:.35;transform:scale(.97)}
.cg-card.cg-over{border-color:var(--gold);box-shadow:0 0 14px rgba(201,168,76,.2);transform:translateY(-3px)}
.cg-portrait{width:100%;height:120px;overflow:hidden;border-bottom:1px solid var(--border)}
.cg-portrait img{width:100%;height:100%;object-fit:cover;transition:transform .25s}
.cg-card:hover .cg-portrait img{transform:scale(1.04)}
.cg-portrait-ph{display:flex;align-items:center;justify-content:center;font-size:36px;background:var(--bg3);opacity:.5}
.cg-info{padding:9px 10px 10px}
.cg-name{font-family:'Cinzel',serif;font-size:11px;color:var(--text);margin-bottom:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cg-sub{font-size:11.5px;color:var(--text3);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cg-age{font-family:'Cinzel',serif;font-size:9px;color:var(--gold-dim);letter-spacing:.5px}
.cg-source-badge{position:absolute;top:6px;right:6px;font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:.8px;padding:2px 6px;border-radius:10px;background:rgba(90,61,122,.75);border:1px solid rgba(139,95,191,.4);color:rgba(200,175,240,.85);backdrop-filter:blur(4px);pointer-events:none;max-width:calc(100% - 12px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.empty{text-align:center;padding:36px;color:var(--text3);font-style:italic;font-size:14px}
.no-res{color:var(--text3);font-style:italic;padding:20px;text-align:center}

/* ══ ARCS NARRATIFS ══════════════════════════════════════════ */
.arc-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;background:rgba(140,80,255,.08);border:1px solid rgba(140,80,255,.2);border-radius:20px;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;color:#a090d0;transition:all .15s;margin-right:6px;margin-bottom:4px}
.arc-pill:hover{background:rgba(140,80,255,.18);border-color:rgba(140,80,255,.5);color:#c0a0f0}
.arc-pill-active{background:rgba(140,80,255,.25);border-color:rgba(140,80,255,.7);color:#e0c0ff}
.arc-pill-edit{margin-left:4px;opacity:.5;font-size:9px;padding:0 2px;border-radius:3px;transition:opacity .15s}
.arc-pill-edit:hover{opacity:1;background:rgba(140,80,255,.3)}
/* Sous-menu arcs dans comparatif */
.cmp-chip-arc{cursor:pointer}
.cmp-chip-arc:hover .cmp-arc-menu{display:block}
.cmp-arc-menu{display:none;position:absolute;top:100%;left:0;min-width:160px;background:#1a0f30;border:1px solid rgba(140,80,255,.4);border-radius:6px;z-index:100;padding:4px 0;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.cmp-arc-item{padding:7px 14px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;color:#c0b8e0;cursor:pointer;transition:background .12s}
.cmp-arc-item:hover{background:rgba(140,80,255,.2);color:#e0d0ff}
.cmp-arc-sel{color:#c09aef;background:rgba(140,80,255,.15)}
/* Modal arcs */
#arc-modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7)}
#arc-modal-inner{background:#0e0c18;border:1px solid rgba(140,80,255,.4);border-radius:10px;padding:30px;width:min(540px,94vw);max-height:88vh;overflow-y:auto}

/* ══ ADMIN / VISITOR MODE ════════════════════════════ */
#admin-auth-btn{
  background:var(--bg3);
  border:1px solid rgba(139,26,26,.5);
  color:rgba(180,80,80,.8);
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.5px;
  padding:6px 12px;border-radius:var(--r);cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
#admin-auth-btn:hover{border-color:var(--crimson2);color:#e05050;box-shadow:0 0 10px rgba(139,26,26,.2)}
#admin-auth-btn.is-admin{border-color:rgba(100,180,80,.4);color:rgba(120,200,100,.8)}
#admin-auth-btn.is-admin:hover{border-color:rgba(120,220,100,.7);color:#90e060}
/* Auth par mot de passe */
#visitor-badge{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;
  color:rgba(180,160,120,.4);padding:4px 8px;
  border:1px solid rgba(180,160,120,.12);border-radius:3px;
  pointer-events:none;
}
/* ═══ MASQUAGE EN MODE VISITEUR ════════════════════ */
/* Topbar admin */
body.visitor-mode #topbar-admin-group{ display:none !important; }
/* Sidebar : survol noeuds + drag */
body.visitor-mode .ta{ display:none !important; }
body.visitor-mode .tr:hover .ta{ display:none !important; }
body.visitor-mode .drag-handle{ display:none !important; }
/* Barres d'actions principales (tous les +/modifier/supprimer) */
body.visitor-mode .ev-actions{ display:none !important; }
/* Boutons son : visibles pour les visiteurs (pause/play)
   Les menus admin (clic-droit) sont déjà protégés par _isAdmin() */
/* body.visitor-mode #cat-sound-btn,
body.visitor-mode #wlc-sound-btn,
body.visitor-mode #il-sound-btn,
body.visitor-mode #hg-sound-btn,
body.visitor-mode #gard-sound-btn{ display:none !important; } */
/* Arbre genealogique */
body.visitor-mode .fam-add-btn{ display:none !important; }
body.visitor-mode #family-overlay .btn{ display:none !important; }
/* Divisions : boutons edit + logo cliquable */
body.visitor-mode .div-edit-btn{ display:none !important; }
body.visitor-mode .div-icon-ring{ cursor:default !important; pointer-events:none !important; }
/* Histoire : masquer seulement Modifier et + Nouvelle frise (pas Zoom/Ajuster) */
body.visitor-mode #h2-add-frise{ display:none !important; }
body.visitor-mode .h2-btn-row-edit{ display:none !important; }
/* Carte */
body.visitor-mode .carte-tb-btn{ display:none !important; }
/* Portrait placeholder 'Ajouter portrait' */
body.visitor-mode .ev-portrait-ph{ display:none !important; }
/* Slots Gardiens vides (assignation) */
body.visitor-mode .gard-slot-btn{ pointer-events:none !important; cursor:default !important; opacity:.5 !important; }
/* Gardiens : + Nouveau Gardien / Modifier / Supprimer */
body.visitor-mode .gard-btn-row{ display:none !important; }

/* Fiche détaillée : boutons Modifier / Famille / Arc / Supprimer */
body.visitor-mode .entry-edit-actions{ display:none !important; }

/* Secrets : + Nouveau secret + Modifier (vue liste) */
body.visitor-mode .sec-btn-row{ display:none !important; }
/* Secrets : boutons dans le parchemin ouvert (Modifier + Supprimer) */
body.visitor-mode .sec-p-btn:not(.sec-p-btn-keep){ display:none !important; }

/* ---- Boutons des vues immersives specifiques ---- */

/* Bestiaire : + Nouvelle creature + Modifier */
body.visitor-mode .bst-btn-row{ display:none !important; }

/* Artefacts : + Nouvel artefact + Modifier */
body.visitor-mode .art-btn-row{ display:none !important; }

/* Encyclopedie (Lore) : + Nouvelle entree + Modifier */

(function(){
  const _V = 'goh_visitor_ok';

    const inp = document.getElementById('_site-lock-input');

    if(inp && inp.value === 'Hades42'){

  if(sessionStorage.getItem(_V) === '1'){
    document.addEventListener('DOMContentLoaded', function(){
      const lock = document.getElementById('_site-lock');
      if(lock) lock.remove();
    });
    if(document.readyState !== 'loading'){

      if(lock) lock.remove();

})();

const _CLD_CLOUD  = 'dd9kepptt';
const _CLD_PRESET = 'goh_uploads';

function _uploadToCloudinary(file, onSuccess, onError){
  const isAudio = file.type.startsWith('audio/');
  const url = `https://api.cloudinary.com/v1_1/${_CLD_CLOUD}/${isAudio ? 'video' : 'image'}/upload`;
  const fd  = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', _CLD_PRESET);

  // Indicateur de chargement discret
  const toast = _cldToast('⏳ Upload en cours…');

  fetch(url, { method: 'POST', body: fd })
    .then(r => r.json())
    .then(data => {
      toast.remove();
      if(data.secure_url){
        _cldToast('✓ Upload réussi', 1800);
        onSuccess(data.secure_url);
      } else {
        _cldToast('✗ Erreur upload', 2500, true);
        if(onError) onError(data);
      }
    })
    .catch(err => {
      toast.remove();
      _cldToast('✗ Erreur réseau', 2500, true);
      if(onError) onError(err);
    });
}

function _showRemapTool(){
  if(!_isAdmin()) return;
  document.getElementById('_remap-modal')?.remove();

  // Collecter TOUS les champs avec ref: dans toute la DB
  const broken = [];

  function addEntry(nodeId, field, label, val, subPath){
    broken.push({nodeId, field, label, val: val||'', subPath});
  }

  Object.values(db).forEach(n=>{
    const nm = n.name||n.id;
    // images[]
    (n.images||[]).forEach((img,i)=>{
      if(!img || (typeof img==='string' && img.includes('ref:')))
        addEntry(n.id, `images.${i}`, `${nm} — image ${i+1}`, img, null);
    });
    // iconData
    if(n.iconData && n.iconData.includes('ref:'))
      addEntry(n.id, 'iconData', `${nm} — icône`, n.iconData, null);
    // _bgImage, _secBg, _carteImg, _triangleImg
    ['_bgImage','_secBg','_carteImg','_triangleImg'].forEach(f=>{
      if(n[f] && n[f].includes('ref:'))
        addEntry(n.id, f, `${nm} — ${f}`, n[f], null);
    });
    // _audio.src
    if(n._audio?.src && n._audio.src.includes('ref:'))
      addEntry(n.id, '_audio.src', `${nm} — musique`, n._audio.src, null);
    // _sfx
    if(n._sfx && n._sfx.includes('ref:'))
      addEntry(n.id, '_sfx', `${nm} — son SFX`, n._sfx, null);
    // _wlcAudio, _ilAudio, _hgAudio, _gardAudio, _geoAudio
    // icon (svg inline)
    if(typeof n.icon==='string' && n.icon.includes('ref:'))
      addEntry(n.id, 'icon', `${nm} — icône SVG`, n.icon, null);
    // frises images
    (n._h2frises||[]).forEach((frise,fi)=>{
      (frise.periods||[]).forEach((p,pi)=>{
        if(p.img && p.img.includes('ref:'))
          addEntry(n.id, `_h2frises.${fi}.periods.${pi}.img`, `${nm} — Frise "${frise.name||fi}" période "${p.name||pi}"`, p.img, null);
      });
    });
    (n._frises||[]).forEach((frise,fi)=>{
      (frise.periods||[]).forEach((p,pi)=>{
        if(p.img && p.img.includes('ref:'))
          addEntry(n.id, `_frises.${fi}.periods.${pi}.img`, `${nm} — ancienne frise "${frise.title||fi}" période "${p.name||pi}"`, p.img, null);
      });
    });
    // gardiens images
    if(n._gardImgs) n._gardImgs.forEach((img,i)=>{
      if(img && img.includes('ref:'))
        addEntry(n.id, `_gardImgs.${i}`, `${nm} — gardien ${i+1}`, img, null);
    });
    // globalStatNames audio
  });

  // globalStatNames audio
  ['_wlcAudio','_ilAudio','_hgAudio','_gardAudio','_geoAudio'].forEach(k=>{
    if(globalStatNames[k] && globalStatNames[k].includes('ref:'))
      broken.push({nodeId:'__global', field: k, label:`Musique globale — ${k}`, val: globalStatNames[k], subPath:null});
  });
  if(globalStatNames._wlcBg && globalStatNames._wlcBg.includes('ref:'))
    broken.push({nodeId:'__global', field:'_wlcBg', label:'Image fond accueil', val: globalStatNames._wlcBg, subPath:null});

  if(broken.length === 0){ alert('✓ Aucun élément cassé — tout est bon !'); return; }

  const m = document.createElement('div');
  m.id = '_remap-modal';
  m.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:30px 20px';

  let rows = broken.map((e,i)=>{
    const isAudio = e.val.includes('audio/') || e.val.includes('mp3');
    const refName = e.val.replace(/data:[^;]+;ref:assets\//,'') || '(vide)';
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:10px 12px;background:rgba(140,80,255,.04);border:1px solid rgba(140,80,255,.12);border-radius:5px">
      <div style="min-width:240px;font-family:'EB Garamond',serif;font-size:12px">
        <div style="color:#c0a8e8;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px">${esc(e.label)}</div>
        <div style="color:rgba(180,160,220,.35);font-size:10px;margin-top:2px">${esc(refName)}</div>

function _remapUploadIdx(idx, type){
  const e = window._remapBroken[idx]; if(!e) return;
  const inp = document.createElement('input');
  inp.type='file'; inp.accept = type==='audio' ? 'audio/*' : 'image/*';
  inp.onchange = ev=>{
    const f = ev.target.files[0]; if(!f) return;
    _uploadToCloudinary(f, url=>{
      // Stocker l'URL résolue
      window._remapBroken[idx]._resolved = url;
      const field = document.getElementById(`_ri_${idx}`);
      if(field){ field.value=url; field.style.borderColor='rgba(80,200,80,.6)'; }
      _cldToast('✓ Uploadé', 1200);
    });
  };
  inp.click();
}

function _remapSaveAll(){
  const broken = window._remapBroken||[];
  let count = 0;
  broken.forEach(e=>{
    const url = e._resolved || document.getElementById(`_ri_${broken.indexOf(e)}`)?.value?.trim();
    if(!url || !url.startsWith('http')) return;
    // Appliquer la valeur dans db ou globalStatNames
    if(e.nodeId === '__global'){
      globalStatNames[e.field] = url;
    } else {
      const n = db[e.nodeId]; if(!n) return;
      const parts = e.field.split('.');
      // Naviguer dans l'objet
      let obj = n;
      for(let i=0;i<parts.length-1;i++){
        const p = parts[i];
        const ni = parseInt(parts[i+1]);
        if(!isNaN(ni)){ if(!Array.isArray(obj[p])) obj[p]=[]; obj=obj[p]; }
        else { if(!obj[p]||typeof obj[p]!=='object') obj[p]={}; obj=obj[p]; }
      }
      const lastKey = parts[parts.length-1];
      const lastInt = parseInt(lastKey);
      if(!isNaN(lastInt)) obj[lastInt]=url;
      else obj[lastKey]=url;
      count++;
    }
  });
  save();
  _cldToast(`✓ ${count} éléments sauvegardés dans Supabase`, 3000);
  document.getElementById('_remap-modal')?.remove();
}










async function _sbInit(){
  const remote = await _sbLoad();
  if(remote){
    try{
      const parsed = JSON.parse(remote);
      if(parsed.db && Object.keys(parsed.db).length > 0){
        db = parsed.db;
        // Nettoyer les URLs invalides (data:...;ref:...) des données chargées
        _cleanInvalidUrls(db);
        rootIds = parsed.rootIds || rootIds;
        const remoteGS = parsed.globalStatNames || {};
        globalStatNames = Object.assign({phys:{},magic:{},intel:{}}, remoteGS);
        _migrateData();
        ensureGardiens();
  ensureMusicLib();
        ensureMusicLib();
        Object.values(db).forEach(n=>{
          if(n.type==='category' && n.parentId===null && n.kind==='generic'){
            delete expanded[n.id];
          }
        });
        window._sbReady = true; // Supabase chargé avec succès
        _arcPrefLoad();
        _ensureSolaris();
        _migrateGardiensToFactions(); // Déplacer Les Gardiens vers Factions
        renderTree();
        renderWelcome();
      }
    }catch(e){ console.error('Supabase parse error:', e); }
  } else {
    // Supabase accessible mais pas de données — base vierge, on peut sauvegarder
    window._sbReady = true;
  }
}

// ════════════════════════════════════════════════
//  MIGRATION : restructure les anciennes données
// ════════════════════════════════════════════════
function _migrateData(){
  let changed = false;
  // Migration : Les Gardiens → kind='gardiens'
  // Si déjà kind=gardiens → le respecter. Sinon chercher celui sous un ancêtre world.
  const allGard = Object.values(db).filter(n=>n.name==='Les Gardiens'&&n.type==='category');
  const alreadyTagged = allGard.find(g=>g.kind==='gardiens');
  if(!alreadyTagged){
    // Chercher celui sous un ancêtre world
    allGard.forEach(g=>{
      let pid = g.parentId; let isIluminiaGard = false;
      while(pid){ const p=db[pid]; if(!p)break; if(p.kind==='world'){isIluminiaGard=true;break;} if(!p.parentId)break; pid=p.parentId; }
      if(isIluminiaGard){ g.kind='gardiens'; changed=true; }
    });
    // Si toujours rien trouvé (structure différente), taguer le premier qui a des enfants characters
    if(!Object.values(db).find(n=>n.kind==='gardiens')){
      const candidate = allGard.find(g=>(g.children||[]).some(cid=>db[cid]&&db[cid].entryType==='character'));
      if(candidate){ candidate.kind='gardiens'; changed=true; }
    }
  }


  // Migration 1 : Magie & Pouvoirs → kind:'magie-root' (était 'generic')
  const magieNode = Object.values(db).find(n=>n.name==='Magie & Pouvoirs'&&n.type==='category');
  if(magieNode && magieNode.kind!=='magie-root'){
    magieNode.kind='magie-root'; changed=true;
  }

  // Migration 2 : Créer les sous-catégories magie-sub si absentes (Magie + Énergie seulement)
  if(magieNode){
    const existingSubs = (magieNode.children||[]).map(id=>db[id]).filter(n=>n&&n.kind==='magie-sub');
    if(existingSubs.length===0){
      const subDefs=[
        {name:'Magie',   icon:'✨', color:'#7040c8', subtitle:'Sorts, disciplines et arts magiques'},
        {name:'Énergie', icon:'⚡', color:'#c87820', subtitle:'Flux énergétiques et forces primales'},
      ];
      subDefs.forEach(def=>{
        const sid=gid();
        db[sid]={id:sid,type:'category',kind:'magie-sub',name:def.name,icon:def.icon,
          parentId:magieNode.id,children:[],subtitle:def.subtitle,
          _triangleColor:def.color,_triangleImg:null};
        magieNode.children.unshift(sid);
        changed=true;
      });
    }

    // Migration 3 : Supprimer la fausse sous-cat "Portes" si elle existe
    const faussePortes = (magieNode.children||[]).map(id=>db[id]).filter(n=>n&&n.kind==='magie-sub'&&n.name==='Portes')[0];
    if(faussePortes){
      // Remonter les enfants (dont gate-root) directement sous magieNode
      (faussePortes.children||[]).forEach(cid=>{
        if(db[cid]){ db[cid].parentId=magieNode.id; if(!magieNode.children.includes(cid)) magieNode.children.push(cid); }
      });
      magieNode.children = magieNode.children.filter(id=>id!==faussePortes.id);
      delete db[faussePortes.id];
      changed=true;
    }

    // Migration 4 : Déplacer gate-root directement sous magie-root si ce n'est pas déjà le cas
    const gateRoot = Object.values(db).find(n=>n.kind==='gate-root');
    if(gateRoot && gateRoot.parentId !== magieNode.id){
      rootIds = rootIds.filter(id=>id!==gateRoot.id);
      if(gateRoot.parentId && db[gateRoot.parentId]){
        db[gateRoot.parentId].children = (db[gateRoot.parentId].children||[]).filter(id=>id!==gateRoot.id);
      }
      gateRoot.parentId = magieNode.id;
      if(!magieNode.children.includes(gateRoot.id)) magieNode.children.push(gateRoot.id);
      // Ajouter les propriétés triangle si absentes
      if(!gateRoot._triangleColor) gateRoot._triangleColor='#c83020';
      changed=true;
    }
  }

  // Toujours : retirer les gates orphelines des rootIds
  rootIds = rootIds.filter(r=>{ const n=db[r]; return !(n&&n.type==='gate'&&!n.parentId===false); });
  // Plus précis : retirer tout noeud type=gate de rootIds (les gates doivent être sous gate-root)
  rootIds = rootIds.filter(r=>db[r]&&db[r].type!=='gate');

  // Migration nouveaux kinds racine
  const kindMap = {'histoire-root':'Histoire','bestiaire-root':'Bestiaire','artefacts-root':'Artefacts','lore-root':'Encyclopédie'};
  Object.values(db).forEach(n=>{
    if(n.type==='category' && n.parentId===null && kindMap[n.kind]===undefined && n.kind!=='world-root'&&n.kind!=='magie-root'&&n.kind!=='gate-root'&&n.kind!=='gardiens'&&n.kind!=='magie-sub'&&n.kind!=='generic'){
      // laisser tel quel
    }
  });

  // Fermer par défaut les catégories racine de type générique (Personnages etc.)
  // Ne les ouvrir que si l'utilisateur a explicitement cliqué
  Object.values(db).forEach(n=>{
    if(n.type==='category' && n.parentId===null && n.kind==='generic'){
      delete expanded[n.id];
    }
  });

  // Migration : Carte → kind='carte'
  Object.values(db).forEach(n=>{
    if(n.type==='category' && n.name==='Carte' && n.kind==='generic'){
      n.kind='carte'; changed=true;
    }
  });

  // Migration : _frises → _h2frises (nouveau format Histoire)
  Object.values(db).forEach(n=>{
    if((n.kind==='histoire-root'||n.name==='Histoire'||n.name==='Histoire de Pyli') && n._frises && !n._h2frises){
      n._h2frises = n._frises.map(f=>({
        name: f.title||'Frise',
        sub: '',
        height: 72,
        periods: (f.periods||[]).map(p=>({
          name: p.name||'',
          start: String(p.startYear||p.start||0),
          end: String(p.endYear||p.end||1),
          color: p.color||'#5040a0',
          desc: p.desc||'',
          img: p.img||null
        })),
        events: (f.events||[]).map(ev=>({
          name: ev.text||ev.name||'',
          year: String(ev.year||0),
          color: '#f0c840'
        }))
      }));
      changed = true;
    }
  });

  // Migration : Secrets entries → entryType='secret'
  Object.values(db).forEach(n=>{
    if(n.type==='entry' && n.entryType==='generic'){
      // Vérifier si dans la catégorie Secrets
      let node=db[n.parentId];
      let i=0;
      while(node&&i++<10){
        if(node.name==='Secrets'){n.entryType='secret';changed=true;break;}
        node=db[node.parentId];
      }
    }
  });

    // if(changed) save(); -- ne pas sauvegarder avant _sbInit
}

function renderTree(){
  const el=document.getElementById('tree');
  el.innerHTML='';
  rootIds.forEach(id=>{
    el.appendChild(buildNode(id,0));
    // Zone de dépôt ENTRE les éléments racine
    el.appendChild(_makeRootDropZone(id));
  });
  // Zone de dépôt en bas (pour déposer en dernier)
  el.appendChild(_makeRootDropZone(null));
}

function _makeRootDropZone(afterId){
  const z=document.createElement('div');
  z.className='root-drop-zone';
  z.dataset.afterId=afterId||'';
  z.addEventListener('dragover',e=>{
    if(!dragId) return;
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    z.classList.add('root-drop-zone--active');
  });
  z.addEventListener('dragleave',()=>z.classList.remove('root-drop-zone--active'));
  z.addEventListener('drop',e=>{
    e.preventDefault();
    z.classList.remove('root-drop-zone--active');
    if(!dragId) return;
    const node=db[dragId];
    if(!node) return;
    // Retirer de l'ancien parent ou de rootIds
    if(node.parentId && db[node.parentId]){
      db[node.parentId].children=db[node.parentId].children.filter(c=>c!==dragId);
    } else {
      rootIds=rootIds.filter(r=>r!==dragId);
    }
    node.parentId=null;
    // Insérer dans rootIds après afterId
    const afterId=z.dataset.afterId;
    if(afterId && rootIds.includes(afterId)){
      const idx=rootIds.indexOf(afterId);
      rootIds.splice(idx+1,0,dragId);
    } else {
      rootIds.push(dragId);
    }
    dragId=null;
    save(); renderTree();
    if(cur) renderContent(cur);
  });
  return z;
}

function buildNode(id,depth){
  const n=db[id];if(!n)return document.createTextNode('');
  // Fiche masquée : invisible pour les visiteurs
  if(!_isAdmin() && n._hidden) return document.createTextNode('');

  const wrap=document.createElement('div');wrap.className='tn';
  const row=document.createElement('div');
  const isGate=n.type==='gate'||n.kind==='gate-root';
  row.className='tr'+(cur===id?' active':'')+(isGate?' gate-node':'');
  row.style.paddingLeft=(8+depth*13)+'px';
  row.setAttribute('data-id',id);
  row.onclick=e=>{if(!e.target.closest('.ta')&&!e.target.closest('.drag-handle'))selectNode(id)};
  // Clic droit : menu héritage audio (uniquement pour les catégories avec parent)
  if((n.type==='category'||n.type==='gate') && n.parentId){
    row.oncontextmenu=e=>{ e.preventDefault(); e.stopPropagation(); showAudioInheritMenu(id, e.clientX, e.clientY); };
  }

  // Drag handle
  const dh=document.createElement('div');dh.className='drag-handle';dh.textContent='⠿';dh.title='Glisser pour déplacer';
  dh.setAttribute('draggable','true');
  dh.addEventListener('dragstart',e=>{e.stopPropagation();onDragStart(e,id)});
  dh.addEventListener('dragend',onDragEnd);
  row.appendChild(dh);

  // Drop target on the row itself
  row.addEventListener('dragover',e=>onDragOver(e,id));
  row.addEventListener('dragleave',()=>onDragLeave(id));
  row.addEventListener('drop',e=>onDrop(e,id));

  const hasC=n.children&&n.children.length>0;
  const tog=document.createElement('div');
  tog.className='tt'+(hasC?'':' leaf')+(expanded[id]?' open':'');
  tog.innerHTML='▶';tog.onclick=e=>{e.stopPropagation();expanded[id]=!expanded[id];renderTree()};
  row.appendChild(tog);

  const ic=document.createElement('div');ic.className='ti';
  if(n.iconData){const img=document.createElement('img');img.src=n.iconData;img.className='ti-img';ic.appendChild(img);}
  else if(n.icon && n.icon.startsWith('<')){ ic.innerHTML=n.icon; }
  else if(n.entryType==='ability' && (!n.icon||n.icon==='📄')){ ic.textContent='⚡'; }
  else{ic.textContent=n.icon||'•';}
  row.appendChild(ic);
  const lbl=document.createElement('div');lbl.className='tl';
  lbl.textContent=n.name;
  row.appendChild(lbl);
  // Admin : badge discret sur les fiches masquées
  if(n._hidden && _isAdmin()){
    row.classList.add('node-is-hidden');
    const hb=document.createElement('span');hb.className='node-hidden-badge';hb.title='Masqué aux visiteurs';hb.textContent='🚫';row.appendChild(hb);
  }
  // Badge audio inherit off
  if(n._audioInherit===false && n.parentId){
    const abd=document.createElement('span');abd.title='Musique du parent coupée';
    abd.style.cssText='font-size:10px;margin-left:4px;opacity:.55;cursor:default';
    abd.textContent='🔇';row.appendChild(abd);
  }

  if(n.type==='gate'){
    const gb=document.createElement('div');gb.className='gate-badge';gb.textContent='PORTE';row.appendChild(gb);
  }

  if(n.type==='category'||n.type==='gate'){
    const cnt=document.createElement('div');cnt.className='tc';cnt.textContent=countAll(id);row.appendChild(cnt);
  }

  const acts=document.createElement('div');acts.className='ta';
  const ed=document.createElement('button');ed.className='tab';ed.title='Modifier';ed.textContent='✎';
  ed.onclick=e=>{e.stopPropagation();openEditModal(id)};acts.appendChild(ed);
  const dl=document.createElement('button');dl.className='tab del';dl.title='Supprimer';dl.textContent='✕';
  dl.onclick=e=>{e.stopPropagation();doDelete(id)};acts.appendChild(dl);
  row.appendChild(acts);
  wrap.appendChild(row);

  if(hasC&&expanded[id]){
    const ch=document.createElement('div');ch.className='tc-wrap';
    n.children.forEach(cid=>ch.appendChild(buildNode(cid,depth+1)));
    wrap.appendChild(ch);
  }
  return wrap;
}

function countAll(id){
  const n=db[id];if(!n)return 0;
  if(n.type==='entry')return 1;
  let c=0;(n.children||[]).forEach(cid=>{c+=countAll(cid)});return c;
}

function selectNode(id){
  // Fiche masquée : rien ne se passe pour le visiteur
  if(!_isAdmin() && db[id] && db[id]._hidden) return;
  cur=id; renderTree(); renderBreadcrumb(id);
  renderContent(id);
}

function ancestors(id){
  const p=[];let c=db[id];
  while(c){p.unshift(c);c=c.parentId?db[c.parentId]:null}
  return p;
}
function renderBreadcrumb(id){
  const el=document.getElementById('breadcrumb');
  el.innerHTML='';
  ancestors(id).forEach((n,i,arr)=>{
    const sp=document.createElement('span');
    sp.className='crumb'+(i===arr.length-1?' last':'');
    const iconVal = n.icon||'';
    if(iconVal.startsWith('<')){
      // HTML icon (img tag) — render it, then append name as text
      const tmp=document.createElement('span');
      tmp.innerHTML=iconVal;
      sp.appendChild(tmp);
      sp.appendChild(document.createTextNode('  '+n.name));
    } else {
      sp.textContent=iconVal+'  '+n.name;
    }
    sp.onclick=()=>selectNode(n.id);
    el.appendChild(sp);
    if(i<arr.length-1){const s=document.createElement('span');s.className='crumb-sep';s.textContent=' › ';el.appendChild(s)}
  });
}

// Returns the nodeId of the nearest ancestor (or self) that has _audio.src set,
// searching up the tree. Returns null if none found.
function findInheritedAudioNodeId(nodeId){
  let id = nodeId;
  let first = true;
  while(id){
    const nd = db[id];
    if(!nd) break;
    // Bloquer si ce nœud a explicitement désactivé l'héritage
    if(!first && nd._audioInherit === false) return null;
    // Trouver audio cat-audio (stocké dans _audio.src)
    if(nd._audio && nd._audio.src) return id;
    // Stopper à la frontière d'une grande catégorie immersive
    // (world, gate-root, world-root) si ce n'est pas le nœud courant
    if(!first && (nd.kind==='world'||nd.kind==='gate-root'||nd.kind==='world-root')) return null;
    first = false;
    id = nd.parentId || null;
  }
  return null;
}

// Returns true if this node will be rendered by one of the special immersive views
// that have their own independent audio system (not the generic cat-audio).
function nodeHasOwnImmersiveAudio(n){
  if(!n) return false;
  if(n.kind==='gate-root') return true;
  if(n.kind==='world')     return true;
  if(n.kind==='gardiens') return true;
  if(n.name==='Royaumes & Nations' || n.kind==='world-root') return true;
  if(n.kind==='magie-root') return true;
  if(n.kind==='magie-sub') return true;
  if(n.kind==='histoire-root'||n.kind==='bestiaire-root'||n.kind==='artefacts-root'||n.kind==='lore-root') return true;
  if(n.kind==='comparatif') return true;
  return false;
}


function _stopAllAudio(){
  // Couper et masquer TOUS les audios et boutons
  ['cat-audio','il-audio','hg-audio','gard-audio','wlc-audio','geo-audio'].forEach(aid=>{
    const a=document.getElementById(aid); if(a&&!a.paused) a.pause();
  });
  ['cat-sound-btn','il-sound-btn','hg-sound-btn','gard-sound-btn','wlc-sound-btn','geo-sound-btn'].forEach(bid=>{
    const b=document.getElementById(bid); if(b) b.style.display='none';
  });
}

function renderContent(id){
  // Arrêter la musique de la bibliothèque si pas persistante
  if(!window._mlibPersist && window._mlibCurrentAudio && window._mlibCurrentIdx >= 0){
    const isMlib = db[id]?.kind !== 'music-lib';
    if(isMlib){ window._mlibCurrentAudio.pause(); }
  }
  const n=db[id];if(!n)return;
  const v=document.getElementById('view');
  v.style.padding='';v.style.overflow='';

  // ── Gestion audio : UN SEUL SON à la fois ──
  // Étape 1 : tout couper et masquer
  _stopAllAudio();

  // Étape 2 : décider quel son jouer
  if(nodeHasOwnImmersiveAudio(n)){
    // Vue immersive → son propre sera lancé par la fonction de rendu
  } else {
    // Catégorie/entrée → toujours afficher le bouton son
    // Chercher un audio hérité (self ou ancêtre) ; sinon afficher le bouton vide
    const audioSourceId = findInheritedAudioNodeId(id) || id;
    initCatAudio(audioSourceId);
  }

  _cancelAllAnims();
  if(n.type==='entry'){renderEntry(v,n)}
  else if(n.type==='gate'){renderGateEntry(v,n)}
  else{renderCategory(v,n)}
}

let _wlcAnim = null;
let _wlcAudioObj = null;
let _wlcAudioURL = null;
// Volume maître global (0 à 1) — sauvegardé dans localStorage
let _masterVol = parseFloat(localStorage.getItem('goh_master_vol') ?? '0.5');
if(isNaN(_masterVol)||_masterVol<0||_masterVol>1) _masterVol = 0.5;
function _setMasterVol(v){
  _masterVol = Math.max(0, Math.min(1, v));
  localStorage.setItem('goh_master_vol', _masterVol.toString());
  // Appliquer à tous les éléments audio actifs
  ['wlc-audio','il-audio','hg-audio','gard-audio','cat-audio','geo-audio'].forEach(id=>{
    const a = document.getElementById(id);
    if(a) a.volume = _masterVol;
  });
  // Mettre à jour l'affichage du bouton
  const lbl = document.getElementById('_vol-lbl');
  if(lbl) lbl.textContent = Math.round(_masterVol*100)+'%';
  const slider = document.getElementById('_vol-slider');
  if(slider) slider.value = Math.round(_masterVol*100);
}
let _wlcAudioVol = 0.4;

function initWlcAudio(){
  let audio = document.getElementById('wlc-audio');
  if(!audio){ audio=document.createElement('audio');audio.id='wlc-audio';audio.loop=true;audio.style.display='none';document.body.appendChild(audio); }
  if(!audio) return;
  // Utiliser l'audio uploadé (Cloudinary) s'il existe, sinon l'OST par défaut
  const audioSrc = globalStatNames._wlcAudio || WLC_OST;
  if(!_wlcAudioURL || _wlcAudioURL !== audioSrc) _wlcAudioURL = audioSrc;
  if(audio.src !== _wlcAudioURL) audio.src = _wlcAudioURL;
  audio.loop = true; audio.volume = _wlcAudioVol * _masterVol;
  _wlcAudioObj = audio;
  window._wlcPendingPlay = true;
  if(_wlcAudioURL){
    audio.play().then(()=>{ _updateWlcBtn('🔊'); window._wlcPendingPlay=false; }).catch(()=>{
      _updateWlcBtn('🔇');
      if(!window._audioPendingPlay) window._audioPendingPlay=[];
      window._audioPendingPlay.push(()=>{
        audio.play().then(()=>{ _updateWlcBtn('🔊'); window._wlcPendingPlay=false; }).catch(()=>{});
      });
    });
  } else { _updateWlcBtn('🎵'); }
  if(!document.getElementById('wlc-audio-input')){
    const inp = document.createElement('input');
    inp.type='file'; inp.accept='audio/*'; inp.style.display='none'; inp.id='wlc-audio-input';
    inp.onchange = _wlcLoadFile; document.body.appendChild(inp);
  }
}
function _updateWlcBtn(icon){ const b=document.getElementById('wlc-sound-btn'); if(b) b.textContent=icon; }
function _wlcLoadFile(e){
  const file=e.target.files[0]; if(!file) return;
  _uploadToCloudinary(file, url=>{
    _wlcAudioURL = url;
    globalStatNames._wlcAudio = url;
    save();
    const a=document.getElementById('wlc-audio'); if(!a) return;
    a.src=url; a.loop=true; a.volume=_wlcAudioVol; a.play().catch(()=>{});
    _updateWlcBtn('🔊');
  });
  e.target.value='';
}
function toggleWlcSound(){
  const a=document.getElementById('wlc-audio'); if(!a) return;
  if(!_wlcAudioURL||!a.src||a.src===window.location.href){ a.src=WLC_OST; _wlcAudioURL=WLC_OST; a.loop=true; a.volume=_wlcAudioVol; }
  if(a.paused){ a.play().catch(()=>{}); _updateWlcBtn('🔊'); }
  else { a.pause(); _updateWlcBtn('🔇'); }
}
function _wlcRestoreOST(){
  _wlcAudioURL=WLC_OST;

function _showWlcSoundMenu(x,y){
  if(!_isAdmin()) return;

function _showWlcBgMenu(x, y){
  if(!_isAdmin()) return;
  document.getElementById('_wlc-bg-ctx')?.remove();
  const hasBg = !!globalStatNames._wlcBg;
  const m = document.createElement('div');
  m.id = '_wlc-bg-ctx';
  m.style.cssText = `position:fixed;left:${x}px;top:${y}px;z-index:99998;
    background:#0e0c14;border:1px solid rgba(160,130,255,.35);border-radius:6px;
    padding:4px 0;min-width:200px;box-shadow:0 8px 28px rgba(0,0,0,.7);
    font-family:'Cinzel',serif;font-size:10px;`;

  const title = document.createElement('div');
  title.style.cssText = 'padding:7px 14px 5px;font-size:8.5px;letter-spacing:2px;color:rgba(160,130,255,.4);border-bottom:1px solid rgba(160,130,255,.1);margin-bottom:4px;';
  title.textContent = "FOND DE L'ACCUEIL";
  m.appendChild(title);

  function makeRow(icon, label, fn, danger){
    const r = document.createElement('div');
    r.style.cssText = `padding:8px 14px;cursor:pointer;color:${danger?'rgba(220,80,80,.7)':'rgba(200,180,255,.7)'};display:flex;align-items:center;gap:8px;transition:background .12s`;
    r.onmouseenter = ()=>r.style.background='rgba(160,130,255,.1)';
    r.onmouseleave = ()=>r.style.background='';
    r.innerHTML = `${icon} ${label}`;
    r.onclick = ()=>{ m.remove(); fn(); };
    m.appendChild(r);
  }

  makeRow('🖼', "Changer l'image de fond", ()=>{
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = e=>{
      const f = e.target.files[0]; if(!f) return;
      _uploadToCloudinary(f, url=>{
        globalStatNames._wlcBg = url;
        if(!globalStatNames._wlcBgOpacity) globalStatNames._wlcBgOpacity = 0.35;
        save(); renderWelcome();
        _cldToast('✓ Image de fond appliquée', 2000);
      });
    };
    inp.click();
  });

  // Slider opacité si image présente
  if(hasBg){
    const sliderWrap = document.createElement('div');
    sliderWrap.style.cssText = 'padding:8px 14px;color:rgba(200,180,255,.6);';
    const op = Math.round((globalStatNames._wlcBgOpacity??0.35)*100);
    sliderWrap.innerHTML = `<div style="font-size:8.5px;letter-spacing:1px;margin-bottom:6px">OPACITÉ — <span id="_wlcbg-opval">${op}%</span></div>
      <input type="range" min="5" max="100" value="${op}" style="width:100%;accent-color:#9060e0;cursor:pointer"
        oninput="globalStatNames._wlcBgOpacity=this.value/100;document.getElementById('_wlcbg-opval').textContent=this.value+'%';
        const b=document.getElementById('wlc-bg-img');if(b)b.style.opacity=this.value/100;">
      <button onclick="save();document.getElementById('_wlc-bg-ctx')?.remove()" style="margin-top:6px;width:100%;padding:5px 0;background:rgba(140,80,255,.12);border:1px solid rgba(140,80,255,.3);border-radius:4px;color:#c0a0f8;font-family:'Cinzel',serif;font-size:8.5px;cursor:pointer;letter-spacing:1px">✓ Appliquer</button>`;
    m.appendChild(sliderWrap);

    const sep = document.createElement('div');
    sep.style.cssText = 'height:1px;background:rgba(160,130,255,.1);margin:4px 0;';
    m.appendChild(sep);

    makeRow('✕', "Supprimer le fond", ()=>{
      delete globalStatNames._wlcBg;
      delete globalStatNames._wlcBgOpacity;
      save(); renderWelcome();
    }, true);
  }

  document.body.appendChild(m);
  setTimeout(()=>document.addEventListener('click', function _c(e){
    if(!m.contains(e.target)){ m.remove(); document.removeEventListener('click',_c); }
  }), 10);
  requestAnimationFrame(()=>{
    const r = m.getBoundingClientRect();
    if(r.right > window.innerWidth) m.style.left=(x-r.width)+'px';
    if(r.bottom > window.innerHeight) m.style.top=(y-r.height)+'px';
  });
}
