function _h2GetRange(nodeId){
  const n=db[nodeId];if(!n||!n._h2frises||!n._h2frises.length)return{min:0,max:100};
  let min=Infinity,max=-Infinity;
  n._h2frises.forEach(f=>{
    (f.periods||[]).forEach(p=>{
      const s=parseFloat(p.start),e2=parseFloat(p.end);
      if(!isNaN(s)){min=Math.min(min,s);max=Math.max(max,e2||s+1);}
    });
    (f.events||[]).forEach(ev=>{
      const y=parseFloat(ev.year);
      if(!isNaN(y)){min=Math.min(min,y);max=Math.max(max,y);}
    });
  });
  if(!isFinite(min))return{min:0,max:100};
  const pad=(max-min)*.05||5;
  return{min:Math.floor(min-pad),max:Math.ceil(max+pad)};
}

function _h2Render(nodeId){
  const n=db[nodeId];if(!n)return;
  const S=window._h2State;
  const range=_h2GetRange(nodeId);
  const totalYears=range.max-range.min;
  const totalW=Math.max(totalYears*S.pxPerYear,600);

  // Règle
  const ruler=document.getElementById('h2-ruler');
  if(ruler){
    ruler.style.width=totalW+'px';
    ruler.style.minWidth=totalW+'px';
    ruler.innerHTML='';
    const step=_h2NiceStep(S.pxPerYear);
    for(let y=Math.ceil(range.min/step)*step;y<=range.max;y+=step){
      const x=(y-range.min)*S.pxPerYear;
      const tick=document.createElement('div');
      tick.className='h2-tick';
      tick.style.left=x+'px';
      tick.innerHTML=`<span class="h2-tick-label">${y}</span><div class="h2-tick-line"></div>`;
      ruler.appendChild(tick);
    }
  }

  // Frises
  const cont=document.getElementById('h2-frises-container');
  if(!cont)return;
  cont.innerHTML='';
  (n._h2frises||[]).forEach((f,fi)=>{
    const row=document.createElement('div');
    row.className='h2-frise';
    row.style.height=(f.height||72)+'px';
    row.style.minWidth=(120+totalW)+'px';
    row.innerHTML=`
      <div class="h2-frise-label">
        <div class="h2-frise-name">${esc(f.name||'Frise '+(fi+1))}</div>
        ${f.sub?`<div class="h2-frise-sub">${esc(f.sub)}</div>`:''}
        <div style="display:flex;gap:4px;margin-top:5px">
          <button onclick="_h2EditFrise('${nodeId}',${fi})" style="padding:2px 6px;background:rgba(180,150,40,.1);border:1px solid rgba(180,150,40,.2);border-radius:3px;font-family:'Cinzel',serif;font-size:7px;color:rgba(180,150,40,.6);cursor:pointer">✎</button>
          <button onclick="_h2AddPeriod('${nodeId}',${fi})" style="padding:2px 6px;background:rgba(180,150,40,.1);border:1px solid rgba(180,150,40,.2);border-radius:3px;font-family:'Cinzel',serif;font-size:7px;color:rgba(180,150,40,.6);cursor:pointer">＋</button>
        </div>
      </div>
      <div class="h2-track" id="h2-track-${fi}" style="width:${totalW}px"></div>`;
    cont.appendChild(row);

    const track=row.querySelector('.h2-track');
    // Périodes
    (f.periods||[]).forEach((p,pi)=>{
      const s=parseFloat(p.start),e2=parseFloat(p.end);
      if(isNaN(s)||isNaN(e2))return;
      const x=(s-range.min)*S.pxPerYear;
      const w=Math.max((e2-s)*S.pxPerYear,4);
      const col=p.color||'rgba(80,60,120,.6)';
      const el=document.createElement('div');
      el.className='h2-period';
      el.style.cssText=`left:${x}px;width:${w}px;background:${col}`;
      el.innerHTML=`
        ${p.img?`<div class="h2-period-bg" style="background-image:url('${p.img}');background-position:${p.imgX??50}% ${p.imgY??50}%;background-size:${p.imgZoom??100}%"></div>`:''}
        <div class="h2-period-overlay"></div>
        ${w>40?`<div class="h2-period-name">${esc(p.name||'')}</div>`:''}`;
      el.onclick=()=>_h2ShowPeriodInfo(nodeId,fi,pi);
      el.onmouseenter=(e)=>_h2ShowTooltip(p,e);
      el.onmouseleave=()=>_h2HideTooltip();
      el.oncontextmenu=e=>{ e.preventDefault(); if(!_isAdmin()) return; _h2PeriodCtx(e,nodeId,fi,pi); };
      track.appendChild(el);
    });
    // Événements ponctuels
    (f.events||[]).forEach((ev,ei)=>{
      const y=parseFloat(ev.year);if(isNaN(y))return;
      const x=(y-range.min)*S.pxPerYear;
      const el=document.createElement('div');
      el.className='h2-event';
      el.style.left=x+'px';
      el.innerHTML=`<div class="h2-event-dot" style="background:${ev.color||'#f0c840'}"></div><div class="h2-event-label">${esc(ev.name||'')}</div>`;
      el.onclick=()=>{ if(!_isAdmin()) return; _h2EditEvent(nodeId,fi,ei); };
      track.appendChild(el);
    });
    // Clic sur track vide = ajouter événement
    track.ondblclick=e=>{ if(!_isAdmin()) return;
      if(e.target!==track)return;
      const r=track.getBoundingClientRect();
      const xRel=e.clientX-r.left+S.scrollX;
      const year=Math.round(xRel/S.pxPerYear+range.min);
      _h2AddEvent(nodeId,fi,year);
    };
  });

  // Donner la bonne largeur au container pour que la scrollbar apparaisse
  if(cont) cont.style.minWidth=(120+totalW)+'px';
  const addBtn=document.getElementById('h2-add-frise');
  if(addBtn) addBtn.style.minWidth=(totalW)+'px';

  // Mettre à jour le label zoom
  const lbl=document.getElementById('h2-zoom-lbl');
  if(lbl)lbl.textContent=S.pxPerYear+'px/an';

  // Appliquer scroll
  _h2ApplyScroll();
}

function _h2NiceStep(pxPerYear){
  const candidates=[1,2,5,10,25,50,100,250,500,1000];
  for(const c of candidates){if(c*pxPerYear>=50)return c;}
  return 1000;
}

function _h2ApplyScroll(){
  const S=window._h2State;
  const rulerInner=document.getElementById('h2-ruler');
  const frisesWrap=document.getElementById('h2-frises-wrap');
  if(rulerInner)rulerInner.style.transform=`translateX(-${S.scrollX}px)`;
  if(frisesWrap){
    frisesWrap.scrollLeft=S.scrollX;
    frisesWrap.scrollTop=S.scrollY;
  }
}

function _h2SetupScroll(nodeId){
  const frisesWrap=document.getElementById('h2-frises-wrap');
  const rulerWrap=document.getElementById('h2-ruler-wrap');
  if(!frisesWrap)return;

  // Scroll horizontal synchronisé entre règle et frises
  frisesWrap.onscroll=()=>{
    window._h2State.scrollX=frisesWrap.scrollLeft;
    window._h2State.scrollY=frisesWrap.scrollTop;
    // Scroller le div intérieur de la règle (pas le wrapper qui contient le spacer fixe)
    const rulerInner=document.getElementById('h2-ruler');
    if(rulerInner)rulerInner.style.transform=`translateX(-${frisesWrap.scrollLeft}px)`;
  };

  // Wheel pour zoom horizontal avec Ctrl, scroll sinon
  const outer=document.getElementById('h2-outer');
  if(outer) outer.onwheel=e=>{
    if(e.ctrlKey||e.metaKey){
      e.preventDefault();
      _h2Zoom(e.deltaY<0?1.12:0.89);
    }
  };
}

function _h2Zoom(factor){
  const S=window._h2State;
  const vp=document.getElementById('h2-frises-wrap');
  const cx=vp?vp.offsetWidth/2:300;
  // Garder le centre de vue fixe
  const worldX=S.scrollX+cx;
  S.pxPerYear=Math.max(4,Math.min(400,S.pxPerYear*factor));
  // Recalculer scrollX pour garder le même point
  const nodeId=Object.values(db).find(nd=>nd.kind==='histoire-root'||nd.name==='Histoire')?.id;
  if(nodeId){
    const range=_h2GetRange(nodeId);
    const newWorldX=worldX*(S.pxPerYear/(S.pxPerYear/factor));
    S.scrollX=Math.max(0,newWorldX-cx);
    _h2Render(nodeId);
  }
}

function _h2ZoomFit(nodeId){
  const range=_h2GetRange(nodeId);
  const vp=document.getElementById('h2-frises-wrap');
  const w=vp?vp.offsetWidth-140:600;
  window._h2State.pxPerYear=Math.max(4,Math.floor(w/(range.max-range.min)));
  window._h2State.scrollX=0;
  _h2Render(nodeId);
}

function _h2ShowTooltip(p,e){

    <div class="h2-tt-name">${esc(p.name||'Période sans nom')}</div>
    ${p.desc?`<div class="h2-tt-desc">${esc(p.desc)}</div>`:''}
    ${p.img?`<img class="h2-tt-img" src="${p.img}">`:''}`;
  tt.style.left=(e.clientX+14)+'px';
  tt.style.top=(e.clientY-20)+'px';
  tt.classList.add('show');
}
function _h2HideTooltip(){

function _h2AdjPreview(){

  const y=document.getElementById('_h2adj-y')?.value??50;

    ${p.img?`<div style="padding:8px 16px;color:#d4b060;cursor:pointer" onmouseenter="this.style.background='rgba(180,150,40,.1)'" onmouseleave="this.style.background=''" onclick="document.getElementById('_h2-ctx')?.remove();_h2AdjustImg('${nodeId}',${fi},${pi})">🖼 Ajuster l'image</div>`:''}
    <div style="padding:8px 16px;color:#e07070;cursor:pointer" onmouseenter="this.style.background='rgba(200,60,60,.1)'" onmouseleave="this.style.background=''" onclick="_h2DeletePeriod('${nodeId}',${fi},${pi});document.getElementById('_h2-ctx')?.remove()">✕ Supprimer</div>`;
  document.body.appendChild(m);
  requestAnimationFrame(()=>{const r=m.getBoundingClientRect();if(r.right>window.innerWidth)m.style.left=(e.clientX-r.width-4)+'px';if(r.bottom>window.innerHeight)m.style.top=(e.clientY-r.height-4)+'px';});

  `;
  document.head.appendChild(st);

  v.style.padding='0';v.style.overflow='auto';
  v.innerHTML=`<div id="broot-outer">

    const outer=document.getElementById('broot-outer');if(!outer)return;
    const ctx=canvas.getContext('2d');
    canvas.width=outer.offsetWidth||800;canvas.height=Math.max(outer.offsetHeight||600,window.innerHeight);
    const W=canvas.width,H=canvas.height;
    const parts=Array.from({length:35},()=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.1,vy:-(0.03+Math.random()*.08),
      r:.4+Math.random()*.9,life:Math.random(),maxLife:.5+Math.random()*.5

function _brootFilter(q, nodeId){
  function collectEntries(id){
    const node=db[id];if(!node)return[];
    if(node.type==='entry')return[node];
    const res=[];(node.children||[]).forEach(cid=>collectEntries(cid).forEach(e=>res.push(e)));
    return res;
  }
  const all=collectEntries(nodeId);
  const filtered=q?all.filter(e=>
    e.name.toLowerCase().includes(q.toLowerCase())||
    (e.subtitle||'').toLowerCase().includes(q.toLowerCase())||
    (e.tags||[]).some(t=>t.toLowerCase().includes(q.toLowerCase()))
  ):all;

  const list=document.getElementById('broot-list');
  const countEl=document.getElementById('broot-count');
  if(!list)return;
  if(countEl)countEl.textContent=filtered.length+' créature'+(filtered.length!==1?'s':'')+' répertoriée'+(filtered.length!==1?'s':'');

  if(!filtered.length){
    list.innerHTML=`<div class="broot-empty">${q?'Aucune créature ne correspond.':'Aucune créature répertoriée — commencez à remplir ce carnet.'}</div>`;
    return;
  }

  // Couleurs de danger
  const dangerColors={
    'Inoffensif':'#408040','Faible':'#609050','Modéré':'#888030',
    'Dangereux':'#a06020','Très dangereux':'#c04020','Mortel':'#c02020',
    'Légendaire':'#802080','Apocalypse':'#601040'
  };

  list.innerHTML=filtered.map((e,i)=>{
    const img=e.images&&e.images[0];
    const danger=e.dangerLevel||(e.tags||[]).find(t=>dangerColors[t])||'';
    const dangerCol=dangerColors[danger]||'rgba(80,60,20,.4)';
    const habitat=e.habitat||e.subtitle||'';
    // Taches décoratives aléatoires mais déterministes par index
    const seed=i*137;
    const stain1x=(seed%80)+5,stain1y=(seed%60)+10,stain1s=(seed%30)+20;
    const stain2x=((seed*3)%60)+30,stain2y=((seed*2)%50)+40,stain2s=((seed*2)%20)+15;
    return `<div class="broot-card" onclick="selectNode('${e.id}')" oncontextmenu="event.preventDefault();event.stopPropagation();_brootCtxMenu(event,'${e.id}')">
      <div class="broot-page">
        <div class="broot-spine">
          <div class="broot-spine-hole" style="top:18%"></div>
          <div class="broot-spine-hole" style="top:50%"></div>
          <div class="broot-spine-hole" style="top:82%"></div>
        </div>
        <div class="broot-stain" style="width:${stain1s}px;height:${stain1s}px;left:${stain1x}%;top:${stain1y}%;background:#8b6820"></div>
        <div class="broot-stain" style="width:${stain2s}px;height:${stain2s}px;left:${stain2x}%;top:${stain2y}%;background:#5a3810"></div>
        <div class="broot-sketch-wrap">
          ${img
            ? `<img class="broot-sketch" src="${img}" draggable="false">`
            : `<div class="broot-sketch-ph">🐉</div>`}
        </div>
        <div class="broot-divider"></div>
        <div class="broot-card-body">
          <div class="broot-card-name">${esc(e.name)}</div>
          ${habitat?`<div class="broot-habitat">📍 ${esc(habitat)}</div>`:''}
          ${danger?`<span class="broot-danger" style="color:${dangerCol};border-color:${dangerCol}">${esc(danger)}</span>`:''}
        </div>
        <div class="broot-pagenum">${String(i+1).padStart(2,'0')}</div>
      </div>
    </div>`;
  }).join('');
}

function _artInitSpotlights(){
  // Spotlight qui suit la souris sur chaque vitrine
  document.querySelectorAll('.art-case').forEach(el=>{
    const spotlight=el.querySelector('.art-spotlight');
    if(!spotlight)return;
    el.addEventListener('mousemove',e=>{
      const r=el.getBoundingClientRect();
      const x=e.clientX-r.left,y=e.clientY-r.top;
      const xp=(x/r.width)*100,yp=(y/r.height)*100;
      spotlight.style.background=`radial-gradient(ellipse 60% 70% at ${xp}% ${Math.min(yp,60)}%,rgba(255,240,160,.14) 0%,rgba(255,220,100,.06) 35%,transparent 70%)`;
    });
    el.addEventListener('mouseleave',()=>{
      spotlight.style.background='';
    });
  });
}

function _artFilter(q, nodeId){
  function collect(id){
    const nd=db[id];if(!nd)return[];
    if(nd.type==='entry')return[nd];
    const r=[];(nd.children||[]).forEach(c=>collect(c).forEach(e=>r.push(e)));
    return r;
  }
  const all=collect(nodeId);
  const filtered=q?all.filter(e=>e.name.toLowerCase().includes(q.toLowerCase())||(e.subtitle||'').toLowerCase().includes(q.toLowerCase())):all;

  const gallery=document.getElementById('art-gallery');
  const countEl=document.getElementById('art-count');
  if(!gallery)return;
  if(countEl) countEl.textContent=filtered.length+' pièce'+(filtered.length!==1?'s':'')+' en collection';

  if(!filtered.length){
    gallery.innerHTML=`<div class="art-empty">${q?'Aucun artefact ne correspond.':'Collection vide — ajoutez votre premier artefact.'}</div>`;
    return;
  }

  const allForIndex=collect(nodeId);
  gallery.innerHTML=filtered.map(e=>{
    const invNum=String(allForIndex.indexOf(e)+1).padStart(4,'0');
    const localVal=(e.fields||[]).find(f=>f.k&&(f.k.toLowerCase()==='localisation'||f.k.toLowerCase()==='possesseur'))?.v||'';
    const img=e.images&&e.images[0];
    return `<div class="art-case" onclick="selectNode('${e.id}')" oncontextmenu="event.preventDefault();event.stopPropagation();_artCtxMenu(event,'${e.id}')">

function _isInArtefacts(n){
  if(!n)return false;
  const artRootId=Object.keys(db).find(k=>db[k].kind==='artefacts-root');
  if(!artRootId)return false;
  let node=n;let i=0;
  while(node&&i++<20){
    if(node.kind==='artefacts-root')return true;
    if(node.id===artRootId||node.parentId===artRootId)return true;
    node=node.parentId?db[node.parentId]:null;
  }
  return false;
}

    .art-e-ostatus{font-family:'EB Garamond',serif;font-size:11px;color:rgba(180,140,60,.5);font-style:italic}
  `;
  document.head.appendChild(st);

  // Numéro d'inventaire
  function collectAll(id){const nd=db[id];if(!nd)return[];if(nd.type==='entry')return[nd];const r=[];(nd.children||[]).forEach(c=>collectAll(c).forEach(e=>r.push(e)));return r;}
  const artRootId=Object.keys(db).find(k=>db[k].kind==='artefacts-root');
  const allArts=artRootId?collectAll(artRootId):[];
  const invIdx=allArts.indexOf(n);
  const invNum=invIdx>=0?String(invIdx+1).padStart(4,'0'):'????';

  // Champs spéciaux
  const localF=(n.fields||[]).find(f=>f.k.toLowerCase()==='localisation');
  const origineF=(n.fields||[]).find(f=>f.k.toLowerCase()==='origine'||f.k.toLowerCase()==='époque');
  const matF=(n.fields||[]).find(f=>f.k.toLowerCase()==='matériaux'||f.k.toLowerCase()==='matériau');
  const statutF=(n.fields||[]).find(f=>f.k.toLowerCase()==='statut');
  const otherFields=(n.fields||[]).filter(f=>!['localisation','origine','époque','matériaux','matériau','statut','possesseur','possesseurs'].includes(f.k.toLowerCase()));

  // Possesseurs liés
  const ownerIds=(n._owners||[]);
  const owners=ownerIds.map(id=>db[id]).filter(Boolean);

  const quickFields=[localF,origineF,matF,statutF].filter(Boolean);
  const img=n.images&&n.images[0];

  let h=`<div id="art-e-outer"><div id="art-e-bg"></div><div id="art-e-wrap">
    <div class="art-e-inv">✦ Collection Permanente · N° INV. ${invNum} ✦</div>
    <div class="art-e-vitrine">
      <div class="art-e-c tl"></div><div class="art-e-c tr"></div>
      <div class="art-e-c bl"></div><div class="art-e-c br"></div>
      <div class="art-e-img-wrap">
        ${img?`<img class="art-e-img" src="${img}" onclick="openLB('${img}')">`
             :`<div class="art-e-img-ph" onclick="_artEditModal('${n.id}')">⚔</div>`}
      </div>
      <div class="art-e-cartel">
        <div class="art-e-name">${esc(n.name)}</div>
        ${n.subtitle?`<div class="art-e-subtitle">${esc(n.subtitle)}</div>`:''}
        <div class="art-e-rule"></div>
        ${quickFields.length?`<div class="art-e-fields">${quickFields.map(f=>`<div class="art-e-field"><div class="art-e-flbl">${esc(f.k)}</div><div class="art-e-fval">${esc(f.v)}</div></div>`).join('')}</div>`:''}
        ${n.charBio?`<div class="art-e-sec">Description</div><div class="art-e-desc">${esc(n.charBio)}</div>`:''}
        ${otherFields.length?`<div class="art-e-sec">Informations</div>${otherFields.map(f=>`<div style="margin-bottom:6px;border-left:2px solid rgba(200,160,40,.2);padding:3px 10px"><span style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;color:rgba(200,160,40,.4);text-transform:uppercase;margin-right:10px">${esc(f.k)}</span><span style="font-family:'EB Garamond',serif;font-size:14px;color:#b8a050">${esc(f.v)}</span></div>`).join('')}`:''}
        ${!n.charBio&&!quickFields.length?`<div style="font-family:'EB Garamond',serif;font-size:14px;color:rgba(200,160,40,.2);font-style:italic;padding:12px 0;text-align:center">Fiche vide — cliquez sur Modifier.</div>`:''}
        ${owners.length?`<div class="art-e-sec">Possesseurs / Historique</div>${owners.map(o=>`<div class="art-e-owner" onclick="selectNode('${o.id}')">
          ${o.images&&o.images[0]?`<img src="${o.images[0]}">`:`<div class="art-e-owner-ph">🧙</div>`}
          <div><div class="art-e-oname">${esc(o.name)}${o.lastName?' '+esc(o.lastName):''}</div><div class="art-e-ostatus">${esc(o.charStatus||'')}</div></div>
        </div>`).join('')}`:''}
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:22px">
          <button class="btn p" onclick="_artEditModal('${n.id}')">✎ Modifier</button>
          <button class="btn d" onclick="doDelete('${n.id}')">✕ Supprimer</button>
        </div>
      </div>

  </div></div>`;

  v.style.padding='0';v.style.overflow='auto';
  v.innerHTML=h;

  // Fond poussière
  const bg=document.getElementById('art-e-bg');
  if(bg){
    const c=document.createElement('canvas');
    c.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none';
    bg.appendChild(c);
    const ctx=c.getContext('2d');
    const o=document.getElementById('art-e-outer');
    c.width=o.offsetWidth||800;c.height=Math.max(o.offsetHeight||600,window.innerHeight);
    const dust=Array.from({length:30},()=>({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.12,vy:-(0.03+Math.random()*.1),r:.3+Math.random()*.6,life:Math.random(),ml:.5+Math.random()*.5}));
    function fr(){
      if(!document.getElementById('art-e-outer'))return;
      const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
      const vg=ctx.createRadialGradient(W*.5,H*.4,H*.1,W*.5,H*.4,H*.9);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.65)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
      dust.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life+=.002;if(p.life>p.ml||p.y<-5){p.x=Math.random()*W;p.y=H+5;p.life=0;p.ml=.5+Math.random()*.5;}
        const a=Math.sin((p.life/p.ml)*Math.PI)*.3;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(220,180,60,${a})`;ctx.fill();});
      requestAnimationFrame(fr);
    }
    fr();
  }
}

    </div>

function _artToggleOwner(charId, artId){
  if(!window._artPendOwners) window._artPendOwners={};
  if(!window._artPendOwners[artId]) window._artPendOwners[artId]=[];
  const arr=window._artPendOwners[artId];
  const idx=arr.indexOf(charId);
  const el=document.getElementById('_ao_'+charId);
  if(idx>=0){
    arr.splice(idx,1);
    if(el){el.style.border='1px solid rgba(200,160,40,.15)';el.style.background='rgba(200,160,40,.04)';el.querySelector('span').style.color='rgba(180,140,60,.5)';}
  } else {
    arr.push(charId);
    if(el){el.style.border='1px solid rgba(200,160,40,.6)';el.style.background='rgba(200,160,40,.15)';el.querySelector('span').style.color='#d8c870';}
  }
}

function _artLoadImg(input,id){
  const f=input.files[0];if(!f)return;
  _uploadToCloudinary(f, url=>{
    if(!window._artPendImg)window._artPendImg={};
    window._artPendImg[id]=url;
    const p=document.getElementById('_art-img-prev');
    if(p)p.innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
  });
}
function _artClearImg(id){
  if(!window._artPendImg)window._artPendImg={};
  window._artPendImg[id]='__clear__';
  const p=document.getElementById('_art-img-prev');
  if(p)p.innerHTML='<span style="font-size:20px;opacity:.2">⚔</span>';
  const fi=document.getElementById('_art-img-input');if(fi)fi.value='';
}

function _artSave(id){
  const n=db[id];if(!n)return;
  n.name=document.getElementById('_art-name')?.value.trim()||n.name;
  n.charBio=document.getElementById('_art-desc')?.value.trim()||'';
  const local=document.getElementById('_art-local')?.value.trim()||'';
  const origine=document.getElementById('_art-origine')?.value.trim()||'';
  const statut=document.getElementById('_art-statut')?.value||'';
  n.fields=(n.fields||[]).filter(f=>!['localisation','origine','époque','statut'].includes(f.k.toLowerCase()));
  if(local) n.fields.push({k:'localisation',v:local});
  if(origine) n.fields.push({k:'origine',v:origine});
  if(statut) n.fields.push({k:'statut',v:statut});
  // Image
  const pi=window._artPendImg&&window._artPendImg[id];
  if(pi==='__clear__')n.images=[];
  else if(pi)n.images=[pi];
  if(window._artPendImg)delete window._artPendImg[id];
  // Possesseurs
  if(window._artPendOwners&&window._artPendOwners[id]!==undefined){
    n._owners=window._artPendOwners[id];
    delete window._artPendOwners[id];
    // Ajouter tag sur les persos liés
    n._owners.forEach(cid=>{
      const c=db[cid];if(!c)return;
      if(!c.tags)c.tags=[];
      const tag='⚔ '+n.name;
      if(!c.tags.includes(tag))c.tags.push(tag);
    });
  }
  save();
  document.getElementById('_art-modal')?.remove();
  renderTree();
  renderContent(id);
}

function _artNew(parentId){
  const id=gid();
  db[id]={id,type:'entry',parentId,name:'Nouvel artefact',icon:'⚔',iconData:null,
    subtitle:'',tags:[],fields:[],body:'',images:[],_owners:[],
    links:{kingdoms:[],factions:[],gates:[],characters:[]},
    stats:{phys:{},magic:{},intel:{}},
    entryType:'artefact',charBio:'',charPowers:'',charGoals:'',charAge:'',charGender:'',charStatus:'',lastName:'',mapDesc:''};
  if(db[parentId])db[parentId].children.push(id);
  save();renderTree();selectNode(id);
}

function renderMusicLib(v, n){

// Construire la liste des pistes depuis toutes les sources audio


function _mlibBuild(nodeId){
  const n = db[nodeId]; if(!n) return;
  // Collecter toutes les sources audio disponibles
  const auto = _mlibCollectAuto();
  // Appliquer les overrides sauvegardés (noms perso, ordre, ajouts manuels)
  const overrides = n._musicOverrides || {}; // {src: {name, origin}}
  const manualOrder = n._musicOrder || []; // [src, src, ...] pour l'ordre
  // Construire la liste finale
  let tracks = auto.map(t=>({
    ...t,
    name: overrides[t.src]?.name ?? t.name,
    origin: overrides[t.src]?.origin ?? t.origin
  }));
  // Ajouter les pistes uploadées manuellement (pas dans auto)
  (n._musicManual||[]).forEach(t=>{
    if(!tracks.find(x=>x.src===t.src)) tracks.push({...t, name: overrides[t.src]?.name ?? t.name});
  });
  // Appliquer l'ordre personnalisé si défini
  if(manualOrder.length > 0){
    const ordered=[], rest=[];
    manualOrder.forEach(src=>{ const t=tracks.find(x=>x.src===src); if(t) ordered.push(t); });
    tracks.forEach(t=>{ if(!manualOrder.includes(t.src)) rest.push(t); });
    tracks=[...ordered,...rest];
  }
  n._musicList = tracks;
  window._mlibNodeId = nodeId;
  window._mlibCurrentAudio = window._mlibCurrentAudio || null;
  window._mlibCurrentIdx = window._mlibCurrentIdx ?? -1;
  _mlibRender();
}

function _mlibCollectAuto(){
  // Collecter toutes les sources audio du site
  const tracks = [];
  function addTrack(src, name, origin){
    if(!src || tracks.find(t=>t.src===src)) return;
    tracks.push({src, name, origin});
  }
  addTrack(globalStatNames._wlcAudio,'Theme Accueil','Accueil');
  addTrack(globalStatNames._ilAudio,'Theme Iluminia','Iluminia');
  addTrack(globalStatNames._hgAudio,'Theme des Portes','Gates of Hades');
  addTrack(globalStatNames._gardAudio,'Theme des Gardiens','Les Gardiens');
  addTrack(globalStatNames._geoAudio,'Theme des Pays','Pays');
  Object.values(db).forEach(nd=>{
    if(nd._audio?.src) addTrack(nd._audio.src, (nd.name||'')+' - Theme', nd.name||'');
    if(nd._sfx) addTrack(nd._sfx, (nd.name||'')+' - Effet', nd.name||'');
  });
  return tracks;
}

function _mlibRender(){
  const nodeId = window._mlibNodeId;
  const n = db[nodeId]; if(!n) return;
  const list = document.getElementById('mlib-list'); if(!list) return;
  const q = (document.getElementById('mlib-search')?.value||'').toLowerCase().trim();

  const tracks = n._musicList || [];
  const filtered = q ? tracks.filter(t=>
    (t.name||'').toLowerCase().includes(q) ||
    (t.origin||'').toLowerCase().includes(q)
  ) : tracks;

  if(filtered.length === 0){
    list.innerHTML = `<div class="mlib-empty">${q?'Aucun résultat.':'Aucune musique enregistrée.'}</div>`;
    return;
  }

  list.innerHTML = filtered.map((t,i)=>{
    const realIdx = tracks.indexOf(t);
    const isPlaying = window._mlibCurrentIdx === realIdx;
    return `<div class="mlib-track${isPlaying?' playing':''}" id="mlib-tr-${realIdx}" data-idx="${realIdx}"
      ${_isAdmin()?'draggable="true"':''}>
      ${_isAdmin()?`<span class="mlib-drag-handle" title="Glisser pour réordonner">⠿</span>`:''}
      <span class="mlib-track-num">${(realIdx+1).toString().padStart(2,'0')}</span>
      <button class="mlib-play-btn" onclick="_mlibToggle(${realIdx})">${isPlaying?'⏸':'▶'}</button>
      <div class="mlib-info">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="mlib-name" id="mlib-name-${realIdx}">${esc(t.name||'Sans titre')}</span>
          ${_isAdmin()?`<button class="mlib-rename-btn" onclick="_mlibStartRename(${realIdx})" title="Renommer">✎</button>`:''}
        </div>
        <input class="mlib-edit-name" id="mlib-edit-${realIdx}"
          onblur="_mlibSaveName(${realIdx},this.value)"
          onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.value=document.getElementById('mlib-name-${realIdx}').textContent;this.blur();}">
        <div class="mlib-origin">${esc(t.origin||'')}</div>
      </div>
      <div class="mlib-progress-wrap">
        <div class="mlib-progress" id="mlib-prog-${realIdx}" onclick="_mlibSeek(event,${realIdx})">
          <div class="mlib-progress-bar" id="mlib-bar-${realIdx}"></div>
        </div>
        <span class="mlib-time" id="mlib-time-${realIdx}">0:00 / 0:00</span>
      </div>
      <input type="range" class="mlib-vol" min="0" max="100" value="${Math.round(_masterVol*100)}"
        title="Volume" oninput="_mlibSetVol(${realIdx},this.value)">
      <a class="mlib-dl-btn" href="${t.src}" download="${esc(t.name||'musique')}.mp3"
        onclick="event.stopPropagation()" title="Télécharger">⬇ MP3</a>
    </div>`;
  }).join('');

  // Drag & drop admin
  if(_isAdmin()) _mlibInitDrag(nodeId);

  // Relancer l'update de la barre de progression si une piste joue
  if(window._mlibCurrentAudio && window._mlibCurrentIdx >= 0){
    _mlibStartProgress(window._mlibCurrentIdx);
  }
}

function _mlibFilter(){
  _mlibRender();
}

function _mlibToggle(idx){
  const nodeId = window._mlibNodeId;
  const n = db[nodeId]; if(!n) return;
  const t = (n._musicList||[])[idx]; if(!t) return;

  // Si c'est la piste courante, pause/play
  if(window._mlibCurrentIdx === idx && window._mlibCurrentAudio){
    const a = window._mlibCurrentAudio;
    if(a.paused){ a.play(); _mlibUpdateBtn(idx,'⏸'); }
    else { a.pause(); _mlibUpdateBtn(idx,'▶'); }
    return;
  }

  // Arrêter la piste précédente
  if(window._mlibCurrentAudio){
    window._mlibCurrentAudio.pause();
    if(window._mlibCurrentIdx >= 0) _mlibUpdateBtn(window._mlibCurrentIdx,'▶');
    const oldRow=document.getElementById('mlib-tr-'+window._mlibCurrentIdx);
    if(oldRow) oldRow.classList.remove('playing');
  }

  // Nouvelle piste
  const audio = new Audio(t.src);
  audio.volume = _masterVol;
  audio.play().catch(()=>{});
  window._mlibCurrentAudio = audio;
  window._mlibCurrentIdx = idx;

  const row = document.getElementById('mlib-tr-'+idx);
  if(row) row.classList.add('playing');
  _mlibUpdateBtn(idx,'⏸');
  _mlibStartProgress(idx);

  audio.onended = ()=>{
    _mlibUpdateBtn(idx,'▶');
    if(row) row.classList.remove('playing');
    window._mlibCurrentIdx = -1;
  };
}

function _mlibUpdateBtn(idx, icon){
  const btn = document.querySelector(`#mlib-tr-${idx} .mlib-play-btn`);
  if(btn) btn.textContent = icon;
}

function _mlibStartProgress(idx){
  const audio = window._mlibCurrentAudio; if(!audio) return;
  function update(){
    if(window._mlibCurrentIdx !== idx) return;
    const bar = document.getElementById('mlib-bar-'+idx);
    const time = document.getElementById('mlib-time-'+idx);
    if(bar && audio.duration){
      bar.style.width = (audio.currentTime/audio.duration*100)+'%';
    }
    if(time && audio.duration){
      const fmt = s=>Math.floor(s/60)+':'+(Math.floor(s%60)+'').padStart(2,'0');
      time.textContent = fmt(audio.currentTime)+' / '+fmt(audio.duration);
    }
    if(!audio.paused) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
  audio.addEventListener('timeupdate', update);
}

function _mlibSeek(e, idx){
  if(window._mlibCurrentIdx !== idx || !window._mlibCurrentAudio) return;
  const bar = document.getElementById('mlib-prog-'+idx);
  if(!bar) return;
  const r = bar.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  window._mlibCurrentAudio.currentTime = pct * window._mlibCurrentAudio.duration;
}

function _mlibSetVol(idx, val){
  if(window._mlibCurrentIdx === idx && window._mlibCurrentAudio){
    window._mlibCurrentAudio.volume = val/100;
  }
}

function _mlibStartRename(idx){
  const nameEl = document.getElementById('mlib-name-'+idx);
  const inp = document.getElementById('mlib-edit-'+idx);
  if(!nameEl||!inp) return;
  inp.value = nameEl.textContent;
  nameEl.parentElement.style.display='none';
  inp.style.display='block';
  inp.focus(); inp.select();
}

function _mlibSaveName(idx, val){
  const nodeId = window._mlibNodeId;
  const n = db[nodeId]; if(!n) return;
  const t = (n._musicList||[])[idx]; if(!t||!val.trim()) return;
  if(!n._musicOverrides) n._musicOverrides = {};
  n._musicOverrides[t.src] = {name: val.trim(), origin: t.origin};
  save();
  _mlibBuild(nodeId); // reconstruire depuis les sources
}

function _mlibInitDrag(nodeId){
  const n = db[nodeId]; if(!n) return;
  let _dragIdx = null;
  document.querySelectorAll('.mlib-track[draggable="true"]').forEach(row=>{
    row.addEventListener('dragstart', e=>{
      _dragIdx = parseInt(row.dataset.idx);
      row.style.opacity='.4';
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragend', ()=>{ row.style.opacity='1'; });
    row.addEventListener('dragover', e=>{ e.preventDefault(); row.style.background='rgba(100,70,180,.25)'; });
    row.addEventListener('dragleave', ()=>{ row.style.background=''; });
    row.addEventListener('drop', e=>{
      e.preventDefault(); row.style.background='';
      const targetIdx = parseInt(row.dataset.idx);
      if(_dragIdx===null||_dragIdx===targetIdx) return;
      const moved = n._musicList.splice(_dragIdx,1)[0];
      n._musicList.splice(targetIdx,0,moved);
      if(window._mlibCurrentIdx===_dragIdx) window._mlibCurrentIdx=targetIdx;
      // Sauvegarder l'ordre
      n._musicOrder = n._musicList.map(t=>t.src);
      save();
      _mlibRender();
    });
  });
}

function _mlibAddTrack(nodeId){
  if(!_isAdmin()) return;
  const n=db[nodeId];if(!n)return;
  if(!n._musicList) n._musicList=_mlibCollect(nodeId);
  const inp=document.createElement('input');inp.type='file';inp.accept='audio/*';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    _uploadToCloudinary(f,url=>{
      if(!n._musicManual) n._musicManual=[];
      n._musicManual.push({src:url,name:f.name.replace(/\.[^.]+$/,''),origin:'Manuel'});
      save();_mlibBuild(nodeId);
    });
  };
  inp.click();
}

function _loreFilter(q, nodeId, activeLetter){
  const ACC_MAP={À:'A',Á:'A',Â:'A',Ã:'A',Ä:'A',È:'E',É:'E',Ê:'E',Ë:'E',Ì:'I',Í:'I',Î:'I',Ï:'I',Ñ:'N',Ò:'O',Ó:'O',Ô:'O',Ö:'O',Ù:'U',Ú:'U',Û:'U',Ü:'U'};
  function normLetter(s){const c=(s||'').trim().toUpperCase()[0]||'#';return ACC_MAP[c]||c;}
  function collect(id){const nd=db[id];if(!nd)return[];if(nd.type==='entry')return[nd];const r=[];(nd.children||[]).forEach(c=>collect(c).forEach(e=>r.push(e)));return r;}

  const all=collect(nodeId).sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  // Filtres
  let filtered=all;
  if(q) filtered=all.filter(e=>e.name.toLowerCase().includes(q.toLowerCase())||(e.charBio||'').toLowerCase().includes(q.toLowerCase()));
  if(activeLetter) filtered=filtered.filter(e=>normLetter(e.name)===activeLetter);

  // Mettre à jour les boutons lettres
  const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  LETTERS.forEach(l=>{
    const btn=document.getElementById('lore-lb-'+l);if(!btn)return;
    const hasAny=all.some(e=>normLetter(e.name)===l);
    btn.className='lore-letter-btn'+(hasAny?' has-entries':'')+(activeLetter===l?' active':'');
  });

  const count=document.getElementById('lore-count');
  if(count) count.textContent=filtered.length+' terme'+(filtered.length!==1?'s':'');

  const content=document.getElementById('lore-content');if(!content)return;

  if(!filtered.length){
    content.innerHTML=`<div style="font-family:'EB Garamond',serif;font-size:14px;color:rgba(80,120,200,.2);font-style:italic;padding:20px 32px">${q||activeLetter?'Aucun terme ne correspond.':'Aucune entrée — cliquez sur + pour commencer.'}</div>`;
    return;
  }

  // Grouper par lettre
  const statusCls={'En usage':'lore-s-usage','Archaïque':'lore-s-archaique','Disparu':'lore-s-disparu','Mythique':'lore-s-mythique'};
  const catColors={'Lieu':'#6090d0','Concept':'#9060c0','Religion':'#c07040','Langue':'#40a080','Loi':'#a08040','Mythe':'#8050a0','Titre':'#4080a0','Autre':'#607090'};

  if(q||activeLetter){
    // Vue liste flat
    content.innerHTML=filtered.map(e=>{
      const catF=(e.fields||[]).find(f=>f.k.toLowerCase()==='catégorie'||f.k.toLowerCase()==='categorie');
      const statF=(e.fields||[]).find(f=>f.k.toLowerCase()==='statut');
      const cat=catF?.v||'';const stat=statF?.v||'';
      const sClass=statusCls[stat]||'';
      const catColor=catColors[cat]||'rgba(80,120,200,.5)';
      const def=(e.charBio||'').replace(/\n/g,' ').slice(0,90)+(e.charBio&&e.charBio.length>90?'…':'');
      return `<div class="lore-entry" onclick="selectNode('${e.id}')" oncontextmenu="event.preventDefault();event.stopPropagation();_loreCtxMenu(event,'${e.id}')">
        <div class="lore-entry-name">${esc(e.name)}</div>
        ${cat?`<div class="lore-entry-cat" style="color:${catColor};border-color:${catColor.replace(')',',0.25)')}">${esc(cat)}</div>`:''}
        ${def?`<div class="lore-entry-def">${esc(def)}</div>`:''}
        ${stat?`<div class="lore-entry-status ${sClass}" style="border:1px solid">${esc(stat)}</div>`:''}
      </div>`;
    }).join('');
  } else {
    // Vue groupée par lettre
    const groups={};
    filtered.forEach(e=>{const l=normLetter(e.name);if(!groups[l])groups[l]=[];groups[l].push(e);});
    content.innerHTML=Object.keys(groups).sort().map(l=>`
      <div class="lore-section" id="lore-sec-${l}">
        <div class="lore-section-letter">${l}</div>
        ${groups[l].map(e=>{
          const catF=(e.fields||[]).find(f=>f.k.toLowerCase()==='catégorie'||f.k.toLowerCase()==='categorie');
          const statF=(e.fields||[]).find(f=>f.k.toLowerCase()==='statut');
          const cat=catF?.v||'';const stat=statF?.v||'';
          const sClass=statusCls[stat]||'';
          const catColor=catColors[cat]||'rgba(80,120,200,.5)';
          const def=(e.charBio||'').replace(/\n/g,' ').slice(0,90)+(e.charBio&&e.charBio.length>90?'…':'');
          return `<div class="lore-entry" onclick="selectNode('${e.id}')" oncontextmenu="event.preventDefault();event.stopPropagation();_loreCtxMenu(event,'${e.id}')">
            <div class="lore-entry-name">${esc(e.name)}</div>
            ${cat?`<div class="lore-entry-cat" style="color:${catColor};border-color:${catColor.replace(')',',0.25)')}">${esc(cat)}</div>`:''}
            ${def?`<div class="lore-entry-def">${esc(def)}</div>`:''}
            ${stat?`<div class="lore-entry-status ${sClass}" style="border:1px solid">${esc(stat)}</div>`:''}
          </div>`;
        }).join('')}
      </div>`).join('');
  }
}

function _isInLore(n){
  if(!n)return false;
  const rootId=Object.keys(db).find(k=>db[k].kind==='lore-root');
  if(!rootId)return false;
  let node=n;let i=0;
  while(node&&i++<20){if(node.kind==='lore-root'||node.id===rootId||node.parentId===rootId)return true;node=node.parentId?db[node.parentId]:null;}
  return false;
}

function _loreToggleRef(entryId, loreId){
  if(!window._lorePendRefs)window._lorePendRefs={};
  if(!window._lorePendRefs[loreId])window._lorePendRefs[loreId]=[];
  const arr=window._lorePendRefs[loreId];
  const idx=arr.indexOf(entryId);
  const el=document.getElementById('_lr_'+entryId);
  if(idx>=0){
    arr.splice(idx,1);
    if(el){el.style.border='1px solid rgba(80,120,200,.15)';el.style.background='rgba(80,120,200,.04)';el.style.color='rgba(100,140,190,.45)';}
  } else {
    arr.push(entryId);
    if(el){el.style.border='1px solid rgba(80,120,200,.5)';el.style.background='rgba(80,120,200,.15)';el.style.color='#a0c0e8';}
  }
}

function _loreSave(id){
  const n=db[id];if(!n)return;
  n.name=document.getElementById('_lore-name')?.value.trim()||n.name;
  n.charBio=document.getElementById('_lore-def')?.value.trim()||'';
  const cat=document.getElementById('_lore-cat')?.value||'';
  const stat=document.getElementById('_lore-stat')?.value||'';
  const etym=document.getElementById('_lore-etym')?.value.trim()||'';
  n.fields=(n.fields||[]).filter(f=>!['catégorie','categorie','statut','étymologie','etymologie'].includes(f.k.toLowerCase()));
  if(cat) n.fields.push({k:'catégorie',v:cat});
  if(stat) n.fields.push({k:'statut',v:stat});
  if(etym) n.fields.push({k:'étymologie',v:etym});
  if(window._lorePendRefs&&window._lorePendRefs[id]!==undefined){
    n._refs=window._lorePendRefs[id];
    delete window._lorePendRefs[id];
    // Badge 📖 sur les entrées liées
    n._refs.forEach(rid=>{
      const r=db[rid];if(!r)return;
      if(!r.tags)r.tags=[];
      const tag='📖 '+n.name;
      if(!r.tags.includes(tag))r.tags.push(tag);
    });
  }
  save();
  document.getElementById('_lore-modal')?.remove();
  renderTree();
  renderContent(id);
}

function _loreNew(parentId){
  if(!_isAdmin()) return;
  const id=gid();
  db[id]={id,type:'entry',parentId,name:'Nouveau terme',icon:'📖',iconData:null,
    subtitle:'',tags:[],fields:[],body:'',images:[],_refs:[],
    links:{kingdoms:[],factions:[],gates:[],characters:[]},
    stats:{phys:{},magic:{},intel:{}},
    entryType:'lore',charBio:'',charPowers:'',charGoals:'',charAge:'',charGender:'',charStatus:'',lastName:'',mapDesc:''};
  if(db[parentId])db[parentId].children.push(id);
  save();renderTree();selectNode(id);
}

function _renderGenericRootImmersive(v, n, opts){
  if(_histAnim){cancelAnimationFrame(_histAnim);_histAnim=null;}
  const children=(n.children||[]).map(id=>db[id]).filter(Boolean);
  const [r_,g_,b_] = opts.particleColor.split(',').map(Number);

  const oldSt=document.getElementById('groot-style');if(oldSt)oldSt.remove();
  const st=document.createElement('style');st.id='groot-style';
  st.textContent=`
    #groot-outer{position:relative;width:100%;min-height:calc(100vh - 90px);overflow:hidden;background:${opts.bg}}
    #groot-canvas{position:absolute;inset:0;pointer-events:none;z-index:1}
    #groot-ui{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;padding:50px 30px 80px}
    .groot-title{font-family:'Cinzel Decorative',serif;font-size:clamp(20px,3vw,40px);color:#ede8ff;text-shadow:0 0 60px ${opts.titleShadow},0 2px 8px #000;letter-spacing:10px;margin-bottom:10px;text-align:center}
    .groot-rule{width:320px;height:1px;margin:0 auto 8px;background:linear-gradient(90deg,transparent,${opts.ruleColor},transparent)}
    .groot-sub{font-family:'EB Garamond',serif;font-size:13px;color:rgba(200,210,230,.4);font-style:italic;letter-spacing:3px;text-align:center;margin-bottom:44px}
    .groot-scroll{width:100%;max-width:900px;overflow-x:auto;padding:4px 4px 20px;margin-bottom:16px;scrollbar-width:thin;scrollbar-color:rgba(${opts.accentRgb},.3) transparent}
    .groot-row{display:flex;gap:14px;width:max-content}
    .groot-card{background:rgba(${opts.accentRgb},.07);border:1px solid rgba(${opts.accentRgb},.22);border-radius:7px;padding:22px 20px;width:200px;flex-shrink:0;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;backdrop-filter:blur(3px)}
    .groot-card:hover{transform:translateY(-5px);border-color:rgba(${opts.accentRgb},.55);box-shadow:0 10px 30px rgba(0,0,0,.7),0 0 20px rgba(${opts.accentRgb},.15)}
    .groot-card-icon{font-size:32px}
    .groot-card-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;color:#e0e4f0}
    .groot-card-sub{font-family:'EB Garamond',serif;font-size:11px;color:rgba(160,180,210,.45);font-style:italic}
    .groot-btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:16px}
  `;
  document.head.appendChild(st);

  const cards = children.map(c=>{
    const cnt = countAll(c.id);
    const iconHtml = c.iconData ? `<img src="${c.iconData}" style="width:40px;height:40px;object-fit:contain;border-radius:4px">` : `<div class="groot-card-icon">${c.icon||'📁'}</div>`;
    return `<div class="groot-card" onclick="selectNode('${c.id}')">
      ${iconHtml}
      <div class="groot-card-name">${esc(c.name)}</div>
      ${c.subtitle?`<div class="groot-card-sub">${esc(c.subtitle)}</div>`:''}
      <div style="font-family:'Cinzel',serif;font-size:8px;color:rgba(${opts.accentRgb},.4)">${cnt} élément${cnt!==1?'s':''}</div>
    </div>`;
  }).join('');

  v.style.padding='0';v.style.overflow='auto';
  v.innerHTML=`<div id="groot-outer">
    <canvas id="groot-canvas"></canvas>
    <div id="groot-ui">
      <div class="groot-title">${esc(n.name)}</div>
      <div class="groot-rule"></div>
      <div class="groot-sub">${esc(n.subtitle||'')}</div>
      ${cards?`<div class="groot-scroll"><div class="groot-row">${cards}</div></div>`:`<div style="font-family:'EB Garamond',serif;font-size:14px;color:rgba(${opts.accentRgb},.3);font-style:italic;text-align:center;padding:40px">${opts.emptyMsg}</div>`}
      <div class="groot-btn-row">
        <button class="btn p" onclick="openNewCatModal('${n.id}','generic')" style="${opts.btnStyle}">${opts.btnLabel}</button>
        <button class="btn" onclick="openEditModal('${n.id}')">✎ Modifier</button>
      </div>
    </div>
  </div>`;

  // Canvas particules
  (()=>{
    const canvas=document.getElementById('groot-canvas');if(!canvas)return;
    const outer=document.getElementById('groot-outer');if(!outer)return;
    const ctx=canvas.getContext('2d');
    canvas.width=outer.offsetWidth||800;canvas.height=Math.max(outer.offsetHeight||600,window.innerHeight);
    const parts=Array.from({length:50},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.3,vy:-(.05+Math.random()*.35),r:.5+Math.random()*1.5,life:Math.random(),maxLife:.4+Math.random()*.6}));
    let t=0;
    function frame(){
      if(!document.getElementById('groot-canvas'))return;
      const W=canvas.width,H=canvas.height;
      ctx.clearRect(0,0,W,H);
      parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life+=.004;if(p.life>p.maxLife||p.y<-10){p.x=Math.random()*W;p.y=H+5;p.life=0;p.maxLife=.4+Math.random()*.6;}const a=Math.sin((p.life/p.maxLife)*Math.PI)*.4;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${r_},${g_},${b_},${a})`;ctx.fill();});
      const vg=ctx.createRadialGradient(W*.5,H*.5,H*.08,W*.5,H*.5,H*.85);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.6)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
      t++;_histAnim=requestAnimationFrame(frame);
    }
    frame();
  })();
  initCatAudio(n.id);
  _injectCatBg('groot-outer',n.id);
  document.getElementById('groot-outer').oncontextmenu=e=>{ if(e.target.closest('.card')||e.target.closest('.cg-card')) return; e.preventDefault();_showCatBgMenu(n.id,e.clientX,e.clientY);};
}

    const chips = document.getElementById('cmp-chips');
    if(!handle||!chips) return;
    let _resizing=false, _startY=0, _startH=0;
    handle.addEventListener('mousedown', e=>{
      e.preventDefault();
      _resizing=true; _startY=e.clientY; _startH=chips.offsetHeight;
      document.body.style.cursor='ns-resize';
    });
    document.addEventListener('mousemove', e=>{
      if(!_resizing) return;
      const newH=Math.max(40,Math.min(400,_startH+(e.clientY-_startY)));
      chips.style.height=newH+'px';
    });
    document.addEventListener('mouseup', ()=>{
      if(!_resizing) return;
      _resizing=false; document.body.style.cursor='';
    });
  });
}

function _cmpAllChars(){
  return Object.values(db).filter(n=>n.type==='entry'&&n.entryType==='character');
}

function _cmpRenderSlots(){
  const wrap = document.getElementById('cmp-picker'); if(!wrap) return;
  let h = '';
  for(let i=0;i<8;i++){
    const slot = _cmpSelected[i];
    const ch = slot ? db[_cmpGetId(slot)] : null;
    if(ch){
      const imgSrc = _cmpGetImg(slot);
      const img = imgSrc ? `<img class="cmp-slot-img" src="${imgSrc}">` : `<div style="font-size:28px">${ch.icon||'🧙'}</div>`;
      const ai = _cmpGetArcIdx(slot);
      const arcBadge = ai>=0&&ch._arcs&&ch._arcs[ai] ? `<div style="position:absolute;bottom:2px;left:2px;right:2px;background:rgba(140,80,255,.8);border-radius:3px;font-size:6px;font-family:'Cinzel',serif;color:#fff;text-align:center;padding:1px 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ch._arcs[ai].name)}</div>` : '';
      const si = JSON.stringify(slot).replace(/"/g,'&quot;');
      h += `<div class="cmp-slot filled" onclick="_cmpRemoveSlot(${i})" title="Cliquer pour retirer">
        <div class="cmp-slot-x">✕</div>
        ${img}
        ${arcBadge}
        <div class="cmp-slot-name">${esc(ch.name)}</div>
      </div>`;
    } else {
      h += `<div class="cmp-slot" onclick="document.getElementById('cmp-search').focus()" title="Ajouter un personnage">
        <div class="cmp-slot-add">＋</div>
        <div style="font-size:9px;color:rgba(140,80,255,.3);margin-top:4px;font-family:'Cinzel',serif">Slot ${i+1}</div>
      </div>`;
    }
  }
  h += `<button onclick="_cmpClear()" style="margin-left:8px;padding:6px 14px;background:rgba(200,60,60,.1);border:1px solid rgba(200,60,60,.3);border-radius:5px;color:#e07070;font-family:'Cinzel',serif;font-size:9px;cursor:pointer;letter-spacing:1px" title="Vider la sélection">✕ Vider</button>`;
  wrap.innerHTML = h;
}

function _cmpRenderChips(q){
  const wrap = document.getElementById('cmp-chips'); if(!wrap) return;
  const chars = _cmpAllChars().filter(c=>!q||c.name.toLowerCase().includes(q.toLowerCase())||(c.lastName||'').toLowerCase().includes(q.toLowerCase()));
  wrap.innerHTML = chars.map(c=>{
    const selMain = _cmpSelected.some(s=>_cmpGetId(s)===c.id&&_cmpGetArcIdx(s)===-1);
    const hasArcs = c._arcs&&c._arcs.length>0;
    const img = c.images&&c.images[0]
      ? `<img src="${c.images[0]}">`
      : `<span style="font-size:16px">${c.icon||'🧙'}</span>`;
    if(!hasArcs){
      return `<div class="cmp-char-chip${selMain?' selected':''}" onclick="_cmpToggle('${c.id}',-1)">
        ${img}
        <span class="cmp-char-chip-name">${esc(c.name)}${c.lastName?' '+esc(c.lastName):''}</span>
      </div>`;
    }
    // Chip avec sous-menu arcs
    const arcItems = [
      `<div class="cmp-arc-item${selMain?' cmp-arc-sel':''}" onclick="event.stopPropagation();_cmpToggle('${c.id}',-1)">✦ Fiche principale</div>`,
      ...c._arcs.map((arc,i)=>{
        const selArc = _cmpSelected.some(s=>_cmpGetId(s)===c.id&&_cmpGetArcIdx(s)===i);
        return `<div class="cmp-arc-item${selArc?' cmp-arc-sel':''}" onclick="event.stopPropagation();_cmpToggle('${c.id}',${i})">◈ ${esc(arc.name)}</div>`;
      })
    ].join('');
    return `<div class="cmp-char-chip cmp-chip-arc${selMain||c._arcs.some((_,i)=>_cmpSelected.some(s=>_cmpGetId(s)===c.id&&_cmpGetArcIdx(s)===i))?' selected':''}" style="position:relative">
      <div style="display:flex;align-items:center;gap:6px;pointer-events:none">${img}<span class="cmp-char-chip-name">${esc(c.name)}${c.lastName?' '+esc(c.lastName):''}</span><span style="font-size:9px;color:rgba(160,120,240,.6)">▾</span></div>
      <div class="cmp-arc-menu">${arcItems}</div>
    </div>`;
  }).join('');
}

function _cmpToggle(id, arcIdx=-1){
  const slot = arcIdx>=0 ? {id, arcIdx} : id;
  // Vérifier si déjà présent (même id + même arc)
  const existing = _cmpSelected.findIndex(s=>_cmpGetId(s)===id&&_cmpGetArcIdx(s)===arcIdx);
  if(existing>=0){ _cmpSelected.splice(existing,1); _cmpRenderSlots(); _cmpRenderChips(document.getElementById('cmp-search')?.value||''); _cmpRenderTable(); return; }
  if(_cmpSelected.length>=8){ alert('Maximum 8 personnages'); return; }
  _cmpSelected.push(slot);
  _cmpRenderSlots();
  _cmpRenderChips(document.getElementById('cmp-search')?.value||'');
  _cmpRenderTable();
}

function _cmpRemove(id){
  _cmpSelected = _cmpSelected.filter(x=>_cmpGetId(x)!==id);
  _cmpRenderSlots();
  _cmpRenderChips(document.getElementById('cmp-search')?.value||'');
  _cmpRenderTable();
}
function _cmpRemoveSlot(slotIdx){
  _cmpSelected.splice(slotIdx,1);
  _cmpRenderSlots();
  _cmpRenderChips(document.getElementById('cmp-search')?.value||'');
  _cmpRenderTable();
}

function _cmpClear(){
  _cmpSelected=[];
  _cmpRenderSlots();

}

function _cmpRenderTable(){
  const wrap = document.getElementById('cmp-table-wrap'); if(!wrap) return;
  if(!_cmpSelected.length){
    wrap.innerHTML=`<div style="text-align:center;padding:40px;font-family:'EB Garamond',serif;font-size:14px;color:rgba(140,80,255,.3);font-style:italic">Sélectionnez des personnages ci-dessus pour les comparer</div>`;
    return;
  }
  const chars = _cmpSelected.map(slot=>{ const c=db[_cmpGetId(slot)]; if(!c) return null; return {...c, _slotStats:_cmpGetStats(slot), _slotImg:_cmpGetImg(slot), _slotLabel:_cmpGetLabel(slot)}; }).filter(Boolean);
  const COL = ['#6a9fd4','#9b6fd4','#6acd8d'];

  let h = `<table class="cmp-table"><thead><tr>
    <th class="cmp-th-stat">Statistique</th>
    ${chars.map(c=>`<th><div class="cmp-portrait-cell">
      ${c._slotImg?`<img src="${c._slotImg}">`:`<div style="font-size:28px;width:54px;height:68px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(140,80,255,.35);border-radius:4px">${c.icon||'🧙'}</div>`}
      <div class="cmp-portrait-name">${esc(c._slotLabel||c.name)}</div>
    </div></th>`).join('')}
  </tr></thead><tbody>`;

  // Pour chaque catégorie de stats
  ['phys','magic','intel'].forEach(cat=>{
    const def = STAT_DEFS[cat];
    const globalNames = globalStatNames[cat]||{};
    const statKeys = def.stats;

    // Ligne de section
    h += `<tr class="cmp-section-header"><td colspan="${chars.length+1}" style="color:${def.color}">◈ ${def.label}</td></tr>`;

    statKeys.forEach(sKey=>{
      const label = globalNames[sKey]||sKey;
      const vals = chars.map(c=>{
        const stats = c._slotStats || c.stats || {};
        return (stats[cat]&&stats[cat][sKey]) || 0;
      });
      const maxVal = Math.max(...vals, 1);
      const bestVal = Math.max(...vals);

      h += `<tr><td class="cmp-td-stat">${esc(label)}</td>`;
      vals.forEach((val,i)=>{
        const sortedVals = [...vals].filter(x=>x>0).sort((a,b)=>b-a);
        const rank = val>0 ? sortedVals.indexOf(val) : -1;
        const medalColor = rank===0?'#ffd700':rank===1?'#c0c0c0':rank===2?'#cd7f32':'';
        const pct = Math.round((val/100)*100);
        h += `<td><div class="cmp-bar-wrap">
          <div class="cmp-bar" style="width:${Math.max(pct,0)}px;max-width:80px;background:${medalColor||def.color+'66'}"></div>
          <span class="cmp-val" style="${medalColor?'color:'+medalColor+';font-weight:bold':''}">${val||'—'}</span>
        </div></td>`;
      });
      h += `</tr>`;
    });

    // Ligne moyenne — utiliser _slotStats (stats de l'arc sélectionné)
    const avgs = chars.map(c=>{
      const v = (c._slotStats||c.stats||{})[cat] || {};
      const vals = statKeys.map(s=>v[s]||0).filter(x=>x>0);
      return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '—';
    });
    const avgNums = avgs.map(a=>a==='—'?-1:parseFloat(a));
    const sortedAvgs = [...avgNums].filter(x=>x>0).sort((a,b)=>b-a);
    h += `<tr style="background:rgba(${cat==='phys'?'106,159,212':cat==='magic'?'155,111,212':'106,205,141'},.06)"><td class="cmp-td-stat" style="font-style:italic">Moyenne</td>`;
    avgs.forEach((a,i)=>{
      const rank = avgNums[i]>0 ? sortedAvgs.indexOf(avgNums[i]) : -1;
      const medalColor = rank===0?'#ffd700':rank===1?'#c0c0c0':rank===2?'#cd7f32':'';
      h += `<td><span class="cmp-val" style="font-style:italic;${medalColor?'color:'+medalColor+';font-weight:bold':''}">${a}</span></td>`;
    });
    h += `</tr>`;
  });

  h += `</tbody></table>`;
  wrap.innerHTML = h;
}

// ── Persistent Gate Audio System ──────────────────────────────
// Global audio object survives category changes
let _hgAudioObj = null;      // the Audio element
let _hgAudioURL  = null;     // null until initHGAudio sets it to GATE_OST or user file
let _hgAudioVol  = 0.4;      // current volume

function initHGAudio(){
  let audio = document.getElementById('hg-audio');
  if(!audio){ console.warn('hg-audio element missing'); return; }

  // Utiliser l'audio uploadé (Cloudinary) si disponible, sinon OST par défaut
  const hgSrc = globalStatNames._hgAudio || null;
  if(hgSrc){ _hgAudioURL = hgSrc; }
  else if(!_hgAudioURL){ _hgAudioURL = null; } // OST invalide en ligne, pas de son par défaut
  if(_hgAudioURL && audio.src !== _hgAudioURL) audio.src = _hgAudioURL;
  audio.loop   = true;
  audio.volume = _hgAudioVol * _masterVol;
  _hgAudioObj  = audio;

  if(_hgAudioURL){
    audio.play().then(()=>{
      _updateSoundBtn('🔊');
    }).catch(()=>{
      _updateSoundBtn('🔇');
      if(!window._audioPendingPlay) window._audioPendingPlay=[];
      window._audioPendingPlay.push(()=>{
        const a = document.getElementById('hg-audio');
        if(a && a.paused){ a.play().then(()=>_updateSoundBtn('🔊')).catch(()=>{}); }
      });
    });
  } else { _updateSoundBtn('🎵'); }

  // Ensure hidden file input exists
  if(!document.getElementById('hg-audio-input')){
    const inp = document.createElement('input');
    inp.type='file'; inp.accept='audio/*';
    inp.style.display='none'; inp.id='hg-audio-input';
    inp.onchange = _hgLoadFile;
    document.body.appendChild(inp);
  }

  // Context menu (right-click) on sound button
  const btn = document.getElementById('hg-sound-btn');
  if(btn){
    btn.oncontextmenu = function(e){
      e.preventDefault();
      _showHGSoundMenu(e.clientX, e.clientY);
    };
  }
}

function _hgLoadFile(e){
  const file = e.target.files[0]; if(!file) return;
  _uploadToCloudinary(file, url=>{
    _hgAudioURL = url;
    globalStatNames._hgAudio = url;
    save();
    _hgAudioObj = document.getElementById('hg-audio');
    if(!_hgAudioObj) return;
    _hgAudioObj.src    = url;
    _hgAudioObj.loop   = true;
    _hgAudioObj.volume = _hgAudioVol;
    _hgAudioObj.play().catch(()=>{});
    _updateSoundBtn('🔊');
  });
  e.target.value = '';
}

function _updateSoundBtn(icon){
  const btn = document.getElementById('hg-sound-btn');
  if(btn) btn.textContent = icon;
}

function toggleHGSound(){
  const audio = document.getElementById('hg-audio');
  if(!audio) return;
  // Ensure OST is loaded (first click after browser blocked autoplay)
  if(!_hgAudioURL || !audio.src || audio.src === window.location.href){
    // Pas d'audio uploadé — ne rien faire
    if(!globalStatNames._hgAudio) return;
    audio.src = globalStatNames._hgAudio; _hgAudioURL = globalStatNames._hgAudio;
    audio.loop = true; audio.volume = _hgAudioVol;
  }
  if(audio.paused){ audio.play().catch(()=>{}); _updateSoundBtn('🔊'); }
  else             { audio.pause();              _updateSoundBtn('🔇'); }
}

function _hgRestoreOST(){
  if(!globalStatNames._hgAudio) return;
  _hgAudioURL = globalStatNames._hgAudio;
  const audio = document.getElementById('hg-audio');
  if(audio){ audio.src = GATE_OST; audio.loop=true; audio.volume=_hgAudioVol; audio.play().catch(()=>{}); }
  _updateSoundBtn('🔊');
  document.getElementById('hg-ctx-menu')?.remove();
}

function _showHGSoundMenu(x, y){
  // Remove any existing menu
  document.getElementById('hg-ctx-menu')?.remove();

    delayWrap.style.cssText='padding:4px 16px 8px;display:flex;align-items:center;gap:10px;color:rgba(210,170,150,.7)';

function gateTransition(event, nodeId){
  // Play gate-specific SFX if set
  const _gn = db[nodeId];
  const sfxDelay = (_gn && _gn._sfxDelay != null) ? _gn._sfxDelay : 300; // ms before animation starts

  const _launchAnim = () => {
  const W = window.innerWidth, H = window.innerHeight;

  // Origin = the red crack in the door image: horizontally centered, ~45% down
  const bgCanvas = document.getElementById('hg-canvas');
  let cx = W / 2;
  let cy = H * 0.45;
  if(bgCanvas){
    // The background image is centered/covered — crack is at 50% x, ~42% y of image
    const bw = bgCanvas.offsetWidth || bgCanvas.width || W;
    const bh = bgCanvas.offsetHeight || bgCanvas.height || H;
    const rect = bgCanvas.getBoundingClientRect();
    cx = rect.left + bw * 0.50;
    cy = rect.top  + bh * 0.42;
  }

  const ov = document.createElement('canvas');
  ov.style.cssText = 'position:fixed;inset:0;z-index:9999;pointer-events:none;';
  ov.width = W; ov.height = H;
  document.body.appendChild(ov);
  const ctx = ov.getContext('2d');

  let frame = 0;
  const TOTAL = 60;

  function animate(){
    ctx.clearRect(0, 0, W, H);
    frame++;
    const t = frame / TOTAL;
    const eased = t * t;

    // Expanding red radial from crack origin
    const maxR = Math.sqrt(
      Math.max(cx, W-cx) ** 2 + Math.max(cy, H-cy) ** 2
    ) * 1.1;
    const radius = eased * maxR;

    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0,    `rgba(255,20,4,${Math.min(1, eased * 2.5)})`);
    grad.addColorStop(0.2,  `rgba(210,10,3,${Math.min(1, eased * 2)})`);
    grad.addColorStop(0.55, `rgba(130,5,2,${eased * 1.4})`);
    grad.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Bright core flash (the crack itself)
    const coreAlpha = Math.max(0, 1 - t * 2.4);
    if(coreAlpha > 0){
      const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, 90);
      core.addColorStop(0,   `rgba(255,220,200,${coreAlpha})`);
      core.addColorStop(0.2, `rgba(255,60,15,${coreAlpha * 0.8})`);
      core.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = core;
      ctx.fillRect(0, 0, W, H);
    }

    // Final black cover
    if(t > 0.85){
      const ft = (t - 0.85) / 0.15;
      ctx.fillStyle = `rgba(4,0,0,${ft})`;
      ctx.fillRect(0, 0, W, H);
    }

    if(frame < TOTAL){
      requestAnimationFrame(animate);
    } else {
      ov.remove();
      selectNode(nodeId);
    }
  }

  requestAnimationFrame(animate);
  }; // end _launchAnim

  if(_gn && _gn._sfx){
    try{
      if(window._gateSfxAudio){ window._gateSfxAudio.pause(); window._gateSfxAudio.currentTime=0; }
      const _sa = new Audio(_gn._sfx);
      _sa.volume = _gn._sfxVol||0.8;
      window._gateSfxAudio = _sa;
      _sa.play().catch(()=>{});
    }catch(e){}
    setTimeout(_launchAnim, sfxDelay);
  } else {
    _launchAnim();
  }
}


function startGateCanvas(){
  const canvas=document.getElementById('hg-canvas');
  if(!canvas)return;
  const outer=document.getElementById('hg-outer');
  const ctx=canvas.getContext('2d');

  function resize(){
    canvas.width=outer.offsetWidth;
    canvas.height=Math.max(outer.scrollHeight,outer.offsetHeight,600);
  }
  resize();
  const ro=new ResizeObserver(resize);ro.observe(outer);

  // Preload background
  const bgImg=new Image();bgImg.src=GATE_BG;

  // Fog particles
  const FOG=[];
  function makeFog(W,H,init){
    return{
      x:(init?Math.random()*W:Math.random()<.5?-200:W+200),
      y:H*(0.5+Math.random()*.5),
      w:200+Math.random()*280,
      h:80+Math.random()*120,
      vx:(Math.random()-.5)*0.35,
      vy:-0.08-Math.random()*0.12,
      a:0.04+Math.random()*0.1,
      phase:Math.random()*Math.PI*2,
      r:Math.floor(180+Math.random()*40),
      g:Math.floor(Math.random()*25),
      b:Math.floor(Math.random()*18),
    };
  }

  // Ash particles
  const ASH=[];
  function makeAsh(W){
    return{
      x:Math.random()*W,
      y:-8,
      vx:(Math.random()-.5)*0.4,
      vy:0.3+Math.random()*0.5,
      r:1+Math.random()*1.5,
      a:0.2+Math.random()*0.45,
      phase:Math.random()*Math.PI*2,
    };
  }

  let t=0,W0=0,H0=0;
  function init(){
    const W=canvas.width,H=canvas.height;
    W0=W;H0=H;
    FOG.length=0;ASH.length=0;
    for(let i=0;i<18;i++)FOG.push(makeFog(W,H,true));
    for(let i=0;i<40;i++){
      const a=makeAsh(W);
      a.y=Math.random()*H;
      ASH.push(a);
    }
  }
  bgImg.onload=init;
  init();

  (function frame(){
    _gateAnim=requestAnimationFrame(frame);
    if(!document.getElementById('hg-canvas')){cancelAnimationFrame(_gateAnim);ro.disconnect();return;}
    const W=canvas.width,H=canvas.height;
    if(W!==W0||H!==H0)init();
    ctx.clearRect(0,0,W,H);

    // 1. Background image
    if(bgImg.complete&&bgImg.naturalWidth>0){
      const iw=bgImg.naturalWidth,ih=bgImg.naturalHeight;
      const scale=Math.max(W/iw,H/ih);
      const dw=iw*scale,dh=ih*scale;
      ctx.drawImage(bgImg,(W-dw)/2,(H-dh)/2,dw,dh);
    }else{
      ctx.fillStyle='#0a0406';ctx.fillRect(0,0,W,H);
    }

    // 2. Pulsing red crack glow (center of door)
    const crackPulse=0.7+0.3*Math.sin(t*.025);
    const crackX=W/2;
    // Vertical light beam from crack
    const beam=ctx.createLinearGradient(crackX-40,H*.1,crackX+40,H*.1);
    beam.addColorStop(0,'rgba(0,0,0,0)');
    beam.addColorStop(.45,`rgba(200,20,8,${.18*crackPulse})`);
    beam.addColorStop(.5,`rgba(255,60,20,${.38*crackPulse})`);
    beam.addColorStop(.55,`rgba(200,20,8,${.18*crackPulse})`);
    beam.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=beam;
    ctx.fillRect(crackX-40,H*.08,80,H*.72);

    // Radial glow at base of crack
    const baseGlow=ctx.createRadialGradient(crackX,H*.75,5,crackX,H*.75,W*.28);
    baseGlow.addColorStop(0,`rgba(220,30,8,${.38*crackPulse})`);
    baseGlow.addColorStop(.3,`rgba(160,18,5,${.18*crackPulse})`);
    baseGlow.addColorStop(.7,`rgba(80,8,2,${.06*crackPulse})`);
    baseGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=baseGlow;ctx.fillRect(0,H*.4,W,H*.6);

    // 3. Fog layers — drawn bottom-up
    ctx.save();
    // Clip fog to bottom 55% of canvas
    ctx.beginPath();ctx.rect(0,H*.42,W,H*.6);ctx.clip();
    FOG.forEach((f,i)=>{
      f.x+=f.vx;f.y+=f.vy;
      // Respawn fog
      if(f.y<H*.3||f.x<-300||f.x>W+300)Object.assign(f,makeFog(W,H,false));
      const pulse=0.7+0.3*Math.sin(t*.018+f.phase);
      const fg=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.w/2);
      fg.addColorStop(0,`rgba(${f.r},${f.g},${f.b},${f.a*pulse})`);
      fg.addColorStop(.5,`rgba(${f.r},${f.g},${f.b},${f.a*.4*pulse})`);
      fg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=fg;
      ctx.beginPath();ctx.ellipse(f.x,f.y,f.w/2,f.h/2,0,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();

    // Dense fog ground band
    const gfog=ctx.createLinearGradient(0,H*.68,0,H);
    gfog.addColorStop(0,'rgba(0,0,0,0)');
    gfog.addColorStop(.3,`rgba(120,15,8,${.14*crackPulse})`);
    gfog.addColorStop(.6,`rgba(80,8,4,${.22*crackPulse})`);
    gfog.addColorStop(1,'rgba(20,2,2,.35)');
    ctx.fillStyle=gfog;ctx.fillRect(0,H*.68,W,H*.32);

    // 4. Ash / ember particles
    for(let i=ASH.length-1;i>=0;i--){
      const a=ASH[i];
      a.x+=a.vx+Math.sin(t*.015+a.phase)*.3;
      a.y+=a.vy;
      if(a.y>H+10){ASH[i]=makeAsh(W);}
      const flicker=0.6+0.4*Math.sin(t*.06+a.phase*3);
      ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,120,40,${a.a*flicker})`;ctx.fill();
    }
    if(ASH.length<45&&t%8===0)ASH.push(makeAsh(W));

    // 5. Edge vignette
    const vig=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.82);
    vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.62)');
    ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

    // Top darkness
    const topD=ctx.createLinearGradient(0,0,0,H*.12);
    topD.addColorStop(0,'rgba(0,0,0,.5)');topD.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=topD;ctx.fillRect(0,0,W,H*.12);

    t++;
  })();
}

function buildLinksDisplay(n){

  (lk.factions||[]).forEach(id=>{const x=db[id];if(x)h+=`<span class="ev-link faction" onclick="selectNode('${id}')">⚔ ${esc(x.name)}</span>`});
  (lk.gates||[]).forEach(id=>{const x=db[id];if(x)h+=`<span class="ev-link gate" onclick="selectNode('${id}')">🔥 ${esc(x.name)}</span>`});

function drawRadars(stats, compareStats){
  ['phys','magic','intel'].forEach(cat=>{
    const canvas=document.getElementById('radar-'+cat);
    if(!canvas)return;
    const def=STAT_DEFS[cat];
    const vals=stats[cat]||{};
    const globalNames=globalStatNames[cat]||{};
    const anyVal=def.stats.some(s=>vals[s]>0);if(!anyVal)return;
    const labels=def.stats.map(s=>globalNames[s]||s);
    const data=def.stats.map(s=>vals[s]||0);
    const cmpData=compareStats ? def.stats.map(s=>(compareStats[cat]||{})[s]||0) : null;
    drawSpider(canvas,labels,data,def.color,cmpData);
  });
}

function drawSpider(canvas,labels,data,color,cmpData){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2;
  const n=labels.length;
  const maxVal=100;
  const RINGS=5;
  const maxR=Math.min(W,H)/2-55;
  const angle=i=>(i/n)*Math.PI*2-Math.PI/2;

  ctx.clearRect(0,0,W,H);

  // Background rings
  for(let r=1;r<=RINGS;r++){
    const frac=r/RINGS;
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a=angle(i);
      const x=cx+Math.cos(a)*maxR*frac, y=cy+Math.sin(a)*maxR*frac;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle=r===RINGS?'rgba(255,255,255,.18)':'rgba(255,255,255,.07)';
    ctx.lineWidth=r===RINGS?1.2:.8; ctx.stroke();
  }

  // Axis spokes + scale numbers
  for(let i=0;i<n;i++){
    const a=angle(i);
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*maxR,cy+Math.sin(a)*maxR);
    ctx.strokeStyle='rgba(255,255,255,.13)'; ctx.lineWidth=1; ctx.stroke();
    if(i===0){
      for(let r=1;r<=RINGS;r++){
        const frac=r/RINGS;
        const x=cx+Math.cos(a)*maxR*frac, y=cy+Math.sin(a)*maxR*frac;
        ctx.font='bold 8px Cinzel,serif'; ctx.fillStyle='rgba(200,185,140,.55)';
        ctx.textAlign='right'; ctx.textBaseline='middle';
        ctx.fillText(String(r*20),x-6,y);
      }
    }
  }

  // Data polygon
  const cr=parseInt(color.slice(1,3),16);
  const cg=parseInt(color.slice(3,5),16);
  const cb=parseInt(color.slice(5,7),16);
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const a=angle(i); const frac=data[i]/maxVal;
    const x=cx+Math.cos(a)*maxR*frac, y=cy+Math.sin(a)*maxR*frac;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle=`rgba(${cr},${cg},${cb},0.22)`; ctx.fill();
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();

  // Compare overlay
  if(cmpData&&cmpData.some(v=>v>0)){
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a=angle(i); const frac=cmpData[i]/maxVal;
      const x=cx+Math.cos(a)*maxR*frac, y=cy+Math.sin(a)*maxR*frac;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fillStyle='rgba(255,180,50,0.15)'; ctx.fill();
    ctx.strokeStyle='#ffb832'; ctx.lineWidth=1.8;
    ctx.setLineDash([5,3]); ctx.stroke(); ctx.setLineDash([]);
    for(let i=0;i<n;i++){
      const a=angle(i); const frac=cmpData[i]/maxVal;
      const x=cx+Math.cos(a)*maxR*frac, y=cy+Math.sin(a)*maxR*frac;
      ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fillStyle='rgba(10,8,15,.9)';ctx.fill();
      ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle='#ffb832';ctx.fill();
    }
  }

  // Data point dots
  const ptCoords=[];
  for(let i=0;i<n;i++){
    const a=angle(i); const frac=data[i]/maxVal;
    const x=cx+Math.cos(a)*maxR*frac, y=cy+Math.sin(a)*maxR*frac;
    ptCoords.push({x,y,val:data[i],lbl:labels[i],cmpVal:cmpData?cmpData[i]:null});
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle='rgba(10,8,15,.9)';ctx.fill();
    ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  }

  // Labels
  const GAP=16;
  ctx.font='bold 11px Cinzel,serif'; ctx.fillStyle='rgba(225,215,245,.9)'; ctx.textBaseline='middle';
  for(let i=0;i<n;i++){
    const a=angle(i); const cosA=Math.cos(a), sinA=Math.sin(a);
    const lx=cx+cosA*(maxR+GAP), ly=cy+sinA*(maxR+GAP);
    if(Math.abs(cosA)<0.12) ctx.textAlign='center';
    else if(cosA>0)          ctx.textAlign='left';
    else                     ctx.textAlign='right';
    const parts=labels[i].split(' ');
    if(parts.length>1){
      const lh=13; ctx.fillText(parts[0],lx,ly-lh/2); ctx.fillText(parts.slice(1).join(' '),lx,ly+lh/2);
    } else {
      ctx.fillText(labels[i],lx,ly);
    }
  }

  // ── Hover tooltip ──
  // Store point coords in canvas dataset for mousemove
  canvas._radarPts = ptCoords;
  canvas._radarColor = color;

  // Attach listener only once
  if(!canvas._radarListenerAttached){
    canvas._radarListenerAttached = true;
    const tipEl = canvas.parentElement?.querySelector('[id^="radar-tip-"]');

    canvas.addEventListener('mousemove', e=>{
      const rect=canvas.getBoundingClientRect();
      const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
      const mx=(e.clientX-rect.left)*scaleX, my=(e.clientY-rect.top)*scaleY;
      const pts=canvas._radarPts||[];
      let closest=null, minD=20*scaleX;
      pts.forEach(pt=>{
        const d=Math.hypot(mx-pt.x,my-pt.y);
        if(d<minD){minD=d;closest=pt;}
      });
      if(closest&&tipEl){
        let txt=`${closest.lbl} : ${closest.val}`;
        if(closest.cmpVal!==null) txt+=`   ⚖ ${closest.cmpVal}`;
        tipEl.textContent=txt;
        // Position relative to canvas element in its display size
        const dispX=(closest.x/canvas.width)*rect.width;
        const dispY=(closest.y/canvas.height)*rect.height;
        tipEl.style.left=(dispX+10)+'px';
        tipEl.style.top=(dispY-18)+'px';
        tipEl.style.display='block';
      } else if(tipEl){
        tipEl.style.display='none';
      }
    });
    canvas.addEventListener('mouseleave',()=>{
      if(tipEl) tipEl.style.display='none';
    });
  }
}

function buildLinkOptions(type){
  // type: 'kingdoms','factions','gates','characters'
  let nodes=[];
  if(type==='kingdoms'){
    // all category kind='world'
    nodes=Object.values(db).filter(n=>n.kind==='world');
  } else if(type==='factions'){
    nodes=Object.values(db).filter(n=>(n.type==='category'||n.type==='gate')&&n.kind==='generic'&&n.name.toLowerCase().match(/faction|division|guild|ordre|alliance|clan|groupe/i));
    if(!nodes.length)nodes=Object.values(db).filter(n=>n.type==='category'&&n.kind==='generic');
  } else if(type==='gates'){
    nodes=Object.values(db).filter(n=>n.type==='gate');
  } else if(type==='characters'){
    nodes=Object.values(db).filter(n=>n.type==='entry').slice(0,30);
  }
  if(!nodes.length)return`<span style="font-size:12px;color:var(--text3);font-style:italic">Aucune option disponible</span>`;
  const sel=selLinks[type]||[];
  const key=type;
  return nodes.map(n=>`<span class="ls-option${sel.includes(n.id)?' selected':''}" onclick="toggleLink('${key}','${n.id}',this)">${n.icon||''} ${esc(n.name)}</span>`).join('');
}

function toggleLink(type,id,el){
  if(!selLinks[type])selLinks[type]=[];
  const idx=selLinks[type].indexOf(id);
  if(idx>=0){selLinks[type].splice(idx,1);el.classList.remove('selected')}
  else{selLinks[type].push(id);el.classList.add('selected')}
}

function buildStatSliders(stats){
  let h='';
  ['phys','magic','intel'].forEach(cat=>{
    const def=STAT_DEFS[cat];
    const vals=stats[cat]||{};
    const globalNames=globalStatNames[cat]||{};
    h+='<div class="stat-group"><div class="sg-title '+cat+'">'+def.label+'</div>';
    def.stats.forEach(s=>{
      const v=vals[s]||0;
      const displayName=globalNames[s]||s;
      h+='<div class="sr-row">'
        +'<div class="sr-lbl" title="Renommer via ⚙ Stats dans la barre du haut">'+esc(displayName)+'</div>'
        +'<input class="sr-inp" type="range" min="0" max="100" value="'+v+'" data-cat="'+cat+'" data-stat="'+s+'" oninput="this.nextElementSibling.textContent=this.value">'
        +'<div class="sr-num">'+v+'</div>'
        +'</div>';
    });
    h+='</div>';
  });
  return h;
}

function cfRow(k,v,i){

}

function saveEntry(){
  const name=document.getElementById('fn').value.trim();
  if(!name){alert('Nom requis');return}
  const subtitle=document.getElementById('fsu').value.trim();
  const body=document.getElementById('fbody').value.trim();
  const tagsRaw=document.getElementById('ftg').value.trim();
  const tags=tagsRaw?tagsRaw.split(',').map(t=>t.trim()).filter(Boolean):[];
  const entryType=mEntryType||'generic';
  const isChar=entryType==='character';

  // character-specific fields
  const lastName=document.getElementById('f-lastname')?.value.trim()||'';
  const charAge=document.getElementById('f-age')?.value.trim()||'';
  const charGender=document.getElementById('f-gender')?.value.trim()||'';
  const charStatus=document.getElementById('f-status')?.value||'';
  const charBio=document.getElementById('f-bio')?.value.trim()||'';
  const charPowers=document.getElementById('f-powers')?.value.trim()||'';
  const charGoals=document.getElementById('f-goals')?.value.trim()||'';

  // map entry fields
  const mapImg=document.getElementById('f-mapimg')?.src||null;
  const mapDesc=document.getElementById('f-mapdesc')?.value.trim()||'';

  const fields=[];
  document.querySelectorAll('[data-fk]').forEach(el=>{
    const i=el.dataset.fk;
    const vel=document.querySelector(`[data-fv="${i}"]`);
    if(el.value.trim())fields.push({k:el.value.trim(),v:vel?.value.trim()||''});
  });

  const stats={phys:{},magic:{},intel:{}};
  document.querySelectorAll('.sr-inp').forEach(inp=>{
    stats[inp.dataset.cat][inp.dataset.stat]=parseInt(inp.value)||0;
  });

  const links=JSON.parse(JSON.stringify(selLinks));

  const abilityRank  = document.getElementById('f-ability-rank')?.value||'';
  const abilitySchool= document.getElementById('f-ability-school')?.value.trim()||'';
  const data={name,icon:curIcon,iconData:curIconData||null,subtitle,tags,fields,body,images:[...pendImgs],links,stats,entryType,lastName,charAge,charGender,charStatus,charBio,charPowers,charGoals,mapDesc,abilityRank,abilitySchool};

  if(mMode==='new-entry'){
    const id=gid();
    db[id]={id,type:'entry',parentId:mPar,...data};
    if(mPar&&db[mPar]){db[mPar].children.push(id);expanded[mPar]=true}else rootIds.push(id);
    save();renderTree();closeModal();selectNode(id);
    if(_gardienSlot){db[id].gardienSlot=_gardienSlot.slotIdx;save();_gardienSlot=null;
      // Re-render gardiens scene if still visible
      const gNode=Object.values(db).find(nd=>nd.kind==='gardiens');
      if(gNode&&cur===gNode.id){const v=document.getElementById('view');renderGardiensImmersive(v,gNode);}
    }
  } else {
    Object.assign(db[mId],data);
    save();renderTree();closeModal();renderContent(mId);
  }
}

function confirmDialog(msg, onOk){
  const ov=document.getElementById('confirm-overlay');
  document.getElementById('confirm-msg').textContent=msg;
  ov.style.display='flex';
  const ok=document.getElementById('confirm-ok');
  const cancel=document.getElementById('confirm-cancel');
  const cleanup=()=>{ov.style.display='none';ok.onclick=null;cancel.onclick=null;};
  ok.onclick=()=>{cleanup();onOk();};
  cancel.onclick=cleanup;
}

function doDelete(id){
  if(!_isAdmin()) return;
  const n=db[id];if(!n)return;
  confirmDialog(`Supprimer « ${n.name} » et tout son contenu ?`, ()=>{
    delNode(id);save();renderTree();
    if(cur===id||isDesc(id,cur)){
      cur=null;document.getElementById('breadcrumb').innerHTML='';
      document.getElementById('view').innerHTML=`<div id="welcome"><div class="w-icon">⛩</div><div class="w-h">Gates of Hades</div></div>`;
    } else if(cur){
      renderContent(cur);
    }
  });
}
function delNode(id){
  const n=db[id];if(!n)return;
  (n.children||[]).forEach(cid=>delNode(cid));
  if(n.parentId&&db[n.parentId])db[n.parentId].children=db[n.parentId].children.filter(c=>c!==id);
  else rootIds=rootIds.filter(r=>r!==id);
  delete db[id];
}
function isDesc(ancId,checkId){
  if(!checkId)return false;
  let c=db[checkId];
  while(c){if(c.parentId===ancId)return true;c=c.parentId?db[c.parentId]:null}
  return false;
}

// ════════════════════════════════════════════
function doSearch(q){
  q=q.trim().toLowerCase();
  if(!q){if(cur)renderContent(cur);return}
  const res=Object.values(db).filter(n=>{
    const h=[n.name,n.subtitle,n.body,...(n.tags||[]),...(n.fields||[]).map(f=>f.k+' '+f.v)].join(' ').toLowerCase();
    return h.includes(q);
  });
  const v=document.getElementById('view');
  document.getElementById('breadcrumb').innerHTML=`<span class="crumb last">🔍 « ${esc(q)} » — ${res.length} résultat(s)</span>`;
  if(!res.length){v.innerHTML=`<div class="no-res">Aucun résultat.</div>`;return}
  v.innerHTML=`<div class="ev-wrap">`+res.map(n=>{
    const path=ancestors(n.id).map(x=>x.name).join(' › ');
    const prev=(n.body||n.subtitle||'').slice(0,100);
    return`<div class="sr-item" onclick="selectNode('${n.id}');document.getElementById('search').value=''">
      <div class="sr-path">${esc(path)}</div>
      <div class="sr-name">${n.icon||''} ${esc(n.name)}</div>
      ${prev?`<div class="sr-prev">${esc(prev)}…</div>`:''}
    </div>`;
  }).join('')+`</div>`;
}

  _arcRenderStats(existing?existing.stats:null, ch.stats);
